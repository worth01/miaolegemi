<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>喵呜乐消消·养好猫·趣闯关</title>
  <!-- 性能优化：预连接 CDN，节省 DNS+TCP+TLS 约 500ms -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://unpkg.com">
  <link rel="dns-prefetch" href="https://unpkg.com">
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>

  <script src="api.js"></script>
  <script>
    // Fallback API 如果 api.js 加载失败
    if (typeof MiaolegemiAPI === 'undefined') {
      console.warn('API script not loaded, using offline mode');
      window.MiaolegemiAPI = {
        isLoggedIn: () => false,
        logout: () => {},
        clearToken: () => {},
        getProfile: () => Promise.reject('offline'),
        getCats: () => Promise.resolve([]),
        login: () => Promise.reject('offline'),
        register: () => Promise.reject('offline'),
        cleanupCatPersonalities: () => Promise.resolve({ success: true, message: '离线模式无需清理' }),
      };
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0b072a; font-family: 'Noto Sans SC', -apple-system, sans-serif; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
    @keyframes fadeIn { 0%{opacity:0} 100%{opacity:1} }
    @keyframes slideUp { 0%{transform:translateY(30px);opacity:0} 100%{transform:translateY(0);opacity:1} }
    @keyframes coinPop { 0%{transform:scale(0.5);opacity:0} 60%{transform:scale(1.3);opacity:1} 100%{transform:scale(1);opacity:1} }
    @keyframes goldSweep { 0%{left:-100%;opacity:0} 20%{left:-100%;opacity:1} 50%{left:100%;opacity:1} 51%{left:100%;opacity:0} 100%{left:100%;opacity:0} }
    @keyframes particleFly { 0%{transform:translate(0,0) scale(1);opacity:1} 100%{transform:translate(var(--px),var(--py)) scale(0);opacity:0} }
    @keyframes catJumpOut { 0%{transform:translateY(0) scale(0.3);opacity:0} 30%{transform:translateY(-30px) scale(1.2);opacity:1} 50%{transform:translateY(-50px) scale(1);opacity:1} 65%{transform:translateY(-20px) scale(0.95)} 78%{transform:translateY(-42px) scale(1.05)} 90%{transform:translateY(-35px) scale(1)} 100%{transform:translateY(-40px) scale(1);opacity:1} }
    @keyframes ringPulse { 0%{transform:scale(0);opacity:0.8} 100%{transform:scale(2.5);opacity:0} }
    @keyframes bellShake { 0%{transform:rotate(0) scale(1)} 10%{transform:rotate(-18deg) scale(1.08)} 20%{transform:rotate(16deg) scale(1.05)} 30%{transform:rotate(-14deg) scale(1.06)} 40%{transform:rotate(12deg) scale(1.04)} 50%{transform:rotate(-10deg) scale(1.03)} 60%{transform:rotate(8deg) scale(1.02)} 70%{transform:rotate(-6deg) scale(1.01)} 80%{transform:rotate(4deg)} 90%{transform:rotate(-2deg)} 100%{transform:rotate(0) scale(1)} }
    @keyframes farewellFadeIn { 0%{opacity:0} 100%{opacity:1} }
    @keyframes farewellCatWalk { 0%{transform:translateY(0) translateX(0) scale(1);opacity:1} 20%{transform:translateY(-8px) translateX(10px) scale(1.05);opacity:1} 40%{transform:translateY(0) translateX(25px) scale(1);opacity:1} 60%{transform:translateY(-6px) translateX(45px) scale(0.95);opacity:0.8} 80%{transform:translateY(0) translateX(70px) scale(0.85);opacity:0.4} 100%{transform:translateY(-10px) translateX(100px) scale(0.6);opacity:0} }
    @keyframes farewellStar { 0%{transform:translateY(0) scale(0);opacity:0} 20%{transform:translateY(-20px) scale(1);opacity:1} 80%{transform:translateY(-80px) scale(0.8);opacity:0.6} 100%{transform:translateY(-120px) scale(0.3);opacity:0} }
    @keyframes farewellText { 0%{opacity:0;transform:translateY(20px)} 30%{opacity:1;transform:translateY(0)} 80%{opacity:1} 100%{opacity:0} }
    @keyframes farewellTear { 0%{transform:translateY(0) scale(1);opacity:0.8} 100%{transform:translateY(40px) scale(0.5);opacity:0} }

    /* P9: 布阵系统样式集成 */
    .zone-battle {
      background: linear-gradient(135deg, rgba(253, 150, 68, 0.12) 0%, rgba(108, 92, 231, 0.08) 50%, rgba(253, 150, 68, 0.06) 100%);
      border: 1px solid rgba(253, 150, 68, 0.2);
      margin: 0 16px 8px;
      border-radius: 24px;
      padding: 14px;
      position: relative;
      box-shadow: 0 4px 20px rgba(253, 150, 68, 0.1), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      transform: translateY(-2px); /* P9: 上移2px */
    }
    .zone-spectator {
      background: linear-gradient(180deg, rgba(0, 180, 216, 0.08) 0%, rgba(0, 212, 255, 0.04) 100%);
      border: 1px solid rgba(0, 180, 216, 0.15);
      margin: 8px 16px 20px;
      border-radius: 24px;
      padding: 14px;
      box-shadow: 0 4px 16px rgba(0, 180, 216, 0.08);
      transform: translateY(-2px); /* P9: 上移2px */
    }
    /* ═══ 暗黑模式 备战区 ═══ */
    .zone-battle-dark {
      background: rgba(253,150,68,0.08);
      backdrop-filter: blur(10px);
      border: 2px solid rgba(253,150,68,0.5);
      box-shadow: 0 0 12px rgba(253,150,68,0.25), 0 0 24px rgba(253,150,68,0.1);
    }
    .zone-spectator-dark {
      background: rgba(0,229,255,0.06);
      backdrop-filter: blur(10px);
      border: 2px solid rgba(0,229,255,0.4);
      box-shadow: 0 0 12px rgba(0,229,255,0.2), 0 0 24px rgba(0,229,255,0.08);
    }
    .slot-grid { 
      display: grid; 
      grid-template-columns: repeat(3, 30%); 
      justify-content: space-between; 
      gap: 0px; 
    }
    .slot {
      aspect-ratio: 0.72;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.02);
      border: 2px dashed rgba(255, 255, 255, 0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: all 0.3s;
      min-height: 135px;
    }
    .slot.active-slot { border-color: rgba(253, 150, 68, 0.3); }
    .slot.spectator-slot { border-color: rgba(0, 180, 216, 0.2); }
    .slot.filled { background: rgba(255,255,255,0.06); border: 2px solid rgba(82, 196, 26, 0.4); border-style: solid; }
    .slot.locked { background: rgba(255, 107, 107, 0.15); border: 2px solid rgba(255, 107, 107, 0.3); border-style: solid; }
    .slot-dark { background: rgba(22,12,44,0.6); border-style: solid; transition: all 0.3s; }
    .slot-dark.filled { border-width: 2px; background: rgba(22,12,44,0.8); }
    .slot-dark.active-slot:not(.filled) { border-color: rgba(253,150,68,0.25); border-style: dashed; }
    .slot-dark.spectator-slot:not(.filled) { border-color: rgba(0,229,255,0.25); border-style: dashed; }
    .slot-label {
      position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
      font-size: 9px; font-weight: 700; padding: 2px 8px; border-radius: 8px;
      background: rgba(0,0,0,0.5); white-space: nowrap;
    }
    .active-slot .slot-label {
      background: linear-gradient(135deg, rgba(253, 150, 68, 0.8), rgba(253, 150, 68, 0.5));
      color: #FD9644; border: 1px solid rgba(253, 150, 68, 0.8);
    }
    .spectator-slot .slot-label {
      background: linear-gradient(135deg, rgba(0, 180, 216, 0.8), rgba(0, 212, 255, 0.3));
      color: #00B4D8; border: 1px solid rgba(0, 180, 216, 0.8);
    }
    .cat-card-p9 {
      flex-shrink: 0; width: 81px; border-radius: 16px; padding: 12px 7px 10px;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08);
      display: flex; flex-direction: column; align-items: center; gap: 5px;
      cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
      position: relative; user-select: none; touch-action: none;
      animation: cat-float 4s ease-in-out infinite;
    }
    .cat-card-p9-dark {
      background: rgba(22,12,44,0.8);
      border: 1px solid transparent;
      box-shadow: 0 0 8px var(--rarity-glow, rgba(255,105,180,0.2));
    }
    .cat-card-p9-dark:hover {
      transform: scale(1.06);
      box-shadow: 0 0 16px var(--rarity-glow, rgba(255,105,180,0.3));
    }
    .slotted-cat { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; animation: dropIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
    @keyframes dropIn { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    /* ===== 喵了个咪 · 星形粒子背景层 ===== */
    .star-bg-layer {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .star-bg-grid {
      position: absolute;
      inset: 0;
      height: 33.3%;
      background-image: radial-gradient(circle, rgba(255,255,255,0.1) 1.5px, transparent 1.5px);
      background-size: 35px 35px;
      mask-image: linear-gradient(to right, #000 0%, #000 37.5%, transparent 37.5%, transparent 62.5%, #000 62.5%, #000 100%),
                  linear-gradient(to bottom, transparent 0%, rgba(0,0,0,1) 10%, rgba(0,0,0,1) 90%, transparent 100%);
      -webkit-mask-image: linear-gradient(to right, #000 0%, #000 37.5%, transparent 37.5%, transparent 62.5%, #000 62.5%, #000 100%),
                          linear-gradient(to bottom, transparent 0%, rgba(0,0,0,1) 10%, rgba(0,0,0,1) 90%, transparent 100%);
      mask-size: 100% 100%, 100% 100%;
      -webkit-mask-size: 100% 100%, 100% 100%;
    }
    .star-bg-layer .star {
      position: absolute;
      clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
      filter: drop-shadow(0 0 12px currentColor);
    }
    .star-bg-layer .star-1 { left: 8%; top: 15%; width: 48px; height: 48px; color: #a78bfa; background: linear-gradient(135deg, #c4b5fd 0%, #7c3aed 50%, #5b21b6 100%); animation: starPulseBg 2s ease-in-out infinite, starFloatBg 4s ease-in-out infinite; }
    .star-bg-layer .star-2 { right: 18%; top: 18%; width: 32px; height: 32px; color: #f472b6; background: linear-gradient(135deg, #f9a8d4 0%, #db2777 100%); animation: starPulseBg 1.8s ease-in-out infinite 0.4s, starFloatBg 3.5s ease-in-out infinite 0.6s; }
    .star-bg-layer .star-3 { right: 10%; top: 25%; width: 36px; height: 36px; color: #22c55e; background: linear-gradient(135deg, #86efac 0%, #16a34a 100%); animation: starPulseBg 2.2s ease-in-out infinite 0.8s, starFloatBg 4.2s ease-in-out infinite 1.2s; }
    .star-bg-layer .star-4 { left: 5%; top: 30%; width: 26px; height: 26px; color: #fbbf24; background: linear-gradient(135deg, #fde68a 0%, #d97706 100%); animation: starPulseBg 2s ease-in-out infinite 1.2s, starFloatBg 3.8s ease-in-out infinite 0.3s; }
    .star-bg-layer .star-5 { right: 28%; top: 35%; width: 22px; height: 22px; color: #60a5fa; background: linear-gradient(135deg, #93c5fd 0%, #2563eb 100%); animation: starPulseBg 1.6s ease-in-out infinite 0.2s, starFloatBg 3.2s ease-in-out infinite 0.8s; }
    @keyframes starPulseBg {
      0%, 100% { opacity: 0.65; filter: drop-shadow(0 0 10px currentColor); transform: scale(1); }
      50% { opacity: 1; filter: drop-shadow(0 0 28px currentColor) drop-shadow(0 0 48px currentColor); transform: scale(1.1); }
    }
    @keyframes starFloatBg {
      0%, 100% { transform: translateY(0) translateX(0); }
      33% { transform: translateY(-6px) translateX(3px); }
      66% { transform: translateY(-3px) translateX(-2px); }
    }
    .bg-blur-overlay {
      position: absolute; inset: 0; z-index: 0; pointer-events: none;
      filter: blur(1px);
      -webkit-mask-image: linear-gradient(to bottom, black 0%, black 1%, transparent 100%);
      mask-image: linear-gradient(to bottom, black 0%, black 1%, transparent 100%);
    }

    /* ═══ 暗黑粉蓝霓虹：全局规则 ═══ */
    @keyframes breathe {
      0% { filter: drop-shadow(0 0 2px rgba(255,46,185,0.35)) drop-shadow(0 0 4px rgba(255,90,208,0.15)); }
      100% { filter: drop-shadow(0 0 4px rgba(255,46,185,0.45)) drop-shadow(0 0 8px rgba(255,90,208,0.25)); }
    }
    @keyframes breatheOrange {
      0% { filter: drop-shadow(0 0 4px rgba(253,150,68,0.6)) drop-shadow(0 0 10px rgba(255,180,67,0.35)); }
      100% { filter: drop-shadow(0 0 8px rgba(253,150,68,0.8)) drop-shadow(0 0 18px rgba(255,180,67,0.5)); }
    }
    @keyframes breatheSoft {
      0% { filter: drop-shadow(0 0 4px #ff69b4) drop-shadow(0 0 8px #ff9ed8); }
      100% { filter: drop-shadow(0 0 10px #ff69b4) drop-shadow(0 0 20px #ff9ed8); }
    }

    /* 主按钮呼吸 — 冰蓝霓虹 */
    @keyframes breatheBtn {
      0% { filter: drop-shadow(0 0 8px rgba(0, 240, 255, 0.4)) drop-shadow(0 0 16px rgba(0, 240, 255, 0.2)) drop-shadow(0 0 12px rgba(138, 43, 226, 0.15)); }
      100% { filter: drop-shadow(0 0 12px rgba(0, 240, 255, 0.55)) drop-shadow(0 0 24px rgba(0, 240, 255, 0.3)) drop-shadow(0 0 20px rgba(138, 43, 226, 0.25)); }
    }
    .btn-main-dark {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; height: 52px;
      position: relative;
      cursor: pointer;
      border: none; outline: none;
      background: transparent;
      transition: transform 0.2s ease;
    }
    .btn-main-dark img {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 0 8px rgba(0, 240, 255, 0.4)) drop-shadow(0 0 16px rgba(0, 240, 255, 0.2)) drop-shadow(0 0 12px rgba(138, 43, 226, 0.15));
      animation: breatheBtn 2.5s infinite ease-in-out alternate;
      transition: all 0.2s ease;
    }
    .btn-main-dark:hover img {
      transform: scale(1.03);
      filter: drop-shadow(0 0 16px rgba(0, 240, 255, 0.7)) drop-shadow(0 0 32px rgba(0, 240, 255, 0.35)) drop-shadow(0 0 28px rgba(138, 43, 226, 0.4));
      animation: none;
    }
    .btn-main-dark:active img {
      transform: scale(0.97);
    }
    .btn-main-dark .btn-main-text {
      position: relative; z-index: 2;
      font-size: 18px; font-weight: 800; color: #fff;
      letter-spacing: 1px; pointer-events: none;
      text-shadow: 0 0 4px rgba(0, 240, 255, 0.8);
    }

    /* ═══ 出战席 卡片+头像 独立发光 ═══ */
    .battle-card-ssr {
      border: 2px solid rgba(253,150,68,0.7);
      box-shadow: 0 0 7px rgba(253,150,68,0.5), 0 0 16px rgba(255,180,67,0.3), 0 0 30px rgba(255,180,67,0.12);
      animation: breathe 2.5s infinite ease-in-out alternate;
    }
    .battle-card-n {
      border: 2px solid rgba(0,184,148,0.7);
      box-shadow: 0 0 7px rgba(0,184,148,0.5), 0 0 16px rgba(85,239,196,0.3), 0 0 30px rgba(85,239,196,0.12);
    }
    .battle-card-sr {
      border: 2px solid rgba(108,92,231,0.7);
      box-shadow: 0 0 7px rgba(108,92,231,0.5), 0 0 16px rgba(162,155,254,0.3), 0 0 30px rgba(162,155,254,0.12);
    }
    .battle-card-r {
      border: 2px solid rgba(0,229,255,0.7);
      box-shadow: 0 0 7px rgba(0,229,255,0.5), 0 0 16px rgba(0,153,255,0.3), 0 0 30px rgba(0,153,255,0.12);
    }
    .battle-avatar-ssr {
      filter: drop-shadow(0 0 6px rgba(253,150,68,0.8)) drop-shadow(0 0 14px rgba(255,180,67,0.5));
      animation: breatheOrange 2.5s infinite ease-in-out alternate;
    }
    .battle-avatar-n {
      filter: drop-shadow(0 0 6px rgba(0,184,148,0.8)) drop-shadow(0 0 14px rgba(85,239,196,0.5));
    }
    .battle-avatar-r {
      filter: drop-shadow(0 0 6px rgba(0,229,255,0.8)) drop-shadow(0 0 14px rgba(0,153,255,0.5));
    }
    .battle-avatar-sr {
      filter: drop-shadow(0 0 6px rgba(108,92,231,0.8)) drop-shadow(0 0 14px rgba(162,155,254,0.5));
    }

    /* ═══ 首页 中心猫咪霓虹圈 ═══ */
    .cat-neon-ring {
      border-radius: 50%;
      border: 3px solid #ff2eb9;
      filter: drop-shadow(0 0 5px #ff2eb9) drop-shadow(0 0 10px #ff5ad0);
      animation: breathe 2.5s infinite ease-in-out alternate;
    }

    /* ═══ 卡片容器 ═══ */
    .battle-container-dark {
      background: transparent;
      backdrop-filter: none;
      border: 2px solid rgba(255,105,180,0.4);
      border-radius: 16px;
      box-shadow: 0 0 8px rgba(255,105,180,0.3), 0 0 16px rgba(255,46,185,0.2);
    }
    .battle-slot-dark {
      background: rgba(105,60,130,0.06);
      backdrop-filter: none;
      border-radius: 16px;
      transition: all 0.2s ease;
    }

    /* ═══ 底部导航 霓虹状态 ═══ */
    .nav-item-active-dark {
      color: #00e5ff;
      filter: drop-shadow(0 0 6px #00e5ff);
    }
    .nav-item-idle-dark {
      color: #ff69b4;
      filter: drop-shadow(0 0 4px #ff69b4);
    }

    /* ═══ 「我的」页面 卡片 ═══ */
    .profile-card-dark {
      background: rgba(22,12,44,0.8);
      border: 2px solid rgba(255,105,180,0.5);
      border-radius: 16px;
      backdrop-filter: blur(8px);
      box-shadow: 0 0 8px rgba(255,105,180,0.2), 0 0 16px rgba(255,46,185,0.1);
    }
    .profile-card-dark-stat {
      text-shadow: 0 0 8px currentColor;
    }
    .profile-avatar-dark {
      filter: drop-shadow(0 0 16px #ff69b4) drop-shadow(0 0 32px #ff2eb9);
    }
    .profile-title-active-dark {
      filter: drop-shadow(0 0 10px #ff69b4);
    }
    .memorial-card-dark {
      background: rgba(22,12,44,0.6);
      border: 1px solid rgba(255,105,180,0.08);
      border-radius: 14px;
      transition: all 0.2s ease;
    }
    .memorial-card-dark:hover {
      border-color: rgba(255,46,185,0.3);
      filter: drop-shadow(0 0 12px #ff2eb9);
    }
    .about-row-dark {
      border-bottom: 1px solid rgba(255,105,180,0.06);
      transition: all 0.2s ease;
    }
    .about-row-dark:hover {
      background: rgba(255,105,180,0.04);
      border-radius: 8px;
    }

    /* ═══ 弹窗 ═══ */
    @keyframes modalGlowDark {
      0%,100% { box-shadow: 0 0 12px rgba(0,229,255,0.4), 0 0 28px rgba(0,153,255,0.2), 0 20px 60px rgba(0,0,0,0.7); }
      50%      { box-shadow: 0 0 16px rgba(0,229,255,0.6), 0 0 36px rgba(0,153,255,0.25), 0 20px 60px rgba(0,0,0,0.7); }
    }
    @keyframes flowGreen {
      0%   { border-color: #00ffcc; box-shadow: 0 0 8px #00ffcc66, 0 4px 0 #00805566; }
      33%  { border-color: #33ffaa; box-shadow: 0 0 12px #33ffaa55, 0 4px 0 #00805566; }
      66%  { border-color: #66ff88; box-shadow: 0 0 8px #66ff8855, 0 4px 0 #00805566; }
      100% { border-color: #00ffcc; box-shadow: 0 0 8px #00ffcc66, 0 4px 0 #00805566; }
    }
    @keyframes flowPink {
      0%   { border-color: #ff3366; box-shadow: 0 0 8px #ff336666, 0 4px 0 #660022; }
      33%  { border-color: #9933ff; box-shadow: 0 0 12px #9933ff55, 0 4px 0 #330066; }
      66%  { border-color: #cc33ff; box-shadow: 0 0 8px #cc33ff55, 0 4px 0 #550066; }
      100% { border-color: #ff3366; box-shadow: 0 0 8px #ff336666, 0 4px 0 #660022; }
    }
    @keyframes flowBlue {
      0%   { border-color: #00ffff; box-shadow: 0 0 8px #00ffff66, 0 4px 0 #003366; }
      33%  { border-color: #3399ff; box-shadow: 0 0 12px #3399ff55, 0 4px 0 #002255; }
      66%  { border-color: #66ccff; box-shadow: 0 0 8px #66ccff55, 0 4px 0 #003366; }
      100% { border-color: #00ffff; box-shadow: 0 0 8px #00ffff66, 0 4px 0 #003366; }
    }
    @keyframes flowPurple {
      0%   { border-color: #9933ff; box-shadow: 0 0 8px #9933ff66, 0 4px 0 #330066; }
      33%  { border-color: #6666ff; box-shadow: 0 0 12px #6666ff55, 0 4px 0 #220055; }
      66%  { border-color: #8066ff; box-shadow: 0 0 8px #8066ff55, 0 4px 0 #2a0066; }
      100% { border-color: #9933ff; box-shadow: 0 0 8px #9933ff66, 0 4px 0 #330066; }
    }
    @keyframes flowPinkOrange {
      0%   { border-color: #FF4D79; box-shadow: 0 0 8px #FF4D79, 0 3px 0 #662233; }

    @keyframes smoothFlow {
      0% { background-position: 0% 50%; }
      100% { background-position: 100% 50%; }
    }
    .card-flow-border {
      position: relative;
      overflow: hidden;
    }
    .card-flow-border::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 3px;
      background: linear-gradient(90deg, #fff 0%, #333 20%, #000 40%, #555 60%, #fff 80%, #222 100%);
      background-size: 200% 100%;
      animation: smoothFlow 8s linear infinite;
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask-composite: exclude;
      pointer-events: none;
      z-index: 10;
    }
    .flow-btn {
      position: relative;
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 0;
      overflow: hidden;
    }
    .flow-btn .inner {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      background: #111;
      color: #fff;
      font-weight: 700;
      text-align: center;
      border-radius: 6px;
      margin: 2px;
      z-index: 2;
      text-shadow: 0 0 5px rgba(255,255,255,0.2);
      padding: 10px 8px;
      font-size: 11px;
      transition: opacity 0.2s;
    }
    .flow-btn::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      border-radius: 10px;
      z-index: 1;
      background-size: 400% 400%;
      animation: smoothFlow 6s linear infinite;
    }

const AGREEMENT_VERSION = 1; // 协议版本号，更新协议后需递增

const GUEST_MODE_KEY = 'miaolegemi_guest_mode';
function getAgreementStatus() {
  try {
    const data = JSON.parse(localStorage.getItem(AGREEMENT_KEY));
    return data || {
      agreed: false,
      version: 0,
      agreedAt: null
    };
  } catch {
    return {
      agreed: false,
      version: 0,
      agreedAt: null
    };
  }
}
function setAgreementStatus() {
  localStorage.setItem(AGREEMENT_KEY, JSON.stringify({
    agreed: true,
    version: AGREEMENT_VERSION,
    agreedAt: Date.now()
  }));
}
function isGuestMode() {
  try {
    return JSON.parse(localStorage.getItem(GUEST_MODE_KEY)) === true;
  } catch {
    return false;
  }
}
function setGuestMode() {
  localStorage.setItem(GUEST_MODE_KEY, 'true');
}
function clearGuestMode() {

/* ═══════════════════════════════════════
   P2: 猫咪不和冲突检测（黑猫+三花猫）
   ═══════════════════════════════════════ */
const CAT_CONFLICTS = {
  '黑猫': ['三花猫'],
  '三花猫': ['黑猫']
};
function checkCatConflict(cat1, cat2) {
  if (!cat1 || !cat2) return false;
  const c1Conflicts = CAT_CONFLICTS[cat1.breedId] || CAT_CONFLICTS[cat1.name] || [];
  return c1Conflicts.includes(cat2.breedId) || c1Conflicts.includes(cat2.name);
}
function validateBattleLineup(cats) {
  // cats: 最多4只出战猫咪
  for (let i = 0; i < cats.length; i++) {
    for (let j = i + 1; j < cats.length; j++) {
      if (checkCatConflict(cats[i], cats[j])) {
        return {
          valid: false,
          conflict: [cats[i], cats[j]]
        };
      }
    }
  }
  return {
    valid: true
  };
}

    // SR: 5%
    SSR: 2 // SSR: 2%
  },
  // 保底配置
  pity: {
    sr: 20,
    // SR小保底：每20抽至少出SR
    ssr: 80 // SSR大保底：每80抽必出SSR
  },
  // SSR概率递进表
  // 每累计N抽后，SSR概率提升
  ssrProgressive: [{
    count: 0,
    rate: 2
  },
  // 0-19抽：2%
  {
    count: 20,
    rate: 5
  },
  // 20-39抽：5%
  {
    count: 40,
    rate: 10
  },
  // 40-59抽：10%
  {
    count: 60,
    rate: 20
  },
  // 60-79抽：20%
  {
    count: 80,
    rate: 100
  } // 80抽：100%保底
  ]
};

/**
 * 计算当前抽数的SSR概率
 * @param {number} pityCount - 当前保底计数器
 * @returns {number} SSR概率百分比
 */
function getCurrentSSRRate(pityCount) {
  const config = GACHA_CONFIG.ssrProgressive;
  for (let i = config.length - 1; i >= 0; i--) {
    if (pityCount >= config[i].count) {
      return config[i].rate;
    }
  }
  return config[0].rate;
}

/**
 * 获取保底进度信息
 * @param {number} pityCount - 当前保底计数器
 * @returns {object} { nextTier, countToNext, currentRate, nextRate }
 */
function getPityProgress(pityCount) {
  const {
    ssr,
    sr
  } = GACHA_CONFIG.pity;

  // 计算到SSR保底的距离
  const ssrRemaining = ssr - pityCount % ssr;

  // 计算到SR小保底的距离
  const srRemaining = sr - pityCount % sr;

  // 获取当前和下一级概率
  const currentRate = getCurrentSSRRate(pityCount);
  const nextRate = getCurrentSSRRate(Math.min(pityCount + 1, ssr - 1));
  return {
    ssrProgress: pityCount % ssr,
    ssrTotal: ssr,
    ssrRemaining,
    srProgress: pityCount % sr,
    srTotal: sr,
    srRemaining: srRemaining % sr || sr,
    currentSSRRate: currentRate,
    nextSSRRate: nextRate,
    // 下一个里程碑
    nextMilestone: srRemaining <= ssrRemaining ? 'sr' : 'ssr',
    milestoneRemaining: Math.min(srRemaining, ssrRemaining)
  };
}

/**
 * 执行抽卡逻辑
 * @param {number} pityCount - 当前保底计数器
 * @returns {{ breed, rarity, pityCount, triggeredPity }}
 */
function doGacha(pityCount) {
  const config = GACHA_CONFIG;
  const {
    sr,
    ssr
  } = config.pity;
  let triggeredPity = null;
  let rarity = 'N';

  // 检查保底
  const currentSSRRate = getCurrentSSRRate(pityCount);
  const newPityCount = pityCount + 1;

  // 1. 先检查SSR大保底（80抽必出）
  if (newPityCount % ssr === 0) {
    rarity = 'SSR';
    triggeredPity = {
      type: 'ssr',
      count: ssr
    };
  }
  // 2. 检查SR小保底（20抽至少SR）
  else if (newPityCount % sr === 0) {
    rarity = Math.random() < 0.3 ? 'SSR' : 'SR'; // 30%概率升为SSR
    triggeredPity = {
      type: 'sr',
      rarity,
      count: sr
    };
  }
  // 3. 正常概率抽取（带递进概率）
  else {
    const roll = Math.random() * 100;
    if (roll < currentSSRRate) {
      rarity = 'SSR';
    } else if (roll < currentSSRRate + config.baseRates.SR) {
      rarity = 'SR';
    } else if (roll < currentSSRRate + config.baseRates.SR + config.baseRates.R) {
      rarity = 'R';
    } else {
      rarity = 'N';
    }
  }

  // 从对应稀有度池中随机选择
  const pool = BREEDS.filter(b => b.rarity === rarity);
  const breed = pool[Math.floor(Math.random() * pool.length)];
  return {
    breed,
    rarity,
    triggeredPity,
    // 如果触发了保底，重置计数器；否则+1
    newPityCount: triggeredPity && triggeredPity.type === 'ssr' ? 0 : newPityCount
  };
}

function sanitizePersonality(raw, breedId) {
  if (!raw) return getDefaultPersonality(breedId);
  const val = Array.isArray(raw) ? raw[0] : raw;
  if (STANDARD_PERSONALITIES.has(val)) return val;

  if (PERSONALITY_CLEAN_MAP[val]) return PERSONALITY_CLEAN_MAP[val];
  // 模糊匹配：包含标准性格关键词的旧值
  for (const std of STANDARD_PERSONALITIES) {
    if (val.includes(std)) return std;
  }
  // 兜底：返回品种默认性格
  return getDefaultPersonality(breedId);
}

const STORAGE_KEY = 'miaolegemi_p0_v1';
function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const data = JSON.parse(saved);
      globalSerialId = data.globalSerialId || 1;
      fishLedger = data.fishLedger || fishLedger;
      // P3: load breed serial counters and cooling pool
      breedSerialCounters = data.breedSerialCounters || {};
      coolingPool = data.colingPool || data.coolingPool || {};
      cleanCoolingPool();
      let cats = data.cats || seedInitialCats();
      // P3: migrate old cats missing breedSerial
      cats = cats.map(c => {
        if (!c.breedSerial) {
          const bs = breedSerialCounters[c.breedId] || 1;
          breedSerialCounters[c.breedId] = bs + 1;
          return {
            ...c,
            breedSerial: bs,
            isGenesis: bs <= 10
          };
        }
        return c;
      });
      // 迁移旧版猫图片路径 cat/ → assets/Textures/cat/
      cats = cats.map(c => {
        if (c.img && c.img.startsWith('cat/')) {
          return { ...c, img: 'assets/Textures/' + c.img };
        }
        return c;
      });
      // 迁移 .png → .webp 扩展名
      cats = cats.map(c => {
        if (c.img && c.img.endsWith('.png')) {
          return { ...c, img: c.img.replace('.png', '.webp') };
        }
        return c;
      });
      // 修正猫咪稀有度，强制跟品种定义走
      cats = cats.map(c => {
        const breed = BREEDS.find(b => b.id === c.breedId);
        if (breed && breed.rarity !== c.rarity) {
          return {
            ...c,
            rarity: breed.rarity
          };
        }
        return c;
      });
      // P3: auto-wander — expire bag cats past their deadline
      cats = cats.map(c => {
        if (c.location === 'bag' && c.bagExpiresAt && Date.now() > c.bagExpiresAt) {
          return {
            ...c,
            location: 'memorial',
            releasedAt: c.bagExpiresAt
          };
        }
        // P2: migrate nurturing to home
        if (c.location === 'nurturing') {
          return {
            ...c,
            location: 'home'
          };
        }
        return c;
      });
      return cats;
    }
  } catch (e) {}
  return seedInitialCats();
}

/* ═══════════════════════════════════════
   分享工具：Web Share API 优先，降级剪贴板 + Toast
   ═══════════════════════════════════════ */
let _shareToastCallback = null;
function setShareToastCallback(fn) {
  _shareToastCallback = fn;
}
function showShareToast(msg) {
  if (_shareToastCallback) _shareToastCallback(msg);
}
async function shareContent({
  title,
  text,
  url,
  onSuccess,
  onError
}) {
  const shareData = {
    title: title || '喵呜乐消消',
    text: text || '',
    url: url || window.location.href
  };

  // 1. 优先 Web Share API（移动端原生分享面板，可分享到微信/短信等）
  if (navigator.share) {
    try {
      await navigator.share(shareData);
      if (onSuccess) onSuccess();
      return 'shared';
    } catch (err) {
      // 用户取消分享不是错误
      if (err.name === 'AbortError') return 'cancelled';
      // 其他错误降级到剪贴板
    }
  }

  // 2. 降级：剪贴板复制 + Toast 提示
  try {
    const copyText = text + (url ? '\n' + url : '');
    if (navigator.clipboard && navigator.clipboard.writeText) {
      await navigator.clipboard.writeText(copyText);
    } else {
      // 最后的降级方案
      const textarea = document.createElement('textarea');
      textarea.value = copyText;
      textarea.style.position = 'fixed';
      textarea.style.opacity = '0';
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand('copy');
      document.body.removeChild(textarea);
    }
    showShareToast('已复制到剪贴板，去粘贴分享吧～');
    if (onSuccess) onSuccess();
    return 'copied';
  } catch (err) {
    showShareToast('分享失败，请稍后再试');
    if (onError) onError(err);
    return 'failed';
  }
}

function generateInviteCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = '';
  for (let i = 0; i < 8; i++) {
    code += chars[Math.floor(Math.random() * chars.length)];
  }
  return code;
}
function getOrCreateInviteCode() {
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    if (saved.myInviteCode) return saved.myInviteCode;
    const code = generateInviteCode();
    saved.myInviteCode = code;
    saved.inviteCodes = saved.inviteCodes || [];
    saved.inviteCodes.push({
      code,
      createdAt: Date.now()
    });
    localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
    return code;
  } catch (e) {
    return generateInviteCode();
  }
}
function getTodayInviteRewardCount() {
  const todayStart = new Date();
  todayStart.setHours(0, 0, 0, 0);
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    const rewards = saved.inviteRewards || [];
    return rewards.filter(r => r.time > todayStart.getTime()).length;
  } catch (e) {
    return 0;
  }
}
function processInviteReward(inviteCode) {
  if (!inviteCode) return false;
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    const myCode = saved.myInviteCode;
    if (inviteCode === myCode) return false;
    const codes = saved.inviteCodes || [];
    const match = codes.find(c => c.code === inviteCode);
    if (match && Date.now() - match.createdAt > 86400000) return false;
    const rewards = saved.inviteRewards || [];
    if (rewards.some(r => r.code === inviteCode && r.role === 'invitee')) return false;
    const todayStart = new Date();
    todayStart.setHours(0, 0, 0, 0);
    const todayRewards = rewards.filter(r => r.time > todayStart.getTime());
    if (todayRewards.length >= 3) return false;
    rewards.push({
      code: inviteCode,
      time: Date.now(),
      role: 'invitee',
      amount: 30
    });
    saved.inviteRewards = rewards;
    const ledger = saved.fishLedger || [];
    ledger.push({
      type: 'earn',
      amount: 30,
      desc: '好友推荐奖励',
      time: Date.now()
    });
    saved.fishLedger = ledger;
    if (match && !match.claimed) {
      match.claimed = true;
      match.claimedAt = Date.now();
      if (!rewards.some(r => r.code === inviteCode && r.role === 'inviter')) {
        rewards.push({
          code: inviteCode,
          time: Date.now(),
          role: 'inviter',
          amount: 30
        });
        ledger.push({
          type: 'earn',
          amount: 30,
          desc: '好友推荐奖励（邀请）',
          time: Date.now()
        });
        saved.fishLedger = ledger;
      }
    }
    localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
    return true;
  } catch (e) {
    return false;
  }
}

function computeCatStatus(cat) {
  // P2: 家园猫咪使用亲密度系统，不再有饥饿状态
  if (cat.location === 'home') return 'alive';
  if (cat.location !== 'nurturing' || !cat.lastFedAt) return 'alive';
  const hoursSinceFeed = (Date.now() - cat.lastFedAt) / 3600000;
  if (hoursSinceFeed >= 96) return 'packing'; // 4 days
  if (hoursSinceFeed >= 48) return 'starving'; // 2 days
  if (hoursSinceFeed >= 24) return 'hungry'; // hungry after 1 day
  return 'alive';
}
function getRemainingDays(cat) {
  if (cat.location === 'bag') {
    return Math.max(0, Math.ceil((cat.bagExpiresAt - Date.now()) / 86400000));
  }
  if (cat.location === 'home') {
    // P2: 家园猫咪没有倒计时，永生
    return 999;
  }
  return 0;
}

/* ═══════════════════════════════════════
   CAT MEOW SOUND (Web Audio API 合成喵叫)
   ═══════════════════════════════════════ */
let _globalAudioCtx = null;
function getGlobalAudioCtx() {
  if (!_globalAudioCtx) {
    _globalAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (_globalAudioCtx.state === 'suspended') {
    _globalAudioCtx.resume();
  }
  return _globalAudioCtx;
}
function playMeowSound(pitch = 600) {
  try {
    const ctx = getGlobalAudioCtx();
    const t = ctx.currentTime;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'triangle';
    // 模拟猫叫声：音高先升后降
    osc.frequency.setValueAtTime(pitch, t);
    osc.frequency.exponentialRampToValueAtTime(pitch * 1.3, t + 0.08);
    osc.frequency.exponentialRampToValueAtTime(pitch * 0.6, t + 0.2);
    osc.frequency.linearRampToValueAtTime(pitch * 0.3, t + 0.4);
    gain.gain.setValueAtTime(0.15, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
    osc.start(t);
    osc.stop(t + 0.4);
  } catch (e) {/* 降级：不支持则静默 */}
}
function unlockAudioCtx() {
  const ctx = getGlobalAudioCtx();
  if (ctx.state === 'suspended') {
    ctx.resume();
  }
  // 播放无声 buffer 彻底解锁 iOS
  try {
    const buf = ctx.createBuffer(1, 1, 22050);
    const src = ctx.createBufferSource();
    src.buffer = buf;
    src.connect(ctx.destination);
    src.start(0);
  } catch (e) {}
}

(function() {
  function adaptToDevice() {
    const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent)
                  || window.innerWidth <= 480;
    const mockup = document.querySelector('.phone-mockup');
    const screen = document.querySelector('.phone-screen');
    if (!mockup || !screen) return;
    if (isMobile) {
      var w = window.innerWidth;
      var h = window.innerHeight;
      mockup.style.cssText = 'position:fixed!important;top:0!important;left:0!important;transform:none!important;width:'+w+'px!important;height:'+h+'px!important;max-height:none!important;border-radius:0!important;border:none!important;box-shadow:none!important';
      screen.style.cssText = 'border-radius:0!important';
    }
  }
  adaptToDevice();
  window.addEventListener('resize', adaptToDevice);
  window.addEventListener('orientationchange', function() {
    setTimeout(adaptToDevice, 200);
  });
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', adaptToDevice);
  }
})();

  <script>
