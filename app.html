function GachaPage({ bells, pityCount, onGacha, cats, onCardClick }) {

// Pre-computed 128 gold particle positions
  const goldParticles = useRef(Array.from({ length: 128 }, (_, i) => {
    const angle = (i / 128) * Math.PI * 2;
    const dist = 80 + Math.random() * 120;
    return {
      px: Math.cos(angle) * dist + 'px',
      py: Math.sin(angle) * dist + 'px',
      color: ['#FFEAA7','#FFB730','#FD9644','#FFD700'][i % 4],
      delay: (Math.random() * 0.3).toFixed(2) + 's',
    };
  })).current;

  const [animPhase, setAnimPhase] = useState('idle'); // idle → shake → reveal → idle
  const [animCat, setAnimCat] = useState(null);
  const timersRef = useRef([]);
  const PAGE_SIZE = 8;
  const [myCatPage, setMyCatPage] = useState(0);

  // Cleanup timers on unmount
  useEffect(() => {
    return () => timersRef.current.forEach(clearTimeout);
  }, []);

  // 使用新的保底系统
  const pityInfo = getPityProgress(pityCount);

  const handleGacha = () => {
    if (bells < 1 || animPhase !== 'idle') return;

    // 使用新保底系统
    const result = doGacha(pityCount);
    const { breed, rarity, newPityCount, triggeredPity } = result;

    const previewCat = {
      breedId: breed.id,
      name: breed.id,
      rarity: breed.rarity,
      img: breed.img,
      desc: breed.desc,
      personality: BREED_DEFAULT_PERSONALITIES[breed.id] || '傲娇',
      serialId: globalSerialId + 1,
      breedSerial: breedSerialCounters[breed.id] || 1,
      triggeredPity, // 标记是否触发保底
    };

    setAnimCat(previewCat);
    setAnimPhase('shake');

    // Animation timeline: shake+sweep+particles(1.5s) → cat pops out(1.5s) → done
    timersRef.current = [
      setTimeout(() => {
        onGacha(previewCat.breedId, previewCat.rarity, newPityCount, triggeredPity);
        setAnimPhase('reveal');
      }, 1500),
      setTimeout(() => {
        setAnimPhase('idle');
        setAnimCat(null);
      }, 3000),
    ];
  };

  // Sort cats: SSR > SR > R > N, same rarity by serialId ascending
  const RARITY_WEIGHT = { SSR: 4, SR: 3, R: 2, N: 1 };
  const sortedCats = [...cats].sort((a, b) => {
    const w = (RARITY_WEIGHT[b.rarity] || 0) - (RARITY_WEIGHT[a.rarity] || 0);
    return w !== 0 ? w : a.serialId - b.serialId;
  });

  const isAnimating = animPhase !== 'idle';

  return (
    <div style={{ paddingBottom: 0 }}>
      {/* Gacha area */}
      <div style={{ padding:'16px 20px 12px', textAlign:'center' }}>
        <div style={{ fontSize:14, fontWeight:700, color:colors.ink, marginBottom:4 }}>🎁 猫咪抽卡· 现有{bells} 颗🔔· 消耗1枚抽一次</div>
        
        {/* 双轨保底进度条 */}
        <div style={{ marginBottom:16 }}>
          {/* SSR大保底进度 */}
          <div style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:8, marginBottom:8 }}>
            <span style={{ fontSize:10, color:colors.muted }}>✨SSR</span>
            <div style={{ width:120, height:6, borderRadius:3, background: colors.bg2, overflow:'hidden', position:'relative' }}>
              <div style={{ 
                height:'100%', 
                width:`${Math.min(100, pityInfo.ssrProgress/80*100)}%`, 
                borderRadius:3, 
                background: pityInfo.ssrRemaining <= 10 ? 'linear-gradient(90deg, #FF6B6B, #FD9644)' : 'linear-gradient(90deg, #FD9644, #FFEAA7)', 
                transition:'width 0.3s',
                boxShadow: pityInfo.ssrRemaining <= 10 ? '0 0 8px #FD9644' : 'none',
              }}/>
              {/* 递进概率标记点 */}
              {[20, 40, 60].map(mark => (
                <div key={mark} style={{
                  position:'absolute', left:`${mark/80*100}%`, top:0, bottom:0, width:1, background: colors.cardBorder
                }}/>
              ))}
            </div>
            <span style={{ fontSize:10, fontWeight:600, color: pityInfo.ssrRemaining <= 10 ? colors.red : colors.orange }}>
              {pityInfo.ssrRemaining <= 10 ? `🔥${pityInfo.ssrRemaining}` : pityInfo.ssrProgress}/{pityInfo.ssrTotal}
            </span>
            <span style={{ fontSize:8, color:colors.muted, background:'rgba(253,150,68,0.2)', padding:'2px 6px', borderRadius:4 }}>
              {pityInfo.currentSSRRate}%
            </span>
          </div>
          {/* SR小保底进度 */}
          <div style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:8 }}>
            <span style={{ fontSize:10, color:colors.muted }}>💎SR</span>
            <div style={{ width:120, height:4, borderRadius:2, background: colors.bg2, overflow:'hidden' }}>
              <div style={{ 
                height:'100%', 
                width:`${pityInfo.srProgress/pityInfo.srTotal*100}%`, 
                borderRadius:2, 
                background: pityInfo.srRemaining <= 5 ? 'linear-gradient(90deg, #6C5CE7, #A29BFE)' : 'linear-gradient(90deg, #6C5CE7, #9B8FE8)', 
                transition:'width 0.3s',
                boxShadow: pityInfo.srRemaining <= 5 ? '0 0 6px #6C5CE7' : 'none',
              }}/>
            </div>
            <span style={{ fontSize:10, fontWeight:600, color: pityInfo.srRemaining <= 5 ? '#A29BFE' : colors.purple }}>
              {pityInfo.srRemaining <= 5 ? `${pityInfo.srRemaining}抽` : `${pityInfo.srProgress}/${pityInfo.srTotal}`}
            </span>
          </div>
        </div>

        {/* Gacha display area — shrunk 10%, centered */}
        <div style={{ display:'flex', justifyContent:'center', marginBottom:14 }}>
          <div style={{
            width:'90%', aspectRatio:'1', borderRadius:18, overflow:'hidden',
            background: colors.card, border:`1px solid ${colors.cardBorder}`,
            display:'flex', alignItems:'center', justifyContent:'center',
            position:'relative',
          }}>
            {/* Idle: cat bell */}
            {animPhase === 'idle' && (
              <img src="cat/猫铃铛.png" alt="猫铃铛" style={{ width:'100%', height:'100%', objectFit:'contain' }}
                onError={e => {
                  e.target.style.display = 'none';
                  e.target.parentElement.innerHTML = '<div style="text-align:center;color:rgba(240,237,255,0.25);font-size:13px">猫铃铛</div>';
                }} />
            )}

            {/* Bell shaking + gold sweep + particles — all simultaneous */}
            {animPhase === 'shake' && (
              <>
                {/* Bell fills div, shaking */}
                <img src="cat/猫铃铛.png" alt="猫铃铛" style={{
                  width:'100%', height:'100%', objectFit:'contain',
                  animation:'bellShake 1.5s ease-in-out',
                  zIndex:2, position:'relative',
                }}
                  onError={e => { e.target.style.display='none'; e.target.parentElement.innerHTML='<div style="font-size:60px">🔔</div>'; }} />

                {/* Gold sweep overlay */}
                <div style={{
                  position:'absolute', top:0, left:0, right:0, bottom:0, pointerEvents:'none', zIndex:3,
                  overflow:'hidden', borderRadius:18,
                }}>
                  <div style={{
                    position:'absolute', top:0, width:'50%', height:'100%',
                    background:'linear-gradient(105deg, transparent 30%, rgba(255,234,167,0.25) 48%, rgba(255,234,167,0.6) 50%, rgba(255,234,167,0.25) 52%, transparent 70%)',
                    transform:'skewX(-20deg)',
                    animation:'goldSweep 0.7s ease-in-out forwards',
                  }}/>
                </div>

                {/* 128 Gold particles */}
                <div style={{ position:'absolute', top:'50%', left:'50%', transform:'translate(-50%,-50%)', zIndex:4, pointerEvents:'none' }}>
                  {goldParticles.map((p, i) => (
                    <div key={i} style={{
                      position:'absolute', width:5, height:5, borderRadius:'50%', background:p.color,
                      animation:`particleFly 0.8s ease-out ${p.delay} forwards`,
                      '--px': p.px, '--py': p.py,
                      boxShadow:`0 0 6px ${p.color}`,
                    }}/>
                  ))}
                </div>
              </>
            )}

            {/* Cat pops out from circle */}
            {animPhase === 'reveal' && animCat && (
              <>
                {/* Ring pulses */}
                <div style={{ position:'absolute', top:'50%', left:'50%', transform:'translate(-50%,-50%)', pointerEvents:'none' }}>
                  {[0, 200, 400].map((delay, i) => (
                    <div key={i} style={{
                      position:'absolute', width:40, height:40, borderRadius:'50%',
                      border:`2px solid ${RARITY_COLORS[animCat.rarity]}40`,
                      animation:`ringPulse 1s ease-out ${delay}ms forwards`,
                    }}/>
                  ))}
                </div>

                {/* Cat jumps out */}
                <div style={{
                  position:'relative', zIndex:2,
                  animation:'catJumpOut 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards',
                }}>
                  <div style={{
                    width:100, height:100, borderRadius:'50%', overflow:'hidden',
                    border:`3px solid ${RARITY_COLORS[animCat.rarity]}`,
                    boxShadow:`0 0 30px ${RARITY_COLORS[animCat.rarity]}40`,
                  }}>
                    <img src={animCat.img} alt={animCat.name} style={{ width:'100%', height:'100%', objectFit:'cover' }}
                      onError={e => { e.target.style.display='none'; }} />
                  </div>
                  <div style={{ marginTop:8, textAlign:'center' }}>
                    <span style={{
                      fontSize:11, fontWeight:800, letterSpacing:3,
                      padding:'4px 16px', borderRadius:999,
                      background:RARITY_BG[animCat.rarity], color:RARITY_COLORS[animCat.rarity],
                    }}>{animCat.rarity}</span>
                  </div>
                </div>
              </>
            )}
          </div>
        </div>

        <button onClick={handleGacha} disabled={isAnimating || bells < 1} style={{
          width:'100%', height:50, borderRadius:16,
          background: (isAnimating || bells < 1) ? colors.bg2 : 'linear-gradient(135deg, #6C5CE7, #A29BFE)',
          border: (isAnimating || bells < 1) ? `1px solid ${colors.border}` : 'none',
          cursor:(isAnimating||bells<1)?'not-allowed':'pointer',
          fontSize:16, fontWeight:800,
          color:(isAnimating||bells<1)?colors.muted:'#fff',
          opacity:(isAnimating||bells<1)?0.6:1,
          boxShadow:(isAnimating||bells<1)?'none':'0 8px 24px rgba(108,92,231,0.35)',
        }}>
          {isAnimating ? '抽卡中...' : bells < 1 ? '铃铛不足' : '抽卡 (-1🔔)'}
        </button>
      </div>

      {/* Cat collection grid */}
      <div style={{ padding:'0 20px' }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:8 }}>
          <div style={{ fontSize:13, fontWeight:700, color:colors.ink, display:'flex', alignItems:'center', gap:6 }}>
            <span>🐱</span> 我的猫咪
            <span style={{ fontSize:10, color:colors.sub, fontWeight:400 }}>{new Set(cats.map(c => c.breedId)).size}/{BREEDS.length}已解锁，共{cats.length}只</span>
          </div>
        </div>
        {(() => {
          const totalPages = Math.ceil(sortedCats.length / PAGE_SIZE);
          const safePage = Math.min(myCatPage, Math.max(0, totalPages - 1));
          const pageCats = sortedCats.slice(safePage * PAGE_SIZE, (safePage + 1) * PAGE_SIZE);
          return (
            <>
              <div style={{ display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap:8 }}>
                {pageCats.map((cat, i) => (
                  <div key={cat.serialId} onClick={() => onCardClick(cat)} style={{
                    borderRadius:14, padding:'8px 4px 6px', cursor:'pointer',
                    background:colors.card, border:`1px solid ${RARITY_COLORS[cat.rarity]}20`,
                    display:'flex', flexDirection:'column', alignItems:'center', gap:4,

                ))}
              </div>
              {totalPages > 1 && (

                  <button onClick={() => setMyCatPage(p => Math.max(0, p - 1))} disabled={safePage === 0} style={{
                    background: safePage === 0 ? 'transparent' : colors.card,
                    border: `1px solid ${safePage === 0 ? 'transparent' : colors.cardBorder}`,

                    color: safePage === 0 ? colors.muted : colors.ink, cursor: safePage === 0 ? 'default' : 'pointer',

                </div>
              )}

        })()}
        {/* Unlocked breeds count */}
        <div style={{ display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap:8, marginTop:8 }}>
          {BREEDS.filter(b => !cats.some(c => c.breedId === b.id)).map((breed, i) => (
            <div key={breed.id} style={{
              borderRadius:14, padding:'8px 4px 6px',

              opacity:0.3,
            }}>
              <div style={{ width:56, height:56, borderRadius:'50%', overflow:'hidden', position:'relative' }}>

                <div style={{ position:'absolute', top:0, left:0, right:0, bottom:0, display:'flex', alignItems:'center', justifyContent:'center' }}>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
                    <rect x="5" y="11" width="14" height="10" rx="2" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" strokeWidth="1.5"/>
                    <path d="M8 11V7a4 4 0 118 0v4" stroke="rgba(255,255,255,0.3)" strokeWidth="1.5" fill="none" strokeLinecap="round"/>

            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════
   P6: 告别仪式倒计时组件
   ═══════════════════════════════════════ */
function FarewellCountdown({ cat }) {
  const [remaining, setRemaining] = useState('');
  const farewellDuration = cat.farewellDuration || 24 * 60 * 60 * 1000;

  useEffect(() => {
    const updateCountdown = () => {
      if (!cat.farewellStartedAt) return;
      const elapsed = Date.now() - cat.farewellStartedAt;
      const remainingMs = Math.max(0, farewellDuration - elapsed);
      const hours = Math.floor(remainingMs / (60 * 60 * 1000));
      const minutes = Math.floor((remainingMs % (60 * 60 * 1000)) / (60 * 1000));
      const seconds = Math.floor((remainingMs % (60 * 1000)) / 1000);
      setRemaining(`${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`);
    };

    updateCountdown();
    const timer = setInterval(updateCountdown, 1000);
    return () => clearInterval(timer);
  }, [cat.farewellStartedAt, farewellDuration]);

  const progress = cat.farewellStartedAt
    ? Math.max(0, ((Date.now() - cat.farewellStartedAt) / farewellDuration) * 100)
    : 0;
  
  return (
    <div>
      <div style={{ width:'100%', height:6, borderRadius:3, background:'rgba(255,107,107,0.2)', overflow:'hidden' }}>
        <div style={{ 
          height:'100%', 
          width:`${progress}%`, 
          borderRadius:3, 
          background:'linear-gradient(90deg, #FF6B6B, #EE5A5A)',
          transition:'width 1s linear',
        }}/>
      </div>
      <div style={{ fontSize:14, fontWeight:700, color:colors.red, marginTop:4, textAlign:'center', fontFamily:'monospace' }}>
        {remaining}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════
   告别仪式动画
   ═══════════════════════════════════════ */
function FarewellCeremony({ cat, show, onDone }) {
  const [phase, setPhase] = useState(0); // 0=fadeIn, 1=walking, 2=text, 3=done
  const timerRef = useRef(null);

  useEffect(() => {
    if (!show || !cat) return;
    setPhase(0);
    // Phase 0: fadeIn (0.8s)
    timerRef.current = setTimeout(() => setPhase(1), 800);
    // Phase 1: cat walks away (2.5s)
    timerRef.current = setTimeout(() => setPhase(2), 3300);
    // Phase 2: show text (2s)
    timerRef.current = setTimeout(() => setPhase(3), 5300);
    // Phase 3: auto close
    timerRef.current = setTimeout(() => onDone && onDone(), 6000);
    return () => { if (timerRef.current) clearTimeout(timerRef.current); };
  }, [show, cat]);

  if (!show || !cat) return null;

  const stars = Array.from({ length: 12 }, (_, i) => ({
    id: i,
    left: 10 + Math.random() * 80,
    delay: Math.random() * 2,
    size: 8 + Math.random() * 16,
    emoji: ['✨', '⭐', '🌟', '💫', '☆', '❋'][i % 6],
  }));

  const tears = Array.from({ length: 6 }, (_, i) => ({
    id: i,
    left: 20 + Math.random() * 60,
    delay: 0.5 + Math.random() * 1.5,
    size: 6 + Math.random() * 8,
  }));

  return (
    <div style={{
      position:'absolute', top:0, left:0, right:0, bottom:0, zIndex:80,
      background:'linear-gradient(180deg, #0a0618 0%, #1a0a2e 40%, #0a0618 100%)',
      display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
      animation:'farewellFadeIn 0.8s ease-out',
    }}>
      {/* Stars background */}
      {stars.map(s => (
        <div key={s.id} style={{
          position:'absolute', left:`${s.left}%`, bottom:'20%',
          fontSize:s.size, animation:`farewellStar 3s ${s.delay}s ease-out infinite`,
          pointerEvents:'none',
        }}>{s.emoji}</div>
      ))}

      {/* Tears */}
      {phase >= 1 && tears.map(t => (
        <div key={t.id} style={{
          position:'absolute', left:`${t.left}%`, top:'25%',
          fontSize:t.size, animation:`farewellTear 1.5s ${t.delay}s ease-in infinite`,
          pointerEvents:'none', opacity:0.6,
        }}>💧</div>
      ))}

      {/* Cat walking away with backpack */}
      {phase < 3 && (
        <div style={{
          animation: phase >= 1 ? 'farewellCatWalk 2.5s ease-in-out forwards' : 'none',
          textAlign:'center',
        }}>
          <div style={{ width:80, height:80, borderRadius:'50%', overflow:'hidden', margin:'0 auto 8px',
            border:`2px solid ${RARITY_COLORS[cat.rarity]}60`, filter:'grayscale(0.3)',
            boxShadow:`0 0 30px ${RARITY_COLORS[cat.rarity]}40`,
          }}>
            <img src={cat.img} alt={cat.name} style={{ width:'100%', height:'100%', objectFit:'cover' }}
              onError={e => { e.target.style.display='none'; }} />
          </div>
          {/* Backpack */}
          <div style={{ fontSize:20, marginTop:-12, marginLeft:30 }}>🎒</div>
          <div style={{ fontSize:11, color:colors.sub, marginTop:4 }}>{cat.name}</div>
        </div>
      )}

      {/* Farewell text */}
      {phase >= 2 && phase < 3 && (
        <div style={{
          position:'absolute', bottom:'30%', textAlign:'center',
          animation:'farewellText 2s ease-out forwards',
        }}>
          <div style={{ fontSize:14, color:colors.sub, marginBottom:6 }}>
            {cat.name} · #{String(cat.breedSerial || cat.serialId).padStart(3,'0')}
          </div>
          <div style={{ fontSize:18, fontWeight:800, color:colors.ink, marginBottom:8 }}>
            踏上了流浪的旅途
          </div>
          <div style={{ fontSize:12, color:colors.sub, lineHeight:1.8 }}>
            陪伴了你 {cat.daysAlive} 天<br/>
            见证了 {cat.gamesWitnessed} 场消消乐，见证了你 {cat.witnessMaxScore || 0} 分的高光时刻<br/>
            最佳连击 {cat.bestCombo} 连消
          </div>
          <div style={{ fontSize:13, color:colors.purpleLight, marginTop:12, fontWeight:600 }}>
            ✨ 这段记忆将永远珍藏 ✨
          </div>
        </div>
      )}

      {/* Done phase - summary */}
      {phase >= 3 && (
        <div style={{ textAlign:'center', animation:'farewellFadeIn 0.5s ease-out' }}>
          <div style={{ fontSize:48, marginBottom:12 }}>🕊️</div>
          <div style={{ fontSize:16, fontWeight:800, color:colors.ink, marginBottom:6 }}>
            {cat.name} 正在流浪
          </div>
          <div style={{ fontSize:12, color:colors.sub, marginBottom:20 }}>
            它的序列号将在 60 天后重新流通
          </div>
          <button onClick={onDone} style={{
            padding:'10px 32px', borderRadius:12, border:'none', cursor:'pointer',
            background:`linear-gradient(135deg, ${colors.purple}, ${colors.purpleDark})`,
            color:'#fff', fontSize:14, fontWeight:700,
          }}>永远记得它</button>
        </div>
      )}
    </div>
  );
}

function GachaResultModal({ cat, show, onClose }) {

if (!show || !cat) return null;

  // 检查是否触发保底
  const isPitySSR = cat.triggeredPity?.type === 'ssr';
  const isPitySR = cat.triggeredPity?.type === 'sr';
  const isPity = isPitySSR || isPitySR;
  
  // 保底标签文案
  const pityLabel = isPitySSR ? '🎉 大保底出SSR!' : isPitySR ? '💎 小保底出SR!' : null;
  const pityColor = isPitySSR ? '#FD9644' : isPitySR ? '#A29BFE' : null;
  
  return (
    <div style={{ position:'absolute', top:0, left:0, right:0, bottom:0, background:'rgba(0,0,0,0.75)', backdropFilter:'blur(12px)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:60 }} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{ width:280, background:'linear-gradient(180deg, #1E1440 0%, #0F0A1E 100%)', borderRadius:24, padding:'28px 22px', textAlign:'center', border:`1px solid ${RARITY_COLORS[cat.rarity]}30`, boxShadow:`0 0 40px ${RARITY_COLORS[cat.rarity]}20`, animation:'slideUp 0.4s ease-out' }}>
        {/* 保底触发提示 */}
        {isPity && (
          <div style={{
            marginBottom:12,
            padding:'8px 16px',
            borderRadius:20,
            background:`${pityColor}20`,
            border:`1px solid ${pityColor}50`,
            animation:'pulse 1s ease-in-out infinite',
          }}>
            <span style={{ fontSize:13, fontWeight:800, color: pityColor }}>
              {pityLabel}
            </span>
          </div>
        )}
        
        <div style={{ width:80, height:80, borderRadius:'50%', overflow:'hidden', margin:'0 auto 14px', border:`3px solid ${RARITY_COLORS[cat.rarity]}`, boxShadow:`0 0 20px ${RARITY_COLORS[cat.rarity]}40` }}>

        <div style={{ fontSize:18, fontWeight:800, color:colors.ink, marginBottom:2 }}>{cat.name} · #{String(cat.breedSerial || cat.serialId).padStart(3,'0')}</div>
        <div style={{ fontSize:11, color:colors.sub, marginBottom:6 }}>性格：{sanitizePersonality(cat.personality, cat.breedId || '橘猫')}</div>

/* ═══════════════════════════════════════
   LOGIN / REGISTER PAGE
   ═══════════════════════════════════════ */
function LoginPage({ onLogin, onViewPrivacy, onViewAgreement }) {
  const [mode, setMode] = useState('login');
  const [username, setUsername] = useState('');
  const [password, setPassword] = useState('');
  const [showPwd, setShowPwd] = useState(false);
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  // 验证码系统
  const generateCaptcha = () => {
    const a = Math.floor(Math.random() * 9) + 1;
    const b = Math.floor(Math.random() * 9) + 1;
    const ops = ['+', '×'];
    const op = ops[Math.floor(Math.random() * 2)];
    const answer = op === '+' ? a + b : a * b;
    return { a, b, op, answer, text: `${a} ${op} ${b} = ?` };
  };
  const [captcha, setCaptcha] = useState(generateCaptcha);
  const [captchaInput, setCaptchaInput] = useState('');
  const [captchaError, setCaptchaError] = useState(false);

  const refreshCaptcha = () => {
    setCaptcha(generateCaptcha());
    setCaptchaInput('');
    setCaptchaError(false);
  };

  const handleSubmit = async () => {
    setError(''); setCaptchaError(false);
    if (!username.trim()) { setError('请输入用户名'); return; }
    if (username.trim().length < 3) { setError('用户名至少3个字符'); return; }
    if (!password.trim()) { setError('请输入密码'); return; }
    if (password.length < 6) { setError('密码至少6个字符'); return; }
    if (!captchaInput.trim()) { setCaptchaError(true); setError('请填写验证码'); return; }
    if (parseInt(captchaInput) !== captcha.answer) {
      setCaptchaError(true);
      setError('验证码错误，请重新输入');
      refreshCaptcha();
      return;
    }
    setLoading(true);
    try {
      const fn = mode === 'login' ? MiaolegemiAPI.login : MiaolegemiAPI.register;
      const data = await fn(username.trim(), password);
      onLogin(data.user, false);
    } catch (e) {
      setError(e.message);
      refreshCaptcha();
    } finally { setLoading(false); }
  };

  const handleLocalMode = () => {
    onLogin({ id: 'local', username: '本地用户', nickname: '铲屎官', bells: 3 }, true);
  };

  const pwdStrength = password.length === 0 ? 0
    : password.length < 6 ? 1
    : /(?=.*[a-zA-Z])(?=.*\d)/.test(password) ? 3
    : password.length >= 6 ? 2 : 1;

  const strengthColors = ['transparent', colors.red, colors.orange, colors.green];
  const strengthLabels = ['', '太短', '一般', '较强'];

  return (
    <div style={{ width:'100%', height:'100%', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', background:colors.bg, padding:30, position:'relative', overflow:'hidden' }}>

      {/* 背景图片 + 模糊效果 */}
      <div style={{
        position:'absolute', top:0, left:0, right:0, bottom:0,
        backgroundImage:'url(cat/登录页背景.png)',
        backgroundSize:'cover', backgroundPosition:'center',
        filter: 'blur(2px)',
        opacity:0.6,
        zIndex:0,
      }} />

      {/* 半透明遮罩 */}
      <div style={{
        position:'absolute', top:0, left:0, right:0, bottom:0,
        background:'rgba(15,10,30,0.5)',
        zIndex:1,
      }} />

      {/* 表单内容 */}
      <div style={{ position:'relative', zIndex:2 }}>

      <div style={{ fontSize:24, fontWeight:800, color:colors.ink, marginBottom:4, textAlign:'center', textShadow:'0 2px 10px rgba(0,0,0,0.5)' }}>喵呜乐消消</div>
      <div style={{ fontSize:12, color:colors.sub, marginBottom:36, textAlign:'center', textShadow:'0 1px 5px rgba(0,0,0,0.5)' }}>养好猫·趣闯关</div>

      <div style={{ width:'100%', maxWidth:300 }}>
        {/* Tab切换 */}
        <div style={{ display:'flex', marginBottom:20, background:colors.card, borderRadius:12, padding:3 }}>
          {['login','register'].map(m => (
            <div key={m} onClick={() => { setMode(m); setError(''); setCaptchaError(false); refreshCaptcha(); }} style={{
              flex:1, textAlign:'center', padding:'8px 0', borderRadius:10, cursor:'pointer',
              fontSize:13, fontWeight: mode===m ? 700 : 400,
              background: mode===m ? colors.purple : 'transparent',
              color: mode===m ? '#fff' : colors.sub,
              transition:'all 0.2s',
            }}>{m === 'login' ? '登录' : '注册'}</div>
          ))}
        </div>

        {/* 用户名 */}
        <div style={{ marginBottom:12 }}>
          <input value={username} onChange={e => { setUsername(e.target.value); setError(''); }}
            placeholder="用户名 (至少3个字符)" maxLength={20}
            style={{ width:'100%', padding:'10px 14px', borderRadius:10, border:`1px solid ${colors.cardBorder}`, background:colors.card, color:colors.ink, fontSize:14, outline:'none', boxSizing:'border-box' }} />
        </div>

        {/* 密码 + 可见切换 + 强度指示 */}
        <div style={{ marginBottom:8, position:'relative' }}>
          <input value={password} onChange={e => { setPassword(e.target.value); setError(''); }}
            type={showPwd ? 'text' : 'password'}
            placeholder="密码 (至少6个字符)" maxLength={40}
            style={{ width:'100%', padding:'10px 40px 10px 14px', borderRadius:10, border:`1px solid ${colors.cardBorder}`, background:colors.card, color:colors.ink, fontSize:14, outline:'none', boxSizing:'border-box' }} />
          <span onClick={() => setShowPwd(!showPwd)} style={{
            position:'absolute', right:12, top:'50%', transform:'translateY(-50%)',
            cursor:'pointer', fontSize:14, opacity:0.5, userSelect:'none',
          }}>{showPwd ? '🙈' : '👁️'}</span>
        </div>
        {password.length > 0 && (
          <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:12 }}>
            <div style={{ flex:1, height:3, borderRadius:2, background:colors.cardBorder, overflow:'hidden' }}>
              <div style={{ width:`${(pwdStrength/3)*100}%`, height:'100%', borderRadius:2, background:strengthColors[pwdStrength], transition:'width 0.3s' }} />
            </div>
            <span style={{ fontSize:10, color:strengthColors[pwdStrength], fontWeight:600 }}>{strengthLabels[pwdStrength]}</span>
          </div>
        )}

/* ═══════════════════════════════════════
   CAT MEOW SOUND (Web Audio API 合成喵叫)
   ═══════════════════════════════════════ */
let _globalAudioCtx = null;

function getGlobalAudioCtx() {
  if (!_globalAudioCtx) {
    _globalAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (_globalAudioCtx.state === 'suspended') {
    _globalAudioCtx.resume();
  }
  return _globalAudioCtx;
}

function playMeowSound(pitch = 600) {
  try {
    const ctx = getGlobalAudioCtx();
    const t = ctx.currentTime;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'triangle';
    // 模拟猫叫声：音高先升后降
    osc.frequency.setValueAtTime(pitch, t);
    osc.frequency.exponentialRampToValueAtTime(pitch * 1.3, t + 0.08);
    osc.frequency.exponentialRampToValueAtTime(pitch * 0.6, t + 0.2);
    osc.frequency.linearRampToValueAtTime(pitch * 0.3, t + 0.4);
    gain.gain.setValueAtTime(0.15, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
    osc.start(t);
    osc.stop(t + 0.4);
  } catch(e) { /* 降级：不支持则静默 */ }
}

function unlockAudioCtx() {
  const ctx = getGlobalAudioCtx();
  if (ctx.state === 'suspended') {
    ctx.resume();
  }
  // 播放无声 buffer 彻底解锁 iOS
  try {
    const buf = ctx.createBuffer(1, 1, 22050);
    const src = ctx.createBufferSource();
    src.buffer = buf;
    src.connect(ctx.destination);
    src.start(0);
  } catch(e) {}
}

    // P6: 进入24小时告别仪式（不直接送走）
    const rt = releaseTarget;
    const now = Date.now();
    
    setCats(prev => prev.map(c => {
      if (c.serialId !== rt.serialId) return c;
      return {
        ...c,
        pendingRelease: true,           // 开启告别仪式状态
        farewellStartedAt: now,        // 开始时间
        farewellDuration: c.farewellDuration || 24 * 60 * 60 * 1000, // 确保有默认值
        canBeSaved: true,              // 可以挽回
        saveCost: 100,                 // 挽留费用
      };
    }));
    
    setReleaseTarget(null);
    if (showCatDetail && selectedCat?.serialId === rt.serialId) {
      setShowCatDetail(false);
      setSelectedCat(null);
    }
    
    // 简短提示告别仪式开始
    showConfirmModal({ emoji:'💫', title:'告别仪式', message:`${rt.name} 开始告别仪式，24小时内可以挽留～`, onConfirm:()=>{} });
  }, [releaseTarget, showCatDetail, selectedCat, showConfirmModal]);

  // P6: 挽留告别仪式中的猫咪
  const handleSaveFromFarewell = useCallback(async (cat) => {
    if (fish < cat.saveCost) {
      showConfirmModal({ emoji:'🐟', title:'鱼干不足', message:`挽留需要 ${cat.saveCost} 鱼干`, onConfirm:()=>{} });
      return;
    }
    
    showConfirmModal({
      emoji: '💚',
      title: '确认挽留',
      message: `花费 ${cat.saveCost} 鱼干挽留 ${cat.name}？它将留在家园。`,
      onConfirm: () => {
        // 扣除鱼干
        fishLedger.push({ type: 'spend', amount: cat.saveCost, desc: `${cat.name}挽留`, time: Date.now() });
        try {
          const key = 'miaolegemi_p0_v1';
          const saved = localStorage.getItem(key);
          if (saved) {
            const data = JSON.parse(saved);
            data.fishLedger = fishLedger;
            localStorage.setItem(key, JSON.stringify(data));
          }
        } catch(e) {}
        // 取消告别仪式状态
        setCats(prev => prev.map(c => {
          if (c.serialId !== cat.serialId) return c;
          return {
            ...c,
            pendingRelease: false,
            farewellStartedAt: null,
            canBeSaved: false,
          };
        }));
      },
    });
    return;
  }, [fish, showConfirmModal]);

  // P6: 执行真正的送走（24小时后调用）
  const executeRealRelease = useCallback(async (cat) => {
    if (!isLocalMode && cat._apiId) {
      try {
        await MiaolegemiAPI.releaseCat(cat._apiId);
      } catch (e) { console.error(e); }
    }
    
    const now = Date.now();
    const coolingDuration = 60 * 24 * 60 * 60 * 1000; // 60天冷却
    const coolingKey = `${cat.breedId}_${cat.breedSerial || cat.serialId}`;
    
    // 进入冷却池
    coolingPool[coolingKey] = now;
    
    // 构建血统记录
    const ownerRecord = {
      name: '你',
      daysAlive: cat.daysAlive || 0,
      fishSpent: cat.fishSpent || 0,
      bestCombo: cat.bestCombo || 0,
      gamesWitnessed: cat.gamesWitnessed || 0,
      intimacy: cat.intimacy || 0,
      dateLeft: new Date().toLocaleDateString('zh-CN'),
      releaseType: '主动送走',
    };
    
    setCats(prev => prev.map(c => {
      if (c.serialId !== cat.serialId) return c;
      return {
        ...c,
        location: 'memorial',
        releasedAt: now,
        coolingUntil: now + coolingDuration,
        coolingKey: coolingKey,
        previousOwners: [...(c.previousOwners || []), ownerRecord],
        lineage: [...(c.lineage || []), ownerRecord],
        // 清除告别仪式状态
        pendingRelease: false,
        farewellStartedAt: null,
        canBeSaved: false,
      };
    }));
  }, [isLocalMode]);
  
  // P6: 设置 executeRealRelease ref
  useEffect(() => {
    executeRealReleaseRef.current = executeRealRelease;
  }, [executeRealRelease]);

  // P6: 立即送走 — 跳过24小时等待，直接进入告别画面
  const handleImmediateRelease = useCallback((cat) => {
    if (!cat) return;
    showConfirmModal({
      emoji: '😿',
      title: '确认立即送走',
      message: `${cat.name}将直接离开家园去流浪，不可挽回。`,
      onConfirm: () => {
        setFarewellCat(cat);
        setShowFarewell(true);
      },
    });
  }, [showConfirmModal]);

  // Handle discard — remove cat from bag permanently
  const handleDiscard = useCallback(async (cat) => {
    if (!cat) return;
    showConfirmModal({
      emoji: '🗑️',
      title: '确认丢弃',
      message: `${cat.name}将被直接丢弃，不可找回。`,
      onConfirm: async () => {
        if (!isLocalMode && cat._apiId) {
          try {
            await MiaolegemiAPI.releaseCat(cat._apiId);
          } catch (e) { showConfirmModal({ emoji:'❌', title:'丢弃失败', message:e.message, onConfirm:()=>{} }); return; }
        }
        setCats(prev => prev.filter(c => c.serialId !== cat.serialId));
        setFlipCardCat(null);
      },
    });
  }, [isLocalMode, showConfirmModal]);

  // 拓展家园
  const handleExpandHome = useCallback(() => {
    const cost = 1500;
    if (getFishBalance() < cost) {
      showConfirmModal({
        emoji: '🐟',
        title: '鱼干不足',
        message: '拓展家园需要1500鱼干，快去消消乐赚取吧！',
        onConfirm: () => {},
      });
      return;
    }
    showConfirmModal({
      emoji: '🏠',
      title: '拓展家园',
      message: `你要花费 ${cost} 鱼干拓展 1 格家园吗？`,
      onConfirm: () => {
        fishLedger.push({ type: 'spend', amount: cost, desc: '拓展家园', time: Date.now() });
        setHomeMaxSlots(prev => prev + 1);
        try {
          const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
          saved.homeMaxSlots = (saved.homeMaxSlots || 10) + 1;
          saved.fishLedger = fishLedger;
          localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
        } catch(e) {}
      },
    });
  }, [showConfirmModal]);

  // Handle gacha — breedId/rarity pre-rolled by GachaPage for animation sync
  // 支持新参数: breedId, rarity, newPityCount, triggeredPity
  const handleGacha = useCallback(async (breedId, rarity, newPityCount, triggeredPity) => {
    if (bells < 1) return;
    if (!isLocalMode) {
      try {
        const data = await MiaolegemiAPI.pullGacha();
        const c = data.cat;
        const breed = BREEDS.find(b => b.id === c.serial.species.name) || BREEDS[0];
        const newCat = {
          serialId: c.id, breedSerial: c.serial.serialNumber,
          breedId: breed.id, name: breed.id, rarity: c.serial.species.rarity,
          img: breed.img, desc: breed.desc,
          personality: sanitizePersonality(c.personality, breed.id),
          status: 'alive', location: 'bag', createdAt: Date.now(),
          bagExpiresAt: c.bagExpiresAt ? new Date(c.bagExpiresAt).getTime() : Date.now() + 30*86400000,
          adoptedAt: null, expiresAt: null, lastFedAt: null,
          daysAlive: 0, gamesWitnessed: 0, bestCombo: 0, witnessMaxScore: 0, witnessTotalScore: 0, fishSpent: 0,
          isGenesis: c.serial.serialNumber <= 10,
          previousOwners: [], releasedAt: null,
          _apiId: c.id, _serialId: c.serialId,
          triggeredPity: data.triggeredPity || null,
        };
        setBells(data.bellsRemaining);
        setCats(prev => [...prev, newCat]);
        setGachaResult(newCat);
        setTimeout(() => setShowGachaResult(true), 500);
        setGachaDone(true);
        // 更新保底计数
        if (data.pityCount !== undefined) {
          setPityCount(data.pityCount);
        }
        return;
      } catch (e) { showConfirmModal({ emoji:'❌', title:'抽卡失败', message:e.message, onConfirm:()=>{} }); return; }
    }
    setBells(prev => prev - 1);
    setGachaDone(true);
    // 使用新的保底系统
    const finalPityCount = newPityCount !== undefined ? newPityCount : (rarity === 'SSR' ? 0 : pityCount + 1);
    const newCat = makeCatInstance(breedId, rarity, null, 30);
    newCat.triggeredPity = triggeredPity; // 标记触发的保底
    setCats(prev => [...prev, newCat]);
    setGachaResult(newCat);
    setTimeout(() => setShowGachaResult(true), 500);
    setPityCount(finalPityCount);
  }, [bells, isLocalMode, pityCount]);

  // Handle check-in
  const handleCheckIn = useCallback(async () => {
    if (!isLocalMode) {
      try {
        const data = await MiaolegemiAPI.checkin();
        fishLedger.push({ type: 'earn', amount: data.fishEarned, desc: '每日签到', time: Date.now() });
        if (data.bellsEarned > 0) setBells(prev => prev + data.bellsEarned);
      } catch (e) { showConfirmModal({ emoji:'❌', title:'签到失败', message:e.message, onConfirm:()=>{} }); return; }
    } else {
      fishLedger.push({ type: 'earn', amount: 5, desc: '每日签到', time: Date.now() });
    }
    setCheckedIn(true);
    setShowCheckIn(true);
  }, [isLocalMode]);

  // P1: 鱼干兑换铃铛
  const handleExchangeBells = useCallback(() => {
    const todayStart = new Date(); todayStart.setHours(0,0,0,0);
    const todayExchanges = fishLedger.filter(t => t.type === 'exchange' && t.time > todayStart.getTime());
    const exchangedToday = todayExchanges.length;
    const dailyLimit = 5;
    if (exchangedToday >= dailyLimit) { showConfirmModal({ emoji:'📊', title:'兑换上限', message:'今日兑换已达上限（5次/天）', onConfirm:()=>{} }); return; }
    if (getFishBalance() < 100) { showConfirmModal({ emoji:'🐟', title:'鱼干不足', message:'需要100条鱼干', onConfirm:()=>{} }); return; }
    fishLedger.push({ type: 'spend', amount: 100, desc: '兑换铃铛', time: Date.now() });
    fishLedger.push({ type: 'exchange', amount: 0, desc: '兑换铃铛', time: Date.now() });
    setBells(prev => prev + 1);
    setCats(prev => [...prev]); // trigger re-render to update fish display
  }, [showConfirmModal]);

  // P2: 皮肤购买
  const handleBuySkin = useCallback((skinId) => {
    const skin = ALL_SKINS[skinId];
    if (!skin) return;
    if (bells < skin.price) { showConfirmModal({ emoji:'🔔', title:'铃铛不足', message:'铃铛不足，无法购买皮肤', onConfirm:()=>{} }); return; }
    setBells(prev => prev - skin.price);
    setOwnedSkins(prev => [...prev, skinId]);
    fishLedger.push({ type: 'spend', amount: 0, desc: '购买皮肤:' + skinId, time: Date.now() });
  }, [bells, showConfirmModal]);

  // P2: 皮肤装备
  const handleEquipSkin = useCallback((catKey, skinId) => {
    setEquippedSkins(prev => ({ ...prev, [catKey]: skinId }));
  }, []);

  // P2: 皮肤卸下
  const handleUnequipSkin = useCallback((catKey) => {
    setEquippedSkins(prev => {
      const next = { ...prev };
      delete next[catKey];
      return next;
    });
  }, []);

  // P2: 免费皮肤领取
  const handleClaimFreeSkin = useCallback((skinId) => {
    if (ownedSkins.includes(skinId)) { showConfirmModal({ emoji:'✅', title:'已拥有', message:'已拥有该皮肤', onConfirm:()=>{} }); return; }
    setOwnedSkins(prev => [...prev, skinId]);
    fishLedger.push({ type: 'earn', amount: 0, desc: '领取免费皮肤:' + skinId, time: Date.now() });
  }, [ownedSkins, showConfirmModal]);

  // P2: 分组赛领取铃铛奖励
  const handleClaimGroupStageBell = useCallback(() => {
    const today = new Date().toISOString().slice(0, 10);
    if (groupStageBellsClaimed.includes(today)) return;
    const todayScore = groupStageScores[today] || 0;
    if (getGroupStageBracket(todayScore).name !== 'Gold') return;
    setGroupStageBellsClaimed(prev => [...prev, today]);
    setBells(prev => prev + 1);
    fishLedger.push({ type: 'earn', amount: 0, desc: '分组赛Gold奖励:1铃铛', time: Date.now() });
  }, [groupStageScores, groupStageBellsClaimed]);

  // P2: 竞猜投注
  const handlePlaceBet = useCallback((matchId, catBreedId, teamName, fishWagered) => {
    if (getFishBalance() < fishWagered) { showConfirmModal({ emoji:'🐟', title:'鱼干不足', message:'投注所需鱼干不足', onConfirm:()=>{} }); return; }
    fishLedger.push({ type: 'spend', amount: fishWagered, desc: '竞猜投注:' + matchId, time: Date.now() });
    const newBet = { matchId, catBreedId, teamName, fishWagered, won: null, settled: false, shared: false, placedAt: Date.now() };
    setBets(prev => [...prev, newBet]);
  }, [showConfirmModal]);

  // P2: 竞猜分享奖励
  const handleShareBet = useCallback((bet) => {
    fishLedger.push({ type: 'earn', amount: 3, desc: '分享竞猜奖励', time: Date.now() });
    setBets(prev => prev.map(b => b.matchId === bet.matchId ? { ...b, shared: true } : b));
    showConfirmModal({ emoji:'🐟', title:'分享成功', message:'+3 鱼干 🐟', onConfirm:()=>{} });
  }, [showConfirmModal]);

  // P0: 好友推荐 - 分享邀请
  const handleShareInvite = useCallback(() => {
    const code = getOrCreateInviteCode();
    setInviteCode(code);
    const shareMsg = '喵呜乐消消邀请你一起来玩！\n我的推荐码：' + code + '\n打开游戏输入推荐码，一起赚鱼干吧～🐱';
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(shareMsg).then(() => {
        setShareToast('推荐码已复制到剪贴板！');
        setTimeout(() => setShareToast(null), 3000);
      }).catch(() => {
        setShareToast('推荐码：' + code);
        setTimeout(() => setShareToast(null), 4000);
      });
    } else {
      setShareToast('推荐码：' + code);
      setTimeout(() => setShareToast(null), 4000);
    }
  }, []);

  // P2: 竞猜结算（自动检测未结算的投注）
  useEffect(() => {
    const now = Date.now();
    let changed = false;
    const updated = bets.map(bet => {
      if (bet.settled) return bet;
      const match = KNOCKOUT_MATCHES.find(m => m.matchId === bet.matchId);
      if (!match) return bet;
      const matchTime = new Date(match.date + 'T22:00:00+08:00').getTime();
      if (now < matchTime) return bet;
      // Simulate result (55% home win)
      const homeWins = Math.random() < 0.55;
      const winner = homeWins ? match.home : match.away;
      const won = winner === bet.teamName;
      changed = true;
      if (won) {
        const bonus = Math.floor(bet.fishWagered * 0.5);
        fishLedger.push({ type: 'earn', amount: bet.fishWagered + bonus, desc: '竞猜获胜+奖金:' + bet.matchId, time: Date.now() });
      }
      return { ...bet, won, settled: true };
    });
    if (changed) setBets(updated);
  }, [bets]);

  // P2: 每日重置逻辑（淘汰赛状态 + 分组赛新一天）
  useEffect(() => {
    const checkReset = () => {
      const today = new Date().toISOString().slice(0, 10);
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        try {
          const data = JSON.parse(saved);
          const lastDate = data._lastDate || '';
          if (lastDate !== today) {
            // 新的一天：重置淘汰状态
            setKnockoutEliminatedToday(false);
            // 更新日期标记
            data._lastDate = today;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
          }
        } catch(e) {}
      }
    };
    checkReset();
    const timer = setInterval(checkReset, 60000);
    return () => clearInterval(timer);
  }, []);

  // P2: 检测淘汰赛3连胜自动发放皮肤
  useEffect(() => {
    if (isKnockoutStageActive() && knockoutConsecutiveClears >= 3 && !knockoutSkinClaimed) {
      const unownedWC = Object.keys(ALL_SKINS).filter(id =>
        ALL_SKINS[id].category === 'worldcup' && !ownedSkins.includes(id)
      );
      if (unownedWC.length > 0) {
        const pick = unownedWC[Math.floor(Math.random() * unownedWC.length)];
        setKnockoutSkinClaimed(true);
        setOwnedSkins(prev => [...prev, pick]);
        showConfirmModal({ emoji:'🏆', title:'3连胜', message:'淘汰赛3连胜！获得限定皮肤: ' + (ALL_SKINS[pick].team || ALL_SKINS[pick].name), onConfirm:()=>{} });
      }
    }
  }, [knockoutConsecutiveClears, knockoutSkinClaimed, ownedSkins, showConfirmModal]);

  // P2: 大决战高分数称号
  useEffect(() => {
    if (isFinalDayActive() && !finalTitleAwarded) {
      const personalBest = (() => {
        try {
          const saved = localStorage.getItem(STORAGE_KEY);
          return saved ? (JSON.parse(saved).personalBestScore || 0) : 0;
        } catch(e) { return 0; }
      })();
      if (personalBest >= 10000) {
        setFinalTitleAwarded(true);
        showConfirmModal({ emoji:'🏆', title:'大决战', message:'突破10000分！获得专属称号「2026世界杯冠军」', onConfirm:()=>{} });
      }
    }
  }, [finalTitleAwarded, showConfirmModal]);

  // Navigation
  const handleNavigate = useCallback((tab, cat, subTab) => {
    if (tab === 'catDetail' && cat) {
      setSelectedCat(cat);
      setShowCatDetail(true);
    } else if (tab === 'preBattle') {
      setShowPreBattle(true);
    } else {
      setActiveTab(tab);
      if (subTab) {
        if (tab === 'market') {
          setMarketTab(subTab);
        } else {
          setBagTab(subTab);
        }
        // 设置URL参数以确保CatPage能获取正确的subTab
        const url = new URL(window.location);
        url.searchParams.set('tab', subTab);
        window.history.replaceState({}, '', url);
      }
    }
  }, []);

  colors = theme === 'light' ? CL : CD;

  // Show loading
  if (!authChecked) {
    return (
      <div style={{ minHeight:'100vh', background:'#0E0E16', display:'flex', alignItems:'center', justifyContent:'center' }}>
        <div style={{ color:'#F0EDFF', fontSize:14 }}>加载中...</div>
      </div>
    );
  }

  // 合规：隐私政策独立页面
  if (currentPage === 'privacy') {
    return (
      <div style={{ minHeight:'100vh', background:'#0E0E16', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:48 }}>
        <IosFrame>
          <PrivacyPolicyPage onBack={() => setCurrentPage(null)} />
        </IosFrame>
      </div>
    );
  }

  // 合规：用户服务协议独立页面
  if (currentPage === 'agreement') {
    return (
      <div style={{ minHeight:'100vh', background:'#0E0E16', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:48 }}>
        <IosFrame>
          <UserAgreementPage onBack={() => setCurrentPage(null)} />
        </IosFrame>
      </div>
    );
  }

  // Show login page if not authenticated
  if (authChecked && !user) {
    return (
      <div style={{ minHeight:'100vh', background:'#0E0E16', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:48 }}>
        <IosFrame>
          <LoginPage onLogin={handleLogin} onViewPrivacy={() => setCurrentPage('privacy')} onViewAgreement={() => setCurrentPage('agreement')} />
        </IosFrame>
        {/* 合规：协议确认弹窗覆盖在登录页上 */}
        <AgreementModal
          show={showAgreementModal}
          onAgree={handleAgreeAgreement}
          onReject={handleRejectAgreement}
          onViewPrivacy={() => setCurrentPage('privacy')}
          onViewAgreement={() => setCurrentPage('agreement')}
        />
      </div>
    );
  }

  return (
    <div style={{ minHeight:'100vh', background:'#0E0E16', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:48 }}>
      <div style={{ textAlign:'center', marginBottom:0 }}>
        <h1 style={{ fontSize:20, fontWeight:700, color:'#F0F0EC', letterSpacing:'-0.5px', marginBottom:4 }}>
          喵呜乐消消 · 通勤打卡+猫咪养成
        </h1>
        <p style={{ fontSize:11, color:'rgba(255,255,255,0.35)', marginBottom:16 }}>
          喂猫 · 消消乐 · 收集 · 陪伴
        </p>
      </div>

      <IosFrame key={theme}>
        <div style={{ height:'100%', display:'flex', flexDirection:'column', background:`linear-gradient(180deg, ${(theme==='light'?CL:CD).bg} 0%, ${(theme==='light'?CL:CD).bg2} 50%, ${(theme==='light'?CL:CD).bg} 100%)` }}>
          {/* Status bar area */}
          <div style={{ height:54, display:'flex', alignItems:'center', justifyContent:'space-between', padding:'0 32px', fontSize:16, fontWeight:600, color:(theme==='light'?CL:CD).ink, flexShrink:0 }}>
            <span>9:41</span>
            <div style={{ display:'flex', alignItems:'center', gap:8 }}>
              <svg width="14" height="10" viewBox="0 0 14 10" fill="none"><rect x="9" y="0" width="2" height="10" rx="0.5" fill={(theme==='light'?CL:CD).ink}/><rect x="6" y="2" width="2" height="8" rx="0.5" fill={(theme==='light'?CL:CD).ink} opacity="0.8"/><rect x="3" y="4" width="2" height="6" rx="0.5" fill={(theme==='light'?CL:CD).ink} opacity="0.6"/><rect x="0" y="6" width="2" height="4" rx="0.5" fill={(theme==='light'?CL:CD).ink} opacity="0.4"/></svg>
              <div style={{ width:26, height:12, border:`1.5px solid ${(theme==='light'?CL:CD).ink}`, borderRadius:3, padding:2, display:'flex', alignItems:'center' }}><div style={{ width:'75%', height:'100%', background:(theme==='light'?CL:CD).ink, borderRadius:1 }}/></div>
            </div>
          </div>

          {/* 合规：游客模式横幅 */}
          {guestMode && <GuestModeBanner onLogin={handleShowLoginAuth} />}

          {/* Currency bar */}
          <CurrencyBar
            fish={fish} bells={bells}
            theme={theme} onToggleTheme={() => setTheme(t => t === 'dark' ? 'light' : 'dark')}
            onFishClick={() => setInfoModal({ title:'🐟 鱼干', content: '日常高频资源，用于喂猫。通过签到和消消乐获得。' })}
            onBellClick={() => setInfoModal({ title:'🔔 猫铃铛', content: '稀缺资源，用于抽卡获得新猫咪。可通过连续签到和特殊活动获得。' })}
            left={<span style={{ display:'flex', alignItems:'center', gap:8 }}><span style={{ fontSize:14 }}>👋</span><span style={{ fontSize:13, color:colors.sub }}>你好，<span style={{ color:colors.ink, fontWeight:700 }}>{user?.nickname || '铲屎官'}</span></span></span>}
          />

          {/* Content area */}
          <div style={{ flex:1, overflowY:'auto', overflowX:'hidden', scrollbarWidth:'none', paddingBottom:74 }}>
            <style>{`div::-webkit-scrollbar{display:none}`}</style>

            <NightBonusBanner dismissed={nightBonusDismissed} onClose={dismissNightBonus} />
            <GroupStageBanner scores={groupStageScores} claimed={groupStageBellsClaimed} onClaim={handleClaimGroupStageBell} fish={fish} />
            <KnockoutBanner clears={knockoutConsecutiveClears} eliminated={knockoutEliminatedToday} skinClaimed={knockoutSkinClaimed} />
            <FinalDayBanner />
            <BettingPanel bets={bets} onPlaceBet={handlePlaceBet} onShareBet={handleShareBet} fish={fish} showConfirmModal={showConfirmModal} />
            {showCatDetail ? (
              <CatDetailPage
                cats={cats}
                catSerialId={selectedCat?.serialId}
                onBack={() => { setShowCatDetail(false); setSelectedCat(null); }}
                onFeed={handleFeed}
                onBatchFeed={handleBatchFeed}
                onRelease={handleRelease}
                onAdopt={handleAdopt}
                onShowLineage={(cat) => setLineageCat(cat)}
                fish={fish}
                homeCount={nurturing.length}
                homeMaxSlots={homeMaxSlots}
              />
            ) : (activeTab === 'cat' || activeTab === 'cathome') ? (
              <CatPage
                cats={cats} fish={fish}
                onFeed={handleFeed} onBatchFeed={handleBatchFeed} onAdopt={handleAdopt}
                onRelease={handleRelease} onNavigate={handleNavigate}
                onSaveFromFarewell={handleSaveFromFarewell}
                onImmediateRelease={handleImmediateRelease}
                onDiscard={handleDiscard}
                onDeploy={handleDeploy} onWithdraw={handleWithdraw}
                onSpectatorDeploy={handleSpectatorDeploy} onSpectatorWithdraw={handleSpectatorWithdraw}
                initialTab={(new URLSearchParams(window.location.search).get('tab')) || (activeTab === 'cathome' ? 'home' : bagTab)}
                baseSlots={baseSlots}
                slot4Unlocked={slot4Unlocked} slot5Unlocked={slot5Unlocked} slot6Unlocked={slot6Unlocked}
                bubbles={bubbles} animatingCats={animatingCats} isSleepTime={isSleepTime}
                onCatTap={triggerTap} onTriggerFeed={triggerFeed}
                unlockAudio={unlockAudio}
                homeMaxSlots={homeMaxSlots} onExpandHome={handleExpandHome}
              />
            ) : activeTab === 'home' ? (
              <HomePage
                cats={cats} fish={fish} bells={bells} todayFish={todayFish}
                checkedIn={checkedIn} gachaDone={gachaDone}
                onCheckIn={handleCheckIn} onNavigate={handleNavigate}
                activeTitle={activeTitle} battleMaxSlots={maxSlots}
                user={user} inviteRewardToday={inviteRewardToday}
                onShareInvite={handleShareInvite} shareToast={shareToast}
              />
            ) : activeTab === 'market' ? (
              <MarketPage bells={bells} pityCount={pityCount} onGacha={handleGacha} cats={cats} onCardClick={setFlipCardCat} todayFish={todayFish} user={user} bets={bets} onPlaceBet={handlePlaceBet} onShareBet={handleShareBet} fish={fish} knockoutConsecutiveClears={knockoutConsecutiveClears} knockoutEliminatedToday={knockoutEliminatedToday} knockoutSkinClaimed={knockoutSkinClaimed} groupStageScores={groupStageScores} groupStageBellsClaimed={groupStageBellsClaimed} onClaimGroupStageBell={handleClaimGroupStageBell} initialSubTab={marketTab} showConfirmModal={showConfirmModal} />
            ) : activeTab === 'shop' ? (
              <ShopPage fish={fish} bells={bells} user={user} onExchange={handleExchangeBells} cats={cats} ownedSkins={ownedSkins} equippedSkins={equippedSkins} onBuySkin={handleBuySkin} onEquipSkin={handleEquipSkin} onClaimFreeSkin={handleClaimFreeSkin} showConfirmModal={showConfirmModal} />
            ) : (
              <ProfilePage cats={cats} fish={fish} bells={bells} activeTitle={activeTitle} onEquipTitle={setActiveTitle} maxSlots={maxSlots} baseSlots={baseSlots} slot4Unlocked={slot4Unlocked} slot5Unlocked={slot5Unlocked} slot6Unlocked={slot6Unlocked} totalAdopted={totalAdopted} user={user} isLocalMode={isLocalMode} guestMode={guestMode} onLogout={() => setShowLogoutConfirm(true)} onLogin={handleShowLoginAuth} onViewPrivacy={() => setCurrentPage('privacy')} onViewAgreement={() => setCurrentPage('agreement')} onMemorialClick={setMemorialDetailCat} />
            )}
          </div>

          {/* 出战前确认页 */}
          {showPreBattle && (
            <PreBattlePage
              cats={cats}
              slot4Unlocked={slot4Unlocked}
              slot5Unlocked={slot5Unlocked}
              slot6Unlocked={slot6Unlocked}
              onBack={() => { setShowPreBattle(false); setActiveTab('home'); }}
              onStartGame={() => {
                setShowPreBattle(false);
                window.location.href = '猫咪消消乐.html';
              }}
            />
          )}

          {/* Modals */}
          {!showCatDetail && !showPreBattle && <TabBar active={activeTab} onChange={(tab) => { setActiveTab(tab); setBagTab(null); setMarketTab(null); const url = new URL(window.location); url.searchParams.delete('tab'); window.history.replaceState({}, '', url); }} />}
          <CheckInModal show={showCheckIn} onClose={() => setShowCheckIn(false)} />
          <AdoptConfirmModal cat={adoptTarget} show={!!adoptTarget} canAdopt={nurturing.length < homeMaxSlots} homeCount={nurturing.length} homeMaxSlots={homeMaxSlots} onConfirm={confirmAdopt} onCancel={() => setAdoptTarget(null)} />
          <ReleaseConfirmModal cat={releaseTarget} show={!!releaseTarget} onConfirm={confirmRelease} onCancel={() => setReleaseTarget(null)} />
          <GachaResultModal cat={gachaResult} show={showGachaResult} onClose={() => setShowGachaResult(false)} />
          <InfoModal show={!!infoModal} title={infoModal?.title} onClose={() => setInfoModal(null)}>{infoModal?.content}</InfoModal>
          <LineageModal cat={lineageCat} show={!!lineageCat} onClose={() => setLineageCat(null)} />
          <MilestoneUnlockModal alert={milestoneAlert} onClose={() => setMilestoneAlert(null)} />
          {showLogoutConfirm && (
            <div style={{ position:'absolute', top:0, left:0, right:0, bottom:0, background:'rgba(0,0,0,0.75)', backdropFilter:'blur(12px)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:70 }} onClick={() => setShowLogoutConfirm(false)}>
              <div onClick={e => e.stopPropagation()} style={{ width:290, background: colors.card, borderRadius:24, padding:'28px 22px', textAlign:'center', border:`1px solid ${colors.border}`, animation:'slideUp 0.3s ease-out' }}>
                <div style={{ fontSize:48, marginBottom:12 }}>👋</div>
                <div style={{ fontSize:16, fontWeight:800, color:colors.ink, marginBottom:8 }}>确认要退出该账号吗？</div>
                <div style={{ display:'flex', gap:10, marginTop:20 }}>
                  <button onClick={() => setShowLogoutConfirm(false)} style={{ flex:1, height:40, borderRadius:12, background: colors.bg2, border:`1px solid ${colors.border}`, cursor:'pointer', fontSize:13, fontWeight:600, color:colors.muted }}>取消</button>
                  <button onClick={handleLogout} style={{ flex:1, height:40, borderRadius:12, background:'linear-gradient(135deg, #FF6B6B, #E05555)', border:'none', cursor:'pointer', fontSize:13, fontWeight:700, color:'#fff' }}>确认</button>
                </div>
              </div>
            </div>
          )}
          {/* 通用确认弹窗 */}
          {confirmModal && (
            <div style={{ position:'absolute', top:0, left:0, right:0, bottom:0, background:'rgba(0,0,0,0.75)', backdropFilter:'blur(12px)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:80 }} onClick={() => setConfirmModal(null)}>
              <div onClick={e => e.stopPropagation()} style={{ width:290, background: colors.card, borderRadius:24, padding:'28px 22px', textAlign:'center', border:`1px solid ${colors.border}`, animation:'slideUp 0.3s ease-out' }}>
                <div style={{ fontSize:48, marginBottom:12 }}>{confirmModal.emoji}</div>
                <div style={{ fontSize:16, fontWeight:800, color:colors.ink, marginBottom:8 }}>{confirmModal.title}</div>
                <div style={{ fontSize:12, color:colors.sub, marginBottom:4 }}>{confirmModal.message}</div>
                <div style={{ display:'flex', gap:10, marginTop:20 }}>
                  <button onClick={() => setConfirmModal(null)} style={{ flex:1, height:40, borderRadius:12, background: colors.bg2, border:`1px solid ${colors.border}`, cursor:'pointer', fontSize:13, fontWeight:600, color:colors.muted }}>取消</button>
                  <button onClick={() => { const fn = confirmModal.onConfirm; setConfirmModal(null); fn && fn(); }} style={{ flex:1, height:40, borderRadius:12, background:'linear-gradient(135deg, #FF6B6B, #E05555)', border:'none', cursor:'pointer', fontSize:13, fontWeight:700, color:'#fff' }}>确认</button>
                </div>
              </div>
            </div>
          )}
          <CatCardFlipModal cat={flipCardCat} show={!!flipCardCat} onClose={() => setFlipCardCat(null)} onDiscard={handleDiscard} />
          {/* P5: Farewell ceremony */}
          <FarewellCeremony cat={farewellCat} show={showFarewell} onDone={() => {
            // 告别动画结束后，执行真正送走
            if (farewellCat) executeRealRelease(farewellCat);
            setShowFarewell(false); setFarewellCat(null);
          }} />
          {/* P5: Memorial detail */}
          <MemorialDetailModal cat={memorialDetailCat} show={!!memorialDetailCat} onClose={() => setMemorialDetailCat(null)} />
          {/* P5: Title unlock toast */}
          <TitleUnlockToast title={titleUnlockToast} show={!!titleUnlockToast} onDone={() => setTitleUnlockToast(null)} />
          {/* 合规：协议确认弹窗 */}
          <AgreementModal
            show={showAgreementModal}
            onAgree={handleAgreeAgreement}
            onReject={handleRejectAgreement}
            onViewPrivacy={() => setCurrentPage('privacy')}
            onViewAgreement={() => setCurrentPage('agreement')}
          />
          {/* 合规：登录授权弹窗 */}
          <LoginAuthModal
            show={showLoginAuthModal}
            onAuthorize={handleAuthorizeLogin}
            onGuest={handleGuestMode}
            onViewPrivacy={() => setCurrentPage('privacy')}
            onViewAgreement={() => setCurrentPage('agreement')}
            loading={loginAuthLoading}
          />
          {/* 喂食Toast */}
          {feedToast && (
            <div className="feed-toast in" key={feedToast.timestamp}>
              {feedToast.text}
            </div>
          )}
          {/* 合规：游客模式toast */}
          {guestToast && (
            <div style={{
              position:'absolute', bottom:100, left:'50%', transform:'translateX(-50%)',
              background:'rgba(0,0,0,0.85)', color:'#fff', fontSize:12, fontWeight:500,
              padding:'10px 20px', borderRadius:20, zIndex:90,
              animation:'slideUp 0.3s ease-out',
              whiteSpace:'nowrap',
            }}>{guestToast}</div>
          )}
        </div>
      </IosFrame>
    </div>
  );
}

// P0: 检查URL邀请码参数
(function() {
  const params = new URLSearchParams(window.location.search);
  const inviteParam = params.get('invite');
  if (inviteParam && inviteParam.length === 8) {
    try {
      const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      saved.pendingInviteCode = inviteParam;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
    } catch(e) {}
  }
})();

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
