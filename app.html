const CAT_NAMES = ['团子','麻薯','年糕','汤圆','豆沙','芝麻','奶盖','布丁','蛋挞','泡芙','芋圆','栗子','豆花','椰果','仙草','奶酪'];

/* ═══════════════════════════════════════
   GAME STATE (simulated backend)
   ═══════════════════════════════════════ */
let globalSerialId = 1;
function nextSerialId() { return globalSerialId++; }

// P3: Breed-specific serial counters + cooling pool
let breedSerialCounters = {}; // { "橘猫": 5, "黑猫": 3 } — next serial to assign per breed
let coolingPool = {};         // { "橘猫_5": releasedTimestamp } — 60-day cooldown

function cleanCoolingPool() {
  const now = Date.now();
  Object.keys(coolingPool).forEach(k => {
    if (now - coolingPool[k] >= 60 * 86400000) delete coolingPool[k];
  });
}

function getAvailableBreedSerial(breedId) {
  let n = (breedSerialCounters[breedId] || 1);
  while (coolingPool[`${breedId}_${n}`]) n++;
  breedSerialCounters[breedId] = n + 1;
  return n;
}

function makeCatInstance(breedId, rarity, personality, bagExpiresDays = 30) {
  const breed = BREEDS.find(b => b.id === breedId) || BREEDS[0];
  const bs = getAvailableBreedSerial(breed.id);
  return {
    serialId: nextSerialId(),
    breedSerial: bs,
    breedId: breed.id,
    name: breed.id,
    rarity: rarity || breed.rarity,
    img: breed.img,
    desc: breed.desc,
    personality: personality || [PERSONALITIES[Math.floor(Math.random()*PERSONALITIES.length)], PERSONALITIES[Math.floor(Math.random()*PERSONALITIES.length)]],
    status: 'alive',
    location: 'bag',
    createdAt: Date.now(),
    bagExpiresAt: Date.now() + bagExpiresDays * 86400000,
    // nurturing fields
    adoptedAt: null,
    expiresAt: null,
    lastFedAt: null,
    daysAlive: 0,
    gamesWitnessed: 0,
    bestCombo: 0,
    fishSpent: 0,
    isGenesis: bs <= 10,
    previousOwners: [],
    releasedAt: null,
  };
}

// Initial state: create some cats in both nurturing and bag
function seedInitialCats() {
  const cats = [];
  // 3 cats in nurturing area
  const n1 = makeCatInstance('橘猫', 'N', ['贪吃','佛系']);
  n1.location = 'nurturing';
  n1.adoptedAt = Date.now() - 22 * 86400000;
  n1.expiresAt = n1.adoptedAt + 30 * 86400000;
  n1.lastFedAt = Date.now() - 14 * 3600000;
  n1.status = 'alive';
  n1.daysAlive = 22;
  n1.gamesWitnessed = 14;
  n1.bestCombo = 7;
  n1.fishSpent = 22;
  cats.push(n1);

  const n2 = makeCatInstance('黑猫', 'N', ['高冷','酷酷']);

  // 4 cats in bag
  const b1 = makeCatInstance('三花猫', 'R', ['好奇','元气'], 23);

  const b2 = makeCatInstance('暹罗猫', 'R', ['傲娇','醋精'], 18);
  cats.push(b2);
  const b3 = makeCatInstance('折耳猫', 'SR', ['胆小','软萌'], 7);
  cats.push(b3);
  const b4 = makeCatInstance('星空猫', 'SSR', ['呆萌','话痨'], 28);

  return cats;

// Track fish ledger
let fishLedger = [
  { type: 'earn', amount: 100, desc: '初始赠送', time: Date.now() - 30*86400000 },
  { type: 'earn', amount: 50, desc: '签到奖励', time: Date.now() - 22*86400000 },
  { type: 'earn', amount: 18, desc: '消消乐结算', time: Date.now() - 1*86400000 },
  { type: 'spend', amount: 22, desc: '橘猫喂食消耗', time: Date.now() - 1*86400000 },
];

function getFishBalance() {
  return fishLedger.reduce((sum, t) => sum + (t.type === 'earn' ? t.amount : -t.amount), 0);
}

/* ═══════════════════════════════════════
   STORAGE HELPERS
   ═══════════════════════════════════════ */
const STORAGE_KEY = 'miaolegemi_p0_v1';

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const data = JSON.parse(saved);
      globalSerialId = data.globalSerialId || 1;
      fishLedger = data.fishLedger || fishLedger;
      // P3: load breed serial counters and cooling pool
      breedSerialCounters = data.breedSerialCounters || {};
      coolingPool = data.colingPool || data.coolingPool || {};
      cleanCoolingPool();
      let cats = data.cats || seedInitialCats();
      // P3: migrate old cats missing breedSerial
      cats = cats.map(c => {
        if (!c.breedSerial) {
          const bs = (breedSerialCounters[c.breedId] || 1);
          breedSerialCounters[c.breedId] = bs + 1;
          return { ...c, breedSerial: bs, isGenesis: bs <= 10 };
        }
        return c;
      });
      // P3: auto-wander — expire bag cats past their deadline
      cats = cats.map(c => {
        if (c.location === 'bag' && c.bagExpiresAt && Date.now() > c.bagExpiresAt) {
          return { ...c, location: 'memorial', releasedAt: c.bagExpiresAt };
        }
        return c;
      });
      return cats;
    }
  } catch(e) {}
  return seedInitialCats();
}

function loadSavedTitle() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const data = JSON.parse(saved);
      return data.activeTitle || '新手铲屎官';
    }
  } catch(e) {}
  return '新手铲屎官';
}

function saveState(cats, bells, activeTitle) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      cats, globalSerialId, fishLedger, bells, activeTitle,
      breedSerialCounters, coolingPool,
      savedAt: Date.now(),
    }));
  } catch(e) {}
}

/* ═══════════════════════════════════════
   STATUS ENGINE
   ═══════════════════════════════════════ */
function computeCatStatus(cat) {
  if (cat.location !== 'nurturing' || !cat.lastFedAt) return 'alive';
  const hoursSinceFeed = (Date.now() - cat.lastFedAt) / 3600000;
  if (hoursSinceFeed >= 96) return 'packing'; // 4 days
  if (hoursSinceFeed >= 48) return 'starving'; // 2 days (req says 4, but let's follow req: hungry=2d, starving=4d)
  if (hoursSinceFeed >= 24) return 'hungry'; // hungry after 1 day
  return 'alive';
}

function getRemainingDays(cat) {
  if (cat.location === 'bag') {
    return Math.max(0, Math.ceil((cat.bagExpiresAt - Date.now()) / 86400000));
  }
  if (cat.location === 'nurturing') {
    return Math.max(0, Math.ceil((cat.expiresAt - Date.now()) / 86400000));
  }
  return 0;
}

function getHoursSinceFeed(cat) {
  if (!cat.lastFedAt) return 999;
  return Math.floor((Date.now() - cat.lastFedAt) / 3600000);
}

function NotificationBanner({ cats, onNavigate }) {

// Priority: packing > starving > bag expiring <=7d > hungry
  const nurturing = cats.filter(c => c.location === 'nurturing');
  const bagCats = cats.filter(c => c.location === 'bag');

  let banner = null;

  const packingCat = nurturing.find(c => computeCatStatus(c) === 'packing');
  if (packingCat) {
    const hours = getHoursSinceFeed(packingCat);
    banner = { cat: packingCat, text: `${packingCat.name} #${String(packingCat.breedSerial || packingCat.serialId).padStart(3,'0')} 正在收拾行李，还有 ${24-hours%24} 小时`, color: colors.red, priority: 1 };
  } else {
    const starvingCat = nurturing.find(c => computeCatStatus(c) === 'starving');
    if (starvingCat) {
      const days = Math.floor(getHoursSinceFeed(starvingCat) / 24);
      banner = { cat: starvingCat, text: `${starvingCat.name} #${String(starvingCat.breedSerial || starvingCat.serialId).padStart(3,'0')} 已经${days}天没吃东西了`, color: colors.orange, priority: 2 };
    } else {
      const expiringBag = bagCats.find(c => getRemainingDays(c) <= 7);
      if (expiringBag) {
        const days = getRemainingDays(expiringBag);
        banner = { cat: expiringBag, text: `包裹区有猫还有${days}天就会离开`, color: colors.yellow, priority: 3 };
      } else {
        const hungryCat = nurturing.find(c => computeCatStatus(c) === 'hungry');
        if (hungryCat) {
          banner = { cat: hungryCat, text: '有猫咪需要喂食', color: colors.yellow, priority: 4 };
        }
      }
    }
  }

  if (!banner) return null;

  return (
    <div onClick={() => onNavigate('cat', banner.cat)} style={{
      margin: '2px 16px 0', padding: '8px 14px', borderRadius: 12,
      background: `${banner.color}15`, border: `1px solid ${banner.color}30`,
      display: 'flex', alignItems: 'center', gap: 8, cursor: 'pointer',
      animation: 'fadeIn 0.3s ease-out',
    }}>
      <span style={{ fontSize: 14 }}>{banner.priority <= 2 ? '⚠️' : '📢'}</span>
      <span style={{ flex:1, fontSize:11, fontWeight:600, color: banner.color }}>{banner.text}</span>
      <span style={{ fontSize: 12, color: colors.muted }}>→</span>
    </div>
  );
}

function FeaturedCat({ cats, onNavigate }) {

const allCats = cats.filter(c => c.location === 'nurturing' || c.location === 'bag');
  const [idx, setIdx] = useState(0);

  useEffect(() => {
    if (allCats.length <= 1) return;
    const timer = setInterval(() => setIdx(i => (i + 1) % allCats.length), 4000);
    return () => clearInterval(timer);
  }, [allCats.length]);

  if (allCats.length === 0) {
    return (
      <div style={{ textAlign:'center', padding:'20px 20px 0' }}>
        <div style={{ width:140, height:140, borderRadius:'50%', margin:'0 auto', background:'rgba(255,255,255,0.03)', display:'flex', alignItems:'center', justifyContent:'center' }}>
          <span style={{ fontSize:48, opacity:0.3 }}>🐱</span>
        </div>
        <div style={{ fontSize:13, color:colors.muted, marginTop:8 }}>还没有猫咪，去抽卡吧</div>
      </div>
    );
  }

  const cat = allCats[idx % allCats.length];

  return (
    <div style={{ textAlign:'center', padding:'10px 20px 0', position:'relative' }}>
      {/* glow */}
      <div style={{ position:'absolute', top:0, left:'50%', transform:'translateX(-50%)', width:220, height:220, borderRadius:'50%', background:`radial-gradient(circle, ${RARITY_COLORS[cat.rarity]}15 0%, transparent 70%)`, pointerEvents:'none' }}/>
      {/* cat image */}
      <div onClick={() => onNavigate('catDetail', cat)} style={{
        width:140, height:140, borderRadius:'50%', margin:'0 auto',
        background:`radial-gradient(circle, ${RARITY_COLORS[cat.rarity]}20, transparent)`,
        display:'flex', alignItems:'center', justifyContent:'center',
        animation:'float 4s ease-in-out infinite',
        overflow:'hidden', cursor:'pointer',
        border:`2px solid ${RARITY_COLORS[cat.rarity]}30`,
      }}>
        <img src={cat.img} alt={cat.name} style={{ width:'100%', height:'100%', objectFit:'cover' }}
          onError={e => { e.target.style.display='none'; }} />
      </div>
      {/* info */}
      <div style={{ marginTop:8 }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:6 }}>
          <span style={{ fontSize:8, fontWeight:700, padding:'2px 6px', borderRadius:999, background:RARITY_BG[cat.rarity], color:RARITY_COLORS[cat.rarity] }}>{cat.rarity}</span>
          <span style={{ fontSize:16, fontWeight:800, color:colors.ink }}>{cat.name}</span>
          <span style={{ fontSize:10, color:colors.sub }}>#{String(cat.breedSerial || cat.serialId).padStart(3,'0')}</span>
        </div>
        <div style={{ fontSize:10, color:colors.sub, marginTop:2 }}>{cat.desc}</div>
        <div style={{ fontSize:10, color:colors.muted, marginTop:1 }}>{cat.personality.join(' · ')} · {cat.location === 'nurturing' ? '已领养' : `包裹区 · ${getRemainingDays(cat)}天后离开`}</div>
      </div>
      {/* dots */}
      {allCats.length > 1 && (
        <div style={{ display:'flex', gap:4, justifyContent:'center', marginTop:8 }}>
          {allCats.map((_, i) => (
            <div key={i} style={{ width:5, height:5, borderRadius:'50%', background: i === idx % allCats.length ? colors.purpleLight : colors.muted, transition:'all 0.3s' }}/>
          ))}
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════
   NURTURING AREA
   ═══════════════════════════════════════ */
function NurturingArea({ cats, maxSlots, baseSlots, slot4Unlocked, slot5Unlocked, slot6Unlocked, fish, onFeed, onRelease, onNavigate, totalAdopted, maxDaysAlive }) {

const allSlots = Array.from({ length: maxSlots });

  if (cats.length === 0) {
    return (
      <div style={{ padding:'40px 20px', textAlign:'center' }}>
        <div style={{ fontSize:48, marginBottom:12 }}>🏠</div>
        <div style={{ fontSize:14, fontWeight:600, color:colors.ink, marginBottom:4 }}>养成区空空如也</div>
        <div style={{ fontSize:12, color:colors.sub }}>去包裹区领养一只猫吧</div>
      </div>
    );
  }

  const getLockInfo = (slotIndex) => {
    if (slotIndex < baseSlots) return null;
    const extraIndex = slotIndex - baseSlots;
    if (extraIndex === 0 && !slot4Unlocked) return { label: '领养10只后解锁', current: Math.min(totalAdopted, 10), target: 10 };
    if (extraIndex === 1 && !slot5Unlocked) return { label: '有猫存活90天后解锁', current: Math.min(maxDaysAlive, 90), target: 90 };
    if (extraIndex === 2 && !slot6Unlocked) return { label: '历史领养30只后解锁', current: Math.min(totalAdopted, 30), target: 30 };
    return null;
  };

  return (
    <div style={{ padding:'8px 20px 0' }}>
      {allSlots.map((_, i) => {
        const cat = cats[i];
        const lockInfo = !cat ? getLockInfo(i) : null;

        if (!cat && lockInfo) {
          return (
            <div key={i} style={{
              borderRadius:16, padding:'16px', marginBottom:10,
              background:'rgba(255,255,255,0.02)', border:'1px solid rgba(255,255,255,0.05)',
              display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:6, minHeight:100,
              opacity:0.5,
            }}>
              <span style={{ fontSize:20 }}>🔒</span>
              <span style={{ fontSize:11, fontWeight:600, color:colors.muted }}>{lockInfo.label}</span>
              <div style={{ width:120, height:3, borderRadius:2, background:'rgba(255,255,255,0.06)', overflow:'hidden' }}>
                <div style={{ height:'100%', width:`${Math.min(100, lockInfo.current/lockInfo.target*100)}%`, borderRadius:2, background:'linear-gradient(90deg, #6C5CE7, #A29BFE)', transition:'width 0.3s' }}/>
              </div>
              <span style={{ fontSize:9, color:colors.muted }}>{lockInfo.current}/{lockInfo.target}</span>
            </div>
          );
        }

        if (!cat) {
          return (
            <div key={i} style={{
              borderRadius:16, padding:'16px', marginBottom:10,
              background:'rgba(255,255,255,0.02)', border:'1px dashed rgba(255,255,255,0.06)',
              display:'flex', alignItems:'center', justifyContent:'center', gap:6, minHeight:100,
              cursor:'pointer',
            }} onClick={() => onNavigate('cat', null, 'bag')}>
              <span style={{ fontSize:20, color:colors.muted }}>+</span>
              <span style={{ fontSize:12, color:colors.muted }}>领养新猫</span>
            </div>
          );
        }

        const status = computeCatStatus(cat);
        const daysLeft = getRemainingDays(cat);
        const canFeed = fish >= 1 && status !== 'alive';

        return (
          <div key={cat.serialId} style={{
            borderRadius:16, padding:'12px', marginBottom:10,
            background:colors.card, border:`1px solid ${RARITY_COLORS[cat.rarity]}20`,
            position:'relative',
          }}>
            {/* Status indicator */}
            <div style={{ position:'absolute', top:10, right:12, display:'flex', alignItems:'center', gap:3 }}>
              {status !== 'alive' && (
                <span style={{ fontSize:10, animation:'hungerFloat 1.8s ease-in-out infinite' }}>
                  {status === 'packing' ? '💔' : status === 'starving' ? '😿' : '🍽️'}
                </span>
              )}
              <div style={{
                width:12, height:12, borderRadius:'50%',
                background: status==='alive'?colors.green : status==='hungry'?colors.yellow : status==='starving'?colors.orange : colors.red,
                animation: status==='packing'?'packingFlash 0.8s ease-in-out infinite' : status==='starving'?'starvingGlow 0.6s ease-in-out infinite' : status==='hungry'?'pulse 1.5s ease-in-out infinite':'none',
              }}/>
            </div>

            <div onClick={() => onNavigate('catDetail', cat)} style={{ display:'flex', gap:12, cursor:'pointer' }}>
              <div style={{ width:72, height:72, borderRadius:16, overflow:'hidden', border:`2px solid ${RARITY_COLORS[cat.rarity]}40`, flexShrink:0 }}>
                <img src={cat.img} alt={cat.name} style={{ width:'100%', height:'100%', objectFit:'cover' }}
                  onError={e => { e.target.style.display='none'; }} />
              </div>
              <div style={{ flex:1 }}>
                <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:2 }}>

                </div>
                <div style={{ fontSize:11, color:colors.sub, marginBottom:4 }}>
                  性格：{cat.personality.join(' · ')}
                </div>
                <div style={{ display:'flex', alignItems:'center', gap:6 }}>
                  <span style={{ fontSize:11, fontWeight:600, color: status==='alive'?colors.green : status==='hungry'?colors.yellow : status==='starving'?colors.orange : colors.red }}>

            {/* Action buttons */}

                opacity: canFeed ? 1 : 0.5,
              }}>
                {canFeed ? `🐟 喂食 (-1鱼干)` : fish < 1 ? '鱼干不足' : '状态良好'}
              </button>
              <button onClick={() => onRelease(cat)} style={{
                padding:'0 14px', height:34, borderRadius:10, border:'1px solid rgba(255,107,107,0.2)',

              }}>送去流浪</button>
            </div>
          </div>
        );
      })}
    </div>
  );
}

/* ═══════════════════════════════════════
   BAG AREA
   ═══════════════════════════════════════ */
function BagArea({ cats, nurturingCount, maxSlots, onAdopt, onNavigate }) {

if (cats.length === 0) {

  );
}

/* ═══════════════════════════════════════
   CAT CARD FLIP MODAL
   ═══════════════════════════════════════ */
function CatCardFlipModal({ cat, show, onClose, onDiscard }) {

const [phase, setPhase] = useState('enter'); // enter → sweep → flip → back
  const particlesRef = useRef([]);

  useEffect(() => {
    if (!show) return;
    setPhase('enter');
    const t1 = setTimeout(() => setPhase('sweep'), 300);
    const t2 = setTimeout(() => setPhase('flip'), 1200);
    const t3 = setTimeout(() => setPhase('back'), 2200);
    return () => { clearTimeout(t1); clearTimeout(t2); clearTimeout(t3); };
  }, [show, cat?.serialId]);

  // Generate particles once
  useEffect(() => {
    if (phase !== 'flip') return;
    particlesRef.current = Array.from({ length: 24 }, () => ({
      px: (Math.random() - 0.5) * 360 + 'px',
      py: (Math.random() - 0.5) * 360 + 'px',
      delay: Math.random() * 0.5 + 's',
      color: ['#FFEAA7','#FF6B6B','#6C5CE7','#FD9644','#00B894'][Math.floor(Math.random()*5)],
    }));
  }, [phase]);

  if (!show || !cat) return null;

  const isFlipped = phase === 'flip' || phase === 'back';
  const showBack = phase === 'back';

  return (
    <div style={{ position:'absolute', top:0, left:0, right:0, bottom:0, background: `${colors.bg}dd`, backdropFilter:'blur(16px)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:65 }} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{ position:'relative', width:260, height:360, perspective:1000 }}>
        {/* Particles */}
        {phase === 'flip' && (
          <div style={{ position:'absolute', top:'50%', left:'50%', transform:'translate(-50%,-50%)', zIndex:5, pointerEvents:'none' }}>
            {particlesRef.current.map((p, i) => (
              <div key={i} style={{
                position:'absolute', width:6, height:6, borderRadius:'50%', background:p.color,
                animation:`particleFly 1s ease-out ${p.delay} forwards`,
                '--px': p.px, '--py': p.py,
                boxShadow:`0 0 6px ${p.color}`,
              }}/>
            ))}
          </div>
        )}

        {/* Card container with 3D flip */}
        <div style={{
          width:'100%', height:'100%', position:'relative',
          transformStyle:'preserve-3d',
          transition:'transform 0.8s cubic-bezier(0.4, 0, 0.2, 1)',
          transform: isFlipped ? 'rotateY(180deg)' : 'rotateY(0deg)',
          animation: phase === 'enter' ? 'slideUp 0.3s ease-out' : 'none',
        }}>
          {/* FRONT — Cat image */}
          <div style={{
            position:'absolute', top:0, left:0, width:'100%', height:'100%',
            backfaceVisibility:'hidden', borderRadius:20, overflow:'hidden',
            border:`3px solid ${RARITY_COLORS[cat.rarity]}`,
            boxShadow:`0 0 40px ${RARITY_COLORS[cat.rarity]}30`,
            background:`linear-gradient(145deg, ${RARITY_BG[cat.rarity]}, ${colors.bg})`,
            display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
          }}>
            {/* Gold sweep light */}
            {phase === 'sweep' && (
              <div style={{
                position:'absolute', top:0, width:'60%', height:'100%',
                background:'linear-gradient(105deg, transparent 30%, rgba(255,234,167,0.35) 48%, rgba(255,234,167,0.7) 50%, rgba(255,234,167,0.35) 52%, transparent 70%)',
                transform:'skewX(-20deg)',

            {/* Rarity glow */}
            <div style={{ position:'absolute', top:0, left:0, right:0, bottom:0,
              background:`radial-gradient(circle at 50% 40%, ${RARITY_COLORS[cat.rarity]}20 0%, transparent 60%)`,
              opacity: phase === 'sweep' ? 1 : 0.5, transition:'opacity 0.6s',
            }}/>
            <div style={{ width:140, height:140, borderRadius:'50%', overflow:'hidden', border:`2px solid ${RARITY_COLORS[cat.rarity]}50`, position:'relative', zIndex:1 }}>
              <img src={cat.img} alt={cat.name} style={{ width:'100%', height:'100%', objectFit:'cover' }}
                onError={e => { e.target.style.display='none'; }} />
            </div>
            <div style={{ marginTop:12, position:'relative', zIndex:1 }}>
              <span style={{ fontSize:12, fontWeight:800, padding:'4px 14px', borderRadius:999, background:RARITY_BG[cat.rarity], color:RARITY_COLORS[cat.rarity], letterSpacing:2 }}>{cat.rarity}</span>
            </div>
            <div style={{ fontSize:20, fontWeight:800, color:colors.ink, marginTop:8, position:'relative', zIndex:1 }}>{cat.name}</div>
            <div style={{ fontSize:12, color:colors.sub, marginTop:4, position:'relative', zIndex:1 }}>#{String(cat.breedSerial || cat.serialId).padStart(3,'0')}</div>
            <div style={{ fontSize:10, color:colors.muted, marginTop:12, position:'relative', zIndex:1 }}>点击任意位置关闭</div>
          </div>

          {/* BACK — Cat details */}
          <div style={{
            position:'absolute', top:0, left:0, width:'100%', height:'100%',
            backfaceVisibility:'hidden', borderRadius:20, overflow:'hidden',
            border:`3px solid ${RARITY_COLORS[cat.rarity]}`,

                <div style={{ fontSize:10, color:colors.sub }}>
                  {cat.breedId} · 全球第 {cat.breedSerial || cat.serialId} 只
                  {cat.previousOwners.length > 0
                    ? <span style={{ color:colors.purpleLight }}> · 历经 {cat.previousOwners.length} 任主人</span>
                    : ' · 初代'}
                </div>
              </div>
              {cat.location === 'nurturing' && (
                <div>
                  <div style={{ fontSize:9, fontWeight:700, color:colors.muted, letterSpacing:1, marginBottom:4 }}>成长数据</div>
                  <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'4px 12px' }}>
                    <div style={{ fontSize:9, color:colors.sub }}>见证游戏 <span style={{ fontWeight:600, color:colors.ink }}>{cat.gamesWitnessed}</span></div>
                    <div style={{ fontSize:9, color:colors.sub }}>最大连击 <span style={{ fontWeight:600, color:colors.ink }}>{cat.bestCombo}</span></div>
                    <div style={{ fontSize:9, color:colors.sub }}>消耗鱼干 <span style={{ fontWeight:600, color:colors.ink }}>{cat.fishSpent}</span></div>
                  </div>
                </div>
              )}
            </div>
            {/* Bottom buttons */}
            <div style={{ padding:'10px', display:'flex', gap:10, borderTop:`1px solid ${colors.cardBorder}` }}>
              {cat.location === 'bag' && (
                <button onClick={(e) => { e.stopPropagation(); onDiscard && onDiscard(cat); }} style={{
                  flex:1, height:32, borderRadius:8, border:'1px solid rgba(255,107,107,0.3)',
                  background:'rgba(255,107,107,0.1)', cursor:'pointer',
                  fontSize:11, fontWeight:600, color:colors.red,
                }}>丢弃</button>
              )}
              <button onClick={(e) => { e.stopPropagation(); onClose(); }} style={{
                flex:1, height:32, borderRadius:8, border:`1px solid ${colors.cardBorder}`,
                background:colors.card, cursor:'pointer',
                fontSize:11, fontWeight:600, color:colors.muted,
              }}>关闭</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════
   GACHA PAGE
   ═══════════════════════════════════════ */
function GachaPage({ bells, pityCount, onGacha, cats, onCardClick }) {

// Pre-computed 128 gold particle positions
  const goldParticles = useRef(Array.from({ length: 128 }, (_, i) => {
    const angle = (i / 128) * Math.PI * 2;
    const dist = 80 + Math.random() * 120;
    return {
      px: Math.cos(angle) * dist + 'px',
      py: Math.sin(angle) * dist + 'px',
      color: ['#FFEAA7','#FFB730','#FD9644','#FFD700'][i % 4],
      delay: (Math.random() * 0.3).toFixed(2) + 's',
    };
  })).current;

  const [animPhase, setAnimPhase] = useState('idle'); // idle → shake → reveal → idle
  const [animCat, setAnimCat] = useState(null);
  const timersRef = useRef([]);

  // Cleanup timers on unmount
  useEffect(() => {
    return () => timersRef.current.forEach(clearTimeout);
  }, []);

  const handleGacha = () => {
    if (bells < 1 || animPhase !== 'idle') return;

    // Roll: pick a random cat breed weighted by rarity
    const roll = Math.random() * 100;
    let rarity;
    if (pityCount + 1 >= 80) {
      rarity = 'SSR';
    } else if (roll < 2) {
      rarity = 'SSR';
    } else if (roll < 7) {
      rarity = 'SR';
    } else if (roll < 25) {
      rarity = 'R';
    } else {
      rarity = 'N';
    }
    const pool = BREEDS.filter(b => b.rarity === rarity);
    const breed = pool[Math.floor(Math.random() * pool.length)];
    const previewCat = {
      breedId: breed.id,
      name: breed.id,
      rarity: breed.rarity,
      img: breed.img,
      desc: breed.desc,
      personality: [PERSONALITIES[Math.floor(Math.random()*PERSONALITIES.length)], PERSONALITIES[Math.floor(Math.random()*PERSONALITIES.length)]],
      serialId: globalSerialId + 1,
      breedSerial: breedSerialCounters[breed.id] || 1,
    };

    setAnimCat(previewCat);
    setAnimPhase('shake');

    // Animation timeline: shake+sweep+particles(1.5s) → cat pops out(1.5s) → done
    timersRef.current = [
      setTimeout(() => {
        onGacha(previewCat.breedId, previewCat.rarity);
        setAnimPhase('reveal');
      }, 1500),
      setTimeout(() => {
        setAnimPhase('idle');
        setAnimCat(null);
      }, 3000),
    ];
  };

  // Sort cats: SSR > SR > R > N, same rarity by serialId ascending
  const RARITY_WEIGHT = { SSR: 4, SR: 3, R: 2, N: 1 };
  const sortedCats = [...cats].sort((a, b) => {
    const w = (RARITY_WEIGHT[b.rarity] || 0) - (RARITY_WEIGHT[a.rarity] || 0);
    return w !== 0 ? w : a.serialId - b.serialId;
  });

  const isAnimating = animPhase !== 'idle';

  return (
    <div style={{ paddingBottom: 0 }}>
      {/* Gacha area */}
      <div style={{ padding:'16px 20px 12px', textAlign:'center' }}>
        <div style={{ fontSize:14, fontWeight:700, color:colors.ink, marginBottom:4 }}>🎁 猫咪抽卡</div>
        <div style={{ fontSize:11, color:colors.sub, marginBottom:12 }}>
          🔔 {bells} 枚猫铃铛 · 消耗1枚抽一次
        </div>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:8, marginBottom:16 }}>
          <span style={{ fontSize:10, color:colors.muted }}>保底进度</span>
          <div style={{ width:160, height:4, borderRadius:2, background:'rgba(255,255,255,0.06)', overflow:'hidden' }}>
            <div style={{ height:'100%', width:`${Math.min(100, pityCount/80*100)}%`, borderRadius:2, background:'linear-gradient(90deg, #FD9644, #FFEAA7)', transition:'width 0.3s' }}/>
          </div>
          <span style={{ fontSize:10, fontWeight:600, color:colors.orange }}>{pityCount} / 80</span>
        </div>

        {/* Gacha display area — shrunk 10%, centered */}
        <div style={{ display:'flex', justifyContent:'center', marginBottom:14 }}>
          <div style={{
            width:'90%', aspectRatio:'1', borderRadius:18, overflow:'hidden',
            background:'rgba(255,255,255,0.03)', border:'1px solid rgba(255,255,255,0.06)',
            display:'flex', alignItems:'center', justifyContent:'center',
            position:'relative',
          }}>
            {/* Idle: cat bell */}
            {animPhase === 'idle' && (
              <img src="cat/猫铃铛.png" alt="猫铃铛" style={{ width:'100%', height:'100%', objectFit:'contain' }}
                onError={e => {
                  e.target.style.display = 'none';
                  e.target.parentElement.innerHTML = '<div style="text-align:center;color:rgba(240,237,255,0.25);font-size:13px">猫铃铛</div>';
                }} />
            )}

            {/* Bell shaking + gold sweep + particles — all simultaneous */}
            {animPhase === 'shake' && (
              <>
                {/* Bell fills div, shaking */}
                <img src="cat/猫铃铛.png" alt="猫铃铛" style={{
                  width:'100%', height:'100%', objectFit:'contain',
                  animation:'bellShake 1.5s ease-in-out',
                  zIndex:2, position:'relative',
                }}
                  onError={e => { e.target.style.display='none'; e.target.parentElement.innerHTML='<div style="font-size:60px">🔔</div>'; }} />

                {/* Gold sweep overlay */}
                <div style={{
                  position:'absolute', top:0, left:0, right:0, bottom:0, pointerEvents:'none', zIndex:3,
                  overflow:'hidden', borderRadius:18,
                }}>
                  <div style={{
                    position:'absolute', top:0, width:'50%', height:'100%',
                    background:'linear-gradient(105deg, transparent 30%, rgba(255,234,167,0.25) 48%, rgba(255,234,167,0.6) 50%, rgba(255,234,167,0.25) 52%, transparent 70%)',
                    transform:'skewX(-20deg)',
                    animation:'goldSweep 0.7s ease-in-out forwards',
                  }}/>
                </div>

                {/* 128 Gold particles */}
                <div style={{ position:'absolute', top:'50%', left:'50%', transform:'translate(-50%,-50%)', zIndex:4, pointerEvents:'none' }}>
                  {goldParticles.map((p, i) => (
                    <div key={i} style={{
                      position:'absolute', width:5, height:5, borderRadius:'50%', background:p.color,
                      animation:`particleFly 0.8s ease-out ${p.delay} forwards`,
                      '--px': p.px, '--py': p.py,
                      boxShadow:`0 0 6px ${p.color}`,
                    }}/>
                  ))}
                </div>
              </>
            )}

            {/* Cat pops out from circle */}
            {animPhase === 'reveal' && animCat && (
              <>
                {/* Ring pulses */}
                <div style={{ position:'absolute', top:'50%', left:'50%', transform:'translate(-50%,-50%)', pointerEvents:'none' }}>
                  {[0, 200, 400].map((delay, i) => (
                    <div key={i} style={{
                      position:'absolute', width:40, height:40, borderRadius:'50%',
                      border:`2px solid ${RARITY_COLORS[animCat.rarity]}40`,
                      animation:`ringPulse 1s ease-out ${delay}ms forwards`,
                    }}/>
                  ))}
                </div>

                {/* Cat jumps out */}
                <div style={{
                  position:'relative', zIndex:2,
                  animation:'catJumpOut 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards',
                }}>
                  <div style={{
                    width:100, height:100, borderRadius:'50%', overflow:'hidden',
                    border:`3px solid ${RARITY_COLORS[animCat.rarity]}`,
                    boxShadow:`0 0 30px ${RARITY_COLORS[animCat.rarity]}40`,
                  }}>
                    <img src={animCat.img} alt={animCat.name} style={{ width:'100%', height:'100%', objectFit:'cover' }}
                      onError={e => { e.target.style.display='none'; }} />
                  </div>
                  <div style={{ marginTop:8, textAlign:'center' }}>
                    <span style={{
                      fontSize:11, fontWeight:800, letterSpacing:3,
                      padding:'4px 16px', borderRadius:999,
                      background:RARITY_BG[animCat.rarity], color:RARITY_COLORS[animCat.rarity],
                    }}>{animCat.rarity}</span>
                  </div>
                </div>
              </>
            )}
          </div>
        </div>

        <button onClick={handleGacha} disabled={isAnimating || bells < 1} style={{
          width:'100%', height:50, borderRadius:16,
          background: (isAnimating || bells < 1) ? 'rgba(255,255,255,0.06)' : 'linear-gradient(135deg, #6C5CE7, #A29BFE)',
          border:'none', cursor:(isAnimating||bells<1)?'not-allowed':'pointer',
          fontSize:16, fontWeight:800,
          color:(isAnimating||bells<1)?colors.muted:'#fff',
          opacity:(isAnimating||bells<1)?0.6:1,
          boxShadow:(isAnimating||bells<1)?'none':'0 8px 24px rgba(108,92,231,0.35)',
        }}>
          {isAnimating ? '抽卡中...' : bells < 1 ? '铃铛不足' : '抽卡 (-1🔔)'}
        </button>
      </div>

      {/* Cat collection grid */}
      <div style={{ padding:'0 20px' }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:8 }}>
          <div style={{ fontSize:13, fontWeight:700, color:colors.ink, display:'flex', alignItems:'center', gap:6 }}>
            <span>🐱</span> 我的猫咪
            <span style={{ fontSize:10, color:colors.sub, fontWeight:400 }}>{cats.length}/{BREEDS.length}</span>
          </div>
        </div>
        <div style={{ display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap:8 }}>
          {sortedCats.map((cat, i) => (
            <div key={cat.serialId} onClick={() => onCardClick(cat)} style={{
              borderRadius:14, padding:'8px 4px 6px', cursor:'pointer',
              background:colors.card, border:`1px solid ${RARITY_COLORS[cat.rarity]}20`,
              display:'flex', flexDirection:'column', alignItems:'center', gap:4,
              animation:`slideUp 0.4s ease-out ${i * 0.05}s both`,
              transition:'transform 0.15s, box-shadow 0.15s',
            }}
              onMouseEnter={e => { e.currentTarget.style.transform = 'scale(1.06)'; e.currentTarget.style.boxShadow = `0 0 16px ${RARITY_COLORS[cat.rarity]}20`; }}
              onMouseLeave={e => { e.currentTarget.style.transform = 'scale(1)'; e.currentTarget.style.boxShadow = 'none'; }}
            >
              <div style={{ width:56, height:56, borderRadius:'50%', overflow:'hidden', border:`1.5px solid ${RARITY_COLORS[cat.rarity]}40` }}>
                <img src={cat.img} alt={cat.name} style={{ width:'100%', height:'100%', objectFit:'cover' }}
                  onError={e => { e.target.style.display = 'none'; }} />
              </div>
              <span style={{ fontSize:10, fontWeight:600, color:colors.ink }}>{cat.name}</span>
              <span style={{ fontSize:8, fontWeight:700, color:RARITY_COLORS[cat.rarity], padding:'1px 6px', borderRadius:4, background:RARITY_BG[cat.rarity] }}>#{String(cat.breedSerial || cat.serialId).padStart(3,'0')} {cat.rarity}</span>
            </div>
          ))}
        </div>
        {/* Unlocked breeds count */}
        <div style={{ display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap:8, marginTop:8 }}>
          {BREEDS.filter(b => !cats.some(c => c.breedId === b.id)).map((breed, i) => (
            <div key={breed.id} style={{
              borderRadius:14, padding:'8px 4px 6px',
              background:'rgba(255,255,255,0.02)', border:'1px solid rgba(255,255,255,0.06)',
              display:'flex', flexDirection:'column', alignItems:'center', gap:4,
              opacity:0.3,
            }}>
              <div style={{ width:56, height:56, borderRadius:'50%', overflow:'hidden', position:'relative' }}>
                <img src={breed.img} alt={breed.id} style={{ width:'100%', height:'100%', objectFit:'cover', filter:'grayscale(1) brightness(0.3)' }}
                  onError={e => { e.target.style.display = 'none'; }} />
                <div style={{ position:'absolute', top:0, left:0, right:0, bottom:0, display:'flex', alignItems:'center', justifyContent:'center' }}>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
                    <rect x="5" y="11" width="14" height="10" rx="2" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" strokeWidth="1.5"/>
                    <path d="M8 11V7a4 4 0 118 0v4" stroke="rgba(255,255,255,0.3)" strokeWidth="1.5" fill="none" strokeLinecap="round"/>
                  </svg>
                </div>
              </div>
              <span style={{ fontSize:10, fontWeight:600, color:colors.muted }}>{breed.id}</span>
              <span style={{ fontSize:8, fontWeight:700, color:RARITY_COLORS[breed.rarity], padding:'1px 6px', borderRadius:4, background:RARITY_BG[breed.rarity] }}>{breed.rarity}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════
   PROFILE PAGE (Tab 4)

function ProfilePage({ cats, fish, bells, activeTitle, onEquipTitle, maxSlots, baseSlots, slot4Unlocked, slot5Unlocked, slot6Unlocked, totalAdopted, user, isLocalMode, onLogout, onMemorialClick }) {

const nurturing = cats.filter(c => c.location === 'nurturing');
  const memorial = cats.filter(c => c.location === 'memorial');
  const longestCat = [...cats].sort((a,b) => b.daysAlive - a.daysAlive)[0];
  const lowestSerial = [...cats].sort((a,b) => a.serialId - b.serialId)[0];
  const totalFishSpent = cats.reduce((s,c) => s + c.fishSpent, 0);
  const hasGenesis = cats.some(c => c.breedSerial && c.breedSerial <= 10 && (c.location === 'nurturing' || c.location === 'memorial'));

  const titles = [
    { name:'新手铲屎官', cond:'首次领养', done: totalAdopted >= 1 },
    { name:'合格铲屎官', cond:'领养满5只', done: totalAdopted >= 5 },
    { name:'资深铲屎官', cond:'有猫存活90天', done: cats.some(c => c.daysAlive >= 90) },
    { name:'猫咪守护者', cond:'领养满20只', done: totalAdopted >= 20 },
    { name:'老铲屎官', cond:'有猫存活180天', done: cats.some(c => c.daysAlive >= 180) },
    { name:'猫星摆渡人', cond:'送走3只猫', done: memorial.length >= 3 },
    { name:'初代发现者', cond:'持有创世编号猫', done: hasGenesis },

    <div style={{ paddingBottom: 0 }}>
      {/* Header */}
      <div style={{ padding:'12px 20px', display:'flex', alignItems:'center', gap:12 }}>
        <div style={{ width:52, height:52, borderRadius:'50%', background:'linear-gradient(135deg, #FFEAA7, #FD9644)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:28 }}>🐱</div>
        <div style={{ flex:1 }}>
          <div style={{ fontSize:16, fontWeight:800, color:colors.ink }}>{user?.nickname || '铲屎官'}</div>
          <div style={{ display:'flex', alignItems:'center', gap:6, marginTop:2 }}>
            <span style={{ fontSize:9, fontWeight:700, padding:'2px 6px', borderRadius:6, background:'rgba(108,92,231,0.2)', color:colors.purpleLight }}>{activeTitle || '无称号'}</span>
            {!isLocalMode && <span style={{ fontSize:9, padding:'2px 6px', borderRadius:6, background:'rgba(0,184,148,0.15)', color:colors.green }}>在线</span>}
            {isLocalMode && <span style={{ fontSize:9, padding:'2px 6px', borderRadius:6, background:'rgba(253,150,68,0.15)', color:colors.orange }}>离线</span>}
          </div>
        </div>
        {onLogout && (
          <div onClick={onLogout} style={{ cursor:'pointer', padding:'6px 12px', borderRadius:8, border:`1px solid ${colors.cardBorder}`, fontSize:11, color:colors.sub }}>退出</div>
        )}
      </div>

      {/* Stats */}
      <div style={{ padding:'8px 20px' }}>
        <div style={{ borderRadius:16, padding:'14px', background:colors.card, border:`1px solid ${colors.cardBorder}` }}>
          <div style={{ fontSize:12, fontWeight:700, color:colors.ink, marginBottom:10 }}>📊 我的数据</div>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:'10px 0' }}>
            <div style={{ textAlign:'center' }}>
              <div style={{ fontSize:20, fontWeight:800, color:colors.purpleLight }}>{totalAdopted}</div>
              <div style={{ fontSize:10, color:colors.muted }}>历史领养</div>
            </div>
            <div style={{ textAlign:'center' }}>
              <div style={{ fontSize:20, fontWeight:800, color:colors.green }}>{nurturing.length}</div>
              <div style={{ fontSize:10, color:colors.muted }}>存活中</div>
            </div>
            <div style={{ textAlign:'center' }}>
              <div style={{ fontSize:20, fontWeight:800, color:colors.orange }}>{longestCat?.daysAlive || 0}天</div>
              <div style={{ fontSize:10, color:colors.muted }}>最长存活</div>
            </div>
            <div style={{ textAlign:'center' }}>
              <div style={{ fontSize:20, fontWeight:800, color:colors.yellow }}>#{lowestSerial ? String(lowestSerial.breedSerial || lowestSerial.serialId).padStart(3,'0') : '---'}</div>
              <div style={{ fontSize:10, color:colors.muted }}>最低编号</div>
            </div>
            <div style={{ textAlign:'center' }}>
              <div style={{ fontSize:20, fontWeight:800, color:colors.blue }}>{totalFishSpent}</div>
              <div style={{ fontSize:10, color:colors.muted }}>鱼干消耗</div>
            </div>
            <div style={{ textAlign:'center' }}>
              <div style={{ fontSize:20, fontWeight:800, color:colors.pink }}>{memorial.length}</div>
              <div style={{ fontSize:10, color:colors.muted }}>纪念册</div>
            </div>
          </div>
        </div>

/* ═══════════════════════════════════════
   告别仪式动画
   ═══════════════════════════════════════ */
function FarewellCeremony({ cat, show, onDone }) {
  const [phase, setPhase] = useState(0); // 0=fadeIn, 1=walking, 2=text, 3=done
  const timerRef = useRef(null);

  useEffect(() => {
    if (!show || !cat) return;
    setPhase(0);
    // Phase 0: fadeIn (0.8s)
    timerRef.current = setTimeout(() => setPhase(1), 800);
    // Phase 1: cat walks away (2.5s)
    timerRef.current = setTimeout(() => setPhase(2), 3300);
    // Phase 2: show text (2s)
    timerRef.current = setTimeout(() => setPhase(3), 5300);
    // Phase 3: auto close
    timerRef.current = setTimeout(() => onDone && onDone(), 6000);
    return () => { if (timerRef.current) clearTimeout(timerRef.current); };
  }, [show, cat]);

  if (!show || !cat) return null;

  const stars = Array.from({ length: 12 }, (_, i) => ({
    id: i,
    left: 10 + Math.random() * 80,
    delay: Math.random() * 2,
    size: 8 + Math.random() * 16,
    emoji: ['✨', '⭐', '🌟', '💫', '☆', '❋'][i % 6],
  }));

  const tears = Array.from({ length: 6 }, (_, i) => ({
    id: i,
    left: 20 + Math.random() * 60,
    delay: 0.5 + Math.random() * 1.5,
    size: 6 + Math.random() * 8,
  }));

  return (
    <div style={{
      position:'absolute', top:0, left:0, right:0, bottom:0, zIndex:80,
      background:'linear-gradient(180deg, #0a0618 0%, #1a0a2e 40%, #0a0618 100%)',
      display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
      animation:'farewellFadeIn 0.8s ease-out',
    }}>
      {/* Stars background */}
      {stars.map(s => (
        <div key={s.id} style={{
          position:'absolute', left:`${s.left}%`, bottom:'20%',
          fontSize:s.size, animation:`farewellStar 3s ${s.delay}s ease-out infinite`,
          pointerEvents:'none',
        }}>{s.emoji}</div>
      ))}

      {/* Tears */}
      {phase >= 1 && tears.map(t => (
        <div key={t.id} style={{
          position:'absolute', left:`${t.left}%`, top:'25%',
          fontSize:t.size, animation:`farewellTear 1.5s ${t.delay}s ease-in infinite`,
          pointerEvents:'none', opacity:0.6,
        }}>💧</div>
      ))}

      {/* Cat walking away with backpack */}
      {phase < 3 && (
        <div style={{
          animation: phase >= 1 ? 'farewellCatWalk 2.5s ease-in-out forwards' : 'none',
          textAlign:'center',
        }}>
          <div style={{ width:80, height:80, borderRadius:'50%', overflow:'hidden', margin:'0 auto 8px',
            border:`2px solid ${RARITY_COLORS[cat.rarity]}60`, filter:'grayscale(0.3)',
            boxShadow:`0 0 30px ${RARITY_COLORS[cat.rarity]}40`,
          }}>
            <img src={cat.img} alt={cat.name} style={{ width:'100%', height:'100%', objectFit:'cover' }}
              onError={e => { e.target.style.display='none'; }} />
          </div>
          {/* Backpack */}
          <div style={{ fontSize:20, marginTop:-12, marginLeft:30 }}>🎒</div>
          <div style={{ fontSize:11, color:colors.sub, marginTop:4 }}>{cat.name}</div>
        </div>
      )}

      {/* Farewell text */}
      {phase >= 2 && phase < 3 && (
        <div style={{
          position:'absolute', bottom:'30%', textAlign:'center',
          animation:'farewellText 2s ease-out forwards',
        }}>
          <div style={{ fontSize:14, color:colors.sub, marginBottom:6 }}>
            {cat.name} · #{String(cat.breedSerial || cat.serialId).padStart(3,'0')}
          </div>
          <div style={{ fontSize:18, fontWeight:800, color:colors.ink, marginBottom:8 }}>
            踏上了去猫星的旅途
          </div>
          <div style={{ fontSize:12, color:colors.sub, lineHeight:1.8 }}>
            陪伴了你 {cat.daysAlive} 天<br/>
            见证了 {cat.gamesWitnessed} 场消消乐<br/>
            最佳连击 {cat.bestCombo} 连消
          </div>
          <div style={{ fontSize:13, color:colors.purpleLight, marginTop:12, fontWeight:600 }}>
            ✨ 这段记忆将永远珍藏 ✨
          </div>
        </div>
      )}

      {/* Done phase - summary */}
      {phase >= 3 && (
        <div style={{ textAlign:'center', animation:'farewellFadeIn 0.5s ease-out' }}>
          <div style={{ fontSize:48, marginBottom:12 }}>🌈</div>
          <div style={{ fontSize:16, fontWeight:800, color:colors.ink, marginBottom:6 }}>
            {cat.name} 已到达猫星
          </div>
          <div style={{ fontSize:12, color:colors.sub, marginBottom:20 }}>
            它的序列号将在 60 天后重新流通
          </div>
          <button onClick={onDone} style={{
            padding:'10px 32px', borderRadius:12, border:'none', cursor:'pointer',
            background:`linear-gradient(135deg, ${colors.purple}, ${colors.purpleDark})`,
            color:'#fff', fontSize:14, fontWeight:700,
          }}>永远记得它</button>
        </div>
      )}
    </div>
  );
}

function App() {
  // Auth state

  // State

  const [notifPerm, setNotifPerm] = useState('default');
  const [theme, setTheme] = useState('dark');
  const [milestoneAlert, setMilestoneAlert] = useState(null); // { label, slotName }
  const milestoneAlertTimer = useRef(null);
  const milestoneState = useRef({ slot4: false, slot5: false, slot6: false });

  // P5: Farewell ceremony, memorial detail, title unlock toast
  const [farewellCat, setFarewellCat] = useState(null);
  const [showFarewell, setShowFarewell] = useState(false);
  const [memorialDetailCat, setMemorialDetailCat] = useState(null);
  const [titleUnlockToast, setTitleUnlockToast] = useState(null);
  const prevTitlesRef = useRef(new Set());

  // Auto-dismiss milestone alert
  useEffect(() => {
    if (milestoneAlert) {
      milestoneAlertTimer.current = setTimeout(() => setMilestoneAlert(null), 5000);
      return () => clearTimeout(milestoneAlertTimer.current);
    }
  }, [milestoneAlert]);

  // Auth: check token on mount
  useEffect(() => {
    const initAuth = async () => {
      if (MiaolegemiAPI.isLoggedIn()) {
        try {
          const profile = await MiaolegemiAPI.getProfile();
          setUser(profile);
          setBells(profile.bells);
          setIsLocalMode(false);
          // Load cats from API
          const apiCats = await MiaolegemiAPI.getCats();
          if (apiCats.length > 0) {
            const mapped = apiCats.map(c => ({
              serialId: c.id, breedSerial: c.serial?.serialNumber || 0,
              breedId: c.serial?.species?.name || '橘猫', name: c.serial?.species?.name || '橘猫',
              rarity: c.serial?.species?.rarity || 'N',
              img: (BREEDS.find(b => b.id === (c.serial?.species?.name)) || BREEDS[0]).img,
              desc: (BREEDS.find(b => b.id === (c.serial?.species?.name)) || BREEDS[0]).desc,
              personality: Array.isArray(c.personality) ? c.personality : [],
              status: computeCatStatus({ location: c.location, lastFedAt: c.lastFedAt }),
              location: c.location, createdAt: new Date(c.createdAt).getTime(),
              bagExpiresAt: c.bagExpiresAt ? new Date(c.bagExpiresAt).getTime() : null,
              adoptedAt: c.adoptedAt ? new Date(c.adoptedAt).getTime() : null,
              expiresAt: c.expiresAt ? new Date(c.expiresAt).getTime() : null,
              lastFedAt: c.lastFedAt ? new Date(c.lastFedAt).getTime() : null,
              daysAlive: c.daysAlive || 0, gamesWitnessed: c.gamesWitnessed || 0,
              bestCombo: c.bestCombo || 0, fishSpent: c.fishSpent || 0,
              isGenesis: (c.serial?.serialNumber || 0) <= 10,
              previousOwners: Array.isArray(c.previousOwners) ? c.previousOwners : [],
              releasedAt: c.releasedAt ? new Date(c.releasedAt).getTime() : null,
              _apiId: c.id, _serialId: c.serialId,
            }));
            setCats(mapped);
          }
          // Sync fish balance from ledger
          try {
            const ledger = await MiaolegemiAPI.request('/user/profile');
            // fishBalance is in profile
          } catch {}
        } catch (e) {
          // Token invalid
          MiaolegemiAPI.clearToken();
        }
      }
      setAuthChecked(true);
    };
    initAuth();
  }, []);

  const handleLogin = (userData, localMode) => {
    setUser(userData);
    setIsLocalMode(localMode);
    if (!localMode) {
      setBells(userData.bells || 3);
    }
  };

  const handleLogout = () => {
    MiaolegemiAPI.logout();
    setUser(null);
    setIsLocalMode(false);
    setCats(loadState);
    setBells(3);
  };

  // Info modals
  const [infoModal, setInfoModal] = useState(null);

  const fish = getFishBalance();
  const nurturing = cats.filter(c => c.location === 'nurturing');
  const memorial = cats.filter(c => c.location === 'memorial');
  const totalAdopted = cats.filter(c => c.location === 'nurturing' || c.location === 'memorial').length;
  const baseSlots = 3;
  const slot4Unlocked = totalAdopted >= 10;
  const slot5Unlocked = cats.some(c => c.daysAlive >= 90);
  const slot6Unlocked = totalAdopted >= 30;
  const maxSlots = baseSlots + (slot4Unlocked ? 1 : 0) + (slot5Unlocked ? 1 : 0) + (slot6Unlocked ? 1 : 0);

  // Today's fish earned (for home page display)
  const todayStart = new Date(); todayStart.setHours(0,0,0,0);
  const todayFish = fishLedger
    .filter(t => t.type === 'earn' && t.time > todayStart.getTime())
    .reduce((s, t) => s + t.amount, 0);

  // Compute statuses periodically (simulate hourly backend job) + auto-wander
  useEffect(() => {
    const timer = setInterval(() => {
      setCats(prev => prev.map(c => {
        if (c.location === 'nurturing') {
          const newStatus = computeCatStatus(c);
          return c.status !== newStatus ? { ...c, status: newStatus } : c;
        }
        if (c.location === 'bag' && c.bagExpiresAt && Date.now() > c.bagExpiresAt) {
          return { ...c, location: 'memorial', releasedAt: c.bagExpiresAt };
        }
        return c;
      }));
    }, 60000);
    return () => clearInterval(timer);
  }, []);

  // Sync data when returning from game (visibility change)
  useEffect(() => {
    const handleVisibility = async () => {
      if (document.visibilityState === 'visible') {
        // Online mode: sync from API
        if (!isLocalMode && MiaolegemiAPI.isLoggedIn()) {
          try {
            const apiCats = await MiaolegemiAPI.getCats();
            if (apiCats.length > 0) {
              const mapped = apiCats.map(c => ({
                serialId: c.id, breedSerial: c.serial?.serialNumber || 0,
                breedId: c.serial?.species?.name || '橘猫', name: c.serial?.species?.name || '橘猫',
                rarity: c.serial?.species?.rarity || 'N',
                img: (BREEDS.find(b => b.id === (c.serial?.species?.name)) || BREEDS[0]).img,
                desc: (BREEDS.find(b => b.id === (c.serial?.species?.name)) || BREEDS[0]).desc,
                personality: Array.isArray(c.personality) ? c.personality : [],
                status: computeCatStatus({ location: c.location, lastFedAt: c.lastFedAt }),
                location: c.location, createdAt: new Date(c.createdAt).getTime(),
                bagExpiresAt: c.bagExpiresAt ? new Date(c.bagExpiresAt).getTime() : null,
                adoptedAt: c.adoptedAt ? new Date(c.adoptedAt).getTime() : null,
                expiresAt: c.expiresAt ? new Date(c.expiresAt).getTime() : null,
                lastFedAt: c.lastFedAt ? new Date(c.lastFedAt).getTime() : null,
                daysAlive: c.daysAlive || 0, gamesWitnessed: c.gamesWitnessed || 0,
                bestCombo: c.bestCombo || 0, fishSpent: c.fishSpent || 0,
                isGenesis: (c.serial?.serialNumber || 0) <= 10,
                previousOwners: Array.isArray(c.previousOwners) ? c.previousOwners : [],
                releasedAt: c.releasedAt ? new Date(c.releasedAt).getTime() : null,
                _apiId: c.id, _serialId: c.serialId,
              }));
              setCats(mapped);
            }
            const profile = await MiaolegemiAPI.getProfile();
            setBells(profile.bells);
          } catch (e) {}
          return;
        }
        // Local mode: sync from localStorage
        try {
          const saved = localStorage.getItem(STORAGE_KEY);
          if (saved) {
            const data = JSON.parse(saved);
            const savedLedger = data.fishLedger;
            if (Array.isArray(savedLedger)) {
              const localLen = fishLedger.length;
              const savedLen = savedLedger.length;
              if (savedLen > localLen) {
                const newEntries = savedLedger.slice(localLen);
                fishLedger.push(...newEntries);
              }
            }
            if (data.cats) {
              const savedCats = data.cats;
              setCats(prev => {
                if (JSON.stringify(prev) !== JSON.stringify(savedCats)) return savedCats;
                return prev;
              });
            }
            if (data.globalSerialId && data.globalSerialId > globalSerialId) {
              globalSerialId = data.globalSerialId;
            }
            setCats(prev => [...prev]);
          }
        } catch(e) {}
      }
    };
    document.addEventListener('visibilitychange', handleVisibility);
    return () => document.removeEventListener('visibilitychange', handleVisibility);
  }, [isLocalMode]);

  // Request notification permission on first interaction
  useEffect(() => {
    if (notifPerm !== 'default') return;
    const timer = setTimeout(() => {
      if ('Notification' in window && Notification.permission === 'default') {
        Notification.requestPermission().then(p => setNotifPerm(p));
      }
    }, 5000);
    return () => clearTimeout(timer);
  }, [notifPerm]);

  // Push notifications: check cat statuses periodically
  const notifSentRef = useRef({});
  useEffect(() => {
    if (!('Notification' in window) || Notification.permission !== 'granted') return;
    const checkAndNotify = () => {
      const now = Date.now();
      const nurturing = cats.filter(c => c.location === 'nurturing');
      const bagCats = cats.filter(c => c.location === 'bag');

      for (const cat of nurturing) {
        const status = computeCatStatus(cat);
        const key = `nurturing_${cat.serialId}_${status}`;
        const lastSent = notifSentRef.current[key];
        // Don't re-send same notification within 6 hours
        if (lastSent && now - lastSent < 6 * 3600000) continue;

        let title, body;
        if (status === 'packing') {
          title = `${cat.name} 开始收拾行李了`;
          body = `#${String(cat.breedSerial || cat.serialId).padStart(3,'0')} 还有最后24小时，它还在等你`;
        } else if (status === 'starving') {
          title = `${cat.name} 严重饥饿`;
          body = `#${String(cat.breedSerial || cat.serialId).padStart(3,'0')} 已经多天没吃东西了`;
        } else if (status === 'hungry') {
          title = `${cat.name} 饿了`;
          body = `#${String(cat.breedSerial || cat.serialId).padStart(3,'0')} 想吃鱼干了，快去喂它`;
        } else continue;

        try { new Notification(title, { body, icon: cat.img, tag: key, requireInteraction: status === 'packing' }); } catch(e) {}
        notifSentRef.current[key] = now;
      }

      for (const cat of bagCats) {
        const daysLeft = getRemainingDays(cat);
        if (daysLeft <= 7 && daysLeft > 0) {
          const key = `bag_${cat.serialId}_${daysLeft}`;
          const lastSent = notifSentRef.current[key];
          if (lastSent && now - lastSent < 6 * 3600000) continue;
          try { new Notification('包裹有猫即将离开', { body: `${cat.name} #${String(cat.breedSerial || cat.serialId).padStart(3,'0')} 还有${daysLeft}天就要离开了`, icon: cat.img, tag: key }); } catch(e) {}
          notifSentRef.current[key] = now;
        }
      }
    };

    checkAndNotify();
    const timer = setInterval(checkAndNotify, 120000); // every 2 minutes
    return () => clearInterval(timer);
  }, [cats]);

  // Detect newly unlocked milestones + titles
  useEffect(() => {
    const slot4 = totalAdopted >= 10;
    const slot5 = cats.some(c => c.daysAlive >= 90);
    const slot6 = totalAdopted >= 30;

    if (slot4 && !milestoneState.current.slot4) {
      setMilestoneAlert({ label: '历史领养达到10只！', slotName: '第4格' });
      if ('Notification' in window && Notification.permission === 'granted') {
        try { new Notification('养成区第4格已解锁！', { body: '快去领养新猫咪吧' }); } catch(e) {}
      }
    }
    if (slot5 && !milestoneState.current.slot5) {
      setMilestoneAlert({ label: '有猫咪存活超过90天！', slotName: '第5格' });
      if ('Notification' in window && Notification.permission === 'granted') {
        try { new Notification('养成区第5格已解锁！', { body: '猫咪与你的羁绊越来越深了' }); } catch(e) {}
      }
    }
    if (slot6 && !milestoneState.current.slot6) {
      setMilestoneAlert({ label: '历史领养达到30只！', slotName: '第6格' });
      if ('Notification' in window && Notification.permission === 'granted') {
        try { new Notification('养成区第6格已解锁！', { body: '你已经是资深铲屎官了' }); } catch(e) {}
      }
    }

    milestoneState.current = { slot4, slot5, slot6 };

    // P5: Detect newly unlocked titles
    const currentTitles = new Set();
    if (totalAdopted >= 1) currentTitles.add('新手铲屎官');
    if (totalAdopted >= 5) currentTitles.add('合格铲屎官');
    if (cats.some(c => c.daysAlive >= 90)) currentTitles.add('资深铲屎官');
    if (totalAdopted >= 20) currentTitles.add('猫咪守护者');
    if (cats.some(c => c.daysAlive >= 180)) currentTitles.add('老铲屎官');
    const memorialCount = cats.filter(c => c.location === 'memorial').length;
    if (memorialCount >= 3) currentTitles.add('猫星摆渡人');
    if (cats.some(c => c.isGenesis && (c.location === 'nurturing' || c.location === 'bag'))) currentTitles.add('初代发现者');

    if (prevTitlesRef.current.size > 0) {
      for (const t of currentTitles) {
        if (!prevTitlesRef.current.has(t)) {
          setTitleUnlockToast(t);
          if ('Notification' in window && Notification.permission === 'granted') {
            try { new Notification('新称号解锁！', { body: t }); } catch(e) {}
          }
          break; // show one at a time
        }
      }
    }
    prevTitlesRef.current = currentTitles;
  }, [totalAdopted, cats]);

  // Save state (local mode only)
  useEffect(() => {
    if (isLocalMode) saveState(cats, bells, activeTitle);
  }, [cats, bells, activeTitle, isLocalMode]);

  // Handle feeding
  const handleFeed = useCallback(async (cat) => {
    if (getFishBalance() < 1 && isLocalMode) return;
    if (!isLocalMode && cat._apiId) {
      try {
        await MiaolegemiAPI.feedCat(cat._apiId);
      } catch (e) { alert(e.message); return; }
    }
    fishLedger.push({ type: 'spend', amount: 1, desc: `${cat.name}喂食`, time: Date.now() });
    setCats(prev => prev.map(c => {
      if (c.serialId !== cat.serialId) return c;
      const newExpiresAt = (c.expiresAt || Date.now() + 30*86400000) + 86400000;
      return { ...c, lastFedAt: Date.now(), expiresAt: newExpiresAt, status: 'alive', fishSpent: (c.fishSpent || 0) + 1, daysAlive: (c.daysAlive || 0) + 1 };
    }));
  }, [isLocalMode]);

  // Handle adoption
  const handleAdopt = useCallback((cat) => {
    if (nurturing.length >= maxSlots) return;
    setAdoptTarget(cat);
  }, [nurturing.length]);

  const confirmAdopt = useCallback(async () => {
    if (!adoptTarget) return;
    if (!isLocalMode && adoptTarget._apiId) {
      try {
        await MiaolegemiAPI.adoptCat(adoptTarget._apiId);
      } catch (e) { alert(e.message); return; }
    }
    setCats(prev => prev.map(c => {
      if (c.serialId !== adoptTarget.serialId) return c;
      return {
        ...c, location: 'nurturing',
        adoptedAt: Date.now(), expiresAt: Date.now() + 30*86400000,
        lastFedAt: Date.now(), status: 'alive',
        daysAlive: 0, gamesWitnessed: 0, bestCombo: 0, fishSpent: 0,
      };
    }));
    setAdoptTarget(null);
  }, [adoptTarget, isLocalMode]);

  // Handle release
  const handleRelease = useCallback((cat) => {
    setReleaseTarget(cat);
  }, []);

  const confirmRelease = useCallback(async () => {
    if (!releaseTarget) return;
    if (!isLocalMode && releaseTarget._apiId) {
      try {
        await MiaolegemiAPI.releaseCat(releaseTarget._apiId);
      } catch (e) { alert(e.message); return; }
    }
    // P3: record lineage + enter cooling pool
    const rt = releaseTarget;
    coolingPool[`${rt.breedId}_${rt.breedSerial || rt.serialId}`] = Date.now();
    setCats(prev => prev.map(c => {
      if (c.serialId !== rt.serialId) return c;
      return {
        ...c, location: 'memorial', releasedAt: Date.now(),
        previousOwners: [...(c.previousOwners || []), {
          name: '你',
          daysAlive: c.daysAlive || 0,
          fishSpent: c.fishSpent || 0,
          bestCombo: c.bestCombo || 0,
          gamesWitnessed: c.gamesWitnessed || 0,
          dateLeft: new Date().toLocaleDateString('zh-CN'),
        }],
      };
    }));
    setReleaseTarget(null);
    if (showCatDetail && selectedCat?.serialId === rt.serialId) {
      setShowCatDetail(false);
      setSelectedCat(null);
    }
    // P5: Show farewell ceremony
    setFarewellCat(rt);
    setShowFarewell(true);
  }, [releaseTarget, showCatDetail, selectedCat, isLocalMode]);

  // Handle discard — remove cat from bag permanently
  const handleDiscard = useCallback(async (cat) => {
    if (!cat) return;
    if (!isLocalMode && cat._apiId) {
      try {
        await MiaolegemiAPI.releaseCat(cat._apiId);
      } catch (e) { alert(e.message); return; }
    }
    setCats(prev => prev.filter(c => c.serialId !== cat.serialId));
    setFlipCardCat(null);
  }, [isLocalMode]);

  // Handle gacha — breedId/rarity pre-rolled by GachaPage for animation sync
  const handleGacha = useCallback(async (breedId, rarity) => {
    if (bells < 1) return;
    if (!isLocalMode) {
      try {
        const data = await MiaolegemiAPI.pullGacha();
        const c = data.cat;
        const breed = BREEDS.find(b => b.id === c.serial.species.name) || BREEDS[0];
        const newCat = {
          serialId: c.id, breedSerial: c.serial.serialNumber,
          breedId: breed.id, name: breed.id, rarity: c.serial.species.rarity,
          img: breed.img, desc: breed.desc,
          personality: Array.isArray(c.personality) ? c.personality : [],
          status: 'alive', location: 'bag', createdAt: Date.now(),
          bagExpiresAt: c.bagExpiresAt ? new Date(c.bagExpiresAt).getTime() : Date.now() + 30*86400000,
          adoptedAt: null, expiresAt: null, lastFedAt: null,
          daysAlive: 0, gamesWitnessed: 0, bestCombo: 0, fishSpent: 0,
          isGenesis: c.serial.serialNumber <= 10,
          previousOwners: [], releasedAt: null,
          _apiId: c.id, _serialId: c.serialId,
        };
        setBells(data.bellsRemaining);
        setCats(prev => [...prev, newCat]);
        setGachaResult(newCat);
        setShowGachaResult(true);
        setGachaDone(true);
        return;
      } catch (e) { alert(e.message); return; }
    }
    setBells(prev => prev - 1);
    setGachaDone(true);
    setPityCount(prev => {
      const newPity = prev + 1;
      const newCat = makeCatInstance(breedId, rarity, null, 30);
      setCats(prev => [...prev, newCat]);
      setGachaResult(newCat);
      setShowGachaResult(true);
      return rarity === 'SSR' ? 0 : newPity;
    });
  }, [bells, isLocalMode]);

  // Handle check-in
  const handleCheckIn = useCallback(async () => {
    if (!isLocalMode) {
      try {
        const data = await MiaolegemiAPI.checkin();
        fishLedger.push({ type: 'earn', amount: data.fishEarned, desc: '每日签到', time: Date.now() });
        if (data.bellsEarned > 0) setBells(prev => prev + data.bellsEarned);
      } catch (e) { alert(e.message); return; }
    } else {
      fishLedger.push({ type: 'earn', amount: 5, desc: '每日签到', time: Date.now() });
    }
    setCheckedIn(true);
    setShowCheckIn(true);
  }, [isLocalMode]);

  // Navigation
  const handleNavigate = useCallback((tab, cat, subTab) => {
    if (tab === 'catDetail' && cat) {
      setSelectedCat(cat);
      setShowCatDetail(true);
    } else {
      setActiveTab(tab);
      if (subTab) setBagTab(subTab);
    }
  }, []);

  colors = theme === 'light' ? CL : CD;

  // Show login page if not authenticated
  if (authChecked && !user) {
    return (
      <div style={{ minHeight:'100vh', background:'#0E0E16', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:48 }}>
        <IosFrame>
          <LoginPage onLogin={handleLogin} />
        </IosFrame>
      </div>
    );
  }

  if (!authChecked) {
    return (
      <div style={{ minHeight:'100vh', background:'#0E0E16', display:'flex', alignItems:'center', justifyContent:'center' }}>
        <div style={{ color:'#F0EDFF', fontSize:14 }}>加载中...</div>
      </div>
    );
  }

  return (
    <div style={{ minHeight:'100vh', background:'#0E0E16', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:48 }}>
      <div style={{ textAlign:'center', marginBottom:0 }}>
        <h1 style={{ fontSize:20, fontWeight:700, color:'#F0F0EC', letterSpacing:'-0.5px', marginBottom:4 }}>
          喵了个咪 · 通勤打卡+猫咪养成
        </h1>
        <p style={{ fontSize:11, color:'rgba(255,255,255,0.35)', marginBottom:16 }}>
          喂猫 · 消消乐 · 收集 · 陪伴
        </p>
      </div>

      <IosFrame key={theme}>
        <div style={{ height:'100%', display:'flex', flexDirection:'column', background:`linear-gradient(180deg, ${(theme==='light'?CL:CD).bg} 0%, ${(theme==='light'?CL:CD).bg2} 50%, ${(theme==='light'?CL:CD).bg} 100%)` }}>
          {/* Status bar area */}
          <div style={{ height:54, display:'flex', alignItems:'center', justifyContent:'space-between', padding:'0 32px', fontSize:16, fontWeight:600, color:(theme==='light'?CL:CD).ink, flexShrink:0 }}>
            <span>9:41</span>
            <div style={{ display:'flex', alignItems:'center', gap:8 }}>
              <svg width="14" height="10" viewBox="0 0 14 10" fill="none"><rect x="9" y="0" width="2" height="10" rx="0.5" fill={(theme==='light'?CL:CD).ink}/><rect x="6" y="2" width="2" height="8" rx="0.5" fill={(theme==='light'?CL:CD).ink} opacity="0.8"/><rect x="3" y="4" width="2" height="6" rx="0.5" fill={(theme==='light'?CL:CD).ink} opacity="0.6"/><rect x="0" y="6" width="2" height="4" rx="0.5" fill={(theme==='light'?CL:CD).ink} opacity="0.4"/></svg>
              <div style={{ width:26, height:12, border:`1.5px solid ${(theme==='light'?CL:CD).ink}`, borderRadius:3, padding:2, display:'flex', alignItems:'center' }}><div style={{ width:'75%', height:'100%', background:(theme==='light'?CL:CD).ink, borderRadius:1 }}/></div>
            </div>
          </div>

          {/* Currency bar */}
          <CurrencyBar
            fish={fish} bells={bells}
            theme={theme} onToggleTheme={() => setTheme(t => t === 'dark' ? 'light' : 'dark')}
            onFishClick={() => setInfoModal({ title:'🐟 鱼干', content: '日常高频资源，用于喂猫。通过签到和消消乐获得。' })}
            onBellClick={() => setInfoModal({ title:'🔔 猫铃铛', content: '稀缺资源，用于抽卡获得新猫咪。可通过连续签到和特殊活动获得。' })}
          />

          {/* Content area */}
          <div style={{ flex:1, overflowY:'auto', overflowX:'hidden', scrollbarWidth:'none', paddingBottom:74 }}>
            <style>{`div::-webkit-scrollbar{display:none}`}</style>

            {showCatDetail ? (
              <CatDetailPage
                cats={cats}
                catSerialId={selectedCat?.serialId}
                onBack={() => { setShowCatDetail(false); setSelectedCat(null); }}
                onFeed={handleFeed}
                onRelease={handleRelease}
                onAdopt={handleAdopt}
                onShowLineage={(cat) => setLineageCat(cat)}
                fish={fish}
                nurturingCount={nurturing.length}
                maxSlots={maxSlots}
              />
            ) : activeTab === 'cat' ? (
              <CatPage
                cats={cats} fish={fish}
                onFeed={handleFeed} onAdopt={handleAdopt}
                onRelease={handleRelease} onNavigate={handleNavigate}
                initialTab={bagTab}
                maxSlots={maxSlots} baseSlots={baseSlots}
                slot4Unlocked={slot4Unlocked} slot5Unlocked={slot5Unlocked} slot6Unlocked={slot6Unlocked}
              />
            ) : activeTab === 'home' ? (
              <HomePage
                cats={cats} fish={fish} bells={bells} todayFish={todayFish}
                checkedIn={checkedIn} gachaDone={gachaDone}
                onCheckIn={handleCheckIn} onNavigate={handleNavigate}
                activeTitle={activeTitle} maxSlots={maxSlots}
                user={user}
              />
            ) : activeTab === 'game' ? (
              <GachaPage bells={bells} pityCount={pityCount} onGacha={handleGacha} cats={cats} onCardClick={setFlipCardCat} />
            ) : (
              <ProfilePage cats={cats} fish={fish} bells={bells} activeTitle={activeTitle} onEquipTitle={setActiveTitle} maxSlots={maxSlots} baseSlots={baseSlots} slot4Unlocked={slot4Unlocked} slot5Unlocked={slot5Unlocked} slot6Unlocked={slot6Unlocked} totalAdopted={totalAdopted} user={user} isLocalMode={isLocalMode} onLogout={handleLogout} onMemorialClick={setMemorialDetailCat} />
            )}
          </div>

          {/* Modals */}
          {!showCatDetail && <TabBar active={activeTab} onChange={(tab) => { setActiveTab(tab); setBagTab(null); }} />}
          <CheckInModal show={showCheckIn} onClose={() => setShowCheckIn(false)} />
          <AdoptConfirmModal cat={adoptTarget} show={!!adoptTarget} canAdopt={nurturing.length < maxSlots} onConfirm={confirmAdopt} onCancel={() => setAdoptTarget(null)} />
          <ReleaseConfirmModal cat={releaseTarget} show={!!releaseTarget} onConfirm={confirmRelease} onCancel={() => setReleaseTarget(null)} />
          <GachaResultModal cat={gachaResult} show={showGachaResult} onClose={() => setShowGachaResult(false)} />
          <InfoModal show={!!infoModal} title={infoModal?.title} onClose={() => setInfoModal(null)}>{infoModal?.content}</InfoModal>
          <LineageModal cat={lineageCat} show={!!lineageCat} onClose={() => setLineageCat(null)} />
          <MilestoneUnlockModal alert={milestoneAlert} onClose={() => setMilestoneAlert(null)} />
          <CatCardFlipModal cat={flipCardCat} show={!!flipCardCat} onClose={() => setFlipCardCat(null)} onDiscard={handleDiscard} />
          {/* P5: Farewell ceremony */}
          <FarewellCeremony cat={farewellCat} show={showFarewell} onDone={() => { setShowFarewell(false); setFarewellCat(null); }} />
          {/* P5: Memorial detail */}
          <MemorialDetailModal cat={memorialDetailCat} show={!!memorialDetailCat} onClose={() => setMemorialDetailCat(null)} />
          {/* P5: Title unlock toast */}
          <TitleUnlockToast title={titleUnlockToast} show={!!titleUnlockToast} onDone={() => setTitleUnlockToast(null)} />
        </div>
      </IosFrame>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
