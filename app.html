  const [notifPerm, setNotifPerm] = useState('default');
  const [theme, setTheme] = useState('dark');
  const [milestoneAlert, setMilestoneAlert] = useState(null); // { label, slotName }
  const milestoneAlertTimer = useRef(null);
  const milestoneState = useRef(
    JSON.parse(localStorage.getItem('milestoneAlertsShown') || 'null') || { slot4: false, slot5: false, slot6: false }
  );

  // P5: Farewell ceremony, memorial detail, title unlock toast
  const [farewellCat, setFarewellCat] = useState(null);
  const [showFarewell, setShowFarewell] = useState(false);
  const [memorialDetailCat, setMemorialDetailCat] = useState(null);
  const [titleUnlockToast, setTitleUnlockToast] = useState(null);
  const prevTitlesRef = useRef(new Set());
  
  // P6: Ref for executeRealRelease to use in interval
  const executeRealReleaseRef = useRef(null);

  // Auto-dismiss milestone alert
  useEffect(() => {
    if (milestoneAlert) {
      milestoneAlertTimer.current = setTimeout(() => setMilestoneAlert(null), 5000);
      return () => clearTimeout(milestoneAlertTimer.current);
    }
  }, [milestoneAlert]);

  // Auth: check token on mount (with 5s timeout)
  useEffect(() => {
    const initAuth = async () => {
      try {
        // 5秒超时
        const timeoutPromise = new Promise((_, reject) => 
          setTimeout(() => reject(new Error('timeout')), 5000)
        );
        
        if (MiaolegemiAPI.isLoggedIn()) {
          try {
            const profile = await Promise.race([
              MiaolegemiAPI.getProfile(),
              timeoutPromise
            ]);
            setUser(profile);
            setBells(profile.bells);
            setIsLocalMode(false);
            // Load cats from API
            const apiCats = await Promise.race([
              MiaolegemiAPI.getCats(),
              timeoutPromise
            ]);
            if (apiCats.length > 0) {
              const mapped = apiCats.map(c => ({
                serialId: c.id, breedSerial: c.serial?.serialNumber || 0,
                breedId: c.serial?.species?.name || '橘猫', name: c.serial?.species?.name || '橘猫',
                rarity: c.serial?.species?.rarity || 'N',
                img: (BREEDS.find(b => b.id === (c.serial?.species?.name)) || BREEDS[0]).img,
                desc: (BREEDS.find(b => b.id === (c.serial?.species?.name)) || BREEDS[0]).desc,
                personality: Array.isArray(c.personality) ? c.personality : [],
                status: computeCatStatus({ location: c.location, lastFedAt: c.lastFedAt }),
                location: c.location, createdAt: new Date(c.createdAt).getTime(),
                bagExpiresAt: c.bagExpiresAt ? new Date(c.bagExpiresAt).getTime() : null,
                adoptedAt: c.adoptedAt ? new Date(c.adoptedAt).getTime() : null,
                expiresAt: c.expiresAt ? new Date(c.expiresAt).getTime() : null,
                lastFedAt: c.lastFedAt ? new Date(c.lastFedAt).getTime() : null,
                daysAlive: c.daysAlive || 0, gamesWitnessed: c.gamesWitnessed || 0,
                bestCombo: c.bestCombo || 0, fishSpent: c.fishSpent || 0,
                isGenesis: (c.serial?.serialNumber || 0) <= 10,
                previousOwners: Array.isArray(c.previousOwners) ? c.previousOwners : [],
                releasedAt: c.releasedAt ? new Date(c.releasedAt).getTime() : null,
                _apiId: c.id, _serialId: c.serialId,
              }));
              setCats(mapped);
            }
          } catch (e) {
            if (e.message !== 'timeout') {
              MiaolegemiAPI.clearToken();
            }
          }
        }
      } catch (e) {
        console.warn('Auth check failed, using local mode');
      } finally {
        // 如果没有在线用户，检查本地存储是否有数据
        const saved = localStorage.getItem('miaolegemi_p0_v1');
        const localData = saved ? JSON.parse(saved) : null;
        if (!user && localData && localData.cats && localData.cats.length > 0) {
          // 有本地数据，自动进入离线模式
          setUser({ id: 'local', username: '本地用户', nickname: '铲屎官', bells: localData.bells || 3 });
          setIsLocalMode(true);
        }
        setAuthChecked(true);
      }
    };
    initAuth();
  }, []);

  const handleLogin = (userData, localMode) => {
    setUser(userData);
    setIsLocalMode(localMode);
    if (!localMode) {
      setBells(userData.bells || 3);
    }
  };

  const [showLogoutConfirm, setShowLogoutConfirm] = useState(false);

  const handleLogout = () => {
    setShowLogoutConfirm(false);
    MiaolegemiAPI.logout();
    setUser(null);
    setIsLocalMode(false);
    setCats(loadState);
    setBells(3);
  };

  // Info modals
  const [infoModal, setInfoModal] = useState(null);

  const fish = getFishBalance();
  const nurturing = cats.filter(c => c.location === 'home');
  const memorial = cats.filter(c => c.location === 'memorial');
  const totalAdopted = cats.filter(c => c.location === 'home' || c.location === 'memorial').length;
  const baseSlots = 3;
  const slot4Unlocked = totalAdopted >= 10;
  // P2: slot5 解锁条件：家园或纪念册中任意一只猫存活 90 天以上
  const slot5Unlocked = nurturing.concat(memorial).some(c => c.daysAlive >= 90);
  const slot6Unlocked = totalAdopted >= 30;
  const maxSlots = baseSlots + (slot4Unlocked ? 1 : 0) + (slot5Unlocked ? 1 : 0) + (slot6Unlocked ? 1 : 0);

  // Today's fish earned (for home page display)
  const todayStart = new Date(); todayStart.setHours(0,0,0,0);
  const todayFish = fishLedger
    .filter(t => t.type === 'earn' && t.time > todayStart.getTime())
    .reduce((s, t) => s + t.amount, 0);

  // Compute statuses periodically (simulate hourly backend job) + auto-wander
  useEffect(() => {
    const timer = setInterval(() => {
      setCats(prev => prev.map(c => {
        // P2: 家园猫咪不计算饥饿状态，使用亲密度系统
        if (c.location === 'home') {
          // P2: 亲密度衰减：每自然日-1
          const lastOnline = c.lastOnlineAt || c.adoptedAt || Date.now();
          const daysSinceOnline = Math.floor((Date.now() - lastOnline) / 86400000);
          if (daysSinceOnline >= 1) {
            const decay = Math.min(c.intimacy || 0, daysSinceOnline);
            return { ...c, intimacy: Math.max(0, (c.intimacy || 0) - decay) };
          }
        }
        // P6: 检查告别仪式是否结束（24小时）
        if (c.pendingRelease && c.farewellStartedAt) {
          const elapsed = Date.now() - c.farewellStartedAt;
          if (elapsed >= c.farewellDuration) {
            // 告别仪式结束，执行真正的送走
            executeRealReleaseRef.current(c);
          }
        }
        if (c.location === 'bag' && c.bagExpiresAt && Date.now() > c.bagExpiresAt) {
          return { ...c, location: 'memorial', releasedAt: c.bagExpiresAt };
        }
        return c;
      }));
    }, 60000);
    return () => clearInterval(timer);
  }, []);

  // Sync data when returning from game (visibility change)
  useEffect(() => {
    const handleVisibility = async () => {
      if (document.visibilityState === 'visible') {
        // Online mode: sync from API
        if (!isLocalMode && MiaolegemiAPI.isLoggedIn()) {
          try {
            const apiCats = await MiaolegemiAPI.getCats();
            if (apiCats.length > 0) {
              const mapped = apiCats.map(c => ({
                serialId: c.id, breedSerial: c.serial?.serialNumber || 0,
                breedId: c.serial?.species?.name || '橘猫', name: c.serial?.species?.name || '橘猫',
                rarity: c.serial?.species?.rarity || 'N',
                img: (BREEDS.find(b => b.id === (c.serial?.species?.name)) || BREEDS[0]).img,
                desc: (BREEDS.find(b => b.id === (c.serial?.species?.name)) || BREEDS[0]).desc,
                personality: Array.isArray(c.personality) ? c.personality : [],
                status: computeCatStatus({ location: c.location, lastFedAt: c.lastFedAt }),
                location: c.location, createdAt: new Date(c.createdAt).getTime(),
                bagExpiresAt: c.bagExpiresAt ? new Date(c.bagExpiresAt).getTime() : null,
                adoptedAt: c.adoptedAt ? new Date(c.adoptedAt).getTime() : null,
                expiresAt: c.expiresAt ? new Date(c.expiresAt).getTime() : null,
                lastFedAt: c.lastFedAt ? new Date(c.lastFedAt).getTime() : null,
                daysAlive: c.daysAlive || 0, gamesWitnessed: c.gamesWitnessed || 0,
                bestCombo: c.bestCombo || 0, fishSpent: c.fishSpent || 0,
                isGenesis: (c.serial?.serialNumber || 0) <= 10,
                previousOwners: Array.isArray(c.previousOwners) ? c.previousOwners : [],
                releasedAt: c.releasedAt ? new Date(c.releasedAt).getTime() : null,
                _apiId: c.id, _serialId: c.serialId,
              }));
              setCats(mapped);
            }
            const profile = await MiaolegemiAPI.getProfile();
            setBells(profile.bells);
          } catch (e) {}
          return;
        }
        // Local mode: sync from localStorage
        try {
          const saved = localStorage.getItem(STORAGE_KEY);
          if (saved) {
            const data = JSON.parse(saved);
            const savedLedger = data.fishLedger;
            if (Array.isArray(savedLedger)) {
              const localLen = fishLedger.length;
              const savedLen = savedLedger.length;
              if (savedLen > localLen) {
                const newEntries = savedLedger.slice(localLen);
                fishLedger.push(...newEntries);
              }
            }
            if (data.cats) {
              const savedCats = data.cats;
              setCats(prev => {
                if (JSON.stringify(prev) !== JSON.stringify(savedCats)) return savedCats;
                return prev;
              });
            }
            if (data.globalSerialId && data.globalSerialId > globalSerialId) {
              globalSerialId = data.globalSerialId;
            }
            setCats(prev => [...prev]);
          }
        } catch(e) {}
      }
    };
    document.addEventListener('visibilitychange', handleVisibility);
    return () => document.removeEventListener('visibilitychange', handleVisibility);
  }, [isLocalMode]);

  // Request notification permission on first interaction
  useEffect(() => {
    if (notifPerm !== 'default') return;
    const timer = setTimeout(() => {
      if ('Notification' in window && Notification.permission === 'default') {
        Notification.requestPermission().then(p => setNotifPerm(p));
      }
    }, 5000);
    return () => clearTimeout(timer);
  }, [notifPerm]);

  // Push notifications: check cat statuses periodically
  const notifSentRef = useRef({});
  useEffect(() => {
    if (!('Notification' in window) || Notification.permission !== 'granted') return;
    const checkAndNotify = () => {
      const now = Date.now();
      const homeCats = cats.filter(c => c.location === 'home');
      const bagCats = cats.filter(c => c.location === 'bag');

      // P2: Check home cats for low intimacy
      for (const cat of homeCats) {
        const intimacy = cat.intimacy || 0;
        const key = `home_${cat.serialId}_${intimacy}`;
        const lastSent = notifSentRef.current[key];
        // Don't re-send same notification within 6 hours
        if (lastSent && now - lastSent < 6 * 3600000) continue;

        let title, body;
        if (intimacy <= 10) {
          title = `${cat.name} 与你渐行渐远`;
          body = `#${String(cat.breedSerial || cat.serialId).padStart(3,'0')} 亲密度仅剩${intimacy}%，它需要你的陪伴`;
          try { new Notification(title, { body, icon: cat.img, tag: key }); } catch(e) {}
          notifSentRef.current[key] = now;
        } else if (intimacy <= 30) {
          title = `${cat.name} 想你了`;
          body = `#${String(cat.breedSerial || cat.serialId).padStart(3,'0')} 亲密度${intimacy}%，快去陪陪它`;
          try { new Notification(title, { body, icon: cat.img, tag: key }); } catch(e) {}
          notifSentRef.current[key] = now;
        }
      }

      // Check bag cats for expiration
      for (const cat of bagCats) {
        const daysLeft = getRemainingDays(cat);
        if (daysLeft <= 7 && daysLeft > 0) {
          const key = `bag_${cat.serialId}_${daysLeft}`;
          const lastSent = notifSentRef.current[key];
          if (lastSent && now - lastSent < 6 * 3600000) continue;
          try { new Notification('包裹有猫即将离开', { body: `${cat.name} #${String(cat.breedSerial || cat.serialId).padStart(3,'0')} 还有${daysLeft}天就要离开了`, icon: cat.img, tag: key }); } catch(e) {}
          notifSentRef.current[key] = now;
        }
      }
    };

    checkAndNotify();
    const timer = setInterval(checkAndNotify, 120000); // every 2 minutes
    return () => clearInterval(timer);
  }, [cats]);

  // Detect newly unlocked milestones + titles
  useEffect(() => {
    const slot4 = totalAdopted >= 10;
    const slot5 = cats.some(c => c.daysAlive >= 90);
    const slot6 = totalAdopted >= 30;

    if (slot4 && !milestoneState.current.slot4) {
      setMilestoneAlert({ label: '历史领养达到10只！', slotName: '第4格' });
      if ('Notification' in window && Notification.permission === 'granted') {
        try { new Notification('观赛区第4格已解锁！', { body: '快去领养新猫咪吧' }); } catch(e) {}
      }
    }
    if (slot5 && !milestoneState.current.slot5) {
      setMilestoneAlert({ label: '有猫咪存活超过90天！', slotName: '第5格' });
      if ('Notification' in window && Notification.permission === 'granted') {
        try { new Notification('观赛区第5格已解锁！', { body: '猫咪与你的羁绊越来越深了' }); } catch(e) {}
      }
    }
    if (slot6 && !milestoneState.current.slot6) {
      setMilestoneAlert({ label: '历史领养达到30只！', slotName: '第6格' });
      if ('Notification' in window && Notification.permission === 'granted') {
        try { new Notification('观赛区第6格已解锁！', { body: '你已经是资深铲屎官了' }); } catch(e) {}
      }
    }

    milestoneState.current = { slot4, slot5, slot6 };
    localStorage.setItem('milestoneAlertsShown', JSON.stringify(milestoneState.current));

    // P5: Detect newly unlocked titles
    const currentTitles = new Set();
    if (totalAdopted >= 1) currentTitles.add('新手铲屎官');
    if (totalAdopted >= 5) currentTitles.add('合格铲屎官');
    if (cats.some(c => c.daysAlive >= 90)) currentTitles.add('资深铲屎官');
    if (totalAdopted >= 20) currentTitles.add('猫咪守护者');
    if (cats.some(c => c.daysAlive >= 180)) currentTitles.add('老铲屎官');
    const memorialCount = cats.filter(c => c.location === 'memorial').length;
    if (memorialCount >= 3) currentTitles.add('猫星摆渡人');
    if (cats.some(c => c.isGenesis && (c.location === 'home' || c.location === 'bag'))) currentTitles.add('初代发现者');

    if (prevTitlesRef.current.size > 0) {
      for (const t of currentTitles) {
        if (!prevTitlesRef.current.has(t)) {
          setTitleUnlockToast(t);
          if ('Notification' in window && Notification.permission === 'granted') {
            try { new Notification('新称号解锁！', { body: t }); } catch(e) {}
          }
          break; // show one at a time
        }
      }
    }
    prevTitlesRef.current = currentTitles;
  }, [totalAdopted, cats]);

  // Save state (local mode only)
  useEffect(() => {
    if (isLocalMode) saveState(cats, bells, activeTitle);
  }, [cats, bells, activeTitle, isLocalMode]);

  // Handle feeding - P2: 亲密度系统
  const handleFeed = useCallback(async (cat) => {
    if (getFishBalance() < 1 && isLocalMode) return;
    if (!isLocalMode && cat._apiId) {
      try {
        await MiaolegemiAPI.feedCat(cat._apiId);
      } catch (e) { alert(e.message); return; }
    }
    fishLedger.push({ type: 'spend', amount: 1, desc: `${cat.name}喂食`, time: Date.now() });
    setCats(prev => prev.map(c => {
      if (c.serialId !== cat.serialId) return c;
      // P2: 亲密度系统：每次喂食+5亲密度
      const currentIntimacy = c.intimacy || 0;
      const newIntimacy = Math.min(INTIMACY_MAX, currentIntimacy + INTIMACY_PER_FEED);
      return { 
        ...c, 
        lastFedAt: Date.now(), 
        lastOnlineAt: Date.now(), // 更新在线时间，停止衰减
        intimacy: newIntimacy, // P2: 亲密度更新
        fishSpent: (c.fishSpent || 0) + 1, 
        daysAlive: (c.daysAlive || 0) + 1,
        status: 'alive',
      };
    }));
  }, [isLocalMode]);

  // Handle adoption
  const handleAdopt = useCallback((cat) => {
    const homeCatsCount = cats.filter(c => c.location === 'home').length;
    const homeMaxSlots = 10; // 家园初始 10 格
    if (homeCatsCount >= homeMaxSlots) return;
    setAdoptTarget(cat);
  }, [cats]);

  const confirmAdopt = useCallback(async () => {
    if (!adoptTarget) return;
    if (!isLocalMode && adoptTarget._apiId) {
      try {
        await MiaolegemiAPI.adoptCat(adoptTarget._apiId);
      } catch (e) { alert(e.message); return; }
    }
    const now = Date.now();
    setCats(prev => prev.map(c => {
      if (c.serialId !== adoptTarget.serialId) return c;
      
      // P4: 检查是否是初次发现者（第一次被领养）
      const isFirstDiscovery = !c.firstOwner;
      
      return {
        ...c, location: 'home', // P2: 领养进家园
        adoptedAt: now, expiresAt: now + 30*86400000,
        lastFedAt: now, lastOnlineAt: now, // P2: 更新在线时间
        status: 'alive',
        intimacy: 0, // P2: 亲密度初始为0
        daysAlive: 0, gamesWitnessed: 0, bestCombo: 0, fishSpent: 0,
        // P4: 记录初次发现者（创世猫）
        firstOwner: isFirstDiscovery ? (user?.nickname || '本地用户') : c.firstOwner,
        // P4: 清空冷却信息（被救回）
        coolingUntil: null,
        coolingKey: null,
      };
    }));
    
    // P4: 如果是创世区猫咪，显示特殊提示
    const adoptBreedSerial = adoptTarget.breedSerial || adoptTarget.serialId || 0;
    if (adoptBreedSerial <= 10) {
      alert(`🎉 恭喜！你发现了创世区猫咪 ${adoptTarget.name} #${String(adoptBreedSerial).padStart(3,'0')}！\n\n这是全球仅有的10只创世猫咪之一，请好好珍惜！`);
    }
    
    setAdoptTarget(null);
  }, [adoptTarget, isLocalMode, user]);

  // P2: Handle deploy (家园 → 出战席)
  const handleDeploy = useCallback((cat) => {
    const battleCats = cats.filter(c => c.battleSlot != null);
    const targetSlot = findEmptyBattleSlot(battleCats);
    
    if (targetSlot === null) {
      alert('出战席已满！');
      return;
    }
    
    // 检查猫咪不和冲突
    const newBattleCats = [...battleCats, { ...cat, battleSlot: targetSlot }];
    const conflict = validateBattleLineup(newBattleCats.filter(c => c.battleSlot != null));
    if (!conflict.valid) {
      alert(`⚠️ ${conflict.conflict[0].name} 和 ${conflict.conflict[1].name} 性格不合，不能同时出战！`);
      return;
    }
    
    setCats(prev => prev.map(c => {
      if (c.serialId !== cat.serialId) return c;
      return { ...c, battleSlot: targetSlot };
    }));
  }, [cats]);

  // P2: Find empty battle slot
  function findEmptyBattleSlot(battleCats) {
    const usedSlots = new Set(battleCats.map(c => c.battleSlot).filter(s => s != null));
    for (let i = 1; i <= 3; i++) { // P9: 仅限1-3号位为主动位
      if (!usedSlots.has(i)) return i;
    }
    return null;
  }

  // P2: Handle spectator deploy (家园 → 观战席)
  const handleSpectatorDeploy = useCallback((cat) => {
    const spectatorCats = cats.filter(c => c.battleSpectator != null);
    if (spectatorCats.length >= 3) {
      alert('观战席已满！最多3只观战猫咪');
      return;
    }
    
    // 找到空槽位
    const usedSlots = new Set(spectatorCats.map(c => c.battleSpectator).filter(s => s != null));
    let targetSlot = null;
    for (let i = 1; i <= 3; i++) {
      if (!usedSlots.has(i)) { targetSlot = i; break; }
    }
    
    setCats(prev => prev.map(c => {
      if (c.serialId !== cat.serialId) return c;
      return { ...c, battleSpectator: targetSlot };
    }));
  }, [cats]);

  // P2: Handle spectator withdraw (观战席 → 家园)
  const handleSpectatorWithdraw = useCallback((cat) => {
    setCats(prev => prev.map(c => {
      if (c.serialId !== cat.serialId) return c;
      return { ...c, battleSpectator: null };
    }));
  }, []);

  // P2: Handle withdraw (出战席 → 家园)
  const handleWithdraw = useCallback((cat) => {
    setCats(prev => prev.map(c => {
      if (c.serialId !== cat.serialId) return c;
      return { ...c, battleSlot: null };
    }));
  }, []);

  // Handle release
  const handleRelease = useCallback((cat) => {
    setReleaseTarget(cat);
  }, []);

  const confirmRelease = useCallback(async () => {
    if (!releaseTarget) return;
    
    // P6: 进入24小时告别仪式（不直接送走）
    const rt = releaseTarget;
    const now = Date.now();
    
    setCats(prev => prev.map(c => {
      if (c.serialId !== rt.serialId) return c;
      return {
        ...c,
        pendingRelease: true,           // 开启告别仪式状态
        farewellStartedAt: now,        // 开始时间
        canBeSaved: true,              // 可以挽回
        saveCost: 100,                 // 挽留费用
      };
    }));
    
    setReleaseTarget(null);
    if (showCatDetail && selectedCat?.serialId === rt.serialId) {
      setShowCatDetail(false);
      setSelectedCat(null);
    }
    
    // 简短提示告别仪式开始
    alert(`${rt.name} 开始告别仪式，24小时内可以挽留～`);
  }, [releaseTarget, showCatDetail, selectedCat]);

  // P6: 挽留告别仪式中的猫咪
  const handleSaveFromFarewell = useCallback(async (cat) => {
    if (fish < cat.saveCost) {
      alert(`鱼干不足！挽留需要 ${cat.saveCost} 鱼干`);
      return;
    }
    
    if (!window.confirm(`确定花费 ${cat.saveCost} 鱼干挽留 ${cat.name}？它将留在家园。`)) return;
    
    // 扣除鱼干
    setFish(prev => prev - cat.saveCost);
    
    // 取消告别仪式状态
    setCats(prev => prev.map(c => {
      if (c.serialId !== cat.serialId) return c;
      return {
        ...c,
        pendingRelease: false,
        farewellStartedAt: null,
        canBeSaved: false,
      };
    }));
  }, [fish]);

  // P6: 执行真正的送走（24小时后调用）
  const executeRealRelease = useCallback(async (cat) => {
    if (!isLocalMode && cat._apiId) {
      try {
        await MiaolegemiAPI.releaseCat(cat._apiId);
      } catch (e) { console.error(e); }
    }
    
    const now = Date.now();
    const coolingDuration = 60 * 24 * 60 * 60 * 1000; // 60天冷却
    const coolingKey = `${cat.breedId}_${cat.breedSerial || cat.serialId}`;
    
    // 进入冷却池
    coolingPool[coolingKey] = now;
    
    // 构建血统记录
    const ownerRecord = {
      name: '你',
      daysAlive: cat.daysAlive || 0,
      fishSpent: cat.fishSpent || 0,
      bestCombo: cat.bestCombo || 0,
      gamesWitnessed: cat.gamesWitnessed || 0,
      intimacy: cat.intimacy || 0,
      dateLeft: new Date().toLocaleDateString('zh-CN'),
      releaseType: '主动送走',
    };
    
    setCats(prev => prev.map(c => {
      if (c.serialId !== cat.serialId) return c;
      return {
        ...c,
        location: 'memorial',
        releasedAt: now,
        coolingUntil: now + coolingDuration,
        coolingKey: coolingKey,
        previousOwners: [...(c.previousOwners || []), ownerRecord],
        lineage: [...(c.lineage || []), ownerRecord],
        // 清除告别仪式状态
        pendingRelease: false,
        farewellStartedAt: null,
        canBeSaved: false,
      };
    }));
  }, [isLocalMode]);
  
  // P6: 设置 executeRealRelease ref
  useEffect(() => {
    executeRealReleaseRef.current = executeRealRelease;
  }, [executeRealRelease]);

  // Handle discard — remove cat from bag permanently
  const handleDiscard = useCallback(async (cat) => {
    if (!cat) return;
    if (!isLocalMode && cat._apiId) {
      try {
        await MiaolegemiAPI.releaseCat(cat._apiId);
      } catch (e) { alert(e.message); return; }
    }
    setCats(prev => prev.filter(c => c.serialId !== cat.serialId));
    setFlipCardCat(null);
  }, [isLocalMode]);

  // Handle gacha — breedId/rarity pre-rolled by GachaPage for animation sync
  // 支持新参数: breedId, rarity, newPityCount, triggeredPity
  const handleGacha = useCallback(async (breedId, rarity, newPityCount, triggeredPity) => {
    if (bells < 1) return;
    if (!isLocalMode) {
      try {
        const data = await MiaolegemiAPI.pullGacha();
        const c = data.cat;
        const breed = BREEDS.find(b => b.id === c.serial.species.name) || BREEDS[0];
        const newCat = {
          serialId: c.id, breedSerial: c.serial.serialNumber,
          breedId: breed.id, name: breed.id, rarity: c.serial.species.rarity,
          img: breed.img, desc: breed.desc,
          personality: Array.isArray(c.personality) ? c.personality : [],
          status: 'alive', location: 'bag', createdAt: Date.now(),
          bagExpiresAt: c.bagExpiresAt ? new Date(c.bagExpiresAt).getTime() : Date.now() + 30*86400000,
          adoptedAt: null, expiresAt: null, lastFedAt: null,
          daysAlive: 0, gamesWitnessed: 0, bestCombo: 0, fishSpent: 0,
          isGenesis: c.serial.serialNumber <= 10,
          previousOwners: [], releasedAt: null,
          _apiId: c.id, _serialId: c.serialId,
          triggeredPity: data.triggeredPity || null,
        };
        setBells(data.bellsRemaining);
        setCats(prev => [...prev, newCat]);
        setGachaResult(newCat);
        setTimeout(() => setShowGachaResult(true), 500);
        setGachaDone(true);
        // 更新保底计数
        if (data.pityCount !== undefined) {
          setPityCount(data.pityCount);
        }
        return;
      } catch (e) { alert(e.message); return; }
    }
    setBells(prev => prev - 1);
    setGachaDone(true);
    // 使用新的保底系统
    const finalPityCount = newPityCount !== undefined ? newPityCount : (rarity === 'SSR' ? 0 : pityCount + 1);
    const newCat = makeCatInstance(breedId, rarity, null, 30);
    newCat.triggeredPity = triggeredPity; // 标记触发的保底
    setCats(prev => [...prev, newCat]);
    setGachaResult(newCat);
    setTimeout(() => setShowGachaResult(true), 500);
    setPityCount(finalPityCount);
  }, [bells, isLocalMode, pityCount]);

  // Handle check-in
  const handleCheckIn = useCallback(async () => {
    if (!isLocalMode) {
      try {
        const data = await MiaolegemiAPI.checkin();
        fishLedger.push({ type: 'earn', amount: data.fishEarned, desc: '每日签到', time: Date.now() });
        if (data.bellsEarned > 0) setBells(prev => prev + data.bellsEarned);
      } catch (e) { alert(e.message); return; }
    } else {
      fishLedger.push({ type: 'earn', amount: 5, desc: '每日签到', time: Date.now() });
    }
    setCheckedIn(true);
    setShowCheckIn(true);
  }, [isLocalMode]);

  // Navigation
  const handleNavigate = useCallback((tab, cat, subTab) => {
    if (tab === 'catDetail' && cat) {
      setSelectedCat(cat);
      setShowCatDetail(true);
    } else if (tab === 'preBattle') {
      setShowPreBattle(true);
    } else {
      setActiveTab(tab);
      if (subTab) setBagTab(subTab);
    }
  }, []);

  colors = theme === 'light' ? CL : CD;

  // Show login page if not authenticated
  if (authChecked && !user) {
    return (
      <div style={{ minHeight:'100vh', background:'#0E0E16', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:48 }}>
        <IosFrame>
          <LoginPage onLogin={handleLogin} />
        </IosFrame>
      </div>
    );
  }

  if (!authChecked) {
    return (
      <div style={{ minHeight:'100vh', background:'#0E0E16', display:'flex', alignItems:'center', justifyContent:'center' }}>
        <div style={{ color:'#F0EDFF', fontSize:14 }}>加载中...</div>
      </div>
    );
  }

  return (
    <div style={{ minHeight:'100vh', background:'#0E0E16', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:48 }}>
      <div style={{ textAlign:'center', marginBottom:0 }}>
        <h1 style={{ fontSize:20, fontWeight:700, color:'#F0F0EC', letterSpacing:'-0.5px', marginBottom:4 }}>
          喵呜乐消消 · 通勤打卡+猫咪养成
        </h1>
        <p style={{ fontSize:11, color:'rgba(255,255,255,0.35)', marginBottom:16 }}>
          喂猫 · 消消乐 · 收集 · 陪伴
        </p>
      </div>

      <IosFrame key={theme}>
        <div style={{ height:'100%', display:'flex', flexDirection:'column', background:`linear-gradient(180deg, ${(theme==='light'?CL:CD).bg} 0%, ${(theme==='light'?CL:CD).bg2} 50%, ${(theme==='light'?CL:CD).bg} 100%)` }}>
          {/* Status bar area */}
          <div style={{ height:54, display:'flex', alignItems:'center', justifyContent:'space-between', padding:'0 32px', fontSize:16, fontWeight:600, color:(theme==='light'?CL:CD).ink, flexShrink:0 }}>
            <span>9:41</span>
            <div style={{ display:'flex', alignItems:'center', gap:8 }}>
              <svg width="14" height="10" viewBox="0 0 14 10" fill="none"><rect x="9" y="0" width="2" height="10" rx="0.5" fill={(theme==='light'?CL:CD).ink}/><rect x="6" y="2" width="2" height="8" rx="0.5" fill={(theme==='light'?CL:CD).ink} opacity="0.8"/><rect x="3" y="4" width="2" height="6" rx="0.5" fill={(theme==='light'?CL:CD).ink} opacity="0.6"/><rect x="0" y="6" width="2" height="4" rx="0.5" fill={(theme==='light'?CL:CD).ink} opacity="0.4"/></svg>
              <div style={{ width:26, height:12, border:`1.5px solid ${(theme==='light'?CL:CD).ink}`, borderRadius:3, padding:2, display:'flex', alignItems:'center' }}><div style={{ width:'75%', height:'100%', background:(theme==='light'?CL:CD).ink, borderRadius:1 }}/></div>
            </div>
          </div>

          {/* Currency bar */}
          <CurrencyBar
            fish={fish} bells={bells}
            theme={theme} onToggleTheme={() => setTheme(t => t === 'dark' ? 'light' : 'dark')}
            onFishClick={() => setInfoModal({ title:'🐟 鱼干', content: '日常高频资源，用于喂猫。通过签到和消消乐获得。' })}
            onBellClick={() => setInfoModal({ title:'🔔 猫铃铛', content: '稀缺资源，用于抽卡获得新猫咪。可通过连续签到和特殊活动获得。' })}
            left={<span style={{ display:'flex', alignItems:'center', gap:8 }}><span style={{ fontSize:14 }}>👋</span><span style={{ fontSize:13, color:colors.sub }}>你好，<span style={{ color:colors.ink, fontWeight:700 }}>{user?.nickname || '铲屎官'}</span></span></span>}
          />

          {/* Content area */}
          <div style={{ flex:1, overflowY:'auto', overflowX:'hidden', scrollbarWidth:'none', paddingBottom:74 }}>
            <style>{`div::-webkit-scrollbar{display:none}`}</style>

            {showCatDetail ? (
              <CatDetailPage
                cats={cats}
                catSerialId={selectedCat?.serialId}
                onBack={() => { setShowCatDetail(false); setSelectedCat(null); }}
                onFeed={handleFeed}
                onRelease={handleRelease}
                onAdopt={handleAdopt}
                onShowLineage={(cat) => setLineageCat(cat)}
                fish={fish}
                homeCount={nurturing.length}
                homeMaxSlots={10}
              />
            ) : (activeTab === 'cat' || activeTab === 'cathome') ? (
              <CatPage
                cats={cats} fish={fish}
                onFeed={handleFeed} onAdopt={handleAdopt}
                onRelease={handleRelease} onNavigate={handleNavigate}
                onSaveFromFarewell={handleSaveFromFarewell}
                onDeploy={handleDeploy} onWithdraw={handleWithdraw}
                onSpectatorDeploy={handleSpectatorDeploy} onSpectatorWithdraw={handleSpectatorWithdraw}
                initialTab={(new URLSearchParams(window.location.search).get('tab')) || (activeTab === 'cathome' ? 'home' : bagTab)}
                baseSlots={baseSlots}
                slot4Unlocked={slot4Unlocked} slot5Unlocked={slot5Unlocked} slot6Unlocked={slot6Unlocked}
              />
            ) : activeTab === 'home' ? (
              <HomePage
                cats={cats} fish={fish} bells={bells} todayFish={todayFish}
                checkedIn={checkedIn} gachaDone={gachaDone}
                onCheckIn={handleCheckIn} onNavigate={handleNavigate}
                activeTitle={activeTitle} battleMaxSlots={maxSlots}
                user={user}
              />
            ) : activeTab === 'game' ? (
              <GachaPage bells={bells} pityCount={pityCount} onGacha={handleGacha} cats={cats} onCardClick={setFlipCardCat} />
            ) : (
              <ProfilePage cats={cats} fish={fish} bells={bells} activeTitle={activeTitle} onEquipTitle={setActiveTitle} maxSlots={maxSlots} baseSlots={baseSlots} slot4Unlocked={slot4Unlocked} slot5Unlocked={slot5Unlocked} slot6Unlocked={slot6Unlocked} totalAdopted={totalAdopted} user={user} isLocalMode={isLocalMode} onLogout={() => setShowLogoutConfirm(true)} onMemorialClick={setMemorialDetailCat} />
            )}
          </div>

          {/* 出战前确认页 */}
          {showPreBattle && (
            <PreBattlePage
              cats={cats}
              slot4Unlocked={slot4Unlocked}
              slot5Unlocked={slot5Unlocked}
              slot6Unlocked={slot6Unlocked}
              onBack={() => { setShowPreBattle(false); setActiveTab('home'); }}
              onStartGame={() => {
                setShowPreBattle(false);
                window.location.href = '猫咪消消乐.html';
              }}
            />
          )}

          {/* Modals */}
          {!showCatDetail && !showPreBattle && <TabBar active={activeTab} onChange={(tab) => { setActiveTab(tab); setBagTab(null); }} />}
          <CheckInModal show={showCheckIn} onClose={() => setShowCheckIn(false)} />
          <AdoptConfirmModal cat={adoptTarget} show={!!adoptTarget} canAdopt={nurturing.length < 10} homeCount={nurturing.length} homeMaxSlots={10} onConfirm={confirmAdopt} onCancel={() => setAdoptTarget(null)} />
          <ReleaseConfirmModal cat={releaseTarget} show={!!releaseTarget} onConfirm={confirmRelease} onCancel={() => setReleaseTarget(null)} />
          <GachaResultModal cat={gachaResult} show={showGachaResult} onClose={() => setShowGachaResult(false)} />
          <InfoModal show={!!infoModal} title={infoModal?.title} onClose={() => setInfoModal(null)}>{infoModal?.content}</InfoModal>
          <LineageModal cat={lineageCat} show={!!lineageCat} onClose={() => setLineageCat(null)} />
          <MilestoneUnlockModal alert={milestoneAlert} onClose={() => setMilestoneAlert(null)} />
          {showLogoutConfirm && (
            <div style={{ position:'absolute', top:0, left:0, right:0, bottom:0, background:'rgba(0,0,0,0.75)', backdropFilter:'blur(12px)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:70 }} onClick={() => setShowLogoutConfirm(false)}>
              <div onClick={e => e.stopPropagation()} style={{ width:290, background: colors.card, borderRadius:24, padding:'28px 22px', textAlign:'center', border:`1px solid ${colors.border}`, animation:'slideUp 0.3s ease-out' }}>
                <div style={{ fontSize:48, marginBottom:12 }}>👋</div>
                <div style={{ fontSize:16, fontWeight:800, color:colors.ink, marginBottom:8 }}>确认要退出该账号吗？</div>
                <div style={{ display:'flex', gap:10, marginTop:20 }}>
                  <button onClick={() => setShowLogoutConfirm(false)} style={{ flex:1, height:40, borderRadius:12, background: colors.bg2, border:`1px solid ${colors.border}`, cursor:'pointer', fontSize:13, fontWeight:600, color:colors.muted }}>取消</button>
                  <button onClick={handleLogout} style={{ flex:1, height:40, borderRadius:12, background:'linear-gradient(135deg, #FF6B6B, #E05555)', border:'none', cursor:'pointer', fontSize:13, fontWeight:700, color:'#fff' }}>确认</button>
                </div>
              </div>
            </div>
          )}
          <CatCardFlipModal cat={flipCardCat} show={!!flipCardCat} onClose={() => setFlipCardCat(null)} onDiscard={handleDiscard} />
          {/* P5: Farewell ceremony */}
          <FarewellCeremony cat={farewellCat} show={showFarewell} onDone={() => { setShowFarewell(false); setFarewellCat(null); }} />
          {/* P5: Memorial detail */}
          <MemorialDetailModal cat={memorialDetailCat} show={!!memorialDetailCat} onClose={() => setMemorialDetailCat(null)} />
          {/* P5: Title unlock toast */}
          <TitleUnlockToast title={titleUnlockToast} show={!!titleUnlockToast} onDone={() => setTitleUnlockToast(null)} />
        </div>
      </IosFrame>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
