<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>棋盘预览 — P1+P2 半偏移 + 异形棋盘 + 牌堆</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;display:flex;flex-direction:column;align-items:center;min-height:100vh;font-family:system-ui,sans-serif;overflow-x:hidden}
h1{color:#e0e0e0;margin:16px 0 8px;font-size:18px}
.label{color:#aaa;font-size:13px;margin-bottom:12px}
canvas{border-radius:12px;box-shadow:0 0 30px rgba(108,92,231,.25)}
select,button{margin:6px;padding:8px 16px;border-radius:8px;border:1px solid #444;background:#2a2a3e;color:#ddd;font-size:14px;cursor:pointer}
button:hover{background:#3a3a5e}
.controls{display:flex;gap:8px;margin:10px 0;flex-wrap:wrap;justify-content:center}
.info{color:#888;font-size:12px;margin-top:8px;text-align:center;line-height:1.8}
</style>
</head>
<body>
<h1>棋盘布局预览 — P1+P2</h1>
<div class="label">8列 × 60px · SAFE_ZONE 12px · 半偏移网格 · 6种异形棋盘 · 牌堆系统</div>
<div class="controls">
  <select id="shapeSel">
    <option value="standard">标准棋盘 (48格)</option>
    <option value="love">爱心棋盘 (32格)</option>
    <option value="diamond">菱形棋盘 (24格)</option>
    <option value="persia">波斯双域 (42格)</option>
    <option value="butterfly">蝴蝶棋盘 (30格)</option>
    <option value="petal">花瓣棋盘 (32格)</option>
    <option value="hourglass">沙漏棋盘 (36格)</option>
  </select>
  <select id="layerSel">
    <option value="3">3层堆叠</option>
    <option value="2">2层堆叠</option>
    <option value="1">仅1层</option>
  </select>
  <select id="pileSel">
    <option value="0">无牌堆</option>
    <option value="2">2牌堆 (3-6张/堆)</option>
    <option value="3" selected>3牌堆 (5-8张/堆)</option>
    <option value="4">4牌堆 (6-8张/堆)</option>
  </select>
  <button id="toggleOverlay">切换叠放/分层</button>
  <button id="toggleTypes">显示/隐藏类型</button>
  <button id="regenBtn">重新生成</button>
</div>
<canvas id="c"></canvas>
<div class="info">
  <div id="statLine"></div>
  <div id="shapeInfo"></div>
</div>

<script src="utils/boardShapes.js"></script>
<script>
const T=60, HALF=T/2, SAFE_ZONE=12, GAP=0;
const TYPES_9=['猫爪印','猫薄荷','毛线球','猫罐头','猫爬架','逗猫棒','猫铃铛','猫条','蝴蝶结'];
const COLORS=['#FF6B6B','#4ECDC4','#45B7D1','#FFA07A','#98D8C8','#F7DC6F','#BB8FCE','#85C1E9','#F0B27A'];
const TYPE_EMOJI={'猫爪印':'🐾','猫薄荷':'🌿','毛线球':'🧶','猫罐头':'🥫','猫爬架':'🪜','逗猫棒':'🎣','猫铃铛':'🔔','猫条':'🐟','蝴蝶结':'🎀'};

let shape='standard', numLayers=3, numPiles=3, overlay=true, showTypes=true;
let cards=[], piles=[];

// P2: 生成牌堆数据
function generatePiles() {
  if (numPiles === 0) { piles = []; return; }
  piles = [];
  for (var pi = 0; pi < numPiles; pi++) {
    var cardCount = (numPiles === 2) ? (3 + Math.floor(Math.random() * 4))  // 3-6
      : (numPiles === 3) ? (5 + Math.floor(Math.random() * 4))  // 5-8
      : (6 + Math.floor(Math.random() * 3)); // 6-8 (4 piles)
    var pcards = [];
    for (var ci = 0; ci < cardCount; ci++) {
      pcards.push(TYPES_9[Math.floor(Math.random() * TYPES_9.length)]);
    }
    piles.push({
      id: pi,
      cards: pcards,
      topIndex: 0,
      isEmpty: false,
    });
  }
}

function seededRand(seed){let s=seed;return()=>{s=(s*1103515245+12345)&0x7fffffff;return s/0x7fffffff}}
function shuffle(arr,rng){for(let i=arr.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]}return arr}

// P1: 从 BoardShapes 获取合法格子，分配到各层
function generateCards() {
  // 获取棋盘形状的合法格子
  var validCells;
  if (typeof BoardShapes !== 'undefined') {
    validCells = BoardShapes.getBoardShape(shape);
  } else {
    // Fallback: 标准48格
    validCells = [];
    for (var r = 1; r <= 6; r++)
      for (var c = 1; c <= 8; c++)
        validCells.push({ row: r, col: c });
  }

  var cellCount = validCells.length;
  var all = [];

  // 按层分配：每层使用合法格子，但可以选取不同数量的格子
  for (var li = 0; li < numLayers; li++) {
    // 每层卡牌数递减
    var layerCardCount;
    if (numLayers === 3) {
      layerCardCount = li === 0 ? Math.floor(cellCount * 0.42) : li === 1 ? Math.floor(cellCount * 0.33) : cellCount - Math.floor(cellCount * 0.42) - Math.floor(cellCount * 0.33);
    } else if (numLayers === 2) {
      layerCardCount = li === 0 ? Math.floor(cellCount * 0.55) : cellCount - Math.floor(cellCount * 0.55);
    } else {
      layerCardCount = cellCount;
    }
    layerCardCount = Math.floor(layerCardCount / 3) * 3; // 保证3的倍数

    // 从合法格子中随机选取
    var shuffled = shuffle([...validCells], Math.random);
    for (var i = 0; i < layerCardCount && i < shuffled.length; i++) {
      all.push({
        col: shuffled[i].col,
        row: shuffled[i].row,
        layer: li,
        zoneId: shuffled[i].zoneId,
        type: null,
      });
    }
  }

  // 类型分配：3的倍数
  var rng = seededRand(Date.now() % 10000);
  var pool = TYPES_9;
  var totalSlots = all.length;
  var groups = Math.floor(totalSlots / 3);
  var types = [];
  for (var gi = 0; gi < groups * 3; gi++) types.push(pool[Math.floor(gi / 3) % pool.length]);
  while (types.length < totalSlots) types.push(pool[Math.floor(rng() * pool.length)]);
  shuffle(types, rng);
  all.forEach(function(c, i) { c.type = types[i]; });

  // 按 layer → row → col 排序绘制
  all.sort(function(a, b) { return a.layer - b.layer || a.row - b.row || a.col - b.col; });
  return all;
}

// P1: 半偏移坐标计算
function tileX(col, row) {
  var rowOffset = ((row - 1) % 2 === 1) ? (T + GAP) / 2 : 0;
  return SAFE_ZONE + (col - 1) * (T + GAP) + rowOffset;
}
function tileY(row) {
  return SAFE_ZONE + (row - 1) * (T + GAP);
}

function draw() {
  var canvas = document.getElementById('c');
  var SW = 750, SH = 1334;

  // 棋盘边界计算（含半偏移修正）
  var validCells = typeof BoardShapes !== 'undefined' ? BoardShapes.getBoardShape(shape) : [];
  var maxCol = 1, maxRow = 1;
  validCells.forEach(function(c) { if (c.col > maxCol) maxCol = c.col; if (c.row > maxRow) maxRow = c.row; });
  if (maxCol === 0) { maxCol = 8; maxRow = 6; }

  var halfOffset = (T + GAP) / 2;
  var boardW = SAFE_ZONE * 2 + (maxCol - 1) * (T + GAP) + T + halfOffset - GAP;
  var boardH = SAFE_ZONE * 2 + maxRow * (T + GAP) - GAP;

  // UI 布局
  var topBarH = 110, holdSlotH = 50, collectSlotH = 50, skillBtnH = 70;
  var gap1 = 20, gap2 = 6, gap3 = 6, bottomTabH = 90;
  var groupH = boardH + gap1 + holdSlotH + gap2 + collectSlotH + gap3 + skillBtnH;
  var availH = SH - topBarH - bottomTabH;
  var groupY = topBarH + Math.floor((availH - groupH) / 2);
  var groupX = Math.floor((SW - boardW) / 2);

  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width = SW * dpr; canvas.height = SH * dpr;
  canvas.style.width = SW + 'px'; canvas.style.height = SH + 'px';
  var ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  // Background
  var bg = ctx.createLinearGradient(0, 0, 0, SH);
  bg.addColorStop(0, '#1a1a2e'); bg.addColorStop(1, '#16213e');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, SW, SH);

  // 顶部状态栏
  ctx.fillStyle = 'rgba(0,0,0,.3)'; ctx.fillRect(0, 0, SW, topBarH);
  ctx.fillStyle = '#e0e0e0'; ctx.font = 'bold 16px system-ui'; ctx.textAlign = 'center';
  ctx.fillText(shape + ' · ' + cards.length + '张卡牌 · ' + numLayers + '层', SW / 2, 36);
  ctx.font = '13px system-ui'; ctx.fillStyle = '#aaa';
  ctx.fillText('鱼干: 128  ·  猫铃铛: 3', SW / 2, 62);
  ctx.font = '20px serif'; ctx.textAlign = 'left';
  ctx.fillText('🐱', 20, 40); ctx.textAlign = 'right';
  ctx.fillText('⚙️', SW - 20, 40); ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(108,92,231,.25)';
  roundRect(ctx, 20, 78, SW - 40, 28, 6); ctx.fill();
  ctx.font = '11px system-ui'; ctx.fillStyle = '#a89de0';
  ctx.fillText('P1异形棋盘验证 · 半偏移网格', SW / 2, 96);

  // 绘制棋盘背景（显示所有合法格子为空白格）
  var layerColors = ['#2d6a4f', '#1b4965', '#5a189a', '#9d0208'];
  var layerBorders = ['#52b788', '#48cae4', '#c77dff', '#ff6b6b'];
  var layerOpacities = [0.85, 0.65, 0.45, 0.3];

  // P1: 先画所有合法格子轮廓（半透明），再画卡牌
  if (validCells.length > 0) {
    validCells.forEach(function(cell) {
      var x = groupX + tileX(cell.col, cell.row);
      var y = groupY + tileY(cell.row);
      // 波斯双域：左右区域区分颜色
      if (typeof cell.zoneId !== 'undefined' && cell.zoneId !== null) {
        ctx.fillStyle = cell.zoneId === 0 ? 'rgba(100,149,237,0.08)' : 'rgba(144,238,144,0.08)';
        ctx.strokeStyle = cell.zoneId === 0 ? 'rgba(100,149,237,0.2)' : 'rgba(144,238,144,0.2)';
      } else {
        ctx.fillStyle = 'rgba(255,255,255,0.03)';
        ctx.strokeStyle = 'rgba(255,255,255,0.06)';
      }
      ctx.lineWidth = 0.5;
      roundRect(ctx, x, y, T - 4, T - 4, 8); ctx.fill(); ctx.stroke();
    });
  }

  // 绘制卡牌
  cards.forEach(function(card) {
    var x = groupX + tileX(card.col, card.row);
    var y = groupY + tileY(card.row);
    var ci = card.type ? TYPES_9.indexOf(card.type) % COLORS.length : 0;

    // 波斯双域区域标记
    var isPersia = typeof card.zoneId !== 'undefined' && card.zoneId !== null;
    var zoneColor = isPersia ? (card.zoneId === 0 ? 'rgba(100,149,237,0.5)' : 'rgba(144,238,144,0.5)') : null;

    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,.35)';
    ctx.shadowBlur = 6;
    ctx.shadowOffsetX = 2; ctx.shadowOffsetY = 2;

    if (overlay) {
      ctx.globalAlpha = layerOpacities[card.layer] || 0.5;
    }

    ctx.fillStyle = zoneColor || COLORS[ci];
    roundRect(ctx, x, y, T - 4, T - 4, 8); ctx.fill();
    ctx.restore();

    if (overlay) {
      ctx.globalAlpha = 1;
      ctx.strokeStyle = zoneColor ? 'rgba(255,255,255,0.3)' : layerBorders[card.layer];
      ctx.lineWidth = 1.5;
      roundRect(ctx, x, y, T - 4, T - 4, 8); ctx.stroke();
    }

    if (showTypes && card.type) {
      ctx.font = '22px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = '#fff';
      ctx.fillText(TYPE_EMOJI[card.type] || '?', x + T / 2 - 2, y + T / 2 - 2);
    }

    if (!overlay) {
      ctx.font = 'bold 10px system-ui'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
      ctx.fillStyle = layerBorders[card.layer];
      ctx.fillText('L' + card.layer, x + T / 2 - 2, y + T - 18);
    }
  });

  // 临时存放层
  ctx.globalAlpha = 1;
  var holdSlotY = groupY + boardH + gap1;
  var slotW = T - 2, holdSlotGap = 8;
  var holdSlotTotalW = 3 * (slotW + holdSlotGap) - holdSlotGap;
  var holdSlotStartX = Math.floor((SW - holdSlotTotalW) / 2);
  ctx.font = '11px system-ui'; ctx.fillStyle = '#aaa'; ctx.textAlign = 'center';
  ctx.fillText('临时存放层 3格', SW / 2, holdSlotY - 4);
  for (var si = 0; si < 3; si++) {
    var sx = holdSlotStartX + si * (slotW + holdSlotGap);
    ctx.fillStyle = 'rgba(255,165,0,.1)';
    ctx.strokeStyle = 'rgba(255,165,0,.35)';
    ctx.lineWidth = 1.5;
    roundRect(ctx, sx, holdSlotY, slotW, holdSlotH - 4, 8); ctx.fill(); ctx.stroke();
    ctx.font = '10px system-ui'; ctx.fillStyle = '#cc8800'; ctx.textAlign = 'center';
    ctx.fillText(si + 1, sx + slotW / 2, holdSlotY + holdSlotH - 14);
  }

  // 收集槽
  var collectSlotY = holdSlotY + holdSlotH + gap2;
  var collectSlotGap = 4;
  var collectSlotTotalW = 7 * (slotW + collectSlotGap) - collectSlotGap;
  var collectSlotStartX = Math.floor((SW - collectSlotTotalW) / 2);
  ctx.font = '11px system-ui'; ctx.fillStyle = '#888'; ctx.textAlign = 'center';
  ctx.fillText('收集槽 7格', SW / 2, collectSlotY - 4);
  for (var si2 = 0; si2 < 7; si2++) {
    var sx2 = collectSlotStartX + si2 * (slotW + collectSlotGap);
    ctx.fillStyle = 'rgba(255,255,255,.08)';
    ctx.strokeStyle = 'rgba(255,255,255,.2)';
    ctx.lineWidth = 1;
    roundRect(ctx, sx2, collectSlotY, slotW, collectSlotH - 4, 6); ctx.fill(); ctx.stroke();
    ctx.font = '10px system-ui'; ctx.fillStyle = '#666'; ctx.textAlign = 'center';
    ctx.fillText(si2 + 1, sx2 + slotW / 2, collectSlotY + collectSlotH - 14);
  }

  // 技能按钮栏
  var skillY = collectSlotY + collectSlotH + gap3;
  var skillNames = ['挑出来', '撤回', '洗牌'];
  var skillCats = ['🐱橘猫', '🐈‍⬛黑猫', '🐱幸运猫'];
  var btnW = 140, btnH = skillBtnH - 10;
  var skillTotalW = 3 * btnW + 2 * 16;
  var skillStartX = Math.floor((SW - skillTotalW) / 2);
  for (var bi = 0; bi < 3; bi++) {
    var bx = skillStartX + bi * (btnW + 16);
    ctx.fillStyle = 'rgba(108,92,231,.2)';
    ctx.strokeStyle = 'rgba(108,92,231,.5)';
    ctx.lineWidth = 1.5;
    roundRect(ctx, bx, skillY, btnW, btnH, 10); ctx.fill(); ctx.stroke();
    ctx.font = '12px system-ui'; ctx.fillStyle = '#b8a9f0'; ctx.textAlign = 'center';
    ctx.fillText(skillCats[bi], bx + btnW / 2, skillY + 20);
    ctx.font = 'bold 13px system-ui'; ctx.fillStyle = '#fff';
    ctx.fillText(skillNames[bi], bx + btnW / 2, skillY + 42);
  }

  // 底部Tab栏
  var tabY = SH - bottomTabH;
  ctx.fillStyle = 'rgba(0,0,0,.4)'; ctx.fillRect(0, tabY, SW, bottomTabH);
  ctx.strokeStyle = 'rgba(255,255,255,.1)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, tabY); ctx.lineTo(SW, tabY); ctx.stroke();
  var tabs = ['首页', '消消乐', '猫咪', '我的'];
  var tabIcons = ['🏠', '🎮', '🐱', '👤'];
  var tabW = SW / 4;
  for (var ti = 0; ti < 4; ti++) {
    var tx = tabW * ti + tabW / 2;
    var isActive = ti === 1;
    ctx.font = '20px serif'; ctx.textAlign = 'center';
    ctx.fillStyle = isActive ? '#6C5CE7' : '#666';
    ctx.fillText(tabIcons[ti], tx, tabY + 35);
    ctx.font = (isActive ? 'bold ' : '') + '11px system-ui';
    ctx.fillText(tabs[ti], tx, tabY + 58);
    if (isActive) {
      ctx.fillStyle = '#6C5CE7';
      roundRect(ctx, tx - 16, tabY + 65, 32, 3, 1.5); ctx.fill();
    }
  }

  // P2: 牌堆区绘制
  var pileTotalCards = 0;
  if (numPiles > 0 && piles.length > 0) {
    var pileAreaY = groupY + boardH + gap1 + holdSlotH + gap2 + collectSlotH + gap3 + skillBtnH + 8;
    var pileW = 50, pileH = 60;
    var pileTotalW = numPiles * (pileW + 12) - 12;
    var pileStartX = Math.floor((SW - pileTotalW) / 2);

    ctx.font = '11px system-ui'; ctx.fillStyle = '#ccc'; ctx.textAlign = 'center';
    ctx.fillText('牌堆区 (' + numPiles + '堆)', SW / 2, pileAreaY - 6);

    for (var pi = 0; pi < piles.length; pi++) {
      var pile = piles[pi];
      var px = pileStartX + pi * (pileW + 12);
      var py = pileAreaY;
      pileTotalCards += pile.cards.length - pile.topIndex;

      if (pile.isEmpty) {
        // 空状态
        ctx.fillStyle = 'rgba(40,30,60,0.6)';
        ctx.strokeStyle = 'rgba(255,255,255,0.1)';
        ctx.lineWidth = 1;
        roundRect(ctx, px, py, pileW, pileH - 6, 8); ctx.fill(); ctx.stroke();
        ctx.font = '10px system-ui'; ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.textAlign = 'center';
        ctx.fillText('已空', px + pileW/2, py + pileH/2 - 5);
      } else {
        var remaining = pile.cards.length - pile.topIndex;
        var topType = pile.cards[pile.topIndex];
        var topIdx = TYPES_9.indexOf(topType);
        var topColor = COLORS[topIdx % COLORS.length];

        // 背面层叠
        if (remaining > 2) {
          ctx.fillStyle = 'rgba(42,20,0,0.8)';
          ctx.strokeStyle = 'rgba(255,140,66,0.2)';
          ctx.lineWidth = 1;
          roundRect(ctx, px + 2, py + 8, pileW - 4, pileH - 12, 6); ctx.fill(); ctx.stroke();
        }
        if (remaining > 1) {
          ctx.fillStyle = 'rgba(61,32,0,0.8)';
          ctx.strokeStyle = 'rgba(255,140,66,0.3)';
          ctx.lineWidth = 1;
          roundRect(ctx, px + 1, py + 4, pileW - 2, pileH - 10, 6); ctx.fill(); ctx.stroke();
        }

        // 顶部牌面
        ctx.save();
        ctx.shadowColor = 'rgba(0,0,0,0.4)';
        ctx.shadowBlur = 6;
        ctx.shadowOffsetX = 2; ctx.shadowOffsetY = 2;
        ctx.fillStyle = topColor;
        roundRect(ctx, px, py, pileW, pileH - 6, 8); ctx.fill();
        ctx.restore();

        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.lineWidth = 1.5;
        roundRect(ctx, px, py, pileW, pileH - 6, 8); ctx.stroke();

        // 图案显示
        if (showTypes) {
          ctx.font = '18px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.fillStyle = '#fff';
          ctx.fillText(TYPE_EMOJI[topType] || '•', px + pileW/2, py + (pileH - 6)/2);
        }

        // 剩余张数角标
        ctx.fillStyle = '#FF8C42';
        ctx.beginPath();
        ctx.arc(px + pileW - 4, py + pileH - 10, 9, 0, Math.PI * 2); ctx.fill();
        ctx.font = 'bold 9px system-ui'; ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(remaining, px + pileW - 4, py + pileH - 10);
      }
    }
  }

  // Stats
  var cellCount = validCells.length;
  document.getElementById('statLine').textContent =
    '屏幕占比: ' + ((boardW * boardH) / (750 * 1334) * 100).toFixed(1) + '% · ' +
    '棋盘 ' + boardW + '×' + boardH + 'px · ' +
    'SAFE_ZONE: ' + SAFE_ZONE + 'px · ' +
    '层数: ' + numLayers + ' · ' +
    '卡牌: ' + cards.length + '张' +
    (numPiles > 0 ? ' · 牌堆: ' + pileTotalCards + '张' : '') +
    (numPiles > 0 ? ' · 总计: ' + (cards.length + pileTotalCards) + '张' : '');

  // P1+P2: 形状+牌堆信息
  var info = '形状: ' + shape + ' · 合法格子: ' + cellCount + '格';
  if (shape === 'persia') {
    var leftCount = validCells.filter(function(c) { return c.zoneId === 0; }).length;
    var rightCount = validCells.filter(function(c) { return c.zoneId === 1; }).length;
    info += ' · 左域(col≤3): ' + leftCount + '格 · 右域(col≥5): ' + rightCount + '格';
  }
  if (numPiles > 0) {
    info += ' · 牌堆: ' + numPiles + '堆/' + pileTotalCards + '张';
  }
  document.getElementById('shapeInfo').textContent = info;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y); ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r); ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h); ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y); ctx.closePath();
}

function refresh() { cards = generateCards(); generatePiles(); draw(); }

document.getElementById('shapeSel').onchange = function(e) { shape = e.target.value; refresh(); };
document.getElementById('layerSel').onchange = function(e) { numLayers = +e.target.value; refresh(); };
document.getElementById('pileSel').onchange = function(e) { numPiles = +e.target.value; refresh(); };
