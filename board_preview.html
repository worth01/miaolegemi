<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>棋盘预览 — 8列×60px</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;display:flex;flex-direction:column;align-items:center;min-height:100vh;font-family:system-ui,sans-serif;overflow-x:hidden}
h1{color:#e0e0e0;margin:16px 0 8px;font-size:18px}
.label{color:#aaa;font-size:13px;margin-bottom:12px}
canvas{border-radius:12px;box-shadow:0 0 30px rgba(108,92,231,.25)}
select,button{margin:6px;padding:8px 16px;border-radius:8px;border:1px solid #444;background:#2a2a3e;color:#ddd;font-size:14px;cursor:pointer}
button:hover{background:#3a3a5e}
.controls{display:flex;gap:8px;margin:10px 0}
.info{color:#888;font-size:12px;margin-top:8px;text-align:center;line-height:1.8}
</style>
</head>
<body>
<h1>棋盘布局预览</h1>
<div class="label">8列 × 60px · 层间偏移 30px</div>
<div class="controls">
  <select id="levelSel">
    <option value="0">第一关 · 3层 54张</option>
    <option value="1">第二关 · 4层 72张</option>
    <option value="2">第三关 · 4层 72张</option>
  </select>
  <button id="toggleOverlay">切换叠放/分层</button>
  <button id="toggleTypes">显示/隐藏类型</button>
</div>
<canvas id="c"></canvas>
<div class="info">
  <div id="statLine"></div>
</div>

<script>
const T=60, HALF=T/2, TYPES_3=['猫爪印','猫罐头','逗猫棒'];
const TYPES_9=['猫爪印','猫薄荷','毛线球','猫罐头','猫爬架','逗猫棒','猫铃铛','猫条','蝴蝶结'];
const COLORS=['#FF6B6B','#4ECDC4','#45B7D1','#FFA07A','#98D8C8','#F7DC6F','#BB8FCE','#85C1E9','#F0B27A'];
const TYPE_EMOJI={'猫爪印':'🐾','猫薄荷':'🌿','毛线球':'🧶','猫罐头':'🥫','猫爬架':'🪜','逗猫棒':'🎣','猫铃铛':'🔔','猫条':'🐟','蝴蝶结':'🎀'};

const LEVELS=[
  {name:'第一关',layers:[
    {col:0,row:0,cols:8,rows:3,offX:0,offY:0},
    {col:1,row:1,cols:6,rows:3,offX:HALF,offY:HALF},
    {col:2,row:2,cols:4,rows:3,offX:HALF*2,offY:HALF*2},
  ],pool:TYPES_3,total:54},
  {name:'第二关',layers:[
    {col:0,row:0,cols:8,rows:4,offX:0,offY:0},
    {col:1,row:1,cols:6,rows:4,offX:HALF,offY:HALF},
    {col:2,row:2,cols:4,rows:3,offX:HALF*2,offY:HALF*2},
    {col:2.5,row:2.5,cols:2,rows:2,offX:HALF*2.5,offY:HALF*2.5},
  ],pool:TYPES_9,total:72},
  {name:'第三关',layers:[
    {col:0,row:0,cols:8,rows:4,offX:0,offY:0},
    {col:1,row:1,cols:6,rows:4,offX:HALF,offY:HALF},
    {col:2,row:2,cols:4,rows:3,offX:HALF*2,offY:HALF*2},
    {col:2.5,row:2.5,cols:2,rows:2,offX:HALF*2.5,offY:HALF*2.5},
  ],pool:TYPES_9,total:72},
];

let level=0, overlay=true, showTypes=true;
let cards=[];

function seededRand(seed){let s=seed;return()=>{s=(s*1103515245+12345)&0x7fffffff;return s/0x7fffffff}}
function shuffle(arr,rng){for(let i=arr.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]}return arr}

function generateCards(idx){
  const lv=LEVELS[idx];
  const all=[];
  lv.layers.forEach((la,li)=>{
    for(let c=0;c<la.cols;c++)for(let r=0;r<la.rows;r++){
      all.push({col:la.col+c,row:la.row+r,layer:li,ox:la.offX,oy:la.offY,type:null});
    }
  });
  // assign types: multiples of 3
  const rng=seededRand(42+idx*1000);
  const pool=lv.pool;
  const groups=Math.floor(all.length/3);
  const types=[];
  for(let i=0;i<groups*3;i++)types.push(pool[Math.floor(i/3)%pool.length]);
  // fill remaining if any
  while(types.length<all.length)types.push(pool[Math.floor(rng()*pool.length)]);
  shuffle(types,rng);
  all.forEach((c,i)=>c.type=types[i]);
  // reorder by layer then row then col for drawing
  all.sort((a,b)=>a.layer-b.layer||a.row-b.row||a.col-b.col);
  return all;
}

function draw(){
  const lv=LEVELS[level];
  const canvas=document.getElementById('c');
  // 模拟手机屏幕
  const SW=750, SH=1334;

  // compute bounds — 逐层算出实际最右/最下像素
  let rightmost=0, bottommost=0;
  lv.layers.forEach(la=>{
    rightmost=Math.max(rightmost,(la.col+la.cols)*T+la.offX);
    bottommost=Math.max(bottommost,(la.row+la.rows)*T+la.offY);
  });
  const boardW=rightmost;
  const boardH=bottommost;

  // UI 布局尺寸
  const topBarH=110;        // 顶部状态栏
  const holdSlotH=50;       // 临时存放层高度
  const collectSlotH=50;    // 收集槽高度
  const skillBtnH=70;       // 技能按钮栏高度
  const gap1=20;            // 棋盘→临时存放层
  const gap2=6;             // 临时存放层→收集槽
  const gap3=6;             // 收集槽→技能按钮
  const bottomTabH=90;      // 底部导航栏

  // 棋盘+临时存放层+收集槽+技能按钮 组合高度
  const groupH=boardH+gap1+holdSlotH+gap2+collectSlotH+gap3+skillBtnH;
  // 可用区域 = 屏幕 - 顶栏 - 底栏
  const availH=SH-topBarH-bottomTabH;
  // 垂直居中偏移
  const groupY=topBarH+Math.floor((availH-groupH)/2);
  // 水平居中
  const groupX=Math.floor((SW-boardW)/2);

  const dpr=Math.min(window.devicePixelRatio||1,2);
  canvas.width=SW*dpr;canvas.height=SH*dpr;
  canvas.style.width=SW+'px';canvas.style.height=SH+'px';
  const ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);

  // background
  const bg=ctx.createLinearGradient(0,0,0,SH);
  bg.addColorStop(0,'#1a1a2e');bg.addColorStop(1,'#16213e');
  ctx.fillStyle=bg;ctx.fillRect(0,0,SW,SH);

  // 顶部状态栏
  ctx.fillStyle='rgba(0,0,0,.3)';ctx.fillRect(0,0,SW,topBarH);
  ctx.fillStyle='#e0e0e0';ctx.font='bold 16px system-ui';ctx.textAlign='center';
  ctx.fillText(lv.name+' · '+lv.total+'张卡牌',SW/2,36);
  ctx.font='13px system-ui';ctx.fillStyle='#aaa';
  ctx.fillText('鱼干: 128  ·  猫铃铛: 3',SW/2,62);
  // 左右模拟图标
  ctx.font='20px serif';ctx.textAlign='left';
  ctx.fillText('🐱',20,40);ctx.textAlign='right';
  ctx.fillText('⚙️',SW-20,40);ctx.textAlign='center';
  // 通知横幅
  ctx.fillStyle='rgba(108,92,231,.25)';
  roundRect(ctx,20,78,SW-40,28,6);ctx.fill();
  ctx.font='11px system-ui';ctx.fillStyle='#a89de0';
  ctx.fillText('🐾 橘猫 #234 在养成区等你，还有 8 天',SW/2,96);

  // draw cards
  const layerColors=['#2d6a4f','#1b4965','#5a189a','#9d0208'];
  const layerBorders=['#52b788','#48cae4','#c77dff','#ff6b6b'];
  const layerOpacities=[.85,.65,.45,.3];

  cards.forEach(card=>{
    const x=groupX+card.ox+card.col*T;
    const y=groupY+card.oy+card.row*T;
    const ci=card.type?lv.pool.indexOf(card.type)%COLORS.length:0;

    // shadow
    ctx.save();
    ctx.shadowColor='rgba(0,0,0,.35)';
    ctx.shadowBlur=6;
    ctx.shadowOffsetX=2;ctx.shadowOffsetY=2;

    // card body
    if(overlay){
      ctx.globalAlpha=layerOpacities[card.layer];
    }
    ctx.fillStyle=COLORS[ci];
    roundRect(ctx,x,y,T-4,T-4,8);ctx.fill();
    ctx.restore();

    // border
    if(overlay){
      ctx.globalAlpha=1;
      ctx.strokeStyle=layerBorders[card.layer];
      ctx.lineWidth=1.5;
      roundRect(ctx,x,y,T-4,T-4,8);ctx.stroke();
    }

    // type emoji
    if(showTypes&&card.type){
      ctx.font='22px serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillStyle='#fff';
      ctx.fillText(TYPE_EMOJI[card.type]||'?',x+T/2-2,y+T/2-2);
    }

    // layer label (only in separated view)
    if(!overlay){
      ctx.font='bold 10px system-ui';ctx.textAlign='center';ctx.textBaseline='top';
      ctx.fillStyle=layerBorders[card.layer];
      ctx.fillText('L'+card.layer,x+T/2-2,y+T-18);
    }
  });

  // 临时存放层（3格）
  ctx.globalAlpha=1;
  const holdSlotY=groupY+boardH+gap1;
  const slotW=T-2;
  const holdSlotGap=8;
  const holdSlotTotalW=3*(slotW+holdSlotGap)-holdSlotGap;
  const holdSlotStartX=Math.floor((SW-holdSlotTotalW)/2);
  // label
  ctx.font='11px system-ui';ctx.fillStyle='#aaa';ctx.textAlign='center';
  ctx.fillText('临时存放层 3格',SW/2,holdSlotY-4);
  for(let i=0;i<3;i++){
    const sx=holdSlotStartX+i*(slotW+holdSlotGap);
    ctx.fillStyle='rgba(255,165,0,.1)';
    ctx.strokeStyle='rgba(255,165,0,.35)';
    ctx.lineWidth=1.5;
    roundRect(ctx,sx,holdSlotY,slotW,holdSlotH-4,8);ctx.fill();ctx.stroke();
    ctx.font='10px system-ui';ctx.fillStyle='#cc8800';ctx.textAlign='center';
    ctx.fillText(i+1,sx+slotW/2,holdSlotY+holdSlotH-14);
  }

  // 收集槽（7格）
  const collectSlotY=holdSlotY+holdSlotH+gap2;
  const collectSlotGap=4;
  const collectSlotTotalW=7*(slotW+collectSlotGap)-collectSlotGap;
  const collectSlotStartX=Math.floor((SW-collectSlotTotalW)/2);
  // label
  ctx.font='11px system-ui';ctx.fillStyle='#888';ctx.textAlign='center';
  ctx.fillText('收集槽 7格',SW/2,collectSlotY-4);
  for(let i=0;i<7;i++){
    const sx=collectSlotStartX+i*(slotW+collectSlotGap);
    ctx.fillStyle='rgba(255,255,255,.08)';
    ctx.strokeStyle='rgba(255,255,255,.2)';
    ctx.lineWidth=1;
    roundRect(ctx,sx,collectSlotY,slotW,collectSlotH-4,6);ctx.fill();ctx.stroke();
    ctx.font='10px system-ui';ctx.fillStyle='#666';ctx.textAlign='center';
    ctx.fillText(i+1,sx+slotW/2,collectSlotY+collectSlotH-14);
  }

  // 猫咪技能按钮栏
  const skillY=collectSlotY+collectSlotH+gap3;
  const skillNames=['挑出来','撤回','洗牌'];
  const skillCats=['🐱橘猫','🐈‍⬛黑猫','🐱幸运猫'];
  const btnW=140, btnH=skillBtnH-10;
  const skillTotalW=3*btnW+2*16;
  const skillStartX=Math.floor((SW-skillTotalW)/2);
  for(let i=0;i<3;i++){
    const bx=skillStartX+i*(btnW+16);
    ctx.fillStyle='rgba(108,92,231,.2)';
    ctx.strokeStyle='rgba(108,92,231,.5)';
    ctx.lineWidth=1.5;
    roundRect(ctx,bx,skillY,btnW,btnH,10);ctx.fill();ctx.stroke();
    ctx.font='12px system-ui';ctx.fillStyle='#b8a9f0';ctx.textAlign='center';
    ctx.fillText(skillCats[i],bx+btnW/2,skillY+20);
    ctx.font='bold 13px system-ui';ctx.fillStyle='#fff';
    ctx.fillText(skillNames[i],bx+btnW/2,skillY+42);
  }

  // 底部Tab栏
  const tabY=SH-bottomTabH;
  ctx.fillStyle='rgba(0,0,0,.4)';ctx.fillRect(0,tabY,SW,bottomTabH);
  ctx.strokeStyle='rgba(255,255,255,.1)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(0,tabY);ctx.lineTo(SW,tabY);ctx.stroke();
  const tabs=['首页','消消乐','猫咪','我的'];
  const tabIcons=['🏠','🎮','🐱','👤'];
  const tabW=SW/4;
  for(let i=0;i<4;i++){
    const tx=tabW*i+tabW/2;
    const isActive=i===1;
    ctx.font='20px serif';ctx.textAlign='center';
    ctx.fillStyle=isActive?'#6C5CE7':'#666';
    ctx.fillText(tabIcons[i],tx,tabY+35);
    ctx.font=(isActive?'bold ':'')+ '11px system-ui';
    ctx.fillText(tabs[i],tx,tabY+58);
    if(isActive){
      ctx.fillStyle='#6C5CE7';
      roundRect(ctx,tx-16,tabY+65,32,3,1.5);ctx.fill();
    }
  }

  // stats
  document.getElementById('statLine').textContent=
    `屏幕占比: ${((boardW*boardH)/(750*1334)*100).toFixed(1)}% · `+
    `棋盘 ${boardW}×${boardH}px · `+
    `层数: ${lv.layers.length} · `+
    `卡牌: ${lv.total}张`;
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

function refresh(){cards=generateCards(level);draw()}

document.getElementById('levelSel').onchange=e=>{level=+e.target.value;refresh()};
document.getElementById('toggleOverlay').onclick=()=>{overlay=!overlay;refresh()};
document.getElementById('toggleTypes').onclick=()=>{showTypes=!showTypes;refresh()};
window.onresize=()=>draw();
refresh();
</script>
</body>
</html>
