/* ═══════════════════════════════════════
   TOP HEADER
   ═══════════════════════════════════════ */
function TopHeader({ darkMode, onToggleTheme }) {
  const DAYS = ['周日','周一','周二','周三','周四','周五','周六'];
  const now = new Date();
  const dateStr = `${DAYS[now.getDay()]} ${now.getMonth()+1}.${String(now.getDate()).padStart(2,'0')}`;
  const greetings = ['新的一天加油 ✨','今天也要开心哦 ☀️','元气满满的一天 💪','好运连连 🍀','一起喵了个咪 🐱'];
  const greeting = greetings[now.getDay() % greetings.length];
  return (
    <div style={{
      padding: '8px 20px 0',
      display: 'flex', alignItems: 'center', justifyContent: 'space-between',
    }}>
      <div>
        <div style={{ fontSize: 14, fontWeight: 700, color: T.ink, letterSpacing: '-0.3px' }}>
          {dateStr}
        </div>
        <div style={{ fontSize: 10, color: T.muted, marginTop: 1 }}>
          {greeting}
        </div>
      </div>
      <div style={{ display: 'flex', gap: 12, alignItems: 'center' }}>
        {/* 连续打卡 */}
        <div style={{
          display: 'flex', alignItems: 'center', gap: 4,
          background: 'rgba(108,92,231,0.15)', borderRadius: 999, padding: '4px 10px',
        }}>
          <span style={{ fontSize: 12 }}>🔥</span>
          <span style={{ fontSize: 12, fontWeight: 700, color: T.purpleLight }}>{USER.streak}天</span>
        </div>
        {/* 金币 */}
        <div style={{
          display: 'flex', alignItems: 'center', gap: 4,
          background: 'rgba(253,150,68,0.12)', borderRadius: 999, padding: '4px 10px',
        }}>
          <span style={{ fontSize: 12 }}>🪙</span>
          <span style={{ fontSize: 12, fontWeight: 700, color: T.orange }}>{USER.coins}</span>
        </div>
        {/* 主题切换 */}
        <div onClick={onToggleTheme} style={{
          cursor: 'pointer', opacity: 0.6, display: 'flex', alignItems: 'center',
          padding: '4px 8px', borderRadius: 10,
          background: 'rgba(255,255,255,0.06)', border: '1px solid rgba(255,255,255,0.08)',
          transition: 'opacity 0.2s',
        }}
        onMouseEnter={e => e.currentTarget.style.opacity = '1'}
        onMouseLeave={e => e.currentTarget.style.opacity = '0.6'}
        >
          <span style={{ fontSize: 16 }}>{darkMode ? '☀️' : '🌙'}</span>
        </div>
      </div>
    </div>
  );
}

function FeaturedCat({ cat, checkedIn, onCheckIn }) {
  return (
    <div style={{
      textAlign: 'center',
      padding: '20px 20px 0',
      position: 'relative',
    }}>
      {/* 背景光晕 */}

        background: `radial-gradient(circle, ${RARITY_COLORS[cat.rarity]}15 0%, transparent 70%)`,
        pointerEvents: 'none',
      }}/>
      {/* 装饰星星 */}
      {[
        { top: 10, left: 50, size: 6, delay: 0 },
        { top: 30, right: 60, size: 4, delay: 0.5 },
        { top: 60, left: 30, size: 5, delay: 1 },
        { top: 80, right: 40, size: 3, delay: 1.5 },
        { top: 20, left: 120, size: 4, delay: 0.8 },
      ].map((s, i) => (
        <div key={i} style={{
          position: 'absolute', top: s.top, left: s.left, right: s.right,
          width: s.size, height: s.size, borderRadius: '50%',
          background: T.yellow, opacity: 0.4,
          animation: `sparkle 2s ease-in-out ${s.delay}s infinite`,
          pointerEvents: 'none',
        }}/>
      ))}
      {/* 猫咪图片 */}
      <div style={{
        width: 200, height: 200, borderRadius: '50%',
        margin: '0 auto',
        background: `radial-gradient(circle, ${RARITY_COLORS[cat.rarity]}20, transparent)`,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        animation: checkedIn ? 'none' : 'float 4s ease-in-out infinite',
        position: 'relative',
        overflow: 'hidden',
      }}>
        <img
          src={cat.img}
          alt={cat.name}
          style={{
            width: '100%', height: '100%', objectFit: 'cover', borderRadius: '50%',
            filter: cat.unlocked ? 'none' : 'grayscale(0.7) brightness(0.5)',
          }}
          onError={(e) => {
            e.target.style.display = 'none';
            e.target.parentElement.innerHTML = `<div style="font-size:60px">${cat.unlocked ? '🐱' : '🔒'}</div>`;
          }}
        />
        {!cat.unlocked && (
          <div style={{
            position: 'absolute', top: 0, left: 0, right: 0, bottom: 0,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            background: 'rgba(15,10,30,0.5)', borderRadius: '50%',
          }}>
            <div style={{
              width: 44, height: 44, borderRadius: '50%',
              background: 'rgba(0,0,0,0.5)', display: 'flex', alignItems: 'center', justifyContent: 'center',
            }}>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                <rect x="5" y="11" width="14" height="10" rx="2" fill="rgba(255,255,255,0.3)" stroke="rgba(255,255,255,0.7)" strokeWidth="1.5"/>
                <path d="M8 11V7a4 4 0 118 0v4" stroke="rgba(255,255,255,0.7)" strokeWidth="1.5" fill="none" strokeLinecap="round"/>
              </svg>
            </div>
          </div>
        )}
      </div>
      {/* 猫咪名字 */}
      <div style={{ marginTop: 12, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8 }}>
        <span style={{
          fontSize: 9, fontWeight: 700, padding: '2px 8px', borderRadius: 999,
          background: RARITY_BG[cat.rarity], color: RARITY_COLORS[cat.rarity],
          letterSpacing: '0.05em',
        }}>{cat.rarity}</span>
        <span style={{ fontSize: 20, fontWeight: 800, color: T.ink, letterSpacing: '-0.5px' }}>{cat.name}</span>
        <span style={{ fontSize: 11, color: T.sub }}>{cat.breed}</span>
      </div>
      <div style={{ fontSize: 12, color: T.sub, marginTop: 4, lineHeight: 1.5 }}>{cat.desc}</div>

      {/* 打卡按钮 */}
      {!checkedIn ? (
        <button onClick={onCheckIn} style={{
          margin: '16px auto 0',
          width: '100%', maxWidth: 280, height: 52,
          borderRadius: 16,
          background: `linear-gradient(135deg, ${T.purple}, ${T.purpleDark})`,
          border: 'none', cursor: 'pointer',
          display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
          fontSize: 16, fontWeight: 700, color: '#fff',
          boxShadow: `0 8px 24px ${T.purple}40`,
          transition: 'all 0.2s',
          position: 'relative', overflow: 'hidden',
        }}>
          <span style={{ fontSize: 20 }}>🐾</span>
          今日打卡

        <div style={{
          marginTop: 16,
          width: '100%', maxWidth: 280, height: 52, margin: '16px auto 0',
          borderRadius: 16,
          background: 'rgba(0,184,148,0.15)',
          border: '1px solid rgba(0,184,148,0.3)',
          display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
          fontSize: 16, fontWeight: 700, color: T.green,
        }}>
          <span style={{ fontSize: 18, animation: 'checkPop 0.5s ease-out' }}>✅</span>
          今日已打卡
        </div>
      )}
    </div>
  );
}

              </div>
            ))}
          </div>
        ) : (
          <div style={{
            ...s.card, textAlign: 'center', padding: '24px 0',
            fontSize: 12, color: T.muted,
          }}>去抽卡解锁更多猫咪吧 🎁</div>
        )}
      </div>

      {/* ═══ 功能入口区 ═══ */}
      <div style={{ padding: '16px 20px 0' }}>
        <div style={{ fontSize: 13, fontWeight: 700, color: T.ink, marginBottom: 8 }}>
          📱 功能
        </div>
        <div style={{
          ...s.card, display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 8,
        }}>
          {FUNC_GRID.map((f, i) => (
            <div key={i} style={{
              display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4,
              padding: '10px 4px', borderRadius: 12, cursor: 'pointer',
              transition: 'background 0.15s',
            }}
            onMouseEnter={e => e.currentTarget.style.background = 'rgba(255,255,255,0.04)'}
            onMouseLeave={e => e.currentTarget.style.background = 'transparent'}
            >
              <span style={{ fontSize: 22 }}>{f.icon}</span>
              <span style={{ fontSize: 11, fontWeight: 600, color: T.ink }}>{f.label}</span>
              <span style={{ fontSize: 9, color: T.muted }}>{f.desc}</span>
            </div>
          ))}
        </div>
      </div>

      {/* ═══ 成就徽章栏 ═══ */}
      <div style={{ padding: '16px 0 0' }}>
        <div style={{ padding: '0 20px', fontSize: 13, fontWeight: 700, color: T.ink, marginBottom: 8 }}>
          🏅 成就徽章
        </div>
        <div style={{
          display: 'flex', gap: 10, overflowX: 'auto', padding: '0 20px',
          scrollbarWidth: 'none', msOverflowStyle: 'none',
        }}>
          <style>{`div::-webkit-scrollbar{display:none}`}</style>
          {ACHIEVEMENTS.map((a, i) => (
            <div key={i} style={{
              flexShrink: 0, width: 64, textAlign: 'center',
              padding: '10px 4px', borderRadius: 14,
              background: a.done ? 'rgba(108,92,231,0.12)' : 'rgba(255,255,255,0.03)',
              border: `1px solid ${a.done ? 'rgba(108,92,231,0.25)' : 'rgba(255,255,255,0.05)'}`,
              opacity: a.done ? 1 : 0.4,
            }}>
              <div style={{ fontSize: 24, marginBottom: 4, filter: a.done ? 'none' : 'grayscale(1)' }}>{a.icon}</div>
              <div style={{ fontSize: 9, fontWeight: 600, color: a.done ? T.ink : T.muted }}>{a.name}</div>
            </div>
          ))}
        </div>
      </div>

      {/* ═══ 底部模块 ═══ */}
      <div style={{ padding: '16px 20px 0' }}>
        <div style={{ ...s.card, display: 'flex', flexDirection: 'column', gap: 0 }}>
          {[
            { icon: '🎨', label: '皮肤/外观', sub: '头像框·称号·气泡', arrow: true },
            { icon: '📜', label: '战绩记录', sub: '最近抽卡高光', arrow: true },
            { icon: '👍', label: '好友互动', sub: '获得 23 个赞', arrow: true },
            { icon: '💎', label: '月卡/通行证', sub: '未开通', arrow: true, accent: T.orange },
          ].map((item, i, arr) => (
            <div key={i} style={{
              display: 'flex', alignItems: 'center', gap: 10, padding: '11px 0',
              borderBottom: i < arr.length - 1 ? '1px solid rgba(255,255,255,0.04)' : 'none',
              cursor: 'pointer',
            }}>
              <span style={{ fontSize: 18, width: 28, textAlign: 'center' }}>{item.icon}</span>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 13, fontWeight: 600, color: T.ink }}>{item.label}</div>
                <div style={{ fontSize: 10, color: item.accent || T.muted, marginTop: 1 }}>{item.sub}</div>
              </div>
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style={{ opacity: 0.3 }}>
                <path d="M6 4l4 4-4 4" stroke={T.ink} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            </div>
          ))}
        </div>
      </div>

      {/* ═══ SSR 大图弹窗 ═══ */}
      {selectedShowcase && (
        <div style={{
          position: 'absolute', top: 0, left: 0, right: 0, bottom: 0,
          background: 'rgba(0,0,0,0.8)', backdropFilter: 'blur(16px)',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          zIndex: 60, animation: 'fadeIn 0.3s ease-out',
        }} onClick={() => setSelectedShowcase(null)}>
          <div onClick={e => e.stopPropagation()} style={{
            width: 280, textAlign: 'center', animation: 'slideUp 0.4s ease-out',
          }}>
            <div style={{
              width: 220, height: 280, borderRadius: 20, overflow: 'hidden',
              margin: '0 auto 16px',
              border: `3px solid ${RARITY_COLORS[selectedShowcase.rarity]}`,
              boxShadow: `0 0 50px ${RARITY_COLORS[selectedShowcase.rarity]}30`,
            }}>
              <img src={selectedShowcase.img} alt={selectedShowcase.name} style={{
                width: '100%', height: '100%', objectFit: 'cover',
              }} onError={e => { e.target.style.display='none'; }}/>
            </div>
            <div style={{
              fontSize: 10, fontWeight: 700, letterSpacing: 2,
              color: RARITY_COLORS[selectedShowcase.rarity], marginBottom: 4,
            }}>{selectedShowcase.rarity}</div>
            <div style={{ fontSize: 20, fontWeight: 800, color: '#fff', marginBottom: 4 }}>{selectedShowcase.name}</div>
            <div style={{ fontSize: 12, color: T.sub }}>{selectedShowcase.desc}</div>
            <button onClick={() => setSelectedShowcase(null)} style={{
              marginTop: 16, width: 120, height: 36, borderRadius: 10,
              background: 'rgba(255,255,255,0.1)', border: '1px solid rgba(255,255,255,0.15)',
              cursor: 'pointer', fontSize: 13, fontWeight: 600, color: T.ink,
            }}>关闭</button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════
   BOTTOM TAB BAR
   ═══════════════════════════════════════ */
function TabBar({ active, onChange, darkMode }) {
  const tabs = [
    { key: 'hall',  icon: '🏠', label: '大厅' },
    { key: 'gacha', icon: '🎁', label: '抽卡' },
    { key: 'me',    icon: '👤', label: '我的' },
  ];
  return (
    <div style={{
      flexShrink: 0, height: 64,
      background: darkMode ? 'rgba(15,10,30,0.95)' : 'rgba(245,243,255,0.95)',
      backdropFilter: 'blur(20px)',
      borderTop: `1px solid ${darkMode ? 'rgba(255,255,255,0.06)' : 'rgba(108,92,231,0.1)'}`,
      display: 'flex', alignItems: 'center', justifyContent: 'space-around',
      zIndex: 20, paddingBottom: 6,
    }}>
      {tabs.map(tab => {
        const isActive = tab.key === active;
        return (
          <div key={tab.key} onClick={() => onChange(tab.key)} style={{
            display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 2,
            cursor: 'pointer', padding: '4px 12px',
            borderRadius: 12,
            background: isActive ? 'rgba(108,92,231,0.12)' : 'transparent',
            transition: 'all 0.2s',
          }}>
            <span style={{ fontSize: 20, filter: isActive ? 'none' : 'grayscale(0.5) opacity(0.5)' }}>
              {tab.icon}
            </span>
            <span style={{
              fontSize: 10, fontWeight: isActive ? 700 : 400,
              color: isActive ? T.purpleLight : T.muted,
            }}>{tab.label}</span>
          </div>
        );
      })}
    </div>
  );
}

/* ═══════════════════════════════════════
   CHECK-IN MODAL
   ═══════════════════════════════════════ */
function CheckInModal({ show, onClose, streak }) {
  if (!show) return null;
  return (
    <div style={{
      position: 'absolute', top: 0, left: 0, right: 0, bottom: 0,
      background: 'rgba(0,0,0,0.7)', backdropFilter: 'blur(10px)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      zIndex: 50,
    }} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{
        width: 300, background: 'linear-gradient(180deg, #1E1440 0%, #0F0A1E 100%)',
        borderRadius: 24, padding: '32px 24px', textAlign: 'center',
        border: '1px solid rgba(108,92,231,0.3)',
        boxShadow: '0 24px 64px rgba(0,0,0,0.5)',
        animation: 'checkPop 0.4s ease-out',
      }}>
        <div style={{ fontSize: 48, marginBottom: 8, animation: 'pulse 1s ease-in-out infinite' }}>🐾</div>
        <div style={{ fontSize: 22, fontWeight: 800, color: T.ink, marginBottom: 4 }}>打卡成功！</div>
        <div style={{ fontSize: 13, color: T.sub, marginBottom: 20 }}>连续打卡 {streak + 1} 天</div>
        <div style={{
          display: 'flex', justifyContent: 'center', gap: 20, marginBottom: 20,
        }}>
          <div style={{ textAlign: 'center' }}>
            <div style={{ fontSize: 24, fontWeight: 800, color: T.orange, animation: 'coinDrop 0.5s ease-out 0.3s both' }}>+50</div>
            <div style={{ fontSize: 10, color: T.sub }}>小鱼干</div>
          </div>
          <div style={{ width: 1, background: 'rgba(255,255,255,0.08)' }}/>
          <div style={{ textAlign: 'center' }}>
            <div style={{ fontSize: 24, fontWeight: 800, color: T.yellow, animation: 'coinDrop 0.5s ease-out 0.5s both' }}>+1</div>
            <div style={{ fontSize: 10, color: T.sub }}>解锁进度</div>
          </div>
        </div>
        {/* 连续打卡日历 */}
        <div style={{ display: 'flex', justifyContent: 'center', gap: 4, marginBottom: 20 }}>
          {[1,2,3,4,5,6,7].map(d => (
            <div key={d} style={{
              width: 28, height: 28, borderRadius: 8,
              background: d <= 4 ? T.purple : 'rgba(255,255,255,0.05)',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              fontSize: 10, fontWeight: 600,
              color: d <= 4 ? '#fff' : T.muted,
              border: d === 4 ? '2px solid ' + T.purpleLight : '1px solid transparent',
            }}>{d <= 4 ? '✓' : d}</div>
          ))}
        </div>
        <button onClick={onClose} style={{
          width: '100%', height: 44, borderRadius: 12,
          background: `linear-gradient(135deg, ${T.purple}, ${T.purpleDark})`,
          border: 'none', cursor: 'pointer',
          fontSize: 15, fontWeight: 700, color: '#fff',
        }}>好的</button>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════
   CAT DETAIL MODAL
   ═══════════════════════════════════════ */
function CatDetailModal({ cat, show, onClose }) {
  if (!show || !cat) return null;
  return (
    <div style={{
      position: 'absolute', top: 0, left: 0, right: 0, bottom: 0,
      background: 'rgba(0,0,0,0.75)', backdropFilter: 'blur(10px)',
      display: 'flex', alignItems: 'flex-end', justifyContent: 'center',
      zIndex: 50,
    }} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{
        width: '100%', background: 'linear-gradient(180deg, #1E1440 0%, #0F0A1E 100%)',
        borderRadius: '24px 24px 0 0', padding: '24px 20px 32px',
        animation: 'slideUp 0.3s ease-out',
      }}>
        <div style={{ width: 36, height: 4, background: 'rgba(255,255,255,0.2)', borderRadius: 999, margin: '0 auto 16px' }}/>
        <div style={{ display: 'flex', gap: 16, alignItems: 'center' }}>
          <div style={{
            width: 80, height: 80, borderRadius: '50%', overflow: 'hidden',
            border: `2px solid ${RARITY_COLORS[cat.rarity]}40`,
            flexShrink: 0,
          }}>
            <img src={cat.img} alt={cat.name} style={{
              width: '100%', height: '100%', objectFit: 'cover',
              filter: cat.unlocked ? 'none' : 'grayscale(1) brightness(0.3)',
            }} onError={e => { e.target.style.display = 'none'; }}/>
          </div>
          <div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 4 }}>
              <span style={{
                fontSize: 9, fontWeight: 700, padding: '2px 6px', borderRadius: 999,
                background: RARITY_BG[cat.rarity], color: RARITY_COLORS[cat.rarity],
              }}>{cat.rarity}</span>
              <span style={{ fontSize: 18, fontWeight: 800, color: T.ink }}>{cat.name}</span>
            </div>
            <div style={{ fontSize: 12, color: T.sub, marginBottom: 4 }}>{cat.breed}</div>
            <div style={{ fontSize: 12, color: T.sub, lineHeight: 1.5 }}>{cat.desc}</div>
          </div>
        </div>
        {!cat.unlocked && (
          <div style={{
            marginTop: 16, padding: '12px 16px',
            background: 'rgba(253,150,68,0.1)', borderRadius: 12,
            border: '1px solid rgba(253,150,68,0.2)',
            display: 'flex', alignItems: 'center', gap: 10,
          }}>
            <span style={{ fontSize: 20 }}>🔓</span>
            <div>
              <div style={{ fontSize: 13, fontWeight: 600, color: T.orange }}>累计打卡 {cat.checkins} 天解锁</div>
              <div style={{ fontSize: 11, color: T.sub, marginTop: 2 }}>
                还需 {cat.checkins - USER.total} 天 · 当前进度 {Math.round(USER.total / cat.checkins * 100)}%
              </div>
            </div>
          </div>
        )}
        <button onClick={onClose} style={{
          marginTop: 16, width: '100%', height: 40, borderRadius: 12,
          background: 'rgba(255,255,255,0.06)', border: '1px solid rgba(255,255,255,0.1)',
          cursor: 'pointer', fontSize: 13, fontWeight: 600, color: T.ink,
        }}>关闭</button>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════
   MAIN APP
   ═══════════════════════════════════════ */
function App() {
  const [checkedIn, setCheckedIn] = useState(false);
  const [showCheckIn, setShowCheckIn] = useState(false);
  const [activeTab, setActiveTab] = useState('hall');
  const [featuredIdx, setFeaturedIdx] = useState(0);
  const [selectedCat, setSelectedCat] = useState(null);
  const [unlockedIds, setUnlockedIds] = useState([1, 2, 3, 6, 7]); // 初始已解锁的猫咪
  const [gachaResult, setGachaResult] = useState(null);
  const [showGachaResult, setShowGachaResult] = useState(false);
  const [gachaIsNew, setGachaIsNew] = useState(false);
  const [gachaDrawn, setGachaDrawn] = useState(false);
  const [gachaPlaying, setGachaPlaying] = useState(false);
  const [gachaCount, setGachaCount] = useState(0);
  const [ssrCount, setSsrCount] = useState(0);
  const [coins, setCoins] = useState(USER.coins);
  const [darkMode, setDarkMode] = useState(true);
  const ssrPityRef = useRef(0); // 保底计数器

  // 同步全局主题
  useEffect(() => {
    window.T = darkMode ? { ...C } : { ...C_LIGHT };
  }, [darkMode]);

  const toggleTheme = () => setDarkMode(prev => !prev);

  const handleCheckIn = () => {
    setCheckedIn(true);
    setShowCheckIn(true);
  };

  // 抽卡：加权概率 + 80抽保底
  const handleDraw = () => {
    ssrPityRef.current += 1;
    const roll = Math.random() * 100;
    let rarity;
    if (ssrPityRef.current >= 80) {
      rarity = 'SSR';
      ssrPityRef.current = 0;
    } else if (roll < 2) {
      rarity = 'SSR';
      ssrPityRef.current = 0;
    } else if (roll < 7) {
      rarity = 'SR';
    } else if (roll < 25) {
      rarity = 'R';
    } else {
      rarity = 'N';
    }
    const pool = CATS.filter(c => c.rarity === rarity);
    const drawn = pool[Math.floor(Math.random() * pool.length)];
    const isNew = !unlockedIds.includes(drawn.id);
    if (isNew) {
      setUnlockedIds(prev => [...prev, drawn.id]);
    }
    setGachaResult(drawn);
    setGachaIsNew(isNew);
    setShowGachaResult(true);
    setGachaCount(prev => prev + 1);
    if (drawn.rarity === 'SSR') setSsrCount(prev => prev + 1);
    if (!gachaDrawn) {
      setGachaDrawn(true);
      setCoins(prev => prev + 20);
    }
  };

  // 抽卡动画：先播放4秒视频，再弹出结果
  const handleDrawStart = () => {
    if (gachaPlaying) return;
    setGachaPlaying(true);
    setTimeout(() => {
      handleDraw();
      setGachaPlaying(false);
    }, 4000);
  };

  // 自动轮播当前展示猫咪
  const unlockedCats = CATS.filter(c => unlockedIds.includes(c.id));
  const featuredCat = unlockedCats[featuredIdx % unlockedCats.length];

  useEffect(() => {
    if (checkedIn) return;
    const timer = setInterval(() => {
      setFeaturedIdx(i => (i + 1) % Math.max(unlockedCats.length, 1));
    }, 5000);
    return () => clearInterval(timer);
  }, [checkedIn, unlockedCats.length]);

  return (
    <div style={{
      minHeight: '100vh', background: darkMode ? '#0E0E16' : '#EDE8FF',
      display: 'flex', flexDirection: 'column', alignItems: 'center',
      justifyContent: 'center', padding: 48, gap: 32,
    }}>
      {/* Page Title */}
      <div style={{ textAlign: 'center' }}>
        <h1 style={{ fontSize: 24, fontWeight: 700, color: darkMode ? '#F0F0EC' : '#2D1B69', letterSpacing: '-0.5px', marginBottom: 4 }}>
          喵了个咪 · {activeTab === 'gacha' ? '猫咪抽卡' : activeTab === 'me' ? '我的' : '主页大厅'}
        </h1>
        <p style={{ fontSize: 13, color: darkMode ? 'rgba(255,255,255,0.35)' : 'rgba(45,27,105,0.4)' }}>
          {activeTab === 'gacha' ? '收集猫咪 · 解锁图鉴' : activeTab === 'me' ? '个人中心 · 数据一览' : '通勤打卡 · 猫咪养成 · 每日任务'}
        </p>
      </div>

      <IosFrame>
        <div style={{
          height: '100%', display: 'flex', flexDirection: 'column',
          background: `linear-gradient(180deg, ${T.bg} 0%, ${darkMode ? '#1A1235' : '#E0D8FF'} 50%, ${T.bg} 100%)`,
        }}>
          {/* 可滚动内容区 */}
          <div style={{ flex: 1, overflowY: 'auto', overflowX: 'hidden', paddingBottom: 70, scrollbarWidth: 'none' }}>
            <style>{`div::-webkit-scrollbar{display:none}`}</style>
            {activeTab === 'hall' && (
              <>
                <TopHeader darkMode={darkMode} onToggleTheme={toggleTheme} />
                <FeaturedCat cat={featuredCat} checkedIn={checkedIn} onCheckIn={handleCheckIn} />
                {/* 开始游戏按钮 */}
                <div style={{ padding: '14px 20px 0' }}>
                  <a href="猫咪消消乐.html" style={{
                    display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 10,
                    width: '100%', height: 56, borderRadius: 18,
                    background: 'linear-gradient(135deg, #FD9644, #FF6B6B, #FD79A8)',
                    border: 'none', cursor: 'pointer',
                    fontSize: 18, fontWeight: 800, color: '#fff',
                    textDecoration: 'none',
                    boxShadow: '0 8px 32px rgba(253,150,68,0.35), 0 0 60px rgba(255,107,107,0.15)',
                    animation: 'pulse 2s ease-in-out infinite',
                    letterSpacing: '1px',
                  }}>
                    <span style={{ fontSize: 24 }}>🎮</span>
                    开始游戏
                    <span style={{ fontSize: 11, fontWeight: 500, opacity: 0.8, marginLeft: 4 }}>猫咪消消乐</span>
                  </a>
                </div>
                <StatsBar unlockedCount={unlockedIds.length} coins={coins} />
                <DailyMissions checkedIn={checkedIn} gachaDone={gachaDrawn} />
              </>
            )}
            {activeTab === 'gacha' && (
              <GachaPage cats={CATS} unlockedIds={unlockedIds} onDrawStart={handleDrawStart} playing={gachaPlaying} />
            )}
            {activeTab === 'me' && (
              <ProfilePage
                unlockedIds={unlockedIds}
                coins={coins}
                gachaCount={gachaCount}
                ssrCount={ssrCount}
                checkedIn={checkedIn}
                gachaDrawn={gachaDrawn}
              />
            )}
          </div>
          {/* 弹窗层 */}
          <CheckInModal show={showCheckIn} onClose={() => setShowCheckIn(false)} streak={USER.streak} />
          <CatDetailModal cat={selectedCat} show={!!selectedCat} onClose={() => setSelectedCat(null)} />
          <GachaResultModal cat={gachaResult} show={showGachaResult} onClose={() => setShowGachaResult(false)} isNew={gachaIsNew} />
          {/* 固定底部Tab */}
          <TabBar active={activeTab} onChange={setActiveTab} darkMode={darkMode} />
        </div>
      </IosFrame>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
