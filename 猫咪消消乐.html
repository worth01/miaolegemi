/* ═══════════════════════════════════════
   MAIN GAME COMPONENT
   ═══════════════════════════════════════ */
function Game() {
  const [currentLevel, setCurrentLevel] = useState(1);
  const levelConfig = getLevelConfig(currentLevel) || {};
  const [tiles, setTiles] = useState(() => generateBoard(1));
  const [slot, setSlot] = useState([]);
  const [tempStorage, setTempStorage] = useState([]);
  const [frozenSlot, setFrozenSlot] = useState(null); // 冰冻牌占据收集槽前N格（N=freeze_grid_count）
  const [groomSlots, setGroomSlots] = useState([]); // 舔毛牌：进入收集槽后永久占位，无法消除
  const [groomToast, setGroomToast] = useState(false); // 舔毛牌首次进入收集槽提示
  const [freezeToast, setFreezeToast] = useState(''); // 冰冻牌提示文案（空=不显示）
  const [stickyToast, setStickyToast] = useState(''); // 粘连牌提示文案（空=不显示）
  const [matching, setMatching] = useState([]);
  const [gameState, setGameState] = useState(GAME_PLAYING);
  const [moveCount, setMoveCount] = useState(0);
  const [moveHistory, setMoveHistory] = useState([]);
  // 冰冻牌首次出现提示（1.5秒）：冰冻牌生成且胆小减免未生效时触发
  useEffect(() => {
    if (frozenSlot && !freezeBlockOverride) {
      const gridCount = levelConfig.freeze_grid_count || 1;
      const gridText = gridCount > 1 ? `前${gridCount}格` : '第一格';
      const startText = gridCount > 1 ? `第${gridCount + 1}格` : '第二格';
      setFreezeToast(`❄️ 冰冻牌已冻结收集槽${gridText}，卡牌只能从${startText}开始放入！`);
      const t = setTimeout(() => setFreezeToast(''), 1500);
      return () => clearTimeout(t);
    }
  }, [frozenSlot]);
  // 异常处理：冰冻牌冻结后，如果收集槽有效容量为0，直接判定失败
  useEffect(() => {
    if (frozenSlot && !freezeBlockOverride && gameState === GAME_PLAYING) {
      const frozenOffset = levelConfig.freeze_grid_count || 1;
      const groomOffset = groomSlots.length;
      const effectiveCapacity = SLOT_CAPACITY + slotBonus - frozenOffset - groomOffset;
      if (effectiveCapacity <= 0) {
        // 收集槽已被冰冻牌完全冻结，无法继续游戏
        setFreezeToast('❄️ 收集槽已被冰冻牌完全冻结，无法继续游戏！');
        setTimeout(() => {
          setFreezeToast('');
          setTiles(prev => prev.map(t => t.inSlot ? { ...t, inSlot: false } : t));
          setSlot([]);
          setGroomSlots([]);
          setTempStorage([]);
          setGameState(GAME_LOSE);
        }, 2000);
      }
    }
  }, [frozenSlot, freezeBlockOverride, gameState]);
  // P5: 旧道具状态已移除，由 usedSkills 取代
  // P1: fish & combo tracking
  // P7: 鱼干系统重做 - 使用三消次数追踪（每6次三消=1基础鱼干）
  const [comboCount, setComboCount] = useState(0);  // P7: 三消次数
  const [maxCombo, setMaxCombo] = useState(0);
  const [score, setScore] = useState(0);
  const lastMatchTimeRef = useRef(0);
  const [phase, setPhase] = useState('playing'); // levelSelect → prep → playing
  // 同步加载猫咪数据（确保 BattlePrep 显示前数据已就绪）
  const loadCatsFromStorage = () => {
    try {
      const saved = localStorage.getItem('miaolegemi_p0_v1');
      if (saved) {
        const data = JSON.parse(saved);
        // 出战席1-3号位：主动技能
        const battleCats = (data.cats || []).filter(c => c.battleSlot != null && c.battleSlot >= 1 && c.battleSlot <= 3).sort((a, b) => a.battleSlot - b.battleSlot);
        // 观战区4-6号位：被动技能
        const spectatorCats = (data.cats || []).filter(c => c.battleSpectator != null && c.battleSpectator >= 4 && c.battleSpectator <= 6).sort((a, b) => a.battleSpectator - b.battleSpectator);
        // 只显示备战区实际配置的猫咪
        return [...battleCats, ...spectatorCats].filter(Boolean);
      }
    } catch(e) {}
    return [];
  };

  const initialCats = loadCatsFromStorage();
  const [battleCats, setBattleCats] = useState(initialCats); // 同步加载猫咪数据
  // 冰冻牌减免：胆小性格高好感度下，冰冻牌冻结效果失效（组件级计算，影响UI渲染和游戏逻辑）
  const freezeBlockOverride = frozenSlot && battleCats.some(c => {
    const pers = c?.personality || getDefaultPersonality(c?.breedId || '');
    if (pers !== '胆小') return false;
    const intimacy = c?.intimacy || 0;
    return getIntimacyLevel(intimacy) >= 4;
  });
  // 冰冻牌冻结格数：从关卡配置读取 freeze_grid_count，默认1
  const freezeGridCount = (frozenSlot && !freezeBlockOverride) ? (levelConfig.freeze_grid_count || 1) : 0;
  const [battlePrepVisible, setBattlePrepVisible] = useState(initialCats.length === 0 ? false : true); // 备战弹窗显示状态
  const nourishingCats = useRef(initialCats); // 保持 ref 同步
  const fixedBattleCats = useRef(initialCats.length > 0 ? initialCats : null); // 标记已加载
  const shownBattlePrep = useRef(initialCats.length === 0); // 是否有猫咪（有猫咪才显示备战弹窗）
  const uidRef = useRef(0);
  const slotRef = useRef([]);
  const tempStorageRef = useRef([]);
  const tilesRef = useRef(tiles);
  const matchTimeoutRef = useRef(null);
  const boardContainerRef = useRef(null);
  const boardCanvasRef = useRef(null);
  const [hoveredTileId, setHoveredTileId] = useState(null);
  const [boardScale, setBoardScale] = useState(1);

  // P2: Timer system
  const isTimed = levelConfig.timedMode || false;
  const [timeLeft, setTimeLeft] = useState(isTimed ? (levelConfig.timeLimit || 120) : 0);
  const [timerPaused, setTimerPaused] = useState(false);
  const [timerDelay, setTimerDelay] = useState(0);
  const timerPauseRef = useRef(null); // timeout for auto-resume
  const timerDelayRef = useRef(0); // seconds to delay before counting starts
  const timeLeftRef = useRef(isTimed ? (levelConfig.timeLimit || 120) : 0);

  // P2: Skill system
  const [skillSlots, setSkillSlots] = useState([]); // [active1, active2, active3, passive1, passive2, passive3]
  const [usedSkills, setUsedSkills] = useState({ active0: false, active1: false, active2: false });
  const [confirmSkill, setConfirmSkill] = useState(null); // { index, breed, skill }
  const [fishMultiplier, setFishMultiplier] = useState(1);
  const [extraRestarts, setExtraRestarts] = useState(0);
  const [slotBonus, setSlotBonus] = useState(0);
  const [highlightedTiles, setHighlightedTiles] = useState([]); // tile ids highlighted by skills
  const highlightedTilesRef = useRef([]);
  useEffect(() => { highlightedTilesRef.current = highlightedTiles; }, [highlightedTiles]);

  // 关卡选择回调
  const handleLevelSelect = (level) => {
    setCurrentLevel(level);
    setPhase('prep');
    setTiles(generateBoard(level));
    setGroomSlots([]);
    // 冰冻牌：根据触发规则判断是否生成（名称匹配+配置开关优先）
    const selectedConfig = getLevelConfig(level);
    if (shouldTriggerFreeze(selectedConfig)) {
      const frozenCard = {
        uid: 'frozen_' + (uidRef.current++),
        type: '__interference_freeze__',
        tileId: null,
        frozen: true,
      };
      setFrozenSlot(frozenCard);
    } else {
      setFrozenSlot(null);
    }
  };

  // Load home cats and skill slots from localStorage (P3: updated to home from nurturing)
  // P4: 固定阵容机制 - 只在第一次进入游戏时设置，后续关卡保持不变
  useEffect(() => {
    // 如果已经有固定阵容，直接使用
    if (fixedBattleCats.current !== null) {
      nourishingCats.current = fixedBattleCats.current;
      const slots = [];
      for (let i = 0; i < 6; i++) {
        slots.push(nourishingCats.current[i] ? nourishingCats.current[i].breedId : null);
      }
      setSkillSlots(slots);
      return;
    }
    try {
      const saved = localStorage.getItem('miaolegemi_p0_v1');
      if (saved) {
        const data = JSON.parse(saved);
        // 出战席1-3号位：主动技能
        const battleCats = (data.cats || []).filter(c => c.battleSlot != null && c.battleSlot >= 1 && c.battleSlot <= 3).sort((a, b) => a.battleSlot - b.battleSlot);
        // 观战区4-6号位：被动技能
        const spectatorCats = (data.cats || []).filter(c => c.battleSpectator != null && c.battleSpectator >= 4 && c.battleSpectator <= 6).sort((a, b) => a.battleSpectator - b.battleSpectator);
        // 只显示备战区实际配置的猫咪，不填补
        const cats = [...battleCats, ...spectatorCats].filter(Boolean);
        // 保存固定阵容
        fixedBattleCats.current = cats;
        nourishingCats.current = cats;
        // 构建技能槽位
        const slots = [];
        for (let i = 0; i < 6; i++) {
          slots.push(nourishingCats.current[i] ? nourishingCats.current[i].breedId : null);
        }
        setSkillSlots(slots);
      }
    } catch(e) {}
  }, []);

  useEffect(() => { slotRef.current = slot; }, [slot]);
  useEffect(() => { tempStorageRef.current = tempStorage; }, [tempStorage]);
  useEffect(() => { tilesRef.current = tiles; }, [tiles]);
  useEffect(() => { timeLeftRef.current = timeLeft; }, [timeLeft]);

  // P2: Timer countdown (only in timed mode, respects timerDelay passive)
  useEffect(() => {
    if (!isTimed || phase !== 'playing' || gameState !== GAME_PLAYING) return;
    const interval = setInterval(() => {
      if (timerPauseRef.current) return; // frozen by skill
      // Delay phase: timerDelayRef counts down before real timer starts
      if (timerDelayRef.current > 0) {
        timerDelayRef.current -= 1;
        setTimerDelay(timerDelayRef.current);
        return;
      }
      if (timeLeftRef.current <= 0) {
        clearInterval(interval);
        // 超时 → 按当前分数结算（不是直接失败）
        setGameState(LEVELS[currentLevel + 1] ? GAME_LEVEL_COMPLETE : GAME_WIN);
        return;
      }
      setTimeLeft(t => Math.max(0, t - 1));
    }, 1000);
    return () => clearInterval(interval);
  }, [phase, gameState, isTimed]);

  // P3: Apply passive skills on game start (v3.1 updated)
  // P7: 更新为新的鱼干计算系统
  useEffect(() => {
    if (phase !== 'playing') return;
    let delay = 0;
    let fMult = 1;
    let restarts = 0;
    let tempSlotB = 0;
    let luck = 0;
    const slots = skillSlots;

    // P7: 新增性格加成计算
    let totalPersonalityBonus = 0;      // 性格加成总和
    let hasCleverCat = false;           // 是否有狡黠性格猫咪
    let cleverCatLevel = 1;            // 狡黠猫亲密度等级

    // Passive slots 3-5 (position 4 + home 5-6) apply global effects
    for (let i = 3; i < 6; i++) {
      const breed = slots[i];
      if (!breed) continue;
      const eff = PASSIVE_EFFECTS[breed];
      if (!eff) continue;
      
      // P7: 获取猫咪性格和亲密度
      const cat = battleCats[i];
      const personality = cat?.personality || getDefaultPersonality(breed);
      const intimacy = cat?.intimacy || 0;
      const intimacyLevel = getIntimacyLevel(intimacy);
      
      switch (eff.type) {
        case 'timerDelay': delay = Math.max(delay, eff.value); break;
        case 'fishBonus': fMult += eff.value; break; // 猫咪自带鱼干被动
        case 'extraRestart': restarts += eff.value; break;
        case 'tempSlot': tempSlotB = Math.max(tempSlotB, eff.value); break;
        case 'autoRemove': {
          setTimeout(() => {
            setTiles(prev => {
              // 优先移除棋盘上的干扰卡（含舔毛牌）
              const interferenceOnBoard = prev.filter(t => !t.removed && !t.inSlot && t.isInterference);
              if (interferenceOnBoard.length > 0) {
                const topInterference = interferenceOnBoard.reduce((a, b) => b.layer > a.layer ? b : a);
                return prev.map(t => t.id === topInterference.id ? { ...t, removed: true } : t);
              }
              // 无干扰卡时移除最顶层卡牌
              const candidates = prev.filter(t => !t.removed && !t.inSlot);
              if (candidates.length === 0) return prev;
              const maxLayer = Math.max(...candidates.map(t => t.layer));
              const topTile = candidates.find(t => t.layer === maxLayer);
              if (!topTile) return prev;
              return prev.map(t => t.id === topTile.id ? { ...t, removed: true } : t);
            });
          }, 300);
          break;
        }
        case 'autoHint': break;
        case 'edgeVision': break;
        case 'luck': luck += eff.value; break;
      }
      
      // P7: 计算性格加成
      const personalityBonus = calculatePersonalityBonus(personality, intimacyLevel);
      totalPersonalityBonus += personalityBonus;
      
      // P7: 检测狡黠性格
      if (personality === '狡黠') {
        hasCleverCat = true;
        if (intimacyLevel > cleverCatLevel) {
          cleverCatLevel = intimacyLevel;
        }
      }
    }
    
    // P7: 计算总加成比例 = 猫咪自带鱼干被动 + 性格加成
    const totalBonusRatio = (fMult - 1) + totalPersonalityBonus; // fMult包含基础1
    const fishCalc = calculateFishReward(0, totalBonusRatio, hasCleverCat, cleverCatLevel);
    
    timerDelayRef.current = delay;
    setFishMultiplier(1 + totalBonusRatio); // 保持向后兼容
    setExtraRestarts(restarts);
    setSlotBonus(tempSlotB);

    // P3: 白猫醒目 - 开局自动消除1组
    if (slots.slice(3, 6).some(b => b && PASSIVE_EFFECTS[b]?.type === 'autoHint')) {
      setTimeout(() => {
        setTiles(prev => {
          const avail = prev.filter(t => !t.removed && !isTileBlocked(t, prev));
          const typeCounts = {};
          avail.forEach(t => { typeCounts[t.type] = (typeCounts[t.type] || 0) + 1; });
          const pairType = Object.keys(typeCounts).find(k => typeCounts[k] >= 3);
          if (pairType) {
            const toRemove = avail.filter(t => t.type === pairType).slice(0, 3);
            toRemove.forEach(t => {
              const cat = CAT_TYPES.find(c => c.id === t.type);
              if (cat) emitExplosion(tileX(t) + TILE_W/2, tileY(t) + TILE_H/2, cat.color);
            });
            return prev.map(t => toRemove.some(r => r.id === t.id) ? { ...t, removed: true } : t);
          }
          return prev;
        });
      }, 500);
    }
  }, [phase]);

  const { boardW, boardH } = getBoardBounds(levelConfig.layers);
  // 增加空间容纳Layer偏移（BASE_OFFSET=15 + 最大层偏移10 = 25px），确保棋盘内所有卡牌完整显示
  const LAYER_OFFSET_SPACE = 30;
  const boardWidth = boardW + LAYER_OFFSET_SPACE;
  const boardHeight = boardH + LAYER_OFFSET_SPACE;
  const totalTiles = tiles.length;

  // Dynamic board scaling - 限制scale不超过1，确保棋盘始终完整显示在容器内
  useEffect(() => {
    const el = boardContainerRef.current;
    if (!el) return;
    const ro = new ResizeObserver(() => {
      const s = Math.min(
        1, // 限制最大scale=1，不放大棋盘
        el.clientWidth / boardWidth,
        el.clientHeight / boardHeight
      );
      setBoardScale(s);
    });
    ro.observe(el);
    return () => ro.disconnect();
  }, [boardWidth, boardHeight]);

  // Board canvas rAF loop (tiles + particles)
  useEffect(() => {
    const canvas = boardCanvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    canvas.width = boardWidth * dpr;
    canvas.height = boardHeight * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    let rafId;
    let last = performance.now();
    function loop(now) {
      const dt = Math.min((now - last) / 1000, 0.05);
      last = now;
      drawTiles(ctx, tilesRef.current, highlightedTilesRef.current || [], hoveredTileId, boardWidth, boardHeight);
      runParticleFrame(ctx, dt);
      rafId = requestAnimationFrame(loop);
    }
    rafId = requestAnimationFrame(loop);
    return () => cancelAnimationFrame(rafId);
  }, [boardWidth, boardHeight]);

  // Canvas 点击 → 命中检测 → handleTileClick
  const onBoardClick = useCallback((e) => {
    const canvas = boardCanvasRef.current;
    if (!canvas) return;
    const rect = canvas.getBoundingClientRect();
    const px = (e.clientX - rect.left) * (boardWidth / rect.width);
    const py = (e.clientY - rect.top) * (boardHeight / rect.height);
    const tile = hitTestTile(tilesRef.current, px, py);
    if (tile) handleTileClick(tile);
  }, [boardWidth, boardHeight]);

  const onBoardHover = useCallback((e) => {
    const canvas = boardCanvasRef.current;
    if (!canvas) return;
    const rect = canvas.getBoundingClientRect();
    const px = (e.clientX - rect.left) * (boardWidth / rect.width);
    const py = (e.clientY - rect.top) * (boardHeight / rect.height);
    const tile = hitTestTile(tilesRef.current, px, py);
    setHoveredTileId(tile ? tile.id : null);
  }, [boardWidth, boardHeight]);

  const handleTileClick = useCallback((tile) => {
    if (gameState !== GAME_PLAYING) return;
    if (tile.removed || tile.inSlot) return;
    if (isTileBlocked(tile, tilesRef.current)) return;

    // 舔毛牌：判断是否为舔毛牌
    const isGroomCard = tile.isInterference && tile.interferenceType === 'groom';
    // 粘连牌：判断是否为粘连牌
    const isStickyCard = tile.isInterference && tile.interferenceType === 'sticky';
    // 胆小性格减免：检查是否有高好感度胆小猫（适用于所有干扰牌：舔毛、冰冻、粘连等）
    const hasCowardlyCat = battleCats.some(c => {
      const pers = c?.personality || getDefaultPersonality(c?.breedId || '');
      if (pers !== '胆小') return false;
      const intimacy = c?.intimacy || 0;
      const level = getIntimacyLevel(intimacy);
      return level >= 4; // 亲密(4)及以上，干扰牌负面效果减免
    });
    const groomBlockOverride = isGroomCard && hasCowardlyCat;
    const stickyBlockOverride = isStickyCard && hasCowardlyCat; // 胆小减免：粘连牌仅自身入槽
    // freezeBlockOverride 使用组件级计算（影响CollectionSlot渲染和容量计算）

    // 粘连牌：寻找上下左右相邻的可点击卡牌（优先级：上→下→左→右）
    let stickyAdjacentTile = null;
    if (isStickyCard && !stickyBlockOverride) {
      const directions = [
        { dr: -1, dc: 0 },  // 上
        { dr: 1, dc: 0 },   // 下
        { dr: 0, dc: -1 },  // 左
        { dr: 0, dc: 1 },   // 右
      ];
      const allTiles = tilesRef.current;
      for (const { dr, dc } of directions) {
        const adjacent = allTiles.find(t =>
          !t.removed && !t.inSlot && t.row === tile.row + dr && t.col === tile.col + dc && t.layer === tile.layer && !isTileBlocked(t, allTiles)
        );
        if (adjacent) {
          stickyAdjacentTile = adjacent;
          break;
        }
      }
    }

    // 冰冻牌占据前N格（胆小减免生效时不扣减） + 舔毛牌占据槽位
    const frozenOffset = (frozenSlot && !freezeBlockOverride) ? (levelConfig.freeze_grid_count || 1) : 0;
    const groomOffset = groomSlots.length; // 舔毛牌每张占据1个槽位
    const effectiveCapacity = SLOT_CAPACITY + slotBonus - frozenOffset - groomOffset;
    
    // 粘连牌容量校验：需同时放入粘连牌+被连带的卡牌，剩余容量不足则直接失败
    const stickyBatchSize = stickyAdjacentTile ? 2 : 1; // 连带1张=2，无连带=1
    if (isStickyCard && !stickyBlockOverride) {
      if (slotRef.current.length + stickyBatchSize > effectiveCapacity) {
        // 容量不足，触发失败
        setStickyToast('🩹 收集槽容量不足，无法放入卡牌！');
        setTimeout(() => {
          setTiles(prev => prev.map(t => t.inSlot ? { ...t, inSlot: false } : t));
          setSlot([]);
          setGroomSlots([]);
          setTempStorage([]);
          setGameState(GAME_LOSE);
        }, 800);
        return;
      }
    } else {
      if (slotRef.current.length >= effectiveCapacity) return;
    }

    // Cancel any pending match cleanup from a previous match
    if (matchTimeoutRef.current) {
      clearTimeout(matchTimeoutRef.current);
      matchTimeoutRef.current = null;
    }

    const uid = ++uidRef.current;
    const slotItem = { uid, type: tile.type, tileId: tile.id, isGroom: isGroomCard && !groomBlockOverride };

    // 粘连牌首次点击提示
    if (isStickyCard && !stickyBlockOverride && !stickyAdjacentTile && groomSlots.length === 0 && !window._stickyToastShown) {
      // 粘连牌无相邻牌，仅自身入槽，不显示连带提示
    }
    if (isStickyCard && !stickyBlockOverride && stickyAdjacentTile) {
      setStickyToast('🩹 粘连牌已连带1张卡牌进入收集槽，额外消耗1个槽位！');
      window._stickyToastShown = true;
      setTimeout(() => { setStickyToast(''); window._stickyToastShown = false; }, 1000);
    }

    // 舔毛牌首次进入收集槽提示
    if (isGroomCard && !groomBlockOverride && groomSlots.length === 0) {
      setGroomToast(true);
      setTimeout(() => setGroomToast(false), 1000);
    }

    // 舔毛牌进入收集槽后，标记为永久占位
    if (isGroomCard && !groomBlockOverride) {
      setGroomSlots(prev => [...prev, { uid, type: tile.type, tileId: tile.id }]);
    }

    // Mark tile as in-slot (not yet matched — stays on board dimmed)
    // 粘连牌：同时标记被连带的相邻卡牌
    if (isStickyCard && stickyAdjacentTile && !stickyBlockOverride) {
      const uid2 = ++uidRef.current;
      const adjacentSlotItem = { uid: uid2, type: stickyAdjacentTile.type, tileId: stickyAdjacentTile.id, isGroom: false };
      setTiles(prev => prev.map(t =>
        (t.id === tile.id || t.id === stickyAdjacentTile.id) ? { ...t, inSlot: true } : t
      ));
      setMoveCount(m => m + 2); // 粘连牌+被连带牌各算1步
      setMoveHistory(h => [...h,
        { uid, type: tile.type, tileId: tile.id, tile: tilesRef.current.find(t => t.id === tile.id) },
        { uid: uid2, type: stickyAdjacentTile.type, tileId: stickyAdjacentTile.id, tile: tilesRef.current.find(t => t.id === stickyAdjacentTile.id) },
      ]);

      // Compute next slot with both cards for match detection
      const nextSlotWithBoth = [...slotRef.current, slotItem, adjacentSlotItem];
      const curTemp2 = tempStorageRef.current;
      const combined2 = [...curTemp2, ...nextSlotWithBoth];
      // 检查被连带的牌是否触发三消
      const stickyType = tile.type;
      const adjacentType = stickyAdjacentTile.type;
      const stickySameType = combined2.filter(s => s.type === stickyType && !s.isGroom);
      const adjacentSameType = combined2.filter(s => s.type === adjacentType && !s.isGroom);

      // 优先检查被连带的牌的三消（因为它是后入槽的）
      let matchResult = null;
      if (adjacentSameType.length >= MATCH_COUNT) {
        matchResult = { type: adjacentType, sameType: adjacentSameType, nextSlot: nextSlotWithBoth };
      } else if (stickyType !== adjacentType && stickySameType.length >= MATCH_COUNT) {
        matchResult = { type: stickyType, sameType: stickySameType, nextSlot: nextSlotWithBoth };
      }

      if (matchResult) {
        const tempMatches = curTemp2.filter(s => s.type === matchResult.type && !s.isGroom);
        const tempRemoveCount = Math.min(tempMatches.length, MATCH_COUNT);
        const slotRemoveCount = MATCH_COUNT - tempRemoveCount;
        const allMatchUids = matchResult.sameType.slice(0, MATCH_COUNT).map(s => s.uid);
        setSlot(nextSlotWithBoth);
        setMatching(allMatchUids);

        const catDef = CAT_TYPES.find(c => c.id === matchResult.type);
        const pColor = catDef ? catDef.color : '#FFD700';
        matchResult.sameType.slice(0, MATCH_COUNT).forEach(s => {
          const mt = tilesRef.current.find(t => t.id === s.tileId);
          if (!mt) return;
          emitExplosion(tileX(mt) + TILE_W/2, tileY(mt) + TILE_H/2, pColor);
        });

        setComboCount(c => c + 1);
        const now = Date.now();
        const isCombo = (now - lastMatchTimeRef.current) < 2000;
        lastMatchTimeRef.current = now;
        setScore(prev => {
          let pts = 10;
          if (isCombo) pts += 5;
          return prev + pts;
        });
        setMaxCombo(c => Math.max(c, matchResult.sameType.filter(s => s.type === matchResult.type).length));

        if (isTimed) {
          const bonus = (levelConfig.matchBonus || 5) + (isCombo ? (levelConfig.comboBonus || 3) : 0);
          setTimeLeft(t => t + bonus);
          timeLeftRef.current += bonus;
        }

        const matchType = matchResult.type;
        const matchedTileIds = matchResult.sameType.slice(0, MATCH_COUNT).map(s => s.tileId);
        matchTimeoutRef.current = setTimeout(() => {
          setTempStorage(prev => {
            let removed = 0;
            return prev.filter(s => {
              if (s.type === matchType && !s.isGroom && removed < tempRemoveCount) { removed++; return false; }
              return true;
            });
          });
          setSlot(prev => {
            let toRemove = slotRemoveCount;
            return prev.filter(s => {
              if (s.type === matchType && !s.isGroom && toRemove > 0) { toRemove--; return false; }
              return true;
            });
          });
          setMoveHistory(prev => {
            let rem = slotRemoveCount;
            return prev.filter(m => {
              if (m.type === matchType && rem > 0) { rem--; return false; }
              return true;
            });
          });
          setTiles(prev => prev.map(t =>
            matchedTileIds.includes(t.id) ? { ...t, removed: true, inSlot: false } : t
          ));
          setTiles(prev => {
            if (prev.filter(t => !t.removed).length === 0) {
              const slotEmpty = slotRef.current.length === 0 && tempStorageRef.current.length === 0;
              if (slotEmpty) setScore(s => s + 200);
              setTimeout(() => {
                if (LEVELS[currentLevel + 1]) setGameState(GAME_LEVEL_COMPLETE);
                else setGameState(GAME_WIN);
              }, 300);
            }
            return prev;
          });
          setMatching([]);
        }, 400);
      } else if (nextSlotWithBoth.length >= effectiveCapacity) {
        setSlot(nextSlotWithBoth);
        setTimeout(() => {
          const typeCounts = {};
          nextSlotWithBoth.filter(s => !s.isGroom).forEach(s => { typeCounts[s.type] = (typeCounts[s.type] || 0) + 1; });
          if (!Object.values(typeCounts).some(c => c >= MATCH_COUNT)) {
            setTiles(prev => prev.map(t => t.inSlot ? { ...t, inSlot: false } : t));
            setSlot([]);
            setGroomSlots([]);
            setTempStorage([]);
            setGameState(GAME_LOSE);
          }
        }, 300);
      } else {
        setSlot(nextSlotWithBoth);
      }
      return; // 粘连牌批量入槽已完成，退出函数
    }

    setTiles(prev => prev.map(t => t.id === tile.id ? { ...t, inSlot: true } : t));
    setMoveCount(m => m + 1);
    setMoveHistory(h => [...h, { uid, type: tile.type, tileId: tile.id, tile: tilesRef.current.find(t => t.id === tile.id) }]);

    // Compute next slot synchronously to detect matches
    const nextSlot = [...slotRef.current, slotItem];
    const curTemp = tempStorageRef.current;
    const combined = [...curTemp, ...nextSlot];
    // 舔毛牌不参与三消匹配（除非胆小减免）
    const sameType = combined.filter(s => s.type === tile.type && !s.isGroom);

    if (sameType.length >= MATCH_COUNT) {
      // Cross-slot match: prioritize removing from tempStorage first
      const tempMatches = curTemp.filter(s => s.type === tile.type && !s.isGroom);
      const tempRemoveCount = Math.min(tempMatches.length, MATCH_COUNT);
      const slotRemoveCount = MATCH_COUNT - tempRemoveCount;
      const allMatchUids = sameType.slice(0, MATCH_COUNT).map(s => s.uid);

      setSlot(nextSlot);
      setMatching(allMatchUids);

      // Particle effects at matched tile positions
      const catDef = CAT_TYPES.find(c => c.id === tile.type);
      const pColor = catDef ? catDef.color : '#FFD700';
      sameType.slice(0, MATCH_COUNT).forEach(s => {
        const mt = tilesRef.current.find(t => t.id === s.tileId);
        if (!mt) return;
        emitExplosion(tileX(mt) + TILE_W/2, tileY(mt) + TILE_H/2, pColor);
      });
      if (sameType.length > 3) {
        const mt = tilesRef.current.find(t => t.id === sameType[0].tileId);
        if (mt) {
          emitCombo(tileX(mt) + TILE_W/2, tileY(mt) + TILE_H/2, sameType.length);
        }
      }

      // P7: 追踪三消次数（鱼干在结算时根据规则计算）
      setComboCount(c => c + 1);
      const now = Date.now();
      const isCombo = (now - lastMatchTimeRef.current) < 2000;
      lastMatchTimeRef.current = now;
      setScore(prev => {
        let pts = 10; // 基础分
        if (isCombo) pts += 5; // 连消奖励
        return prev + pts;
      });
      setMaxCombo(c => {
        const currentCombo = sameType.filter(s => s.type === tile.type).length;
        return Math.max(c, currentCombo);
      });

      // 计时模式：消除奖励时间
      if (isTimed) {
        const bonus = (levelConfig.matchBonus || 5) + (isCombo ? (levelConfig.comboBonus || 3) : 0);
        setTimeLeft(t => t + bonus);
        timeLeftRef.current += bonus;
      }

      // Capture matched tile IDs for board removal
      const matchType = tile.type;
      const matchedTileIds = sameType.slice(0, MATCH_COUNT).map(s => s.tileId);
      matchTimeoutRef.current = setTimeout(() => {
        // Remove matched tiles from tempStorage（跳过舔毛牌）
        setTempStorage(prev => {
          let removed = 0;
          return prev.filter(s => {
            if (s.type === matchType && !s.isGroom && removed < tempRemoveCount) { removed++; return false; }
            return true;
          });
        });
        // Remove matched tiles from slot（跳过舔毛牌）
        setSlot(prev => {
          let toRemove = slotRemoveCount;
          return prev.filter(s => {
            if (s.type === matchType && !s.isGroom && toRemove > 0) { toRemove--; return false; }
            return true;
          });
        });
        // Clean moveHistory
        setMoveHistory(prev => {
          let rem = slotRemoveCount;
          return prev.filter(m => {
            if (m.type === matchType && rem > 0) { rem--; return false; }
            return true;
          });
        });
        // Mark matched tiles as removed from board (confirmed match)
        setTiles(prev => prev.map(t =>
          matchedTileIds.includes(t.id) ? { ...t, removed: true, inSlot: false } : t
        ));
        // Check win — all tiles either removed or still in slot will be cleared
        setTiles(prev => {
          if (prev.filter(t => !t.removed).length === 0) {
            // 完美通关加分（棋盘清空且收集槽为空）
            const slotEmpty = slotRef.current.length === 0 && tempStorageRef.current.length === 0;
            if (slotEmpty) setScore(s => s + 200);
            setTimeout(() => {
              if (LEVELS[currentLevel + 1]) {
                setGameState(GAME_LEVEL_COMPLETE);
              } else {
                setGameState(GAME_WIN);
              }
            }, 300);
          }
          return prev;
        });
        setMatching([]);
      }, 400);
    } else if (nextSlot.length >= effectiveCapacity) {
      // 收集槽已满（含舔毛牌占位），判定失败
      setSlot(nextSlot);
      setTimeout(() => {
        const typeCounts = {};
        nextSlot.filter(s => !s.isGroom).forEach(s => { typeCounts[s.type] = (typeCounts[s.type] || 0) + 1; });
        if (!Object.values(typeCounts).some(c => c >= MATCH_COUNT)) {
          // Slot full with no match — restore all in-slot tiles to board
          setTiles(prev => prev.map(t => t.inSlot ? { ...t, inSlot: false } : t));
          setSlot([]);
          setGroomSlots([]);
          setTempStorage([]);
          setGameState(GAME_LOSE);
        }
      }, 300);
    } else {
      setSlot(nextSlot);
    }
  }, [gameState, slotBonus, frozenSlot, groomSlots, battleCats]);

  // P5: 旧道具处理函数已移除，功能由 executeSkill 取代

  /* ── ACTIVE SKILLS ── */
  const handleSkillClick = (skillIndex) => {
    const key = `active${skillIndex}`;
    if (usedSkills[key]) return;
    if (gameState !== GAME_PLAYING) return;
    const breedId = skillSlots[skillIndex];
    if (!breedId) return;
    const skill = CAT_SKILLS[breedId];
    if (!skill) return;
    setConfirmSkill({ index: skillIndex, breed: breedId, skill });
  };

  const executeSkill = () => {
    if (!confirmSkill) return;
    const skillIndex = confirmSkill.index;
    const breedId = confirmSkill.breed;
    setConfirmSkill(null);
    const key = `active${skillIndex}`;
    if (usedSkills[key]) return;
    if (gameState !== GAME_PLAYING) return;

    setUsedSkills(prev => ({ ...prev, [key]: true }));

    switch (breedId) {
      case '橘猫': {
        // P3: 挑出来 - 将收集槽中最底层2张牌移动到临时存放槽中（跳过冰冻牌和舔毛牌）
        const startIdx = (frozenSlot && !freezeBlockOverride) ? (levelConfig.freeze_grid_count || 1) : 0;
        const nonGroomItems = slotRef.current.slice(startIdx).filter(s => !s.isGroom);
        const toMove = nonGroomItems.slice(0, 2);
        if (toMove.length === 0) break;
        // 从slot中移除非舔毛牌
        let movedCount = 0;
        const movedUids = new Set(toMove.map(s => s.uid));
        setSlot(prev => prev.filter(s => !movedUids.has(s.uid)));
        setTempStorage(prev => [...toMove, ...prev]);
        setMoveHistory(h => h.slice(Math.max(0, h.length - toMove.length)));
        toMove.forEach(item => {
          setTiles(prev => prev.map(t => t.id === item.tileId ? { ...t, inSlot: false } : t));
        });
        break;
      }
      case '黑猫': {
        // P3: 撤回 - 撤销上一步操作（跳过舔毛牌，舔毛牌无法撤回）
        if (slotRef.current.length === 0) break;
        if (matchTimeoutRef.current) { clearTimeout(matchTimeoutRef.current); matchTimeoutRef.current = null; }
        setMatching([]);
        // 从末尾找到最近一张非舔毛牌
        let lastNonGroom = null;
        for (let i = slotRef.current.length - 1; i >= 0; i--) {
          if (!slotRef.current[i].isGroom) {
            lastNonGroom = slotRef.current[i];
            break;
          }
        }
        if (lastNonGroom) {
          const tileExists = tilesRef.current.some(t => t.id === lastNonGroom.tileId && t.removed);
          if (tileExists) setTiles(prev => prev.map(t => t.id === lastNonGroom.tileId ? { ...t, removed: false, inSlot: false } : t));
          setSlot(prev => prev.filter(s => s.uid !== lastNonGroom.uid));
          setMoveHistory(h => h.slice(0, -1));
        }
        break;
      }
      case '白猫': {
        // P3: 重整 - 重新打乱当前所有可点击卡牌
        setTiles(prev => {
          const remaining = prev.filter(t => !t.removed && !t.inSlot && !isTileBlocked(t, prev));
          if (remaining.length === 0) return prev;
          const positions = remaining.map(t => ({ col: t.col, row: t.row, layer: t.layer }));
          const shuffledPositions = shuffleArr(positions);
          return prev.map(t => {
            if (t.removed || t.inSlot || isTileBlocked(t, prev)) return t;
            const idx = remaining.findIndex(r => r.id === t.id);
            return { ...t, ...shuffledPositions[idx] };
          });
        });
        break;
      }
      case '蓝猫': {
        // P3: 冻结 - 5秒内计时暂停
        timerPauseRef.current = true;
        setTimerPaused(true);
        setTimeout(() => { timerPauseRef.current = false; setTimerPaused(false); }, 5000);
        break;
      }
      case '布偶猫': {
        // P3: 叼走 - 将收集槽中最底层3张牌移至临时存放槽中（跳过冰冻牌和舔毛牌）
        const startIdx = (frozenSlot && !freezeBlockOverride) ? (levelConfig.freeze_grid_count || 1) : 0;
        const nonGroomItems3 = slotRef.current.slice(startIdx).filter(s => !s.isGroom);
        const toMove3 = nonGroomItems3.slice(0, 3);
        if (toMove3.length === 0) break;
        const movedUids3 = new Set(toMove3.map(s => s.uid));
        setSlot(prev => prev.filter(s => !movedUids3.has(s.uid)));
        setTempStorage(prev => [...toMove3, ...prev]);
        setMoveHistory(h => h.slice(Math.max(0, h.length - toMove3.length)));
        toMove3.forEach(item => {
          setTiles(prev => prev.map(t => t.id === item.tileId ? { ...t, inSlot: false } : t));
        });
        break;
      }
      case '三花猫': {
        // P3: 蹦跶 - 移除收集槽的冰冻牌（仅胆小减免生效时才可移除，否则无法移出）
        if (frozenSlot && freezeBlockOverride) {
          emitExplosion(100, 600, '#74B9FF');
          setFrozenSlot(null);
        }
        // 优先跳走棋盘上的干扰卡（含舔毛牌），其次随机移除2张
        const interferenceCandidates = tilesRef.current.filter(t => !t.removed && !t.inSlot && !isTileBlocked(t, tilesRef.current) && t.isInterference);
        const normalCandidates = tilesRef.current.filter(t => !t.removed && !t.inSlot && !isTileBlocked(t, tilesRef.current));
        let removed = [];
        // 优先移除干扰卡
        const shuffledInterference = shuffleArr(interferenceCandidates);
        removed.push(...shuffledInterference.slice(0, 2));
        // 不够2张时，从普通牌补充
        if (removed.length < 2) {
          const shuffledNormal = shuffleArr(normalCandidates.filter(c => !removed.some(r => r.id === c.id)));
          removed.push(...shuffledNormal.slice(0, 2 - removed.length));
        }
        removed.forEach(t => {
          const groomCard = INTERFERENCE_CARDS[t.interferenceType];
          const cat = groomCard || CAT_TYPES.find(c => c.id === t.type);
          if (cat) emitExplosion(tileX(t) + TILE_W/2, tileY(t) + TILE_H/2, cat.color || '#FD79A8');
        });
        setTiles(prev => prev.map(t => removed.some(r => r.id === t.id) ? { ...t, removed: true } : t));
        break;
      }
      case '暹罗猫': {
        // P3: 瞬移 - 将收集槽3张卡打乱放回棋盘（跳过舔毛牌，舔毛牌无法被移出）
        const nonGroomSlotItems = slotRef.current.filter(s => !s.isGroom);
        const count = Math.min(nonGroomSlotItems.length, 3);
        if (count === 0) break;
        if (matchTimeoutRef.current) { clearTimeout(matchTimeoutRef.current); matchTimeoutRef.current = null; }
        setMatching([]);
        const restoreItems = nonGroomSlotItems.slice(-count);
        const restoreUids = new Set(restoreItems.map(s => s.uid));
        setSlot(prev => prev.filter(s => !restoreUids.has(s.uid)));
        setMoveHistory(h => h.slice(Math.max(0, h.length - count)));
        const shuffledRestore = shuffleArr(restoreItems);
        shuffledRestore.forEach((item, idx) => {
          const candidates = tilesRef.current.filter(t => !t.removed && !t.inSlot && isTileBlocked(t, tilesRef.current));
          if (candidates.length > 0) {
            const target = candidates[idx % candidates.length];
            setTiles(prev => prev.map(t => t.id === item.tileId ? { ...t, removed: false, inSlot: false, layer: target.layer, col: target.col, row: target.row } : t));
          }
        });
        break;
      }
      case '幸运猫': {
        // P3: 洗牌 - 重新打乱当前棋盘所有卡牌
        setTiles(prev => {
          const remaining = prev.filter(t => !t.removed && !t.inSlot);
          const positions = remaining.map(t => ({ col: t.col, row: t.row, layer: t.layer }));
          const shuffledPositions = shuffleArr(positions);
          return prev.map(t => {
            if (t.removed || t.inSlot) return t;
            const idx = remaining.findIndex(r => r.id === t.id);
            return { ...t, ...shuffledPositions[idx] };
          });
        });
        break;
      }
      case '折耳猫': {
        // P3: 听声 - 撤销前2步，同时不计入失败次数（跳过舔毛牌，舔毛牌无法撤回）
        let removed = 0;
        let attempts = 0;
        while (removed < 2 && attempts < slotRef.current.length) {
          attempts++;
          if (matchTimeoutRef.current) { clearTimeout(matchTimeoutRef.current); matchTimeoutRef.current = null; }
          setMatching([]);
          // 从末尾找到非舔毛牌
          let lastNonGroom2 = null;
          for (let i = slotRef.current.length - 1; i >= 0; i--) {
            if (!slotRef.current[i].isGroom) {
              lastNonGroom2 = slotRef.current[i];
              break;
            }
          }
          if (!lastNonGroom2) break;
          const tileExists = tilesRef.current.some(t => t.id === lastNonGroom2.tileId && t.removed);
          if (tileExists) setTiles(prev => prev.map(t => t.id === lastNonGroom2.tileId ? { ...t, removed: false, inSlot: false } : t));
          setSlot(prev => prev.filter(s => s.uid !== lastNonGroom2.uid));
          setMoveHistory(h => h.slice(0, -1));
          removed++;
        }
        break;
      }
      case '无毛猫': {
        // P3: 灼烧 - 清除最顶层3张卡牌
        const candidates = tilesRef.current.filter(t => !t.removed && !t.inSlot);
        if (candidates.length === 0) break;
        const maxLayer = Math.max(...candidates.map(t => t.layer));
        const topTiles = candidates.filter(t => t.layer === maxLayer).slice(0, 3);
        if (topTiles.length === 0) break;
        topTiles.forEach(t => {
          const iCard = t.isInterference ? INTERFERENCE_CARDS[t.interferenceType] : null;
          const cat = iCard || CAT_TYPES.find(c => c.id === t.type);
          if (cat) emitExplosion(tileX(t) + TILE_W/2, tileY(t) + TILE_H/2, cat.color || '#FD79A8');
        });
        setTiles(prev => prev.map(t => topTiles.some(tt => tt.id === t.id) ? { ...t, removed: true } : t));
        setTimeout(() => {
          if (tilesRef.current.filter(t => !t.removed).length === 0) {
            setGameState(LEVELS[currentLevel + 1] ? GAME_LEVEL_COMPLETE : GAME_WIN);
          }
        }, 300);
        break;
      }
      case '波斯猫': {
        // P3: 吐息 - 基于临时存放槽位，移出同等数量的牌
        const tempCount = tempStorageRef.current.length;
        if (tempCount === 0) break;
        const candidates = tilesRef.current.filter(t => !t.removed && !t.inSlot);
        if (candidates.length === 0) break;
        const maxLayer = Math.max(...candidates.map(t => t.layer));
        const topTiles = candidates.filter(t => t.layer === maxLayer).slice(0, tempCount);
        if (topTiles.length === 0) break;
        topTiles.forEach(t => {
          const iCard = t.isInterference ? INTERFERENCE_CARDS[t.interferenceType] : null;
          const cat = iCard || CAT_TYPES.find(c => c.id === t.type);
          if (cat) emitExplosion(tileX(t) + TILE_W/2, tileY(t) + TILE_H/2, cat.color || '#FD79A8');
        });
        setTiles(prev => prev.map(t => topTiles.some(tt => tt.id === t.id) ? { ...t, removed: true } : t));
        setTempStorage([]);
        setTimeout(() => {
          if (tilesRef.current.filter(t => !t.removed).length === 0) {
            setGameState(LEVELS[currentLevel + 1] ? GAME_LEVEL_COMPLETE : GAME_WIN);
          }
        }, 300);
        break;
      }
      case '星空猫': {
        // P3: 永昼 - 一定几率直接跳过本关
        if (Math.random() < 0.3) { // 30%几率
          setGameState(LEVELS[currentLevel + 1] ? GAME_LEVEL_COMPLETE : GAME_WIN);
        }
        break;
      }
    }
  };

  // P1: write fish earnings to localStorage when game ends
  // P7: 更新为新的鱼干计算系统
  const gameEndedRef = useRef(false);
  useEffect(() => {
    if (gameState !== GAME_PLAYING && !gameEndedRef.current) {
      gameEndedRef.current = true;
      
      // P7: 使用新的鱼干计算公式（基于已有的fishMultiplier）
      const fishCalc = calculateFishReward(comboCount || 0, (fishMultiplier || 1) - 1, false, 1);
      const finalFish = fishCalc.totalFish;

      // Send to API if online
      if (MiaolegemiAPI && MiaolegemiAPI.isLoggedIn()) {
        MiaolegemiAPI.endGame({
          score: score || 0,
          fishEarned: finalFish,
          maxCombo: maxCombo || 0,
          activeCats: nourishingCats.current.map(c => c.id).filter(Boolean),
        }).catch(() => {});
      }

      // Also write to localStorage (backup / local mode) - P3: updated to home
      try {
        const key = 'miaolegemi_p0_v1';
        const saved = localStorage.getItem(key);
        const data = saved ? JSON.parse(saved) : {};
        let ledger = data.fishLedger || [];
        if (!Array.isArray(ledger)) ledger = [];
        ledger.push({ type: 'earn', amount: finalFish, desc: '消消乐结算', time: Date.now() });
        data.fishLedger = ledger;
        if (data.cats) {
          data.cats = data.cats.map(c => {
            // P3: 更新家园和出战席猫咪的见证记录
            if (c.location === 'home' || c.battleSlot != null) {
              return { ...c, gamesWitnessed: (c.gamesWitnessed || 0) + 1, bestCombo: Math.max(c.bestCombo || 0, maxCombo) };
            }
            return c;
          });
        }
        localStorage.setItem(key, JSON.stringify(data));
      } catch(e) {}
    }
  }, [gameState]);

  const handleRestart = () => {
    if (matchTimeoutRef.current) {
      clearTimeout(matchTimeoutRef.current);
      matchTimeoutRef.current = null;
    }
    gameEndedRef.current = false;
    setPhase('playing');
    setTiles(generateBoard(currentLevel));
    setSlot([]);
    setTempStorage([]);
    setGroomSlots([]);
    setStickyToast('');
    setMatching([]);
    setGameState(GAME_PLAYING);
    setMoveCount(0);
    setMoveHistory([]);
    setComboCount(0); // P7: 重置三消次数
    setMaxCombo(0);
    setScore(0);
    lastMatchTimeRef.current = 0;
    uidRef.current = 0;
    // P2: reset timer and skills
    const tl = levelConfig.timedMode ? (levelConfig.timeLimit || 120) : 0;
    setTimeLeft(tl);
    timeLeftRef.current = tl;
    setTimerPaused(false);
    timerPauseRef.current = false;
    timerDelayRef.current = 0;
    setTimerDelay(0);
    setUsedSkills({ active0: false, active1: false, active2: false });
    setHighlightedTiles([]);
    setSlotBonus(0);
    // 冰冻牌：根据触发规则判断是否生成
    if (shouldTriggerFreeze(levelConfig)) {
      const frozenCard = {
        uid: 'frozen_' + (uidRef.current++),
        type: '__interference_freeze__',
        tileId: null,
        frozen: true,
      };
      setFrozenSlot(frozenCard);
    } else {
      setFrozenSlot(null);
    }
    // Reload cats
    try {
      const saved = localStorage.getItem('miaolegemi_p0_v1');
      if (saved) nourishingCats.current = (JSON.parse(saved).cats || []).filter(c => c.location === 'nurturing');
    } catch(e) {}
  };

  const handleRetry = () => {
    try {
      const saved = localStorage.getItem('miaolegemi_p0_v1');
      if (saved) {
        const data = JSON.parse(saved);
        let ledger = data.fishLedger || [];
        if (!Array.isArray(ledger)) ledger = [];
        const totalFish = ledger.reduce((s, e) => s + (e.amount || 0), 0);
        if (totalFish < 10) {
          alert('鱼干不足，无法重试');
          return;
        }
        ledger.push({ type: 'spend', amount: -10, desc: '消消乐重试', time: Date.now() });
        data.fishLedger = ledger;
        localStorage.setItem('miaolegemi_p0_v1', JSON.stringify(data));
      }
    } catch(e) {}
    // 重来 = 重新生成棋盘（含粘连牌等干扰牌），清空收集槽
    if (matchTimeoutRef.current) {
      clearTimeout(matchTimeoutRef.current);
      matchTimeoutRef.current = null;
    }
    gameEndedRef.current = false;
    setTiles(generateBoard(currentLevel));
    setSlot([]);
    setTempStorage([]);
    setGroomSlots([]);
    setStickyToast('');
    setMatching([]);
    setGameState(GAME_PLAYING);
    setMoveCount(0);
    setMoveHistory([]);
    setComboCount(0); // P7: 重置三消次数
    setMaxCombo(0);
    setScore(0);
    lastMatchTimeRef.current = 0;
    uidRef.current = 0;
    const tl = levelConfig.timedMode ? (levelConfig.timeLimit || 120) : 0;
    setTimeLeft(tl);
    timeLeftRef.current = tl;
    setTimerPaused(false);
    timerPauseRef.current = false;
    setHighlightedTiles([]);
    // 冰冻牌：根据触发规则判断是否生成
    if (shouldTriggerFreeze(levelConfig)) {
      const frozenCard = {
        uid: 'frozen_' + (uidRef.current++),
        type: '__interference_freeze__',
        tileId: null,
        frozen: true,
      };
      setFrozenSlot(frozenCard);
    } else {
      setFrozenSlot(null);
    }
  };

  // P2: Extra restart from passive skills (三色守护/优雅步调)
  const handleExtraRestart = () => {
    setExtraRestarts(r => Math.max(0, r - 1));
    handleRestart();
  };

  const handleNextLevel = () => {
    const nextLv = currentLevel + 1;
    const nextConfig = getLevelConfig(nextLv);
    // P0: 关卡轮回机制 - 10关通关后循环复刻
    // 如果没有下一关，重新从第1关开始
    if (!nextConfig) {
      setCurrentLevel(1);
      setTiles(generateBoard(1));
      setSlot([]);
      setTempStorage([]);
      setGroomSlots([]);
      setStickyToast('');
      setMatching([]);
      setGameState(GAME_PLAYING);
      setMoveCount(0);
      setComboCount(0); // P7: 重置三消次数
      setMaxCombo(0);
      setScore(0);
      const tl = getLevelConfig(1)?.timedMode ? (getLevelConfig(1).timeLimit || 120) : 0;
      setTimeLeft(tl);
      timeLeftRef.current = tl;
      // 冰冻牌初始化
      if (shouldTriggerFreeze(getLevelConfig(1))) {
        const frozenCard = {
          uid: 'frozen_' + (uidRef.current++),
          type: '__interference_freeze__',
          tileId: null,
          frozen: true,
        };
        setFrozenSlot(frozenCard);
      } else {
        setFrozenSlot(null);
      }
      setTimerPaused(false);
      setUsedSkills({ active0: false, active1: false, active2: false });
      setHighlightedTiles([]);
      return;
    }
    if (matchTimeoutRef.current) {
      clearTimeout(matchTimeoutRef.current);
      matchTimeoutRef.current = null;
    }
    gameEndedRef.current = false;
    // P4: 保持 phase 不变，直接进入下一关（不再显示备战弹窗）
    setCurrentLevel(nextLv);
    setTiles(generateBoard(nextLv));
    setSlot([]);
    setTempStorage([]);
    setGroomSlots([]);
    setStickyToast('');
    setMatching([]);
    setGameState(GAME_PLAYING);
    setMoveCount(0);
    setMoveHistory([]);
    setComboCount(0); // P7: 重置三消次数
    setMaxCombo(0);
    setScore(0);
    lastMatchTimeRef.current = 0;
    uidRef.current = 0;
    // P2: reset timer and skills — use nextConfig to avoid stale state
    const tl = nextConfig.timedMode ? (nextConfig.timeLimit || 120) : 0;
    setTimeLeft(tl);
    timeLeftRef.current = tl;
    setTimerPaused(false);
    timerPauseRef.current = false;
    timerDelayRef.current = 0;
    setTimerDelay(0);
    setUsedSkills({ active0: false, active1: false, active2: false });
    setHighlightedTiles([]);
    setSlotBonus(0);
    // 冰冻牌：根据触发规则判断是否生成
    if (shouldTriggerFreeze(nextConfig)) {
      const frozenCard = {
        uid: 'frozen_' + (uidRef.current++),
        type: '__interference_freeze__',
        tileId: null,
        frozen: true,
      };
      setFrozenSlot(frozenCard);
    } else {
      setFrozenSlot(null);
    }
    // P4: 保持固定阵容，不重新读取
  };

  const remaining = tiles.filter(t => !t.removed && !t.inSlot).length;
  const progress = Math.round(((totalTiles - remaining) / totalTiles) * 100);

  // P4: 关卡背景图映射（11-20关循环1-10关）
  const getLevelBg = (level) => {
    const bgMap = {
      1: '/assets/Textures/bg.png',
      2: '/assets/Textures/白猫清浴.png',
      3: '/assets/Textures/bg.png',
      4: '/assets/Textures/黑猫暗夜.png',
      5: '/assets/Textures/bg.png',
      6: '/assets/Textures/bg.png',
      7: '/assets/Textures/折耳静坪.png',
      8: '/assets/Textures/bg.png',
      9: '/assets/Textures/bg.png',
      10: '/assets/Textures/波斯双域.png',
    };
    const cycleLevel = ((level - 1) % 10) + 1; // 11关=1关, 12关=2关...
    return bgMap[cycleLevel] || '/assets/Textures/bg.png';
  };

  return (
    <div style={{
      height: '100%', position: 'relative',
      display: 'flex', flexDirection: 'column',
      background: `url('${getLevelBg(currentLevel)}') center/cover no-repeat`,
      backgroundBlendMode: 'overlay',
    }}>
      {/* P0: 关卡选择页面 — 暂时禁用，直接进入第1关 */}
      {/* {phase === 'levelSelect' && (
        <LevelSelect
          onSelectLevel={handleLevelSelect}
          onBack={() => window.location.href = 'app.html'}
        />
      )} */}

      {/* P1: Battle preparation page - 第一次进入时显示阵容 */}
      {(phase === 'prep' || (phase === 'playing' && shownBattlePrep.current === false)) && (
        <BattlePrep
          cats={battleCats}
          skillSlots={skillSlots}
          onStart={() => {
            shownBattlePrep.current = true;
            setBattlePrepVisible(false);
          }}
          levelConfig={levelConfig}
          currentLevel={currentLevel}
          onChangeLevel={() => setPhase('levelSelect')}
        />
      )}

      {/* Dark overlay on bg */}
      <div style={{
        position: 'absolute', top: 0, left: 0, right: 0, bottom: 0,
        background: 'rgba(15,10,30,0.35)',
        zIndex: 0,
        display: phase === 'levelSelect' ? 'none' : 'block',
      }}/>

      {/* Content */}
      <div style={{ position: 'relative', zIndex: 1, display: 'flex', flexDirection: 'column', flex: 1, minHeight: 0 }}>

        {/* 顶部渐变遮罩 */}
        <div style={{
          position: 'absolute', top: 0, left: 0, right: 0, height: 120,
          background: 'linear-gradient(180deg, rgba(15,10,30,0.8) 0%, transparent 100%)',
          pointerEvents: 'none', zIndex: 2,
        }} />

        {/* ═══ HEADER ═══ */}
        <div style={{
          padding: '48px 8px 4px',
          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          position: 'relative', zIndex: 3,
          gap: 4,
        }}>
          <a href="app.html" style={{
            display: 'flex', alignItems: 'center', gap: 2,
            textDecoration: 'none', color: 'rgba(240,237,255,0.7)', fontSize: 11, fontWeight: 500,
            padding: '4px 8px',
            borderRadius: 6,
            background: 'rgba(255,255,255,0.05)',
            border: '1px solid rgba(255,255,255,0.1)',
            flexShrink: 0,
          }}>
            <svg width="12" height="12" viewBox="0 0 16 16" fill="none">
              <path d="M10 3.5L5.5 8l4.5 4.5" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
            返回
          </a>
          
          {/* 中心信息区 */}
          <div style={{ 
            display: 'flex', 
            alignItems: 'center', 
            gap: 4,
            flex: 1,
            justifyContent: 'center',
            minWidth: 0,
          }}>
            {/* 关卡信息 */}
            <div style={{
              display: 'flex', alignItems: 'center', gap: 2,
              padding: '3px 6px', borderRadius: 6,
              background: 'rgba(253,150,68,0.15)',
              border: '1px solid rgba(253,150,68,0.25)',
              flexShrink: 0,
            }}>
              <span style={{ fontSize: 10, fontWeight: 700, color: '#FD9644' }}>
                第{currentLevel}关 {levelConfig.name || ''}
              </span>
            </div>
            
            {/* 鱼干计数 */}
            <div style={{
              display: 'flex', alignItems: 'center', gap: 2,
              padding: '3px 6px', borderRadius: 6,
              background: 'rgba(253,150,68,0.1)',
              border: '1px solid rgba(253,150,68,0.2)',
              flexShrink: 0,
            }}>
              <span style={{ fontSize: 10 }}>🐟</span>
              <span style={{ fontSize: 10, fontWeight: 700, color: '#FD9644' }}>+{Math.floor(comboCount / 6)}</span>
            </div>
            
            {/* 计时器 */}
            {phase === 'playing' && (
              <div style={{
                display: 'flex', alignItems: 'center', gap: 2,
                padding: '3px 6px', borderRadius: 6,
                background: timerDelay > 0 
                  ? 'rgba(85,239,196,0.15)'
                  : timeLeft <= 10 
                    ? 'rgba(255,107,107,0.2)'
                    : 'rgba(108,92,231,0.12)',
                border: timerDelay > 0 
                  ? '1px solid rgba(85,239,196,0.3)' 
                  : timeLeft <= 10 
                    ? '1px solid rgba(255,107,107,0.3)' 
                    : '1px solid rgba(108,92,231,0.2)',
                flexShrink: 0,
              }}>
                <span style={{ fontSize: 10 }}>
                  {timerDelay > 0 ? '🛡️' : timeLeft <= 10 ? '⏰' : '⏱️'}
                </span>
                <span style={{
                  fontSize: 10, fontWeight: 700,
                  color: timerDelay > 0 ? '#55EFC4' : timeLeft <= 10 ? '#FF6B6B' : '#A29BFE',
                  animation: timeLeft <= 10 && timerDelay === 0 ? 'shake 0.5s ease-in-out infinite' : 'none',
                }}>
                  {timerDelay > 0 
                    ? `${timerDelay}s` 
                    : `${String(Math.floor(timeLeft / 60)).padStart(2, '0')}:${String(timeLeft % 60).padStart(2, '0')}`}
                </span>
              </div>
            )}
          </div>
          
          <button onClick={handleNextLevel} style={{
            background: 'rgba(253,150,68,0.2)',
            border: '1px solid rgba(253,150,68,0.3)',
            borderRadius: 6, padding: '4px 8px', cursor: 'pointer',
            fontSize: 10, fontWeight: 700, color: '#FD9644',
            display: 'flex', alignItems: 'center', gap: 2,
            flexShrink: 0,
          }}>
            下一关
            <span style={{ fontSize: 10 }}>→</span>
          </button>
        </div>

        {/* ═══ PROGRESS ═══ */}
        <div style={{ 
          padding: '0 16px 6px', 
          display: 'flex', 
          alignItems: 'center', 
          gap: 12,
          position: 'relative', zIndex: 3,
        }}>
          {/* P5: 进度条容器 */}
          <div style={{
            flex: 1, 
            height: 8, 
            borderRadius: 6,
            background: 'rgba(255,255,255,0.08)', 
            overflow: 'hidden',
            position: 'relative',
            boxShadow: 'inset 0 1px 3px rgba(0,0,0,0.3)',
          }}>
            {/* P5: 进度条光效 */}
            <div style={{
              position: 'absolute', top: 0, left: 0, right: 0, height: '50%',
              background: 'linear-gradient(180deg, rgba(255,255,255,0.1) 0%, transparent 100%)',
              pointerEvents: 'none',
            }} />
            <div style={{
              width: `${progress}%`, 
              height: '100%', 
              borderRadius: 6,
              background: 'linear-gradient(90deg, #6C5CE7, #A29BFE, #FD79A8)',
              transition: 'width 0.4s cubic-bezier(0.4, 0, 0.2, 1)',
            }}/>
          </div>
          
          {/* P5: 统计信息 */}
          <div style={{
            display: 'flex', alignItems: 'center', gap: 8,
            flexShrink: 0,
          }}>
            <span style={{ 
              fontSize: 11, 
              color: 'rgba(240,237,255,0.5)',
              fontWeight: 500,
            }}>
              <span style={{ color: '#A29BFE', fontWeight: 700 }}>{progress}</span>%
            </span>
            <span style={{ 
              fontSize: 10, 
              color: 'rgba(240,237,255,0.3)',
              padding: '2px 6px',
              background: 'rgba(255,255,255,0.03)',
              borderRadius: 4,
            }}>
              {totalTiles - remaining}/{totalTiles} · {moveCount}步
            </span>
          </div>
        </div>

        {/* P5: 干扰牌警告提示 - 增强 */}
        {levelConfig.interference && levelConfig.interference.id !== 'none' && phase === 'playing' && (
          <div style={{
            padding: '8px 16px',
            background: `linear-gradient(90deg, ${levelConfig.interference.color}15, transparent)`,
            borderBottom: `1px solid ${levelConfig.interference.color}30`,
            position: 'relative', zIndex: 3,
            animation: 'fadeIn 0.3s ease-out',
          }}>
            <span style={{ 
              fontSize: 12, 
              color: levelConfig.interference.color,
              display: 'flex', alignItems: 'center', gap: 6,
            }}>
              <span style={{ fontSize: 16 }}>⚠️</span>
              {levelConfig.interference.emoji} {levelConfig.interference.desc}
            </span>
          </div>
        )}

        {/* P5: 禁用技能警告 - 增强 */}
        {levelConfig.disabledSkills && levelConfig.disabledSkills.length > 0 && phase === 'playing' && (
          <div style={{
            padding: '6px 16px',
            background: 'linear-gradient(90deg, rgba(255,107,107,0.12), transparent)',
            borderBottom: '1px solid rgba(255,107,107,0.2)',
            position: 'relative', zIndex: 3,
          }}>
            <span style={{ 
              fontSize: 11, 
              color: '#FF6B6B',
              display: 'flex', alignItems: 'center', gap: 6,
            }}>
              <span style={{ fontSize: 14 }}>🚫</span>
              本关禁用：{levelConfig.disabledSkills.join('、')}的「蹦跶」
            </span>
          </div>
        )}

        {/* ═══ 被动技能通知横幅 ═══ */}
        {skillSlots.slice(3).some(s => s) && (
          <div style={{
            padding: '6px 16px 8px',
            display: 'flex',
            flexDirection: 'column',
            gap: 4,
          }}>
            {skillSlots.slice(3).map((breed, i) => {
              if (!breed) return null;
              const eff = PASSIVE_EFFECTS[breed];
              if (!eff) return null;
              const slotNum = i + 4; // 4号位或家园5-6位
              return (
                <div key={i} style={{
                  display: 'flex',
                  alignItems: 'center',
                  gap: 6,
                  padding: '4px 10px',
                  borderRadius: 8,
                  background: 'rgba(108,92,231,0.12)',
                  border: '1px solid rgba(108,92,231,0.2)',
                  animation: 'fadeIn 0.4s ease-out',
                }}>
                  <span style={{ fontSize: 11 }}>🛡️</span>
                  <span style={{ fontSize: 11, fontWeight: 700, color: '#A29BFE' }}>{breed}：</span>
                  <span style={{ fontSize: 10, color: 'rgba(240,237,255,0.7)' }}>{eff.desc}</span>
                </div>
              );
            })}
          </div>
        )}

        {/* ═══ 棋盘区域（独立容器）═══ */}
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minHeight: 0, position: 'relative' }}>
          {/* GAME BOARD - 固定高度容器，棋盘在内部居中缩放 */}
          <div ref={boardContainerRef} style={{
            position: 'relative',
            height: Math.min(400, Math.ceil(boardHeight * Math.min(boardScale, 1)) + 20),
            overflow: 'hidden',
            opacity: gameState === GAME_PLAYING ? 1 : 0,
          }}>
            <div style={{
              position: 'absolute',
              top: '50%', left: '50%',
              transform: `translate(-50%, -50%) scale(${boardScale})`,
              transformOrigin: 'center center',
              width: boardWidth, height: boardHeight,
            }}>
              <canvas
                ref={boardCanvasRef}
                width={boardWidth * (window.devicePixelRatio || 1)}
                height={boardHeight * (window.devicePixelRatio || 1)}
                style={{
                  position: 'absolute', top: 0, left: 0,
                  width: boardWidth, height: boardHeight,
                  cursor: 'pointer',
                }}
                onClick={onBoardClick}
                onMouseMove={onBoardHover}
                onMouseLeave={() => setHoveredTileId(null)}
              />
            </div>
          </div>
          <ResultOverlay
            gameState={gameState}
            remaining={remaining}
            score={score}
            maxCombo={maxCombo}
            comboCount={comboCount} // P7: 三消次数
            fishMultiplier={fishMultiplier} // P7: 鱼干加成倍数
            timeLeft={timeLeft}
            catCount={skillSlots.filter((s, i) => i < 3 && s).length}
            cats={skillSlots.slice(0, 3).filter(s => s).map((breed, idx) => ({ serialId: `active-${idx}`, breed }))}
            extraRestarts={extraRestarts}
            onRestart={handleRestart}
            onRetry={handleRetry}
            onExtraRestart={handleExtraRestart}
            onBack={() => window.location.href = '主页大厅.html'}
            onNextLevel={handleNextLevel}
            onGoHome={() => window.location.href = 'app.html'}
          />
        </div>

        {/* ═══ 临时存放层 + 收集槽（技能栏上方）═══ */}
        <div style={{ padding: '0 2px', position: 'relative' }}>
          {tempStorage.length > 0 && (
            <div style={{ marginBottom: 4 }}>
              <CollectionSlot slot={tempStorage} matching={matching} maxSlots={3} showBg={false} />
            </div>
          )}
          <div style={{ marginTop: tempStorage.length > 0 ? 6 : 0 }}>
            <CollectionSlot slot={slot} matching={matching} frozenSlot={frozenSlot} groomSlots={groomSlots} freezeOverride={freezeBlockOverride} freezeGridCount={freezeGridCount} />
          </div>
          {/* 舔毛牌进入收集槽提示 */}
          {groomToast && (
            <div style={{
              position: 'absolute', left: '50%', transform: 'translateX(-50%)',
              bottom: 100, zIndex: 300,
              background: 'linear-gradient(135deg, rgba(253,203,110,0.95), rgba(243,156,18,0.9))',
              color: '#fff', padding: '8px 18px', borderRadius: 20,
              fontSize: 13, fontWeight: 700, whiteSpace: 'nowrap',
              boxShadow: '0 4px 16px rgba(253,203,110,0.5)',
              animation: 'fadeIn 0.2s ease-out',
              pointerEvents: 'none',
            }}>
              🧴 舔毛牌进入收集槽，无法被消除！
            </div>
          )}
          {/* 冰冻牌冻结收集槽提示 */}
          {freezeToast && (
            <div style={{
              position: 'absolute', left: '50%', transform: 'translateX(-50%)',
              bottom: 100, zIndex: 300,
              background: 'linear-gradient(135deg, rgba(116,185,255,0.95), rgba(9,132,227,0.9))',
              color: '#fff', padding: '8px 18px', borderRadius: 20,
              fontSize: 13, fontWeight: 700, whiteSpace: 'nowrap',
              boxShadow: '0 4px 16px rgba(116,185,255,0.5)',
              animation: 'fadeIn 0.2s ease-out',
              pointerEvents: 'none',
            }}>
              {freezeToast}
            </div>
          )}
          {/* 粘连牌连带效果提示 */}
          {stickyToast && (
            <div style={{
              position: 'absolute', left: '50%', transform: 'translateX(-50%)',
              bottom: 100, zIndex: 300,
              background: 'linear-gradient(135deg, rgba(253,121,168,0.95), rgba(232,67,147,0.9))',
              color: '#fff', padding: '8px 18px', borderRadius: 20,
              fontSize: 13, fontWeight: 700, whiteSpace: 'nowrap',
              boxShadow: '0 4px 16px rgba(253,121,168,0.5)',
              animation: 'fadeIn 0.2s ease-out',
              pointerEvents: 'none',
            }}>
              {stickyToast}
            </div>
          )}
        </div>

        {/* ═══ 技能栏（底部）═══ P3: 显示猫咪头像+技能名+位置标签 */}
        {phase === 'playing' && gameState === GAME_PLAYING && skillSlots.some((s, i) => i < 3 && s) && (
          <div style={{
            display: 'flex', justifyContent: 'center', gap: 20,
            padding: '0 10px 25px',
            marginTop: 75, // 收集槽距离技能按钮保持65px
          }}>
            {[0, 1, 2].map(i => {
              const breed = skillSlots[i];
              if (!breed) return <div key={i} style={{ width: 64 }} />;
              const skill = CAT_SKILLS[breed];
              const used = usedSkills[`active${i}`];
              const rarityColors = { N: '#B2BEC3', R: '#45B7D1', SR: '#6C5CE7', SSR: '#FD9644' };
              const rarity = BREED_RARITY[breed] || 'N';
              const borderColor = used ? 'rgba(255,255,255,0.08)' : (skill?.color || rarityColors[rarity] || '#6C5CE7');
              return (
                <div key={i} onClick={() => !used && handleSkillClick(i)} style={{
                  display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 2,
                  cursor: used ? 'not-allowed' : 'pointer',
                  opacity: used ? 0.3 : 1,
                  filter: used ? 'grayscale(1)' : 'none',
                  transition: 'all 0.2s',
                  maxWidth: 70,
                }}>
                  <div style={{
                    width: 54, height: 54, borderRadius: 16, overflow: 'hidden',
                    border: `2px solid ${borderColor}`,
                    background: used ? 'rgba(255,255,255,0.02)' : `${borderColor}15`,
                    boxShadow: used ? 'none' : `0 4px 16px ${borderColor}30`,
                    position: 'relative',
                  }}>
                    <img src={`cat/${breed}.png`} alt={breed} style={{ width: '100%', height: '100%', objectFit: 'cover', borderRadius: 14 }}
                      onError={e => { e.target.style.display = 'none'; }} />
                    {used && (
                      <div style={{
                        position: 'absolute', top: 0, left: 0, right: 0, bottom: 0,
                        display: 'flex', alignItems: 'center', justifyContent: 'center',
                        background: 'rgba(0,0,0,0.5)', borderRadius: 14,
                      }}>
                        <span style={{ fontSize: 18, color: '#fff' }}>✓</span>
                      </div>
                    )}
                  </div>
                  <span style={{
                    fontSize: 10, fontWeight: 700,
                    color: used ? 'rgba(240,237,255,0.2)' : '#F0EDFF',
                    textAlign: 'center', lineHeight: 1.2,
                  }}>
                    {skill ? skill.icon : '???'}
                  </span>
                  <span style={{
                    fontSize: 10, fontWeight: 700,
                    color: used ? 'rgba(240,237,255,0.2)' : '#F0EDFF',
                    textAlign: 'center', lineHeight: 1.2,
                  }}>
                    {skill ? skill.active : '???'}
                  </span>
                </div>
              );
            })}
          </div>
        )}
      </div>

      {/* Skill confirm modal */}
      <SkillConfirmModal
        breed={confirmSkill?.breed}
        skill={confirmSkill?.skill}
        onConfirm={executeSkill}
        onCancel={() => setConfirmSkill(null)}
      />
    </div>
  );
}

/* ═══════════════════════════════════════
   iOS FRAME + APP
   ═══════════════════════════════════════ */
function IosFrame({ children }) {
  return (
    <div style={{ display:'inline-block', padding:12, background:'#000', borderRadius:60, boxShadow:'0 0 0 2px #1f2937, 0 32px 80px rgba(0,0,0,0.5)' }}>
      <div style={{ position:'relative', borderRadius:48, overflow:'hidden', width:393, height:852, background:'#0F0A1E' }}>
        <div style={{ position:'absolute', top:12, left:'50%', transform:'translateX(-50%)', width:126, height:36, background:'#000', borderRadius:999, zIndex:30 }}/>
        {children}
        <div style={{ position:'absolute', bottom:10, left:'50%', transform:'translateX(-50%)', width:134, height:5, background:'rgba(240,237,255,0.35)', borderRadius:999, zIndex:25 }}/>
      </div>
    </div>
  );
}

function App() {
  const [scale, setScale] = React.useState(1);

  React.useEffect(() => {
    function fit() {
      const s = Math.min(window.innerWidth / 417, window.innerHeight / 876);
      setScale(s);
    }
    fit();
    window.addEventListener('resize', fit);
    return () => window.removeEventListener('resize', fit);
  }, []);

  return (
    <div style={{
      position: 'fixed', top: 0, left: 0, right: 0, bottom: 0,
      background: '#0E0E16',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      overflow: 'hidden',
    }}>
      <div style={{ transform: `scale(${scale})`, transformOrigin: 'center center' }}>
        <IosFrame>
          <Game />
        </IosFrame>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
