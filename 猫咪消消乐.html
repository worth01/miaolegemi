<script>
// Live reload — 仅在 localhost 桌面开发时启用（手机通过IP访问时跳过，避免跨域错误）
(function(){
  if (!location.hostname.match(/^(localhost|127\.0\.0\.1)$/)) return;
  let lastEtag = '';
  async function check() {
    try {
      const r = await fetch(location.href, { cache: 'no-store' });
      const etag = r.headers.get('etag') || (await r.text()).length;
      if (lastEtag && etag !== lastEtag) location.reload();
      lastEtag = etag;
    } catch(e) {}
  }
  setInterval(check, 1000);
})();
</script>

   ═══════════════════════════════════════ */
const PERSONALITY_CONFIG = {

// 亲密度枚举
const INTIMACY_LEVEL_ENUM = {
  1: '陌生',
  2: '初识',
  3: '熟悉',
  4: '亲密',
  5: '挚爱'
};

// 亲密度名称到等级映射
const INTIMACY_TO_LEVEL = Object.fromEntries(Object.entries(INTIMACY_LEVEL_ENUM).map(([level, name]) => [name, parseInt(level)]));

// 亲密度等级效果配置（仅保留狡黠额外鱼干上限，其余效果由各性格自行定义）
const INTIMACY_EFFECTS = {
  1: {
    extraFishLimit: 0
  },
  2: {
    extraFishLimit: 0
  },
  3: {
    extraFishLimit: 1
  },
  4: {
    extraFishLimit: 1

/* ═══════════════════════════════════════
   P7: 鱼干经济系统配置（核心规则）
   ═══════════════════════════════════════ */

const FISH_ECONOMY = {
  // 基础鱼干规则
  baseFish: {
    comboRequired: 6,
    // 每6次三消获得1个基础鱼干
    maxPerGame: 3 // 每局基础鱼干上限 = 3个
  },
  // 额外鱼干规则
  extraFish: {
    defaultMax: 2,
    // 默认每局额外鱼干上限 = 2个
    maxWithClever: 4 // 狡黠猫最高额外上限 = 4个（挚爱狡黠猫）
  },
  // 总上限
  totalMaxPerGame: 7 // 单局总鱼干最高上限 = 7个（3基础+4额外）
};

/**
 * P7: 计算本局获得的鱼干数量
 * @param {number} comboCount - 本局有效三消次数
 * @param {number} totalBonusRatio - 总加成比例（所有来源加成之和）
 * @param {boolean} hasCleverCat - 是否有狡黠性格猫咪上阵
 * @param {number} cleverCatLevel - 狡黠猫亲密度等级（1-5）
 * @returns {object} { baseFish, extraFish, totalFish }
 */
function calculateFishReward(comboCount, totalBonusRatio, hasCleverCat = false, cleverCatLevel = 1) {
  // 步骤1: 计算基础鱼干数量（向下取整，每6次三消得1个）
  const baseFish = Math.floor(comboCount / FISH_ECONOMY.baseFish.comboRequired);
  const cappedBaseFish = Math.min(baseFish, FISH_ECONOMY.baseFish.maxPerGame);

  // 步骤2: 确保加成比例为非负数
  const safeBonusRatio = Math.max(0, totalBonusRatio);

  // 步骤3: 计算额外鱼干数量
  const extraFishBeforeCap = Math.floor(cappedBaseFish * safeBonusRatio);

  // 步骤4: 计算额外鱼干上限
  let extraFishLimit = FISH_ECONOMY.extraFish.defaultMax;
  if (hasCleverCat) {
    const cleverBonus = INTIMACY_EFFECTS[cleverCatLevel]?.extraFishLimit || 0;
    extraFishLimit = FISH_ECONOMY.extraFish.defaultMax + cleverBonus;
    extraFishLimit = Math.min(extraFishLimit, FISH_ECONOMY.extraFish.maxWithClever);
  }

  // 步骤5: 修正额外鱼干数量（不能超过上限）
  const finalExtraFish = Math.min(extraFishBeforeCap, extraFishLimit);

  // 步骤6: 计算总鱼干
  const totalFish = cappedBaseFish + finalExtraFish;
  return {
    baseFish: cappedBaseFish,
    extraFish: finalExtraFish,
    totalFish: Math.min(totalFish, FISH_ECONOMY.totalMaxPerGame),
    extraFishLimit
  };
}

/**
 * P7: 根据猫咪性格计算总鱼干加成比例
 * @param {string} personality - 猫咪性格，如 '吃货'
 * @param {number} intimacyLevel - 亲密度等级（1-5）
 * @returns {number} 加成比例（如 0.15 表示 +15%）
 */
function calculatePersonalityBonus(personality, intimacyLevel) {
  if (!personality) return 0;
  const config = PERSONALITY_CONFIG[personality];
  if (config && config.type === 'fishBonus') return config.getEffect(intimacyLevel);
  return 0;
}

/**
 * P7: 计算所有猫咪性格+亲密度效果（支持叠加规则）
 * @param {Array} allCats - 猫咪数据数组
 * @returns {object} 汇总的性格效果
 */
function computePersonalityEffects(allCats) {
  const cats = (allCats || []).filter(Boolean);
  const result = {
    skillUsesMap: {},
    clingyRetryChance: 0,
    extraFishLimit: 0,
    fishBonus: 0,
    soloBonus: 0,
    isSoloBattle: false,
    scoreBonus: 0,
    timerExtension: 0,
    interferenceProbability: 1.0,
    fishLossRatio: 0.50,
    skillScore: 0
  };

  // 分离出战席和观战席
  const battleCats = cats.filter(c => c.battleSlot >= 1 && c.battleSlot <= 3);
  const allEntries = cats.map(c => {
    const pers = sanitizePersonality(c?.personality, c?.breedId || '');
    const level = getIntimacyLevel(c?.intimacy || 0);
    const isBattle = c?.battleSlot >= 1 && c?.battleSlot <= 3;
    return {
      ...c,
      personalityClean: pers,
      intimacyLevel: level,
      isBattle
    };
  });

  // 单猫出战检测
  result.isSoloBattle = battleCats.length === 1;

  // 出战猫技能次数：仅傲娇按性格决定次数，其余默认1次
  battleCats.forEach(cat => {
    const breedId = cat?.breedId || '';
    const pers = sanitizePersonality(cat?.personality, breedId);
    if (pers === '傲娇') {
      const level = getIntimacyLevel(cat?.intimacy || 0);
      result.skillUsesMap[breedId] = PERSONALITY_CONFIG['傲娇'].getEffect(level);
    } else {
      result.skillUsesMap[breedId] = 1;
    }
  });

  // 计算每种性格的最高好感度等级（同性格取最高）
  const persMaxLevel = {};
  allEntries.forEach(e => {
    const p = e.personalityClean;
    if (!PERSONALITY_CONFIG[p]) return;
    persMaxLevel[p] = Math.max(persMaxLevel[p] || 0, e.intimacyLevel);
  });

  // 按性格计算效果
  for (const [pers, config] of Object.entries(PERSONALITY_CONFIG)) {
    const level = persMaxLevel[pers] || 0;
    if (level === 0) continue;
    switch (config.type) {
      case 'skillCount':
        // 傲娇：技能次数已在 skillUsesMap 中按猫独立计算，此处跳过
        break;
      case 'retry':
        // 黏人：取最高好感度的再来一次概率
        result.clingyRetryChance = Math.max(result.clingyRetryChance, config.getEffect(level));
        break;
      case 'extraFishLimit':
        result.extraFishLimit = Math.max(result.extraFishLimit, config.getEffect(level));
        break;
      case 'fishBonus':
        // 吃货：不同性格的加成加法叠加
        result.fishBonus += config.getEffect(level);
        break;
      case 'soloBonus':
        // 独行：取最高好感度效果（不同猫的独行不叠加），仅单猫上阵时生效
        result.soloBonus = Math.max(result.soloBonus, config.getEffect(level));
        break;
      case 'scoreBonus':
        // 高冷：不同性格的加成加法叠加
        result.scoreBonus += config.getEffect(level);
        break;
      case 'timerExtension':
        result.timerExtension = Math.max(result.timerExtension, config.getEffect(level));
        break;
      case 'interferenceProbability':
        // 胆小：取最低触发概率（好感度越高，干扰概率越低）
        result.interferenceProbability = Math.min(result.interferenceProbability, config.getEffect(level));
        break;
      case 'fishLossRatio':
        // 胆大：取最低损失比例（好感度越高，损失越少）
        result.fishLossRatio = Math.min(result.fishLossRatio, config.getEffect(level));
        break;
      case 'skillScore':
        result.skillScore = Math.max(result.skillScore, config.getEffect(level));
        break;
    }
  }
  return result;
}

/* ═══════════════════════════════════════
   分享工具：Web Share API 优先，降级剪贴板
   ═══════════════════════════════════════ */
async function shareContent(_a) {
  var a = _a || {};
  var title = a.title || '喵呜乐消消';
  var text = a.text || '';
  var url = a.url || window.location.href;
  var onSuccess = a.onSuccess;
  var onError = a.onError;
  // 1. Web Share API（移动端原生分享面板）
  if (navigator.share) {
    try {
      await navigator.share({
        title: title,
        text: text,
        url: url
      });
      if (onSuccess) onSuccess();
      return 'shared';
    } catch (err) {
      if (err.name === 'AbortError') return 'cancelled';
    }
  }
  // 2. 降级：剪贴板复制
  try {
    var copyText = text + (url ? '\n' + url : '');
    if (navigator.clipboard && navigator.clipboard.writeText) {
      await navigator.clipboard.writeText(copyText);
    } else {
      var ta = document.createElement('textarea');
      ta.value = copyText;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    }
    // 简单的视觉提示（游戏页面没有 toast 系统，用 alert 太粗暴，静默复制即可）
    if (onSuccess) onSuccess();
    return 'copied';
  } catch (err) {
    if (onError) onError(err);
    return 'failed';
  }
}

/** P2: 获取关卡对应的牌堆配置 */
function getPileConfig(levelNum) {
  // 波斯双域关卡（10/20/30关及轮回）无牌堆
  const cycleLevel = (levelNum - 1) % 30 + 1;
  if (cycleLevel === 10 || cycleLevel === 20 || cycleLevel === 30) return {
    count: 0,
    minCards: 0,
    maxCards: 0
  };
  if (cycleLevel === 1) return PILE_CONFIG['1'];
  if (cycleLevel >= 2 && cycleLevel <= 10) return PILE_CONFIG['2-10'];
  if (cycleLevel >= 11 && cycleLevel <= 20) return PILE_CONFIG['11-20'];
  return PILE_CONFIG['21-30'];
}

/** P2: 为指定关卡生成牌堆数据 */
function generatePileData(levelNum) {
  const config = getPileConfig(levelNum);
  if (config.count === 0) return [];

  // 使用与棋盘相同的去重牌型列表，确保牌堆与棋盘类型一致
  const uniqueTypes = [...new Set(getCardPoolByLevel(levelNum))];
  const piles = [];
  for (let i = 0; i < config.count; i++) {
    let rawCount = config.minCards + Math.floor(Math.random() * (config.maxCards - config.minCards + 1));
    // 保证每堆牌数是3的倍数，配合 buildBalancedTypePool 每种牌恰好3张一组
    let cardCount = Math.floor(rawCount / 3) * 3;
    if (cardCount < 3) cardCount = 3;
    // 使用与棋盘相同的平衡分配算法：每种图案数量都是3的倍数
    let balancedPool = buildBalancedTypePool(cardCount, uniqueTypes, Math.random);
    let cards = shuffleCardPool(balancedPool, Math.random);
    piles.push({
      id: i,
      cards: cards,
      topIndex: 0,
      isEmpty: false
    });
  }
  return piles;
}

/** P2: 获取牌堆总卡牌数 */
function getPileTotalCards(levelNum) {
  const config = getPileConfig(levelNum);
  if (config.count === 0) return 0;
  const avgCards = Math.floor((config.minCards + config.maxCards) / 2);
  return config.count * avgCards;
}

function getBoardCoordsByType(boardType) {
  switch (boardType) {
    case BOARD_TYPES.love:
      return LOVE_BOARD_COORDS;
    case BOARD_TYPES.diamond:
      return DIAMOND_BOARD_COORDS;
    case BOARD_TYPES.persia:
      return PERSIA_BOARD_COORDS;
    case BOARD_TYPES.butterfly:
      return BUTTERFLY_BOARD_COORDS;
    case BOARD_TYPES.petal:
      return PETAL_BOARD_COORDS;
    case BOARD_TYPES.hourglass:
      return HOURGLASS_BOARD_COORDS;
    default:
      return BOARD_COORDS;
  }
}

// P0+P1: 获取指定类型的棋盘边界（含安全区 + 半偏移）
function getBoardBoundsByType(boardType) {
  const coords = getBoardCoordsByType(boardType);
  let maxCol = 1,
    maxRow = 1;
  coords.forEach(c => {
    if (c.col > maxCol) maxCol = c.col;
    if (c.row > maxRow) maxRow = c.row;
  });
  // P1: 半偏移网格宽度修正
  const halfOffset = (TILE_W + TILE_GAP) / 2;
  const boardW = SAFE_ZONE * 2 + (maxCol - 1) * (TILE_W + TILE_GAP) + TILE_W + halfOffset - TILE_GAP;
  const boardH = SAFE_ZONE * 2 + maxRow * (TILE_H + TILE_GAP) - TILE_GAP;
  return {
    boardW,
    boardH
  };
}

// 检查坐标是否在白名单内
function isCoordAllowed(row, col, boardType) {
  let coordsSet;
  if (boardType === BOARD_TYPES.love) {
    coordsSet = LOVE_BOARD_COORDS_SET;
  } else if (boardType === BOARD_TYPES.diamond) {
    coordsSet = DIAMOND_BOARD_COORDS_SET;
  } else if (boardType === BOARD_TYPES.persia) {
    coordsSet = PERSIA_BOARD_COORDS_SET;
  } else if (boardType === BOARD_TYPES.butterfly) {
    coordsSet = BUTTERFLY_BOARD_COORDS_SET;
  } else if (boardType === BOARD_TYPES.petal) {
    coordsSet = PETAL_BOARD_COORDS_SET;
  } else if (boardType === BOARD_TYPES.hourglass) {
    coordsSet = HOURGLASS_BOARD_COORDS_SET;
  } else {
    coordsSet = BOARD_COORDS_SET;
  }
  return coordsSet.has(`${row},${col}`);
}

// Fisher-Yates 洗牌算法
function shuffleCardPool(pool, rng) {
  const arr = [...pool];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// 异形棋盘放牌数：层数增加后按坐标数×2（金字塔叠放），确保每种牌至少3张
function getMaxCardsForBoard(boardType, boardCoordCount, levelNum) {
  const base = getLayerConfig(levelNum);
  const layerKeys = Object.keys(base);
  const baseTotal = layerKeys.reduce((sum, k) => sum + base[k], 0);
  if (boardType === 'standard') return baseTotal;
  // 多层叠加：每坐标最多 (层数) 张牌，取 3 的倍数
  const maxLayers = layerKeys.length;
  const shapeCap = Math.floor(boardCoordCount * maxLayers / 3) * 3;
  return Math.min(baseTotal, shapeCap);
}

// P0: 构建均衡牌池：每种牌恰好3张，共 cardCount 张（cardCount 须为3的倍数）
// 与 utils/boardGenerator.js 的 buildQuotaTiles 保持一致逻辑
function buildBalancedTypePool(cardCount, availableTypes, rng) {
  const groups = cardCount / 3;
  const types = shuffleArr([...availableTypes], rng);
  const pool = [];
  for (let g = 0; g < groups; g++) {
    const t = types[g % types.length];
    pool.push(t, t, t);
  }
  // P0: 验证配额加密（每种图案总数是3的倍数）
  if (typeof BoardGenerator !== 'undefined') {
    const poolTypeIndices = pool.map(function (typeName) {
      return availableTypes.indexOf(typeName);
    });
    if (!BoardGenerator.isSolvable(poolTypeIndices, availableTypes.length)) {
      console.warn('[BoardGen] buildBalancedTypePool: P0配额验证失败，但已按3的倍数构建');
    }
  }
  return shuffleCardPool(pool, rng);
}

// 三消匹配用类型（三花牌变身不改匹配类型，仅改显示）
function getTileMatchType(tile) {
  if (!tile) return '';
  if (tile.isInterference && tile.interferenceType === 'transform') {
    return tile.originalType || tile.type;
  }
  return tile.type;
}
function getTileDisplayType(tile) {
  if (!tile) return '';
  if (tile.isInterference && tile.interferenceType === 'transform' && tile.displayType) {
    return tile.displayType;
  }
  return tile.visualType || tile.type;
}
function getLayerConfig(levelNum) {
  const cycleLevel = (levelNum - 1) % 30 + 1;
  // 异形棋盘关卡（三轮循环：2/12/22 蝴蝶, 4/14/24 爱心, 6/16/26 花瓣, 7/17/27 菱形, 9/19/29 沙漏）
  if (LAYER_CONFIG[cycleLevel]) return LAYER_CONFIG[cycleLevel];
  // 标准棋盘按区间
  if (cycleLevel >= 1 && cycleLevel <= 10) return LAYER_CONFIG['3-10'];
  if (cycleLevel >= 11 && cycleLevel <= 20) return LAYER_CONFIG['11-20'];
  return LAYER_CONFIG['21-30'];
}

// 关卡倒计时配置（第1关不限时；2-30关按难度分段，31关起轮回复用）
function getLevelTimeConfig(levelNum) {
  const n = (levelNum - 1) % 30 + 1;
  if (n === 1) return {
    timedMode: false,
    timeLimit: 0
  };
  let timeLimit = 120;
  if (n <= 3) timeLimit = 180; // 2-3关 3分钟
  else if (n <= 6) timeLimit = 150; // 4-6关 2分30秒
  else if (n <= 10) timeLimit = 135; // 7-10关 2分15秒
  else if (n <= 20) timeLimit = 150; // 11-20关 2分30秒
  else timeLimit = 165; // 21-30关 2分45秒
  return {
    timedMode: true,
    timeLimit
  };
}
function formatTimeLimitDisplay(seconds) {
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  return `${m}:${String(s).padStart(2, '0')}`;
}
function countRemainingBoardTiles(tiles) {
  return tiles.filter(t => !t.removed && !(t.isInterference && (t.interferenceType === 'danger' || t.interferenceType === 'groom'))).length;
}
function getTimerVisualState(timeLeft, timerDelay, isTimed) {
  if (!isTimed || timerDelay > 0) return 'idle';
  if (timeLeft <= 3) return 'critical';
  if (timeLeft <= 10) return 'danger';
  if (timeLeft <= 30) return 'warn';
  return 'normal';
}

// P4: 关卡轮回机制 - 30关后循环
function getLevelConfig(levelNum) {
  // 轮回机制：第31关复刻第1关，第32关复刻第2关...
  const cycleLevel = (levelNum - 1) % 30 + 1;
  return {
    ...LEVELS[cycleLevel],
    ...getLevelTimeConfig(levelNum)
  };
}

// 判断某关卡是否应触发冰冻牌
// 规则：1) 配置开关 freeze_card_enable 优先级最高（0=强制关闭，1=开启）
//       2) 无配置开关时，关卡名称包含「蓝猫冰封」关键词则触发
//       3) 需同时配置了 INTERFERENCE_TYPES.freeze 干扰才生效
function shouldTriggerFreeze(levelConfig) {
  if (!levelConfig) return false;
  if (levelConfig.interference !== INTERFERENCE_TYPES.freeze) return false;
  // 配置开关优先级最高
  if (levelConfig.freeze_card_enable === 0) return false; // 强制关闭
  if (levelConfig.freeze_card_enable === 1) return true; // 强制开启
  // 无配置开关时，根据关卡名称关键词匹配
  return levelConfig.name && levelConfig.name.includes('蓝猫冰封');
}

// 获取当前关卡显示数字（用于UI展示）
function getDisplayLevel(levelNum) {
  return levelNum;
}

// P2: 棋盘尺寸 — CELL_W×CELL_H 格子，8×6，收缩保证不溢出
function getBoardBounds(layers, boardType) {
  var boardW = SAFE_ZONE * 2 + (BOARD_COLS - 1) * CELL_W + TILE_W;
  var boardH = SAFE_ZONE * 2 + (BOARD_ROWS - 1) * CELL_H + TILE_H + 6;
  return { boardW, boardH };
}

// P0: Tile 像素坐标（1-based坐标系统：row 1-6, col 1-8）
// P2: 顶点对中 — 格子 CELL_W + 偏移 HW
function tileX(tile) {
  if (tile.x != null) return tile.x;
  return SAFE_ZONE + (tile.col - 1) * CELL_W + tile.layer * HW;
}
function tileY(tile) {
  if (tile.y != null) return tile.y;
  return SAFE_ZONE + (tile.row - 1) * CELL_H + tile.layer * HH;
}

// P2: 微弱阴影
let _layerOffsetMap = {};
function getLayerOffset(layer) {
  const offset = _layerOffsetMap[layer];
  return {
    zIndex: offset?.zIndex ?? (layer + 1) * 10,
    shadowX: offset?.shadowX ?? layer * 1,
    shadowY: offset?.shadowY ?? layer * 2,
    shadowBlur: offset?.shadowBlur ?? 2 + layer * 1,
    shadowAlpha: offset?.shadowAlpha ?? 0.08 + layer * 0.04
  };
}
function buildLayerOffsetMap(layers) {
  _layerOffsetMap = {};
  layers.forEach(la => {
    const layer = la.layer;
    _layerOffsetMap[layer] = {
      zIndex: (layer + 1) * 10,
      shadowX: layer * 1,
      shadowY: layer * 2,
      shadowBlur: 2 + layer * 1,
      shadowAlpha: 0.08 + layer * 0.04
    };
  });
}

function getTileStyle(row, col, layer) {
  const x = SAFE_ZONE + (col - 1) * CELL_W + layer * HW;
  const y = SAFE_ZONE + (row - 1) * CELL_H + layer * HH;
  const zIndex = (layer + 1) * 10;
  const sx = layer * 1, sy = layer * 2, blur = 2 + layer, alpha = 0.08 + layer * 0.04;
  const boxShadow = sx + 'px ' + sy + 'px ' + blur + 'px rgba(0,0,0,' + alpha + ')';
  return { x, y, zIndex, boxShadow };
}

// ═══ Canvas 2D 棋盘绘制 ═══
function drawTiles(ctx, tiles, highlightedIds, hoverId, boardW, boardH) {
  ctx.clearRect(0, 0, boardW, boardH);

  // 波斯双域：棋盘中间区域分隔线（咖色加粗，浅灰阴影）
  const hasAreaRule = tiles.some(t => t.areaTag);
  if (hasAreaRule) {
    const dividerX = boardW / 2 - 15;
    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.12)';
    ctx.shadowBlur = 4;
    ctx.shadowOffsetX = 1;
    ctx.shadowOffsetY = 0;
    ctx.strokeStyle = '#8B7355';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(dividerX, 0);
    ctx.lineTo(dividerX, boardH);
    ctx.stroke();
    ctx.restore();
  }

  // 按 layer 排序绘制（排除已移除和已入槽的牌，入槽牌在棋盘上完全消失）
  const sorted = [...tiles].filter(t => !t.removed && !t.inSlot).sort((a, b) => {
    if (a.layer !== b.layer) return a.layer - b.layer;
    if (a.row !== b.row) return a.row - b.row;
    return a.col - b.col;
  });
  sorted.forEach(tile => {
    // 查找卡牌视觉定义：先找普通牌，再找干扰牌
    let cat = CAT_TYPES.find(c => c.id === getTileDisplayType(tile));
    if (!cat && tile.isInterference) {
      const iCard = INTERFERENCE_CARDS[tile.interferenceType];
      if (iCard) cat = iCard;
    }
    // 真身牌特殊处理：未暴露时用伪装层猫咪信息渲染
    const isDisguiseOnBoard = tile.isInterference && tile.interferenceType === 'disguise' && !tile.inSlot && !tile.revealed;
    let disguiseCat = null;
    let effectiveCat = cat; // 实际渲染用的猫咪信息
    if (isDisguiseOnBoard && tile.disguisedAs) {
      disguiseCat = CAT_TYPES.find(c => c.id === tile.disguisedAs);
      effectiveCat = disguiseCat || cat;
    }
    // 真身牌揭穿后（revealed=true, isDisguiseShell=false）直接用原始cat渲染，无需特殊处理
    if (!cat) return;
    const layerOff = getLayerOffset(tile.layer);
    const x = tileX(tile) + layerOff.shadowX;
    const y = tileY(tile) + layerOff.shadowY;
    const blockedCount = countTilesAbove(tile, tiles);
    const isBlocked = blockedCount > 0;
    // 逐层递进不透明度：0层=0%, 1层=20%, 2层=30%, 3层=40% ...
    const overlayAlpha = isBlocked ? Math.min(0.50 + blockedCount * 0.10, 0.90) : 0;
    const isInSlot = tile.inSlot;
    const isHighlighted = highlightedIds.includes(tile.id);
    const isHover = tile.id === hoverId;
    ctx.save();

    // 3D 砖块厚度效果：在卡片本体背后绘制多层偏移的圆角矩形，
    // 每层向右下偏移并逐渐加深，模拟砖块/厚卡牌的侧边厚度感
    if (!isInSlot) {
      const layers = 6;
      const baseA = blockedCount === 0 ? 0.10 : blockedCount === 1 ? 0.06 : 0.04;
      const stepA = blockedCount === 0 ? 0.08 : blockedCount === 1 ? 0.05 : 0.03;
      // 波斯双域：侧壁颜色跟随区域（浅蓝/浅绿），其他关卡保持暖米色
      let sideR = 185,
        sideG = 170,
        sideB = 150;
      if (tile.areaTag === 'blue') {
        sideR = 180;
        sideG = 210;
        sideB = 240;
      } else if (tile.areaTag === 'green') {
        sideR = 180;
        sideG = 230;
        sideB = 195;
      }
      for (let i = layers; i >= 1; i--) {
        const ox = i * 0.35;
        const oy = i * 0.7;
        const a = baseA + i * stepA;
        ctx.fillStyle = 'rgba(' + sideR + ',' + sideG + ',' + sideB + ',' + a + ')';
        roundRect(ctx, x + ox, y + oy, TILE_W, TILE_H, 10);
        ctx.fill();
      }
    }

    // 入场动画（简化：用 opacity 渐入）
    // 背景
    if (isInSlot) {
      ctx.globalAlpha = 0; // 点击后进入收集槽，不显示虚影
      ctx.fillStyle = 'rgba(108,92,231,0.15)';
    } else if (isBlocked) {
      ctx.globalAlpha = 1;
      ctx.fillStyle = 'rgba(80,70,100,' + overlayAlpha.toFixed(2) + ')';
    } else {
      ctx.globalAlpha = 1;
      ctx.fillStyle = 'rgba(255,255,255,0.95)';
    }
    roundRect(ctx, x, y, TILE_W, TILE_H, 10);
    ctx.fill();

    // 顶部边缘高光：模拟砖块受光面的微倒角效果
    if (!isInSlot && blockedCount === 0) {
      ctx.save();
      ctx.beginPath();
      roundRect(ctx, x + 2, y + 1, TILE_W - 4, 10, 6);
      ctx.clip();
      const highlightGrad = ctx.createLinearGradient(x, y, x, y + 10);
      highlightGrad.addColorStop(0, 'rgba(255,255,255,0.45)');
      highlightGrad.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = highlightGrad;
      ctx.fillRect(x, y, TILE_W, 10);
      ctx.restore();
    }

    // 图片
    // 真身牌：未暴露用伪装层图片，暴露后用原始牌图片（去壳后就是普通牌）
    let imgKey = getTileDisplayType(tile);
    let disguiseImgKey = null; // 伪装层图片key（暴露动画期间用于淡出）
    if (isDisguiseOnBoard && tile.disguisedAs) {
      imgKey = tile.disguisedAs; // 未暴露：渲染伪装层图片
    }
    // 干扰牌有自己的贴图，优先使用
    if (tile.isInterference && cat && cat.img) {
      imgKey = cat.id;
    }
    // 揭穿后(isDisguiseShell=false, revealed=true)直接用tile.type渲染，无需特殊处理
    const imgData = _tileImages[imgKey];
    // 检查是否是真正的Image对象且已加载完成
    if (imgData && imgData.tagName === 'IMG' && imgData.complete && imgData.naturalWidth > 0) {
      ctx.save();
      ctx.beginPath();
      roundRect(ctx, x + 2, y + 2, TILE_W - 4, TILE_H - 4, 8);
      ctx.clip();
      if (isInSlot) {
        ctx.filter = 'grayscale(0.3) brightness(0.75)';
      } else if (blockedCount === 1) {
        ctx.filter = 'grayscale(0.15) brightness(0.88)';
      } else if (blockedCount === 2) {
        ctx.filter = 'grayscale(0.25) brightness(0.80)';
      } else if (blockedCount >= 3) {
        ctx.filter = 'grayscale(0.35) brightness(0.72)';
      }
      ctx.drawImage(imgData, x + 2, y + 2, TILE_W - 4, TILE_H - 4);
      ctx.filter = 'none';
      ctx.restore();
    } else {
      // fallback: 显示卡牌emoji或类型文字
      ctx.fillStyle = isBlocked ? 'rgba(150,140,170,' + (0.20 + overlayAlpha).toFixed(2) + ')' : imgData?.color || effectiveCat.color || cat.color;
      const fallbackText = effectiveCat.emoji || cat.emoji || tile.type.slice(0, 2);
      ctx.font = effectiveCat.emoji || cat.emoji ? 'bold 20px sans-serif' : 'bold 11px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(fallbackText, x + TILE_W / 2, y + TILE_H / 2);
    }

    // 边框 — 干扰牌保持自身颜色，波斯双域用区域色，普通牌用 blockedCount 渐变色
    var lyrBorderColor;
    if (tile.areaTag) {
      lyrBorderColor = tile.areaTag === 'blue' ? '#1677FF' : '#00B42A';
    } else if (tile.isInterference) {
      lyrBorderColor = (effectiveCat.color || cat.color);
    } else if (typeof BoardConstants !== 'undefined') {
      lyrBorderColor = BoardConstants.getLayerBorderColor(blockedCount);
    } else {
      lyrBorderColor = (effectiveCat.color || cat.color);
    }
    ctx.strokeStyle = isHighlighted ? '#FFD700'
      : isInSlot ? (tile.areaTag ? lyrBorderColor + '80' : 'rgba(108,92,231,0.3)')
      : isBlocked ? lyrBorderColor + '60'
      : lyrBorderColor;
    ctx.lineWidth = isHighlighted ? 3 : 2.5;
    roundRect(ctx, x, y, TILE_W, TILE_H, 10);
    ctx.stroke();

    // 波斯双域：区域发光描边（蓝色域/绿色域），全程固定显示，入槽后消失
    if (!isInSlot && blockedCount === 0 && tile.areaTag) {
      ctx.save();
      const areaColor = tile.areaTag === 'blue' ? '#1677FF' : '#00B42A';
      ctx.shadowColor = areaColor;
      ctx.shadowBlur = 2;
      ctx.strokeStyle = areaColor + 'CC'; // 80% 不透明度
      ctx.lineWidth = 1.5;
      roundRect(ctx, x, y, TILE_W, TILE_H, 10);
      ctx.stroke();
      ctx.restore();
    }

    // 粘连牌专属特效：边缘胶水风格半透明边框
    if (tile.isInterference && tile.interferenceType === 'sticky' && !isBlocked && !isInSlot) {
      ctx.save();
      // 外层胶水光晕
      ctx.strokeStyle = 'rgba(253,121,168,0.5)';
      ctx.lineWidth = 4;
      ctx.setLineDash([6, 3]);
      roundRect(ctx, x - 1, y - 1, TILE_W + 2, TILE_H + 2, 11);
      ctx.stroke();
      ctx.setLineDash([]);
      // 内层半透明填充
      ctx.fillStyle = 'rgba(253,121,168,0.08)';
      roundRect(ctx, x, y, TILE_W, TILE_H, 10);
      ctx.fill();
      // 四角胶水圆点
      const dotPositions = [[x + 5, y + 5], [x + TILE_W - 5, y + 5], [x + 5, y + TILE_H - 5], [x + TILE_W - 5, y + TILE_H - 5]];
      dotPositions.forEach(([dx, dy]) => {
        ctx.beginPath();
        ctx.arc(dx, dy, 2.5, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(253,121,168,0.7)';
        ctx.fill();
      });
      ctx.restore();
    }

    // 三花牌专属特效：棋盘上显示🔮角标 + 变身时光效
    if (tile.isInterference && tile.interferenceType === 'transform' && !isBlocked && !isInSlot) {
      // 变身动画光效
      if (tile.transformAnimating) {
        ctx.save();
        ctx.fillStyle = 'rgba(162,155,254,0.25)';
        roundRect(ctx, x, y, TILE_W, TILE_H, 10);
        ctx.fill();
        // 变身闪烁边框
        ctx.strokeStyle = 'rgba(162,155,254,0.8)';
        ctx.lineWidth = 3;
        roundRect(ctx, x - 1, y - 1, TILE_W + 2, TILE_H + 2, 11);
        ctx.stroke();
        ctx.restore();
      }
      // 右上角🔮角标
      ctx.save();
      ctx.font = '9px sans-serif';
      ctx.textAlign = 'right';
      ctx.textBaseline = 'top';
      ctx.fillText('🔮', x + TILE_W - 3, y + 2);
      ctx.restore();
    }

    // 舔毛牌专属标记：金边 + 🧴角标（保留原图案，提示入槽后无法消除）
    if (tile.isInterference && tile.interferenceType === 'groom' && !isBlocked && !isInSlot) {
      ctx.save();
      ctx.strokeStyle = '#FDCB6E';
      ctx.lineWidth = 2.5;
      roundRect(ctx, x - 1, y - 1, TILE_W + 2, TILE_H + 2, 11);
      ctx.stroke();
      ctx.font = '11px sans-serif';
      ctx.textAlign = 'right';
      ctx.textBaseline = 'top';
      ctx.fillText('🧴', x + TILE_W - 2, y + 2);
      ctx.restore();
    }

    // 小狗牌专属标记：醒目的红色危险边框 + 🐶角标
    if (tile.isInterference && tile.interferenceType === 'danger' && !isBlocked && !isInSlot) {
      ctx.save();
      // 红色光晕警示
      ctx.shadowColor = 'rgba(255,80,80,0.45)';
      ctx.shadowBlur = 14;
      // 红色实线边框
      ctx.strokeStyle = '#FF6B6B';
      ctx.lineWidth = 3;
      roundRect(ctx, x - 1, y - 1, TILE_W + 2, TILE_H + 2, 11);
      ctx.stroke();
      ctx.shadowBlur = 0;
      // 右上角🐶角标
      ctx.font = '9px sans-serif';
      ctx.textAlign = 'right';
      ctx.textBaseline = 'top';
      ctx.fillText('🐶', x + TILE_W - 3, y + 2);
      ctx.restore();
    }

    // 真身牌专属标记：未暴露时玻璃壳特效
    if (isDisguiseOnBoard && !isBlocked && !isInSlot) {
      ctx.save();
      // 玻璃壳特效：明显的半透明冰蓝色渐变覆盖层
      const glassGrad = ctx.createLinearGradient(x, y, x + TILE_W, y + TILE_H);
      glassGrad.addColorStop(0, 'rgba(180,220,255,0.45)');
      glassGrad.addColorStop(0.3, 'rgba(200,235,255,0.25)');
      glassGrad.addColorStop(0.5, 'rgba(160,210,250,0.35)');
      glassGrad.addColorStop(0.7, 'rgba(200,230,255,0.2)');
      glassGrad.addColorStop(1, 'rgba(180,220,255,0.4)');
      ctx.fillStyle = glassGrad;
      roundRect(ctx, x, y, TILE_W, TILE_H, 10);
      ctx.fill();
      // 玻璃壳内边框高光（更明显）
      ctx.strokeStyle = 'rgba(255,255,255,0.6)';
      ctx.lineWidth = 1.5;
      roundRect(ctx, x + 1.5, y + 1.5, TILE_W - 3, TILE_H - 3, 9);
      ctx.stroke();
      // 玻璃壳外层发光边框
      ctx.strokeStyle = 'rgba(0,206,201,0.5)';
      ctx.lineWidth = 2;
      roundRect(ctx, x - 1, y - 1, TILE_W + 2, TILE_H + 2, 11);
      ctx.stroke();
      // 玻璃壳反光点（更大更明显）
      ctx.beginPath();
      ctx.ellipse(x + 10, y + 8, 10, 5, -0.3, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.55)';
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(x + TILE_W - 12, y + 10, 6, 3, 0.2, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.fill();
      // 🫧水滴角标
      ctx.font = '12px sans-serif';
      ctx.textAlign = 'right';
      ctx.textBaseline = 'top';
      ctx.fillText('🫧', x + TILE_W - 2, y + 1);
      // 胆小减免：额外高亮边框标记
      if (tile.cowardlyHighlight) {
        ctx.strokeStyle = 'rgba(0,206,201,0.8)';
        ctx.lineWidth = 2;
        roundRect(ctx, x - 2, y - 2, TILE_W + 4, TILE_H + 4, 12);
        ctx.stroke();
        ctx.shadowColor = 'rgba(0,206,201,0.4)';
        ctx.shadowBlur = 8;
        roundRect(ctx, x - 2, y - 2, TILE_W + 4, TILE_H + 4, 12);
        ctx.stroke();
        ctx.shadowBlur = 0;
      }
      ctx.restore();
    }

    // 高亮光晕
    if (isHighlighted) {
      ctx.shadowColor = 'rgba(255,215,0,0.6)';
      ctx.shadowBlur = 16;
      roundRect(ctx, x, y, TILE_W, TILE_H, 10);
      ctx.stroke();
      ctx.shadowBlur = 0;
    }

    // hover 效果
    if (isHover && !isBlocked && !isInSlot) {
      ctx.strokeStyle = (effectiveCat.color || cat.color) + '60';
      ctx.lineWidth = 1;
      roundRect(ctx, x - 1, y - 3, TILE_W + 2, TILE_H + 2, 11);
      ctx.stroke();
    }
    ctx.restore();
  });
}
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// Canvas 点击检测：从高 layer 到低 layer 找命中 tile
function hitTestTile(tiles, px, py) {
  const sorted = [...tiles].filter(t => !t.removed && !t.inSlot).sort((a, b) => b.layer - a.layer);
  for (const tile of sorted) {
    const off = getLayerOffset(tile.layer);
    const x = tileX(tile) + off.shadowX;
    const y = tileY(tile) + off.shadowY;
    if (px >= x && px <= x + TILE_W && py >= y && py <= y + TILE_H) {
      return tile;
    }
  }
  return null;
}

};
const STANDARD_PERSONALITIES = new Set(['傲娇', '吃货', '胆小', '黏人', '高冷', '话痨', '懒散', '胆大', '独行', '狡黠']);
function sanitizePersonality(raw, breedId) {
  if (!raw) return getDefaultPersonality(breedId);
  const val = Array.isArray(raw) ? raw[0] : raw;
  if (STANDARD_PERSONALITIES.has(val)) return val;
  if (PERSONALITY_CLEAN_MAP[val]) return PERSONALITY_CLEAN_MAP[val];
  for (const std of STANDARD_PERSONALITIES) {
    if (val.includes(std)) return std;
  }
  return getDefaultPersonality(breedId);
}

function shuffleArr(arr, rng) {
  const a = [...arr];
  const rand = rng || Math.random;
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(rand() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// 每日种子随机
function seededRandom(seed) {
  let s = seed;
  return function () {
    s = s * 1103515245 + 12345 & 0x7fffffff;
    return s / 0x7fffffff;
  };
}
function getDailySeed() {
  const d = new Date();
  return d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate();
}

  5:  { buryRate: 0.20, pathWidth: 2, noiseRate: 0.15 },
  10: { buryRate: 0.25, pathWidth: 2, noiseRate: 0.18 },
  15: { buryRate: 0.35, pathWidth: 2, noiseRate: 0.22 },
  20: { buryRate: 0.40, pathWidth: 1, noiseRate: 0.25 },
  25: { buryRate: 0.50, pathWidth: 1, noiseRate: 0.30 },
  30: { buryRate: 0.55, pathWidth: 1, noiseRate: 0.32 },

  const keys = Object.keys(DIFFICULTY_CONFIG).map(Number).sort((a,b) => a-b);
  if (DIFFICULTY_CONFIG[cycleLevel]) return { ...DIFFICULTY_CONFIG[cycleLevel] };
  if (cycleLevel <= keys[0]) return { ...DIFFICULTY_CONFIG[keys[0]] };
  if (cycleLevel >= keys[keys.length-1]) return { ...DIFFICULTY_CONFIG[keys[keys.length-1]] };
  let lo = keys[0], hi = keys[1];
  for (let i = 0; i < keys.length-1; i++) {
    if (keys[i] <= cycleLevel && cycleLevel < keys[i+1]) { lo=keys[i]; hi=keys[i+1]; break; }

    pathWidth: Math.round(a.pathWidth + t*(b.pathWidth - a.pathWidth)),

      var typeIndices = typeIds.map(function(t) { return typeToIdx[t]; });
      if (!BoardGenerator.isSolvable(typeIndices, uniqueTypes.length)) {
        console.warn('[BoardGen] P0配额验证失败，触发配额修正');
        var counts = {};
        typeIds.forEach(function(t) { counts[t] = (counts[t] || 0) + 1; });
        Object.keys(counts).forEach(function(t) {
          if (counts[t] % 3 !== 0) console.warn('[BoardGen] 类型 ' + t + ' 数量=' + counts[t] + ' 不是3的倍数!');
        });
      }
    }
  }

  // P1: 使用 BoardShapes 验证棋盘形状合法性
  if (typeof BoardShapes !== 'undefined' && result) {
    var shapeKey = BoardShapes.getShapeKeyForLevel(levelNum);
    var validCells = BoardShapes.getBoardShape(shapeKey);
    var validSet = new Set(validCells.map(function(c) { return c.row + ',' + c.col; }));
    var outOfBounds = result.filter(function(card) { return !validSet.has(card.row + ',' + card.col); });
    if (outOfBounds.length > 0) {
      console.warn('[BoardGen] P1形状验证: ' + outOfBounds.length + ' 张牌超出' + shapeKey + '棋盘边界');
    }
  }

  return result;
}

// 从牌池分配类型：每种牌恰好3张，并尽量跨层分散
function assignTypesFromPool(slots, levelNum, rng) {
  const cardCount = slots.length;
  const uniqueTypes = [...new Set(getCardPoolByLevel(levelNum))];
  const balancedPool = buildBalancedTypePool(cardCount, uniqueTypes, rng);

  // 按类型分组（每组3张同型）
  const typeGroups = [];
  for (let i = 0; i < balancedPool.length; i += 3) {
    typeGroups.push(balancedPool[i]);
  }
  const slotList = slots.map(s => ({
    ...s
  }));
  const assigned = new Set();

  // 列区域划分（3区），用于空间分散
  const allCols = slotList.map(s => s.col);
  const minCol = Math.min(...allCols);
  const maxCol = Math.max(...allCols);
  const colRange = maxCol - minCol || 1;
  const getColZone = col => Math.min(2, Math.floor((col - minCol) / (colRange / 3)));

  // Phase 1: 种子组 — 前 2~3 种类型优先占据可及位置（顶层 + 空间分散）
  const shuffledGroups = shuffleArr([...typeGroups], rng);
  const SEED_COUNT = Math.min(3, shuffledGroups.length);
  for (let gi = 0; gi < SEED_COUNT; gi++) {
    const type = shuffledGroups[gi];
    const groupSlots = [];
    const usedZones = new Set();

    // 可用槽位按可及性排序：高层优先 + 优选未用区域
    const available = slotList.filter(s => !assigned.has(s));
    available.sort((a, b) => {
      if (a.layer !== b.layer) return b.layer - a.layer;
      const za = getColZone(a.col),
        zb = getColZone(b.col);
      const zaU = usedZones.has(za),
        zbU = usedZones.has(zb);
      if (zaU !== zbU) return zaU ? 1 : -1;
      return 0;
    });
    for (const s of available) {
      if (groupSlots.length >= 3) break;
      const zone = getColZone(s.col);
      if (!usedZones.has(zone)) {
        groupSlots.push(s);
        usedZones.add(zone);
        assigned.add(s);
      }
    }
    // 放宽区域约束（同区域但不同层也可）
    if (groupSlots.length < 3) {
      for (const s of available) {
        if (groupSlots.length >= 3) break;
        if (!assigned.has(s)) {
          groupSlots.push(s);
          assigned.add(s);
        }
      }
    }
    groupSlots.forEach(s => {
      s.type = type;
    });
  }

  // Phase 2: 剩余类型按层+区域分散填充
  const remainingGroups = shuffledGroups.slice(SEED_COUNT);
  remainingGroups.forEach(type => {
    const groupSlots = [];
    const usedLayers = new Set();
    const usedZones = new Set();
    for (const s of slotList) {
      if (assigned.has(s)) continue;
      const zone = getColZone(s.col);
      if (groupSlots.length === 0 || !usedLayers.has(s.layer) && !usedZones.has(zone)) {
        groupSlots.push(s);
        usedLayers.add(s.layer);
        usedZones.add(zone);
        assigned.add(s);
        if (groupSlots.length >= 3) break;
      }
    }
    // 放宽区域约束
    for (const s of slotList) {
      if (groupSlots.length >= 3) break;
      if (!assigned.has(s) && !usedLayers.has(s.layer)) {
        groupSlots.push(s);
        usedLayers.add(s.layer);
        assigned.add(s);
      }
    }
    // 兜底
    for (const s of slotList) {
      if (groupSlots.length >= 3) break;
      if (!assigned.has(s)) {
        groupSlots.push(s);
        assigned.add(s);
      }
    }
    groupSlots.forEach(s => {
      s.type = type;
    });
  });
  enforceNoAdjacent(slotList, [{
    layer: 0
  }, {
    layer: 1
  }, {
    layer: 2
  }]);
  return slotList.map((s, i) => ({
    id: i,
    type: s.type,
    col: s.col,
    row: s.row,
    layer: s.layer,
    zone: s.zone || 'default',
    removed: false,
    inSlot: false,
    matched: false
  }));
}

// P0: 添加干扰牌
function addInterferenceCards(cards, levelConfig, rng) {
  if (!levelConfig.interference || levelConfig.interferenceCount === 0) {
    return cards;
  }
  const interferenceType = levelConfig.interference.id;
  const count = levelConfig.interferenceCount;
  console.log('[P2-Interference] addInterferenceCards called: type=' + interferenceType + ', count=' + count + ', totalCards=' + cards.length);

  // 冰冻牌不出现在棋盘上，直接占据收集槽前N格（freeze_grid_count），无需在棋盘上生成
  if (interferenceType === 'freeze') {
    return cards;
  }

  // 小狗牌：固定位置生成（右上角第一行最后一列），避免随机位置导致开局翻车
  // 优先使用关卡配置的dog_card_fixed_pos，否则使用全局默认位置
  if (interferenceType === 'danger') {
    // 配置开关检查：dog_card_enable === 0 时强制关闭
    if (levelConfig.dog_card_enable === 0) return cards;

    // 固定位置：优先使用关卡配置，否则默认右上角(row=1, col=8)
    const fixedPos = levelConfig.dog_card_fixed_pos || {
      row: 1,
      col: 8
    };
    const targetRow = fixedPos.row || fixedPos[0];
    const targetCol = fixedPos.col || fixedPos[1];

    // 在棋盘中查找目标位置的卡牌（优先顶层，确保可点击）
    let targetCard = null;
    const sortedByLayer = [...cards].filter(c => !c.removed && c.row === targetRow && c.col === targetCol).sort((a, b) => (b.layer || 0) - (a.layer || 0));
    if (sortedByLayer.length > 0) {
      targetCard = sortedByLayer[0]; // 取最高层
    } else {
      // 目标位置无卡牌（异形棋盘），降级到随机顶层位置
      const maxL = Math.max(...cards.filter(c => !c.removed).map(c => c.layer || 0));
      const topCards = cards.filter(c => !c.removed && (c.layer || 0) === maxL);
      targetCard = topCards.length > 0 ? topCards[Math.floor(rng() * topCards.length)] : null;
    }
    if (!targetCard) return cards;
    return applyInterferenceToCards(cards, [targetCard], interferenceType, rng);
  }

  // 获取可放置干扰牌的位置（顶层可点击的位置）
  const maxLayer = Math.max(...cards.filter(c => !c.removed).map(c => c.layer || 0));
  const topLayerCards = cards.filter(c => !c.removed && (c.layer || 0) === maxLayer);

  // 粘连牌/三花牌/真身牌特殊约束：两张牌之间至少间隔1格，避免相邻
  if (interferenceType === 'sticky' || interferenceType === 'transform' || interferenceType === 'disguise') {
    // 真身牌配置开关：real_card_enable === 0 时强制关闭
    if (interferenceType === 'disguise' && levelConfig.real_card_enable === 0) return cards;
    const iCount = interferenceType === 'sticky' ? levelConfig.stick_card_count || count || 2 : interferenceType === 'transform' ? levelConfig.transform_card_count || count || 2 : levelConfig.real_card_count || count || 2;
    const selectedCards = [];
    const shuffledTop = shuffleArr([...topLayerCards], rng);

    // 粘连牌：优先选择有相邻同层卡牌的位置，保证点击时能触发连带效果
    if (interferenceType === 'sticky') {
      const allCards = cards.filter(c => !c.removed);
      const hasNeighbor = card => {
        const dirs = [{
          dr: -1,
          dc: 0
        }, {
          dr: 1,
          dc: 0
        }, {
          dr: 0,
          dc: -1
        }, {
          dr: 0,
          dc: 1
        }];
        return dirs.some(({
          dr,
          dc
        }) => allCards.some(other => other.id !== card.id && other.layer === card.layer && other.row === card.row + dr && other.col === card.col + dc));
      };
      const withNeighbor = shuffledTop.filter(hasNeighbor);
      const withoutNeighbor = shuffledTop.filter(c => !hasNeighbor);
      const sortedCandidates = [...withNeighbor, ...withoutNeighbor];
      for (const card of sortedCandidates) {
        if (selectedCards.length >= iCount) break;
        const isAdjacent = selectedCards.some(sc => Math.abs(sc.row - card.row) + Math.abs(sc.col - card.col) <= 1);
        if (!isAdjacent) {
          selectedCards.push(card);
        }
      }
      console.log('[P2-Interference] sticky: withNeighbor=' + withNeighbor.length + ', withoutNeighbor=' + withoutNeighbor.length + ', selected=' + selectedCards.length + '/iCount=' + iCount + ', top=' + topLayerCards.length);
    } else {
      for (const card of shuffledTop) {
        if (selectedCards.length >= iCount) break;
        // 检查与已选中的牌是否相邻（上下左右，曼哈顿距离=1）
        const isAdjacent = selectedCards.some(sc => Math.abs(sc.row - card.row) + Math.abs(sc.col - card.col) <= 1);
        if (!isAdjacent) {
          selectedCards.push(card);
        }
      }
    }
    // 若顶层空间不足以放置所有干扰牌（间隔约束），降级到不限制间隔
    if (selectedCards.length < iCount) {
      // 保留已选中的，从剩余牌中补齐
      const remaining = shuffledTop.filter(c => selectedCards.every(sc => sc.id !== c.id));
      const fallbackSelected = [...selectedCards, ...remaining].slice(0, Math.min(iCount, shuffledTop.length));
      console.log('[P2-Interference] ' + interferenceType + ': fallback, selected=' + fallbackSelected.length + '/iCount=' + iCount + ', top=' + topLayerCards.length);
      return applyInterferenceToCards(cards, fallbackSelected, interferenceType, rng);
    }
    console.log('[P2-Interference] ' + interferenceType + ': OK, selected=' + selectedCards.length + '/iCount=' + iCount + ', top=' + topLayerCards.length);
    return applyInterferenceToCards(cards, selectedCards, interferenceType, rng);
  }

  // 舔毛牌：替换3张同型牌为1张舔毛牌，保持牌池3的倍数
  if (interferenceType === 'groom') {
    const shuffledTop = shuffleArr([...topLayerCards], rng);
    const typeCounts = {};
    cards.forEach(c => {
      if (!c.removed) typeCounts[c.type] = (typeCounts[c.type] || 0) + 1;
    });
    // 优先从拥有6张以上的牌型中选取（避免完全消除一种牌型）
    const richTopCards = shuffledTop.filter(c => (typeCounts[c.type] || 0) >= 6);
    const selected = richTopCards.length > 0 ? richTopCards[Math.floor(rng() * richTopCards.length)] : shuffledTop[Math.floor(rng() * shuffledTop.length)];
    // 找到同类型的另外2张牌并移除，保持该类型剩余3的倍数
    const sameTypeOthers = cards.filter(c => !c.removed && c.type === selected.type && c.id !== selected.id);
    const removeIds = new Set(sameTypeOthers.slice(0, 2).map(c => c.id));
    return cards.filter(c => !removeIds.has(c.id)).map(card => {
      if (card.id === selected.id) {
        return {
          ...card,
          type: `__interference_${interferenceType}__`,
          isInterference: true,
          interferenceType: interferenceType,
          revealed: true
        };
      }
      return card;
    });
  }

  // 随机选择位置放置干扰牌
  const shuffledTop = shuffleArr([...topLayerCards], rng);
  const selectedCards = shuffledTop.slice(0, Math.min(count, shuffledTop.length));
  return applyInterferenceToCards(cards, selectedCards, interferenceType, rng);
}

// 将干扰牌属性应用到选中的卡牌
function applyInterferenceToCards(cards, selectedCards, interferenceType, rng) {
  // 获取当前关卡棋盘上实际使用的猫咪类型（用于真身牌伪装贴图随机）
  const availableTypes = [...new Set(cards.map(c => c.type).filter(t => !t.startsWith('__interference_')))];

  // 真身牌特殊处理：在2张现有牌上盖上伪装壳
  // 真身牌不替换原始牌，仅加上伪装壳属性，点击后去掉壳以原始type正常入槽三消
  if (interferenceType === 'disguise') {
    // 随机选1种牌型作为2张真身牌的统一伪装面
    const disguiseType = availableTypes.length > 0 ? availableTypes[Math.floor(rng() * availableTypes.length)] : null;

    // 在选中的牌上加盖伪装壳属性（不改变原始type）
    return cards.map(card => {
      if (selectedCards.some(sc => sc.id === card.id)) {
        return {
          ...card,
          isInterference: true,
          interferenceType: 'disguise',
          isDisguiseShell: true,
          // 标记有伪装壳
          disguisedAs: disguiseType,
          // 伪装的牌型（棋盘上显示这个type的图片+玻璃壳）
          revealed: false
        };
      }
      return card;
    });
  }
  return cards.map(card => {
    if (selectedCards.some(sc => sc.id === card.id)) {
      return {
        ...card,
        // 粘连/三花/小狗/舔毛保留原始type（小狗点击即失败、舔毛入槽即占位，均不参与三消匹配）；
        // 只有真身牌/冰冻牌等改为__interference_xxx__以便专属渲染
        ...(interferenceType !== 'sticky' && interferenceType !== 'transform' && interferenceType !== 'danger' && interferenceType !== 'groom' ? {
          type: `__interference_${interferenceType}__`
        } : {}),
        isInterference: true,
        interferenceType: interferenceType,
        originalType: interferenceType === 'transform' || interferenceType === 'danger' ? card.type : undefined,
        displayType: interferenceType === 'transform' ? card.type : undefined,
        revealed: true
      };
    }
    return card;
  });
}

// 类型分配：确保总数3的倍数、跨层分散、同层不相邻、顶层覆盖
function assignTypes(slots, typeIndices, layers, rng) {
  const total = slots.length;
  const groups = total / 3;
  const maxLayer = Math.max(...layers.map(l => l.layer));

  // 按 layer 分组
  const byLayer = {};
  slots.forEach(s => {
    (byLayer[s.layer] = byLayer[s.layer] || []).push(s);
  });

  // 分配：每组3张，尽量跨层
  const assigned = [];
  const sortedSlots = [...slots].sort((a, b) => b.layer - a.layer); // 高层优先

  for (let g = 0; g < groups; g++) {
    const type = CAT_TYPES[typeIndices[g % typeIndices.length]].id;
    // 从不同层各取1张
    const group = [];
    const usedLayers = new Set();
    for (const s of sortedSlots) {
      if (assigned.includes(s)) continue;
      if (group.length < 3) {
        if (group.length === 0 || !usedLayers.has(s.layer)) {
          group.push(s);
          usedLayers.add(s.layer);
        }
      }
    }
    // 如果跨层不够，补充任意未用的
    if (group.length < 3) {
      for (const s of sortedSlots) {
        if (assigned.includes(s) || group.includes(s)) continue;
        group.push(s);
        if (group.length >= 3) break;
      }
    }
    group.slice(0, 3).forEach(s => {
      assigned.push(s);
      s.type = type;
    });
  }

  // 给未分配的补上类型
  slots.forEach(s => {
    if (!s.type) s.type = CAT_TYPES[typeIndices[0]].id;
  });

  // 同层相邻检查 & 交换
  enforceNoAdjacent(slots, layers);
  return slots.map((s, i) => ({
    id: i,
    type: s.type,
    col: s.col,
    row: s.row,
    layer: s.layer,
    zone: s.zone || 'default',
    // P0: 保留区域信息
    removed: false,
    inSlot: false,
    matched: false
  }));
}
function enforceNoAdjacent(slots, layers) {
  layers.forEach(la => {
    const layerSlots = slots.filter(s => s.layer === la.layer);
    for (let i = 0; i < layerSlots.length; i++) {
      for (let j = i + 1; j < layerSlots.length; j++) {
        const a = layerSlots[i],
          b = layerSlots[j];
        if (a.type !== b.type) continue;
        if (Math.abs(a.col - b.col) > 1 || Math.abs(a.row - b.row) > 1) continue;

        // 优先在同层找到类型不同且自身无邻接问题的卡交换
        let swapTarget = null;
        for (const s of layerSlots) {
          if (s === a || s === b || s.type === a.type) continue;
          const hasOwnAdjacency = layerSlots.some(o => o !== s && o.type === s.type && Math.abs(o.col - s.col) <= 1 && Math.abs(o.row - s.row) <= 1);
          if (!hasOwnAdjacency) {
            swapTarget = s;
            break;
          }
        }
        // 降级：跨层交换，优先低层（保护顶层种子组）
        if (!swapTarget) {
          const crossCandidates = slots.filter(s => s.layer !== a.layer && s.type !== a.type).sort((x, y) => x.layer - y.layer);
          swapTarget = crossCandidates[0] || null;
        }
        if (swapTarget) {
          const tmp = swapTarget.type;
          swapTarget.type = a.type;
          a.type = tmp;
        }
      }
    }
  });
}

// 可解性校验（贪心 + 有限DFS回溯）
function isSolvable(cards) {
  const excludeIds = new Set(cards.filter(c => c.isInterference && (c.interferenceType === 'danger' || c.interferenceType === 'groom')).map(c => c.id));
  const remaining = cards.filter(c => !excludeIds.has(c.id)).map(c => ({
    ...c,
    removed: false
  }));
  const SLOT_SIZE = SLOT_CAPACITY;
  const matchTypeOf = c => getTileMatchType(c);
  const isGroomTile = c => c.isInterference && c.interferenceType === 'groom';

  // 深度克隆状态
  const cloneState = (slots, groomed, removedMap) => ({
    slots: [...slots],
    groomed,
    removed: new Map(removedMap)
  });

  // 收集槽中匹配（不要求连续位置，跳过舔毛牌）
  const tryMatchInSlots = slotsFn => {
    const s = slotsFn;
    const nonGroom = [];
    const groomPositions = [];
    for (let i = 0; i < s.length; i++) {
      if (!s[i]) continue;
      if (s[i].isGroom) {
        groomPositions.push(i);
        continue;
      }
      nonGroom.push({
        idx: i,
        type: s[i].type
      });
    }
    // 按类型分组，每种类型取3张消除
    const byType = {};
    nonGroom.forEach(item => {
      if (!byType[item.type]) byType[item.type] = [];
      byType[item.type].push(item.idx);
    });
    let matched = false;
    for (const [type, indices] of Object.entries(byType)) {
      if (indices.length >= 3) {
        indices.slice(0, 3).forEach(i => {
          s[i] = null;
        });
        matched = true;
        break; // 一次只消一组，然后重新compact
      }
    }
    if (!matched) return false;
    // compact：保留舔毛牌位置不变，其他牌左移
    const kept = [];
    for (let i = 0; i < s.length; i++) {
      if (s[i] && s[i].isGroom) {
        kept.push({
          idx: i,
          val: s[i]
        });
        s[i] = null;
      }
    }
    let writeIdx = 0;
    for (let i = 0; i < s.length; i++) {
      if (s[i] && !s[i].isGroom) {
        while (writeIdx < s.length && s[writeIdx] !== null) writeIdx++;
        if (writeIdx < s.length && writeIdx !== i) {
          s[writeIdx] = s[i];
          s[i] = null;
        }
      }
    }
    kept.forEach(({
      idx,
      val
    }) => {
      s[idx] = val;
    });
    return true;
  };

  // 贪心模拟一步（返回是否成功消除了一组）
  const greedyStep = (slotsFn, remainingFn) => {
    const clickable = remainingFn.filter(c => !c.removed && !isTileBlockedSolvable(c, remainingFn));
    if (clickable.length === 0) return {
      stuck: true
    };

    // 策略1：优先选能立即凑成三消的牌（槽内已有≥2张同型）
    const canMatch = clickable.filter(c => {
      if (isGroomTile(c)) return false;
      const t = matchTypeOf(c);
      return slotsFn.filter(s => s && !s.isGroom && s.type === t).length >= 2;
    });
    if (canMatch.length > 0) {
      const card = canMatch[0];
      const nullIdx = slotsFn.indexOf(null);
      if (nullIdx === -1) return {
        stuck: true
      };
      slotsFn[nullIdx] = {
        type: matchTypeOf(card),
        isGroom: false
      };
      card.removed = true;
      return {
        matched: true
      };
    }

    // 策略2：无立即可消除的，选可点击牌中 board 上剩余同类型最多的（提高后续匹配概率）
    const nonGroomClickable = clickable.filter(c => !isGroomTile(c));
    if (nonGroomClickable.length > 0) {
      // 统计每种类型在剩余牌中的数量
      const typeCount = {};
      remainingFn.filter(c => !c.removed && !isGroomTile(c)).forEach(c => {
        const t = matchTypeOf(c);
        typeCount[t] = (typeCount[t] || 0) + 1;
      });
      // 选数量最多的类型（更可能完成匹配）

  const top = tileY(tile) + off.shadowY;
  const right = left + TILE_W;
  const bottom = top + TILE_H;
  const area = TILE_W * TILE_H;
  let overlap = 0;
  for (const other of allTiles) {
    if (other.id === tile.id || other.removed || other.layer <= tile.layer) continue;
    if (other.inSlot) continue;
    const oOff = getLayerOffset(other.layer);
    const oLeft = tileX(other) + oOff.shadowX;
    const oTop = tileY(other) + oOff.shadowY;
    const oRight = oLeft + TILE_W;
    const oBottom = oTop + TILE_H;
    overlap += Math.max(0, Math.min(right, oRight) - Math.max(left, oLeft)) * Math.max(0, Math.min(bottom, oBottom) - Math.max(top, oTop));
  }
  return overlap / area;
}

  const top = tileY(tile) + off.shadowY;
  const right = left + TILE_W;
  const bottom = top + TILE_H;
  const area = TILE_W * TILE_H;
  let count = 0;
  for (const other of allTiles) {
    if (other.id === tile.id || other.removed || other.layer <= tile.layer) continue;
    if (other.inSlot) continue;
    const oOff = getLayerOffset(other.layer);
    const oLeft = tileX(other) + oOff.shadowX;
    const oTop = tileY(other) + oOff.shadowY;
    const oRight = oLeft + TILE_W;
    const oBottom = oTop + TILE_H;
    const overlap = Math.max(0, Math.min(right, oRight) - Math.max(left, oLeft)) *
                    Math.max(0, Math.min(bottom, oBottom) - Math.max(top, oTop));
    if (overlap / area > 0.1) {
      count++;
    }
  }

}

function isTileBlocked(tile, allTiles) {
  if (tile.removed || tile.inSlot) return true;

}
