// Live reload — 检测文件变化自动刷新（仅本地开发）
(function(){
  let lastEtag = '';
  async function check() {
    try {
      const r = await fetch(location.href, { cache: 'no-store' });
      const etag = r.headers.get('etag') || (await r.text()).length;
      if (lastEtag && etag !== lastEtag) location.reload();
      lastEtag = etag;
    } catch(e) {}
  }
  setInterval(check, 1000);
})();

    maxPerGame: 3,         // 每局基础鱼干上限 = 3个

  // 额外鱼干规则

};

/**
 * P7: 计算本局获得的鱼干数量
 * @param {number} comboCount - 本局有效三消次数
 * @param {number} totalBonusRatio - 总加成比例（所有来源加成之和）
 * @param {boolean} hasCleverCat - 是否有狡黠性格猫咪上阵
 * @param {number} cleverCatLevel - 狡黠猫亲密度等级（1-5）
 * @returns {object} { baseFish, extraFish, totalFish }
 */
function calculateFishReward(comboCount, totalBonusRatio, hasCleverCat = false, cleverCatLevel = 1) {
  // 步骤1: 计算基础鱼干数量（向下取整，每6次三消得1个）
  const baseFish = Math.floor(comboCount / FISH_ECONOMY.baseFish.comboRequired);
  const cappedBaseFish = Math.min(baseFish, FISH_ECONOMY.baseFish.maxPerGame);
  
  // 步骤2: 确保加成比例为非负数
  const safeBonusRatio = Math.max(0, totalBonusRatio);
  
  // 步骤3: 计算额外鱼干数量
  const extraFishBeforeCap = Math.floor(cappedBaseFish * safeBonusRatio);
  
  // 步骤4: 计算额外鱼干上限
  let extraFishLimit = FISH_ECONOMY.extraFish.defaultMax;
  if (hasCleverCat) {
    const cleverBonus = INTIMACY_EFFECTS[cleverCatLevel]?.extraFishLimit || 0;
    extraFishLimit = FISH_ECONOMY.extraFish.defaultMax + cleverBonus;
    extraFishLimit = Math.min(extraFishLimit, FISH_ECONOMY.extraFish.maxWithClever);
  }
  
  // 步骤5: 修正额外鱼干数量（不能超过上限）
  const finalExtraFish = Math.min(extraFishBeforeCap, extraFishLimit);
  
  // 步骤6: 计算总鱼干
  const totalFish = cappedBaseFish + finalExtraFish;
  
  return {
    baseFish: cappedBaseFish,
    extraFish: finalExtraFish,
    totalFish: Math.min(totalFish, FISH_ECONOMY.totalMaxPerGame),
    extraFishLimit,
  };
}

/**
 * P7: 根据猫咪性格计算总鱼干加成比例

 * @param {number} intimacyLevel - 亲密度等级（1-5）
 * @returns {number} 加成比例（如 0.15 表示 +15%）
 */

  if (!personality) return 0;
  
  const effects = INTIMACY_EFFECTS[intimacyLevel] || INTIMACY_EFFECTS[1];
  
  // 吃货性格：额外鱼干百分比加成
  if (personality === '吃货') {
    return effects.personalityBonus;
  }
  
  return 0;
}

// 获取指定类型的棋盘坐标白名单
function getBoardCoordsByType(boardType) {
  switch (boardType) {
    case BOARD_TYPES.love:
      return LOVE_BOARD_COORDS;
    case BOARD_TYPES.diamond:
      return DIAMOND_BOARD_COORDS;
    case BOARD_TYPES.persia:
      return PERSIA_BOARD_COORDS;
    case BOARD_TYPES.butterfly:
      return BUTTERFLY_BOARD_COORDS;
    case BOARD_TYPES.petal:
      return PETAL_BOARD_COORDS;
    case BOARD_TYPES.hourglass:
      return HOURGLASS_BOARD_COORDS;
    default:
      return BOARD_COORDS;
  }
}

// 获取指定类型的棋盘边界
function getBoardBoundsByType(boardType) {
  const coords = getBoardCoordsByType(boardType);
  let maxCol = 1, maxRow = 1;
  coords.forEach(c => {
    if (c.col > maxCol) maxCol = c.col;
    if (c.row > maxRow) maxRow = c.row;
  });
  return { boardW: maxCol * TILE_W, boardH: maxRow * TILE_H };
}

// 检查坐标是否在白名单内
function isCoordAllowed(row, col, boardType) {
  let coordsSet;
  if (boardType === BOARD_TYPES.love) {
    coordsSet = LOVE_BOARD_COORDS_SET;
  } else if (boardType === BOARD_TYPES.diamond) {
    coordsSet = DIAMOND_BOARD_COORDS_SET;
  } else if (boardType === BOARD_TYPES.persia) {
    coordsSet = PERSIA_BOARD_COORDS_SET;
  } else if (boardType === BOARD_TYPES.butterfly) {
    coordsSet = BUTTERFLY_BOARD_COORDS_SET;
  } else if (boardType === BOARD_TYPES.petal) {
    coordsSet = PETAL_BOARD_COORDS_SET;
  } else if (boardType === BOARD_TYPES.hourglass) {
    coordsSet = HOURGLASS_BOARD_COORDS_SET;
  } else {
    coordsSet = BOARD_COORDS_SET;
  }
  return coordsSet.has(`${row},${col}`);
}

// 根据关卡获取对应牌池
function getCardPoolByLevel(levelNum) {

  if (levelNum >= 11 && levelNum <= 20) return [...CARD_POOL_11_20];
  return [...CARD_POOL_21_30];
}

// Fisher-Yates 洗牌算法
function shuffleCardPool(pool, rng) {
  const arr = [...pool];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// P4: 关卡轮回机制 - 30关后循环
function getLevelConfig(levelNum) {
  // 轮回机制：第31关复刻第1关，第32关复刻第2关...
  const cycleLevel = ((levelNum - 1) % 30) + 1;
  return LEVELS[cycleLevel];
}

// 判断某关卡是否应触发冰冻牌
// 规则：1) 配置开关 freeze_card_enable 优先级最高（0=强制关闭，1=开启）
//       2) 无配置开关时，关卡名称包含「蓝猫冰封」关键词则触发
//       3) 需同时配置了 INTERFERENCE_TYPES.freeze 干扰才生效
function shouldTriggerFreeze(levelConfig) {
  if (!levelConfig) return false;
  if (levelConfig.interference !== INTERFERENCE_TYPES.freeze) return false;
  // 配置开关优先级最高
  if (levelConfig.freeze_card_enable === 0) return false; // 强制关闭
  if (levelConfig.freeze_card_enable === 1) return true;  // 强制开启
  // 无配置开关时，根据关卡名称关键词匹配
  return levelConfig.name && levelConfig.name.includes('蓝猫冰封');
}

// 使用1-based坐标：row 1-6, col 1-8
// 始终基于BOARD_COORDS白名单计算，确保6行8列正确显示
function getBoardBounds(layers) {
  let maxCol = 1, maxRow = 1;
  BOARD_COORDS.forEach(c => {
    if (c.col > maxCol) maxCol = c.col;
    if (c.row > maxRow) maxRow = c.row;
  });
  // 像素尺寸 = 最大坐标 * 格子尺寸
  return { boardW: maxCol * TILE_W, boardH: maxRow * TILE_H };
}

// Tile 像素坐标（1-based坐标系统：row 1-6, col 1-8）
function tileX(tile) { return (tile.col - 1) * TILE_W + getLayerOffset(tile.layer).ox; }
function tileY(tile) { return (tile.row - 1) * TILE_H + getLayerOffset(tile.layer).oy; }
let _layerOffsetMap = {};
function getLayerOffset(layer) {
  const offset = _layerOffsetMap[layer];
  return {
    ox: offset?.offsetX ?? offset?.ox ?? 0,
    oy: offset?.offsetY ?? offset?.oy ?? 0
  };
}
function buildLayerOffsetMap(layers) {
  _layerOffsetMap = {};
  layers.forEach(la => { _layerOffsetMap[la.layer] = { ox: la.offsetX, oy: la.offsetY }; });
}

   PARTICLE ENGINE (Canvas 2D)
   ═══════════════════════════════════════ */
const PARTICLE_MAX = 500;
const _particles = new Array(PARTICLE_MAX);
for (let i = 0; i < PARTICLE_MAX; i++) _particles[i] = { active: false };
let _activeCount = 0;
const _comboTexts = [];

function _pInit(p, opts) {
  p.active = true; _activeCount++;
  p.x = opts.x; p.y = opts.y;
  p.vx = opts.vx || 0; p.vy = opts.vy || 0;
  p.life = opts.life || 1; p.maxLife = p.life;
  p.size = opts.size || 3; p.sizeEnd = opts.sizeEnd != null ? opts.sizeEnd : 0;
  p.color = opts.color || '#FFD700';
  p.alpha = opts.alpha != null ? opts.alpha : 1; p.alphaEnd = opts.alphaEnd != null ? opts.alphaEnd : 0;
  p.rotation = opts.rotation || 0; p.rotSpeed = opts.rotSpeed || 0;
  p.shape = opts.shape || 'circle'; // circle | rect | star | ring
  p.gravity = opts.gravity != null ? opts.gravity : 0.3;
  p.friction = opts.friction || 0.98;
  p.glow = opts.glow || false;
}

function _pUpdate(p, dt) {
  p.life -= dt;
  if (p.life <= 0) { p.active = false; _activeCount--; return; }
  p.vx *= p.friction; p.vy *= p.friction;
  p.vy += p.gravity * dt;
  p.x += p.vx * dt * 60; p.y += p.vy * dt * 60;
  p.rotation += p.rotSpeed * dt;
}

function _drawStar(ctx, cx, cy, outerR) {
  ctx.beginPath();
  for (let i = 0; i < 10; i++) {
    const r = i % 2 === 0 ? outerR : outerR * 0.4;
    const a = Math.PI * i / 5 - Math.PI / 2;
    i === 0 ? ctx.moveTo(cx + Math.cos(a)*r, cy + Math.sin(a)*r) : ctx.lineTo(cx + Math.cos(a)*r, cy + Math.sin(a)*r);
  }
  ctx.closePath(); ctx.fill();
}

function _pDraw(p, ctx) {
  const t = 1 - p.life / p.maxLife;
  const alpha = Math.max(0, p.alpha + (p.alphaEnd - p.alpha) * t);
  const size = Math.max(0, p.size + (p.sizeEnd - p.size) * t);
  if (alpha <= 0 || size <= 0) return;
  ctx.save(); ctx.globalAlpha = alpha;
  ctx.translate(p.x, p.y); ctx.rotate(p.rotation);
  if (p.glow) { ctx.shadowColor = p.color; ctx.shadowBlur = size * 3; }
  ctx.fillStyle = p.color;
  if (p.shape === 'circle') { ctx.beginPath(); ctx.arc(0, 0, size, 0, Math.PI*2); ctx.fill(); }
  else if (p.shape === 'rect') { ctx.fillRect(-size, -size*0.6, size*2, size*1.2); }
  else if (p.shape === 'star') { _drawStar(ctx, 0, 0, size); }
  else if (p.shape === 'ring') { ctx.beginPath(); ctx.arc(0,0,size,0,Math.PI*2); ctx.strokeStyle=p.color; ctx.lineWidth=1.5; ctx.stroke(); }
  ctx.restore();
}

function _getSlot() {
  for (let i = 0; i < PARTICLE_MAX; i++) if (!_particles[i].active) return _particles[i];
  return null;
}
function _pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function _rand(a, b) { return a + Math.random() * (b - a); }

function emitExplosion(x, y, color) {
  // core flash
  const c = _getSlot(); if (c) _pInit(c, { x, y, life: 0.25, size: 18, sizeEnd: 0, color: '#FFF', gravity: 0, glow: true });
  // shockwave ring

  // debris
  for (let i = 0; i < 20; i++) {
    const p = _getSlot(); if (!p) break;
    const a = Math.PI*2*i/20 + _rand(-0.2,0.2);
    const spd = _rand(2, 5);
    _pInit(p, { x, y, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd, life: _rand(0.4, 0.8), size: _rand(2,4.5), sizeEnd: 0, color, shape: Math.random()>0.5?'rect':'circle', gravity: _rand(0.2,0.4), friction: 0.97, rotation: _rand(0,6.28), rotSpeed: _rand(-5,5), glow: Math.random()>0.5 });
  }
  // stars
  for (let i = 0; i < 5; i++) {
    const p = _getSlot(); if (!p) break;
    const a = _rand(0, 6.28); const spd = _rand(1, 3.5);
    _pInit(p, { x, y, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd, life: _rand(0.5, 1), size: _rand(3,5.5), sizeEnd: 0, color: '#FFD700', shape: 'star', gravity: 0.12, rotSpeed: _rand(-3,3), glow: true });
  }
}

function emitCombo(x, y, count) {
  _comboTexts.push({ x, y, text: count + 'x 连击!', life: 1.2, maxLife: 1.2, color: _pick(['#FF6B6B','#FFD93D','#6BCB77','#4D96FF','#9B59B6']) });

  }

    _pInit(p, { x, y, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd, life: _rand(0.4, 0.8), size: _rand(2,3.5), sizeEnd: 0, color: _pick(['#FF6B6B','#FF8E53','#FFD93D','#6BCB77','#4D96FF','#9B59B6']), shape: 'star', gravity: 0, friction: 0.96, glow: true, rotSpeed: _rand(-4,4) });

function emitWinConfetti(cx, cy) {

    _pInit(p, { x: cx+_rand(-20,20), y: cy+_rand(-20,20), vx: Math.cos(a)*spd, vy: Math.sin(a)*spd - _rand(2,5), life: _rand(0.8, 1.8), size: _rand(3,6), sizeEnd: _rand(1,3), color: _pick(['#FF6B6B','#FFD93D','#6BCB77','#4D96FF','#A29BFE','#FD79A8','#FF8E53']), shape: Math.random()>0.4?'rect':'circle', gravity: _rand(0.3,0.6), friction: 0.97, rotation: _rand(0,6.28), rotSpeed: _rand(-8,8) });
  }
}

function runParticleFrame(ctx, dt) {
  if (_activeCount <= 0 && _comboTexts.length === 0) return;
  for (let i = 0; i < PARTICLE_MAX; i++) { if (_particles[i].active) { _pUpdate(_particles[i], dt); _pDraw(_particles[i], ctx); } }
  // combo texts
  for (let i = _comboTexts.length - 1; i >= 0; i--) {
    const ct = _comboTexts[i]; ct.life -= dt;
    if (ct.life <= 0) { _comboTexts.splice(i, 1); continue; }
    const t = 1 - ct.life / ct.maxLife;
    const scale = 1 + t * 0.4;
    const alpha = t < 0.1 ? t/0.1 : (1-t);
    ctx.save(); ctx.globalAlpha = Math.max(0, alpha);
    ctx.translate(ct.x, ct.y); ctx.scale(scale, scale);
    ctx.font = 'bold 22px -apple-system, sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = ct.color; ctx.shadowColor = ct.color; ctx.shadowBlur = 12;
    ctx.fillText(ct.text, 0, 0);
    ctx.strokeStyle = '#FFF'; ctx.lineWidth = 0.8; ctx.strokeText(ct.text, 0, 0);
    ctx.restore();
  }
}

// ═══ Canvas 2D 棋盘绘制 ═══
function drawTiles(ctx, tiles, highlightedIds, hoverId, boardW, boardH) {
  ctx.clearRect(0, 0, boardW, boardH);

  // 按 layer 排序绘制
  const sorted = [...tiles].filter(t => !t.removed).sort((a, b) => {
    if (a.layer !== b.layer) return a.layer - b.layer;
    if (a.row !== b.row) return a.row - b.row;
    return a.col - b.col;
  });

  sorted.forEach(tile => {
    // 查找卡牌视觉定义：先找普通牌，再找干扰牌
    let cat = CAT_TYPES.find(c => c.id === tile.type);
    if (!cat && tile.isInterference) {
      const iCard = INTERFERENCE_CARDS[tile.interferenceType];
      if (iCard) cat = iCard;
    }
    if (!cat) return;
    const x = tileX(tile);
    const y = tileY(tile);
    const isBlocked = calcOverlap(tile, tiles) > 0.3;
    const isInSlot = tile.inSlot;
    const isHighlighted = highlightedIds.includes(tile.id);
    const isHover = tile.id === hoverId;

    ctx.save();

    // 入场动画（简化：用 opacity 渐入）
    // 背景
    if (isInSlot) {
      ctx.globalAlpha = 0; // 点击后进入收集槽，不显示虚影
      ctx.fillStyle = 'rgba(108,92,231,0.15)';
    } else if (isBlocked) {
      ctx.globalAlpha = 0.5;
      ctx.fillStyle = 'rgba(40,30,60,0.4)';
    } else {
      ctx.globalAlpha = 1;
      ctx.fillStyle = 'rgba(255,255,255,0.95)';
    }
    roundRect(ctx, x, y, TILE_W, TILE_H, 10);
    ctx.fill();

    // 图片
    const imgData = _tileImages[tile.type];
    // 检查是否是真正的Image对象且已加载完成
    if (imgData && imgData.tagName === 'IMG' && imgData.complete && imgData.naturalWidth > 0) {
      ctx.save();
      ctx.beginPath();
      roundRect(ctx, x + 2, y + 2, TILE_W - 4, TILE_H - 4, 8);
      ctx.clip();
      if (isBlocked || isInSlot) ctx.filter = 'grayscale(0.5) brightness(0.6)';
      ctx.drawImage(imgData, x + 2, y + 2, TILE_W - 4, TILE_H - 4);
      ctx.filter = 'none';
      ctx.restore();
    } else {
      // fallback: 显示卡牌类型文字
      ctx.fillStyle = isBlocked ? 'rgba(150,140,170,0.5)' : (imgData?.color || cat.color);
      ctx.font = 'bold 11px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(tile.type.slice(0, 2), x + TILE_W/2, y + TILE_H/2);
    }

    // 边框
    ctx.strokeStyle = isHighlighted ? '#FFD700' : isInSlot ? 'rgba(108,92,231,0.3)' : isBlocked ? 'rgba(255,255,255,0.08)' : cat.color + '80';
    ctx.lineWidth = isHighlighted ? 3 : 2.5;
    roundRect(ctx, x, y, TILE_W, TILE_H, 10);
    ctx.stroke();

    // 粘连牌专属特效：边缘胶水风格半透明边框
    if (tile.isInterference && tile.interferenceType === 'sticky' && !isBlocked && !isInSlot) {
      ctx.save();
      // 外层胶水光晕
      ctx.strokeStyle = 'rgba(253,121,168,0.5)';
      ctx.lineWidth = 4;
      ctx.setLineDash([6, 3]);
      roundRect(ctx, x - 1, y - 1, TILE_W + 2, TILE_H + 2, 11);
      ctx.stroke();
      ctx.setLineDash([]);
      // 内层半透明填充
      ctx.fillStyle = 'rgba(253,121,168,0.08)';
      roundRect(ctx, x, y, TILE_W, TILE_H, 10);
      ctx.fill();
      // 四角胶水圆点
      const dotPositions = [[x + 5, y + 5], [x + TILE_W - 5, y + 5], [x + 5, y + TILE_H - 5], [x + TILE_W - 5, y + TILE_H - 5]];
      dotPositions.forEach(([dx, dy]) => {
        ctx.beginPath();
        ctx.arc(dx, dy, 2.5, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(253,121,168,0.7)';
        ctx.fill();
      });
      ctx.restore();
    }

    // 高亮光晕
    if (isHighlighted) {
      ctx.shadowColor = 'rgba(255,215,0,0.6)';
      ctx.shadowBlur = 16;
      roundRect(ctx, x, y, TILE_W, TILE_H, 10);
      ctx.stroke();
      ctx.shadowBlur = 0;
    }

    // hover 效果
    if (isHover && !isBlocked && !isInSlot) {
      ctx.strokeStyle = cat.color + '60';
      ctx.lineWidth = 1;
      roundRect(ctx, x - 1, y - 3, TILE_W + 2, TILE_H + 2, 11);
      ctx.stroke();
    }

    ctx.restore();
  });
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// Canvas 点击检测：从高 layer 到低 layer 找命中 tile
function hitTestTile(tiles, px, py) {
  const sorted = [...tiles].filter(t => !t.removed && !t.inSlot).sort((a, b) => b.layer - a.layer);
  for (const tile of sorted) {
    const x = tileX(tile);
    const y = tileY(tile);
    if (px >= x && px <= x + TILE_W && py >= y && py <= y + TILE_H) {
      return tile;
    }
  }
  return null;
}

function shuffleArr(arr, rng) {
  const a = [...arr];
  const rand = rng || Math.random;
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(rand() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// 每日种子随机
function seededRandom(seed) {
  let s = seed;
  return function() {
    s = (s * 1103515245 + 12345) & 0x7fffffff;
    return s / 0x7fffffff;
  };
}

function getDailySeed() {
  const d = new Date();
  return d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate();
}

// 猫爪五指棋盘布局（黑猫暗夜关专用）
function generateCatPawLayout() {
  return [
    // 大拇指
    { layer: 0, cols: 2, rows: 3, offsetX: 0, offsetY: 0, zone: 'thumb' },
    // 食指
    { layer: 0, cols: 2, rows: 4, offsetX: 120, offsetY: -30, zone: 'index' },
    // 中指
    { layer: 0, cols: 2, rows: 5, offsetX: 240, offsetY: -60, zone: 'middle' },
    // 无名指
    { layer: 0, cols: 2, rows: 4, offsetX: 360, offsetY: -30, zone: 'ring' },
    // 小拇指
    { layer: 0, cols: 2, rows: 3, offsetX: 480, offsetY: 0, zone: 'pinky' },
    // 第一层（中间部分）
    { layer: 1, cols: 8, rows: 4, offsetX: 60, offsetY: 60, zone: 'palm' },
  ];
}

// 骨头横放棋盘布局（折耳静坪关专用）
function generateBoneLayout() {

    // 左端（骨头头）
    { layer: 0, cols: 3, rows: 2, offsetX: 0, offsetY: 30, zone: 'bone_end' },
    { layer: 1, cols: 3, rows: 2, offsetX: 30, offsetY: 60, zone: 'bone_end' },
    // 中间（骨头身，密集区）
    { layer: 0, cols: 6, rows: 4, offsetX: 90, offsetY: 0, zone: 'bone_body' },
    { layer: 1, cols: 5, rows: 3, offsetX: 120, offsetY: 30, zone: 'bone_body' },
    { layer: 2, cols: 4, rows: 2, offsetX: 150, offsetY: 60, zone: 'bone_body' },
    // 右端（骨头尾）
    { layer: 0, cols: 3, rows: 2, offsetX: 360, offsetY: 30, zone: 'bone_end' },
    { layer: 1, cols: 3, rows: 2, offsetX: 330, offsetY: 60, zone: 'bone_end' },
  ];
}

// 波斯双域棋盘布局（波斯双域关专用）
function generateDualZoneLayout() {
  return [
    // 左侧蓝色区域
    { layer: 0, cols: 4, rows: 4, offsetX: 0, offsetY: 0, zone: 'left_blue' },
    { layer: 1, cols: 3, rows: 3, offsetX: 30, offsetY: 30, zone: 'left_blue' },

// 获取关卡棋盘布局
function getLevelLayers(levelNum) {
  const lv = getLevelConfig(levelNum);
  if (!lv) return [];
  
  switch (lv.boardType) {
    case BOARD_TYPES.catPaw:
      return generateCatPawLayout();
    case BOARD_TYPES.bone:
      return generateBoneLayout();
    case BOARD_TYPES.dual:
      return generateDualZoneLayout();
    default:
      return lv.layers;
  }
}

// 棋盘生成（按需求文档）
// 使用1-based坐标系统：row 1-6, col 1-8
function generateBoard(levelNum) {
  const lv = getLevelConfig(levelNum);
  if (!lv) return [];
  
  const { boardType } = lv;
  const rng = seededRandom(getDailySeed() + levelNum * 1000);

  // 1. 根据棋盘类型获取坐标白名单
  const boardCoords = getBoardCoordsByType(boardType);
  const boardCoordCount = boardCoords.length;

  // 获取棋盘类型名称
  const boardTypeName = Object.keys(BOARD_TYPES).find(k => BOARD_TYPES[k] === boardType) || 'standard';
  const maxCardsForBoard = BOARD_COUNTS[boardTypeName] || 48;

  // 2. 获取层配置和卡牌池
  const baseLayerConfig = getLayerConfig(levelNum);
  // 限制总卡牌数量不超过棋盘有效点位数量
  const totalCards = Math.min(
    baseLayerConfig[0] + baseLayerConfig[1] + baseLayerConfig[2],
    maxCardsForBoard
  );
  
  // 按比例分配各层卡牌数量（确保总和等于总卡牌数）
  const totalBase = baseLayerConfig[0] + baseLayerConfig[1] + baseLayerConfig[2];
  const layerConfig = {
    0: Math.floor(baseLayerConfig[0] * totalCards / totalBase),
    1: Math.floor(baseLayerConfig[1] * totalCards / totalBase),
    2: totalCards - Math.floor(baseLayerConfig[0] * totalCards / totalBase) - Math.floor(baseLayerConfig[1] * totalCards / totalBase)
  };
  
  let cardPool = getCardPoolByLevel(levelNum);

  // 3. Fisher-Yates 洗牌
  cardPool = shuffleCardPool(cardPool, rng);

  // 4. 生成三层槽位
  // - 异形棋盘：按顺序选取，形成目标形状
  // - 标准棋盘：随机选取，保持随机分布
  const allSlots = [];
  const isShapedBoard = boardType !== BOARD_TYPES.standard;
  let coordIndex = 0;
  
  for (let layer = 0; layer <= 2; layer++) {
    const count = layerConfig[layer];
    for (let i = 0; i < count; i++) {
      let coord;
      if (isShapedBoard) {
        // 异形棋盘：按顺序选取形成形状
        coord = boardCoords[coordIndex % boardCoordCount];
        coordIndex++;
      } else {
        // 标准棋盘：随机选取
        coord = boardCoords[Math.floor(rng() * boardCoordCount)];
      }
      allSlots.push({
        row: coord.row,
        col: coord.col,
        layer: layer,
        zone: 'default'
      });
    }
  }

  // 5. 分配类型（使用洗牌后的牌池）
  const cards = assignTypesFromPool(allSlots, cardPool, rng);

  // 6. 添加干扰牌
  const cardsWithInterference = addInterferenceCards(cards, lv, rng);

  // 7. 可解性校验（最多50次重试）
  let attempts = 0;
  let result = cardsWithInterference;
  while (!isSolvable(result) && attempts < 50) {
    cardPool = shuffleCardPool(getCardPoolByLevel(levelNum), rng);
    const retrySlots = [];
    let retryCoordIndex = 0;
    for (let layer = 0; layer <= 2; layer++) {
      const count = layerConfig[layer];
      for (let i = 0; i < count; i++) {
        let coord;
        if (isShapedBoard) {
          // 异形棋盘：按顺序选取
          coord = boardCoords[(retryCoordIndex + attempts * 3) % boardCoordCount];
        } else {
          // 标准棋盘：随机选取
          coord = boardCoords[Math.floor(rng() * boardCoordCount)];
        }
        retrySlots.push({
          row: coord.row,
          col: coord.col,
          layer: layer,
          zone: 'default'
        });
        retryCoordIndex++;
      }
    }
    const retryCards = assignTypesFromPool(retrySlots, cardPool, rng);
    result = addInterferenceCards(retryCards, lv, rng);
    attempts++;
  }

  // 8. 构建 offset map 供坐标计算（基础偏移确保在棋盘内，边距留出偏移空间）
  const BASE_OFFSET = 15; // 基础偏移，确保Layer0卡牌也在内边距内
  buildLayerOffsetMap([
    { layer: 0, offsetX: BASE_OFFSET, offsetY: BASE_OFFSET },
    { layer: 1, offsetX: BASE_OFFSET + 5, offsetY: BASE_OFFSET + 5 },
    { layer: 2, offsetX: BASE_OFFSET + 10, offsetY: BASE_OFFSET + 10 }
  ]);

  return result;
}

// 从牌池分配类型（确保必通关）
function assignTypesFromPool(slots, cardPool, rng) {
  // 直接按顺序从洗好的牌池分配
  const cardCount = Math.min(slots.length, cardPool.length);
  
  // 按层排序（底层先，高层后）
  const sortedSlots = [...slots].sort((a, b) => b.layer - a.layer);
  
  // 顶层需要包含所有种类
  const layerConfig = getLayerConfig(1); // 获取层配置
  const topLayerCount = layerConfig[2];
  const topLayerSlots = sortedSlots.filter(s => s.layer === 2).slice(0, topLayerCount);
  
  // 确保顶层包含所有种类（取前N张，N为种类数）
  const typeCount = Math.min(topLayerCount, cardPool.length);
  const topTypes = cardPool.slice(0, typeCount);
  
  // 将顶层的卡牌类型设为牌池前N张
  topLayerSlots.forEach((slot, i) => {
    slot.type = topTypes[i] || cardPool[i % cardPool.length];
  });
  
  // 剩余卡牌按顺序分配
  let poolIndex = typeCount;
  sortedSlots.forEach(slot => {
    if (!slot.type && poolIndex < cardPool.length) {
      slot.type = cardPool[poolIndex++];
    }
  });
  
  // 补充未分配的卡牌类型
  slots.forEach(slot => {
    if (!slot.type) {
      slot.type = cardPool[Math.floor(rng() * cardPool.length)];
    }
  });

  return slots.map((s, i) => ({
    id: i, type: s.type,
    col: s.col, row: s.row, layer: s.layer,
    zone: s.zone || 'default',
    removed: false, inSlot: false, matched: false,
  }));
}

// P0: 添加干扰牌
function addInterferenceCards(cards, levelConfig, rng) {
  if (!levelConfig.interference || levelConfig.interferenceCount === 0) {
    return cards;
  }

  const interferenceType = levelConfig.interference.id;
  const count = levelConfig.interferenceCount;
  
  // 冰冻牌不出现在棋盘上，直接占据收集槽前N格（freeze_grid_count），无需在棋盘上生成
  if (interferenceType === 'freeze') {
    return cards;
  }
  
  // 获取可放置干扰牌的位置（顶层可点击的位置）
  const maxLayer = Math.max(...cards.filter(c => !c.removed).map(c => c.layer || 0));
  const topLayerCards = cards.filter(c => !c.removed && (c.layer || 0) === maxLayer);
  
  // 粘连牌特殊约束：两张牌之间至少间隔1格，避免相邻
  if (interferenceType === 'sticky') {
    const stickyCount = levelConfig.stick_card_count || count || 2;
    const selectedCards = [];
    const shuffledTop = shuffleArr([...topLayerCards], rng);
    
    for (const card of shuffledTop) {
      if (selectedCards.length >= stickyCount) break;
      // 检查与已选中的粘连牌是否相邻（上下左右，曼哈顿距离=1）
      const isAdjacent = selectedCards.some(sc =>
        Math.abs(sc.row - card.row) + Math.abs(sc.col - card.col) <= 1
      );
      if (!isAdjacent) {
        selectedCards.push(card);
      }
    }
    // 若顶层空间不足以放置所有粘连牌（间隔约束），降级到不限制间隔
    if (selectedCards.length < stickyCount) {
      const fallbackSelected = shuffledTop.slice(0, Math.min(stickyCount, shuffledTop.length));
      return applyInterferenceToCards(cards, fallbackSelected, interferenceType, rng);
    }
    return applyInterferenceToCards(cards, selectedCards, interferenceType, rng);
  }
  
  // 随机选择位置放置干扰牌
  const shuffledTop = shuffleArr([...topLayerCards], rng);
  const selectedCards = shuffledTop.slice(0, Math.min(count, shuffledTop.length));
  
  return applyInterferenceToCards(cards, selectedCards, interferenceType, rng);
}

// 将干扰牌属性应用到选中的卡牌
function applyInterferenceToCards(cards, selectedCards, interferenceType, rng) {
  return cards.map(card => {
    if (selectedCards.some(sc => sc.id === card.id)) {
      return {
        ...card,
        type: `__interference_${interferenceType}__`,
        isInterference: true,
        interferenceType: interferenceType,
        // 伪装牌特殊处理：先随机伪装成普通牌
        disguisedAs: interferenceType === 'disguise' 
          ? CAT_TYPES[Math.floor(rng() * CAT_TYPES.length)].id 
          : null,
        // 真身牌初始为伪装状态
        revealed: interferenceType !== 'disguise',
      };
    }
    return card;
  });
}

// 类型分配：确保总数3的倍数、跨层分散、同层不相邻、顶层覆盖
function assignTypes(slots, typeIndices, layers, rng) {
  const total = slots.length;
  const groups = total / 3;
  const maxLayer = Math.max(...layers.map(l => l.layer));

  // 按 layer 分组
  const byLayer = {};
  slots.forEach(s => { (byLayer[s.layer] = byLayer[s.layer] || []).push(s); });

  // 分配：每组3张，尽量跨层
  const assigned = [];
  const sortedSlots = [...slots].sort((a, b) => b.layer - a.layer); // 高层优先

  for (let g = 0; g < groups; g++) {
    const type = CAT_TYPES[typeIndices[g % typeIndices.length]].id;
    // 从不同层各取1张
    const group = [];
    const usedLayers = new Set();
    for (const s of sortedSlots) {
      if (assigned.includes(s)) continue;
      if (group.length < 3) {
        if (group.length === 0 || !usedLayers.has(s.layer)) {
          group.push(s);
          usedLayers.add(s.layer);
        }
      }
    }
    // 如果跨层不够，补充任意未用的
    if (group.length < 3) {
      for (const s of sortedSlots) {
        if (assigned.includes(s) || group.includes(s)) continue;
        group.push(s);
        if (group.length >= 3) break;
      }
    }
    group.slice(0, 3).forEach(s => {
      assigned.push(s);
      s.type = type;
    });
  }

  // 给未分配的补上类型
  slots.forEach(s => {
    if (!s.type) s.type = CAT_TYPES[typeIndices[0]].id;
  });

  // 同层相邻检查 & 交换
  enforceNoAdjacent(slots, layers);

  return slots.map((s, i) => ({
    id: i, type: s.type,
    col: s.col, row: s.row, layer: s.layer,
    zone: s.zone || 'default', // P0: 保留区域信息
    removed: false, inSlot: false, matched: false,
  }));
}

function enforceNoAdjacent(slots, layers) {
  layers.forEach(la => {
    const layerSlots = slots.filter(s => s.layer === la.layer);
    for (let i = 0; i < layerSlots.length; i++) {
      for (let j = i + 1; j < layerSlots.length; j++) {
        const a = layerSlots[i], b = layerSlots[j];
        if (a.type === b.type && Math.abs(a.col - b.col) <= 1 && Math.abs(a.row - b.row) <= 1) {
          const other = slots.find(s => s.layer !== a.layer && s.type !== a.type);
          if (other) { const tmp = other.type; other.type = a.type; a.type = tmp; }
        }
      }
    }
  });
}

// 可解性校验（贪心模拟）
function isSolvable(cards) {
  const remaining = cards.map(c => ({ ...c, removed: false }));
  const slots = new Array(SLOT_CAPACITY).fill(null);

  while (true) {
    const clickable = remaining.filter(c => !c.removed && !isTileBlockedSolvable(c, remaining));
    if (clickable.length === 0) break;

    let picked = clickable.find(c => {
      const count = slots.filter(s => s && s.type === c.type).length;
      return count >= 2;
    });
    if (!picked) picked = clickable[0];

    const slotIdx = slots.indexOf(null);
    if (slotIdx === -1) return false;
    slots[slotIdx] = { type: picked.type };
    picked.removed = true;

    for (let i = 0; i <= slots.length - 3; i++) {
      if (slots[i] && slots[i+1] && slots[i+2] &&
          slots[i].type === slots[i+1].type && slots[i].type === slots[i+2].type) {
        slots[i] = slots[i+1] = slots[i+2] = null;
        const filled = slots.filter(s => s !== null);
        slots.fill(null);
        filled.forEach((s, idx) => slots[idx] = s);
        break;
      }
    }
  }
  return remaining.every(c => c.removed);
}

function calcOverlap(tile, allTiles) {
  const BLOCK_THRESHOLD = 0.3;
  // 使用1-based坐标：pixel = (coord - 1) * tileSize
  const left = (tile.col - 1) * TILE_W + getLayerOffset(tile.layer).ox;
  const top = (tile.row - 1) * TILE_H + getLayerOffset(tile.layer).oy;
  const right = left + TILE_W;
  const bottom = top + TILE_H;
  const area = TILE_W * TILE_H;

  let overlap = 0;
  for (const other of allTiles) {
    if (other.id === tile.id || other.removed || other.layer <= tile.layer) continue;
    if (other.inSlot) continue;
    const oLeft = (other.col - 1) * TILE_W + getLayerOffset(other.layer).ox;
    const oTop = (other.row - 1) * TILE_H + getLayerOffset(other.layer).oy;
    const oRight = oLeft + TILE_W;
    const oBottom = oTop + TILE_H;
    overlap += Math.max(0, Math.min(right, oRight) - Math.max(left, oLeft))
             * Math.max(0, Math.min(bottom, oBottom) - Math.max(top, oTop));
  }
  return overlap / area;
}

function isTileBlockedSolvable(tile, allTiles) {
  return calcOverlap(tile, allTiles) > 0.3;
}

// 运行时阻挡判断（面积覆盖阈值 30%）
function isTileBlocked(tile, allTiles) {
  if (tile.removed || tile.inSlot) return true;
  return calcOverlap(tile, allTiles) > 0.3;
}

                      position: 'absolute', top: 0, left: 0, right: 0, bottom: 0,
                      background: 'linear-gradient(180deg, rgba(255,255,255,0.5) 0%, transparent 50%)',
                      borderRadius: 10,
                      pointerEvents: 'none',
                    }} />
                  )}
                </div>
              );
            })() : (
              <div style={{
                width: '100%', height: '100%', borderRadius: 10,
                border: '1.5px dashed rgba(255,255,255,0.1)',
                background: 'linear-gradient(180deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.01) 100%)',
              }}/>
            )}
              </>
            )}
          </div>
        );
      })}
      </div>
    </div>
  );
}

      ) : (

        <a href="app.html?tab=home" style={{
