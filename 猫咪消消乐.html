   MAIN GAME COMPONENT
   ═══════════════════════════════════════ */
function Game() {
  const [currentLevel, setCurrentLevel] = useState(1);
  const levelConfig = getLevelConfig(currentLevel) || {};
  const [tiles, setTiles] = useState(() => generateBoard(1));
  const [slot, setSlot] = useState([]);
  const [tempStorage, setTempStorage] = useState([]);
  const [frozenSlot, setFrozenSlot] = useState(null); // 冰冻牌占据收集槽前N格（N=freeze_grid_count）
  const [groomSlots, setGroomSlots] = useState([]); // 舔毛牌：进入收集槽后永久占位，无法消除
  const [groomToast, setGroomToast] = useState(false); // 舔毛牌首次进入收集槽提示
  const [freezeToast, setFreezeToast] = useState(''); // 冰冻牌提示文案（空=不显示）
  const [stickyToast, setStickyToast] = useState(''); // 粘连牌提示文案（空=不显示）
  const [transformToast, setTransformToast] = useState(''); // 三花牌提示文案（空=不显示）
  const [dangerToast, setDangerToast] = useState(''); // 小狗牌提示文案（空=不显示）
  const [disguiseToast, setDisguiseToast] = useState(''); // 真身牌提示文案（空=不显示）
  const [areaToast, setAreaToast] = useState(''); // 波斯双域提示文案（空=不显示）
  const [toastCycIdx, setToastCycIdx] = useState(0); // 多提示轮番播放索引
  const toastCycTimerRef = useRef(null); // 轮番计时器
  const toastKeysRef = useRef([]); // 当前活跃提示的key列表
  const [transformLocked, setTransformLocked] = useState([]); // 正在变身的三花牌tileId列表（锁定不可点击/匹配）
  const [matching, setMatching] = useState([]);
  const [gameState, setGameState] = useState(GAME_PLAYING);
  const [showCompletion, setShowCompletion] = useState(false); // 30关通关完成画面
  const [moveCount, setMoveCount] = useState(0);
  const [moveHistory, setMoveHistory] = useState([]);
  // 冰冻牌减免：胆小性格减免率达到80%(亲密)以上时，冰冻牌冻结效果失效
  const cowardlyInterferenceBlockedRef = useRef(false); // 胆小：本局干扰牌是否被阻挡
  const freezeBlockOverride = frozenSlot && cowardlyInterferenceBlockedRef.current;
  const freezeGridCount = frozenSlot && !freezeBlockOverride ? levelConfig.freeze_grid_count || 1 : 0;
  // 冰冻牌首次出现提示（1.5秒）：冰冻牌生成且胆小减免未生效时触发
  useEffect(() => {
    if (frozenSlot && !freezeBlockOverride) {
      const gridCount = levelConfig.freeze_grid_count || 1;
      const gridText = gridCount > 1 ? `前${gridCount}格` : '第一格';
      const startText = gridCount > 1 ? `第${gridCount + 1}格` : '第二格';
      setFreezeToast(`❄️ 冰冻牌已冻结收集槽${gridText}，卡牌只能从${startText}开始放入！`);
      const t = setTimeout(() => setFreezeToast(''), 1500);
      return () => clearTimeout(t);
    }
  }, [frozenSlot]);
  // 异常处理：冰冻牌冻结后，如果收集槽有效容量为0，直接判定失败
  useEffect(() => {
    if (frozenSlot && !freezeBlockOverride && gameState === GAME_PLAYING) {
      const frozenOffset = levelConfig.freeze_grid_count || 1;
      const effectiveCapacity = SLOT_CAPACITY + slotBonus - frozenOffset;
      if (effectiveCapacity <= 0) {
        // 收集槽已被冰冻牌完全冻结，无法继续游戏
        setFreezeToast('❄️ 收集槽已被冰冻牌完全冻结，无法继续游戏！');
        setTimeout(() => {
          setFreezeToast('');
          setTiles(prev => prev.map(t => t.inSlot ? {
            ...t,
            inSlot: false
          } : t));
          setSlot([]);
          setGroomSlots([]);
          setTempStorage([]);
          setGameState(GAME_LOSE);
        }, 2000);
      }
    }
  }, [frozenSlot, freezeBlockOverride, gameState]);

  // ═══ 小狗牌开局提示（2秒强提示） ═══
  useEffect(() => {
    const hasDangerCard = tiles.some(t => !t.removed && !t.inSlot && t.isInterference && t.interferenceType === 'danger');
    if (hasDangerCard && gameState === GAME_PLAYING && !window._dangerToastShown) {
      setDangerToast('⚠️ 小狗牌出现！千万别点，否则直接失败！');
      window._dangerToastShown = true;
      const t = setTimeout(() => {
        setDangerToast('');
      }, 2000);
      return () => clearTimeout(t);
    }
  }, [gameState, tiles]);

  // ═══ 真身牌开局提示（1.5秒轻量提示）+ 胆小减免标记 ═══
  useEffect(() => {
    const hasDisguiseCard = tiles.some(t => !t.removed && !t.inSlot && !t.revealed && t.isInterference && t.interferenceType === 'disguise');
    if (hasDisguiseCard && gameState === GAME_PLAYING && !window._disguiseToastShown) {
      setDisguiseToast('🫧 棋盘上有伪装牌！小心辨别，点击后露出真身');
      window._disguiseToastShown = true;
      const t = setTimeout(() => {
        setDisguiseToast('');
      }, 1500);

      // 胆小性格：干扰牌阻挡时，真身牌高亮标记
      if (cowardlyInterferenceBlockedRef.current) {
        setTiles(prev => prev.map(t => t.isInterference && t.interferenceType === 'disguise' && !t.revealed ? {
          ...t,
          cowardlyHighlight: true
        } : t));
      }
      return () => clearTimeout(t);
    }
  }, [gameState, tiles]);

  // ═══ 波斯双域开局提示（2秒轻量提示） ═══
  useEffect(() => {
    if (levelConfig.areaRuleEnable && gameState === GAME_PLAYING && !window._areaToastShown) {
      setAreaToast('双域玩法：蓝色和绿色区域的卡牌，跨区域无法消除哦～');
      window._areaToastShown = true;
      const t = setTimeout(() => {
        setAreaToast('');
      }, 2000);
      return () => clearTimeout(t);
    }
    // 离开双域关时清除提示
    if (!levelConfig.areaRuleEnable && areaToast) {
      setAreaToast('');
    }
  }, [gameState, currentLevel, levelConfig.areaRuleEnable]);

  // ═══ 多提示轮番播放（波斯双域+冰冻牌等场景） ═══
  useEffect(() => {
    const keys = toastKeysRef.current;
    const count = keys.length;
    setToastCycIdx(0);
    if (toastCycTimerRef.current) {
      clearInterval(toastCycTimerRef.current);
      toastCycTimerRef.current = null;
    }
    if (count <= 1) return;
    toastCycTimerRef.current = setInterval(() => {
      setToastCycIdx(i => (i + 1) % toastKeysRef.current.length);
    }, 2500);
    return () => {
      if (toastCycTimerRef.current) {
        clearInterval(toastCycTimerRef.current);
        toastCycTimerRef.current = null;
      }
    };
  }, [groomToast, freezeToast, frozenSlot, stickyToast, transformToast, dangerToast, disguiseToast, areaToast]);

  // ═══ 三花牌：全局3秒变身计时器 ═══
  // 胆小性格减免：高好感度下，三花牌变换间隔从3秒延长至6秒
  // 暂停/恢复：暂停时清除计时器，恢复后从上次变身时间戳继续（不重置间隔）
  const transformIntervalRef = useRef(null); // 全局变身计时器ID
  const transformLastTimeRef = useRef(0); // 上次变身触发的时间戳（ms）
  const transformTimeoutRef = useRef(null); // 恢复后首轮setTimeout ID

  // 清理所有计时器的辅助函数
  const clearTransformTimers = () => {
    if (transformIntervalRef.current) {
      clearInterval(transformIntervalRef.current);
      transformIntervalRef.current = null;
    }
    if (transformTimeoutRef.current) {
      clearTimeout(transformTimeoutRef.current);
      transformTimeoutRef.current = null;
    }
  };
  // 同步加载猫咪数据（确保 BattlePrep 显示前数据已就绪）
  const loadCatsFromStorage = () => {
    try {
      const saved = localStorage.getItem('miaolegemi_p0_v1');
      if (saved) {
        const data = JSON.parse(saved);
        // 出战席1-3号位：主动技能
        const battleCats = (data.cats || []).filter(c => c.battleSlot != null && c.battleSlot >= 1 && c.battleSlot <= 3).sort((a, b) => a.battleSlot - b.battleSlot);
        // 观战区1-3号位：被动技能
        const spectatorCats = (data.cats || []).filter(c => c.battleSpectator != null && c.battleSpectator >= 1 && c.battleSpectator <= 3).sort((a, b) => a.battleSpectator - b.battleSpectator);
        // 只显示备战区实际配置的猫咪
        return [...battleCats, ...spectatorCats].filter(Boolean);
      }
    } catch (e) {}
    return [];
  };
  const initialCats = loadCatsFromStorage();
  const [battleCats, setBattleCats] = useState(initialCats); // 同步加载猫咪数据
  const [piles, setPiles] = useState(() => generatePileData(1)); // P2: 牌堆状态
  const [timerPaused, setTimerPaused] = useState(false);
  const [slotBonus, setSlotBonus] = useState(0);
  const pilesRef = useRef(piles); // P2: 牌堆ref
  const [retryAttemptsUsed, setRetryAttemptsUsed] = useState(0);
  const tempStorageRef = useRef([]);
  useEffect(() => {
    // 仅在有transform类型干扰牌且游戏进行中且未暂停时启动
    const hasTransformCards = tiles.some(t => !t.removed && !t.inSlot && t.isInterference && t.interferenceType === 'transform');
    if (!hasTransformCards || gameState !== GAME_PLAYING || timerPaused) {
      clearTransformTimers();
      return;
    }

    // 计算变身间隔（胆小减免：3秒→6秒）
    const cowardlySlowdown = cowardlyInterferenceBlockedRef.current;
    const intervalMs = (cowardlySlowdown ? 6 : 3) * 1000;

    // 首次进入三花关卡提示（1.5秒）
    if (!window._transformToastShown) {
      setTransformToast('🔮 三花牌已出现，每' + (cowardlySlowdown ? '6' : '3') + '秒会变换一次图案，打乱你的匹配节奏！');
      window._transformToastShown = true;
      setTimeout(() => {
        setTransformToast('');
      }, 1500);
    }

    // 全局变身逻辑
    const doTransform = () => {
      const activeTransformTiles = tilesRef.current.filter(t => !t.removed && !t.inSlot && t.isInterference && t.interferenceType === 'transform');
      if (activeTransformTiles.length === 0) {
        clearTransformTimers();
        return;
      }

      // 记录本次变身时间戳
      transformLastTimeRef.current = Date.now();

      // 收集当前关卡棋盘上所有普通卡牌的type（变身范围）
      const normalTypes = [...new Set(tilesRef.current.filter(t => !t.removed && !t.inSlot && !t.isInterference).map(t => t.type))];
      if (normalTypes.length === 0) return;
      const lockedIds = [];
      setTiles(prev => prev.map(t => {
        if (t.removed || t.inSlot || !t.isInterference || t.interferenceType !== 'transform') return t;

        // 仅变换显示图案，匹配类型保持 originalType 不变
        const currentDisplay = t.displayType || t.type;
        let newDisplay = currentDisplay;
        let attempts = 0;
        do {
          newDisplay = normalTypes[Math.floor(Math.random() * normalTypes.length)];
          attempts++;
        } while (newDisplay === currentDisplay && normalTypes.length > 1 && attempts < 20);
        const sameLayerTiles = tilesRef.current.filter(tt => !tt.removed && !tt.inSlot && tt.id !== t.id && tt.layer === t.layer);
        let checkAttempts = 0;
        while (checkAttempts < 30) {
          const adjacent = sameLayerTiles.filter(tt => Math.abs(tt.row - t.row) <= 1 && tt.col === t.col || Math.abs(tt.col - t.col) <= 1 && tt.row === t.row);
          const sameTypeAdjacent = adjacent.filter(tt => getTileDisplayType(tt) === newDisplay);
          if (sameTypeAdjacent.length < 2) break;
          newDisplay = normalTypes[Math.floor(Math.random() * normalTypes.length)];
          checkAttempts++;
        }
        lockedIds.push(t.id);
        return {
          ...t,
          displayType: newDisplay,
          transformAnimating: true
        };
      }));

      // 变身锁定：0.2秒内不可点击/匹配
      if (lockedIds.length > 0) {
        setTransformLocked(lockedIds);
        setTimeout(() => {
          setTransformLocked([]);
          setTiles(prev => prev.map(t => lockedIds.includes(t.id) ? {
            ...t,
            transformAnimating: false
          } : t));
        }, 200);
      }
    };

    // 暂停恢复后继续计时：计算距上次变身的剩余时间
    const now = Date.now();
    const elapsed = transformLastTimeRef.current > 0 ? now - transformLastTimeRef.current : intervalMs;
    const remainingMs = Math.max(0, intervalMs - elapsed);

    // 先用setTimeout触发首次（补齐暂停期间剩余时间），之后切换到setInterval
    transformTimeoutRef.current = setTimeout(() => {
      transformTimeoutRef.current = null;
      doTransform();
      // 之后每intervalMs触发一次
      transformIntervalRef.current = setInterval(doTransform, intervalMs);
    }, remainingMs);
    return () => {
      clearTransformTimers();
    };
  }, [gameState, tiles, battleCats, timerPaused]);

  // P1: fish & combo tracking
  // P7: 鱼干系统重做 - 使用三消次数追踪（每6次三消=1基础鱼干）
  const [comboCount, setComboCount] = useState(0); // P7: 三消次数
  const [maxCombo, setMaxCombo] = useState(0);
  const [score, setScore] = useState(0);
  const [fishBalance, setFishBalance] = useState(() => {
    try {
      const saved = localStorage.getItem('miaolegemi_p0_v1');
      if (saved) {
        const data = JSON.parse(saved);
        const ledger = data.fishLedger || [];
        return ledger.reduce((s, t) => s + (t.type === 'earn' ? t.amount : -t.amount), 0);
      }
    } catch (e) {}
    return 0;
  });
  // 定期从 localStorage 同步鱼干余额（与首页实时同步）
  useEffect(() => {
    const syncFish = () => {
      try {
        const saved = localStorage.getItem('miaolegemi_p0_v1');
        if (saved) {
          const data = JSON.parse(saved);
          const ledger = data.fishLedger || [];
          const balance = ledger.reduce((s, t) => s + (t.type === 'earn' ? t.amount : -t.amount), 0);
          setFishBalance(balance);
        }
      } catch (e) {}
    };
    syncFish();
    const timer = setInterval(syncFish, 2000);
    const handler = () => syncFish();
    window.addEventListener('storage', handler);
    window.addEventListener('focus', handler);
    return () => {
      clearInterval(timer);
      window.removeEventListener('storage', handler);
      window.removeEventListener('focus', handler);
    };
  }, []);
  const lastMatchTimeRef = useRef(0);
  const personalityEffectsRef = useRef(null); // 性格效果缓存，避免回调中重复计算
  const [phase, setPhase] = useState('playing'); // levelSelect → prep → playing
  const retryAttemptsUsedRef = useRef(0); // 黏人已使用的再来一次次数
  // 性格效果统一计算（useMemo 同步计算 + ref 供回调读取）
  const personalityEffects = React.useMemo(() => computePersonalityEffects(battleCats), [battleCats]);
  useEffect(() => {
    personalityEffectsRef.current = personalityEffects;
  }, [personalityEffects]);
  useEffect(() => {
    retryAttemptsUsedRef.current = retryAttemptsUsed;
  }, [retryAttemptsUsed]);
  // 胆小：每局开始时一次性判定干扰牌是否被阻挡
  useEffect(() => {
    const prob = personalityEffects.interferenceProbability;
    cowardlyInterferenceBlockedRef.current = Math.random() >= prob;
  }, [personalityEffects]);
  const [battlePrepVisible, setBattlePrepVisible] = useState(initialCats.length === 0 ? false : true); // 备战弹窗显示状态
  const nourishingCats = useRef(initialCats); // 保持 ref 同步
  const fixedBattleCats = useRef(initialCats.length > 0 ? initialCats : null); // 标记已加载
  const shownBattlePrep = useRef(initialCats.length === 0); // 是否有猫咪（有猫咪才显示备战弹窗）
  const uidRef = useRef(0);
  const slotRef = useRef([]);
  const tilesRef = useRef(tiles);
  const matchTimeoutRef = useRef(null);
  const boardContainerRef = useRef(null);
  const boardCanvasRef = useRef(null);
  const handleTileClickRef = useRef(null); // 始终指向最新的 handleTileClick，避免闭包过期
  const lastClickTimeRef = useRef(0); // 防抖：记录上次点击时间戳
  const [hoveredTileId, setHoveredTileId] = useState(null);
  const [boardScale, setBoardScale] = useState(1);

  // P2: Timer system
  const isTimed = levelConfig.timedMode || false;
  const [timeLeft, setTimeLeft] = useState(isTimed ? levelConfig.timeLimit || 120 : 0);
  const [elapsedTime, setElapsedTime] = useState(0); // 正向计时：实际用时（秒），所有关卡通用
  const [timerDelay, setTimerDelay] = useState(0);
  const timerVisual = getTimerVisualState(timeLeft, timerDelay, isTimed);
  const timerPauseRef = useRef(null); // timeout for auto-resume
  const timerDelayRef = useRef(0); // seconds to delay before counting starts
  const timeLeftRef = useRef(isTimed ? levelConfig.timeLimit || 120 : 0);

  // P2: Skill system
  const [skillSlots, setSkillSlots] = useState([]); // [active1, active2, active3, passive1, passive2, passive3]
  const [notifIndex, setNotifIndex] = useState(0);

  // ═══ 通知栏消息（干扰/禁用/被动 合一轮播） ═══
  const notifications = React.useMemo(() => {
    const list = [];
    if (levelConfig.interference && levelConfig.interference.id !== 'none') {
      list.push({
        type: 'warn',
        icon: '⚠️',
        text: levelConfig.interference.desc,
        emoji: levelConfig.interference.emoji,
        color: levelConfig.interference.color
      });
    }
    if (levelConfig.disabledSkills && levelConfig.disabledSkills.length > 0) {
      list.push({
        type: 'disable',
        icon: '🚫',
        text: `本关禁用：${levelConfig.disabledSkills.join('、')}的「蹦跶」`,
        color: '#FF6B6B'
      });
    }
    if (skillSlots.slice(3).some(s => s)) {
      skillSlots.slice(3).forEach(breed => {
        if (!breed) return;
        const eff = PASSIVE_EFFECTS[breed];
        if (!eff) return;
        list.push({
          type: 'passive',
          icon: '🛡️',
          breed,
          text: eff.desc
        });
      });
    }
    return list;
  }, [levelConfig, skillSlots]);

  // 通知轮播
  React.useEffect(() => {
    setNotifIndex(0);
  }, [notifications]);
  React.useEffect(() => {
    if (notifications.length <= 1) return;
    const timer = setInterval(() => {
      setNotifIndex(prev => (prev + 1) % notifications.length);
    }, 3000);
    return () => clearInterval(timer);
  }, [notifications.length]);
  const [skillUseCount, setSkillUseCount] = useState({
    active0: 0,
    active1: 0,
    active2: 0
  }); // 已使用次数
  const [skillUseMax, setSkillUseMax] = useState({
    active0: 1,
    active1: 1,
    active2: 1
  }); // 最大可用次数
  const [skillCooldowns, setSkillCooldowns] = useState({
    active0: 0,
    active1: 0,
    active2: 0
  }); // 冷却剩余秒数
  const [usedSkills, setUsedSkills] = useState({
    active0: false,
    active1: false,
    active2: false
  }); // UI显示(已用完置灰)
  const [confirmSkill, setConfirmSkill] = useState(null); // { index, breed, skill }
  const [skillAnimVisible, setSkillAnimVisible] = useState(false); // 技能动效弹窗可见
  const [skillAnimData, setSkillAnimData] = useState(null); // { breed, skill, rarity }
  const [fishMultiplier, setFishMultiplier] = useState(1);
  const [extraRestarts, setExtraRestarts] = useState(0);
  const [highlightedTiles, setHighlightedTiles] = useState([]); // tile ids highlighted by skills
  // 黏人：再来一次概率系统
  const [canRetry, setCanRetry] = useState(false);
  const [inviteRewardToast, setInviteRewardToast] = useState(false); // P0: 推荐奖励提示
  const [newRecordAchieved, setNewRecordAchieved] = useState(false);
  const [previousBestScore, setPreviousBestScore] = useState(0);
  const highlightedTilesRef = useRef([]);
  useEffect(() => {
    highlightedTilesRef.current = highlightedTiles;
  }, [highlightedTiles]);

  // 关卡选择回调
  const handleLevelSelect = level => {
    setCurrentLevel(level);
    setPhase('prep');
    setTiles(generateBoard(level));
    setPiles(generatePileData(level)); // P2: 初始化牌堆
    setGroomSlots([]);
    setGroomToast(false);
    setFreezeToast('');
    setStickyToast('');
    setTransformToast('');
    setDangerToast('');
    setDisguiseToast('');
    setAreaToast('');
    setToastCycIdx(0);
    if (toastCycTimerRef.current) {
      clearInterval(toastCycTimerRef.current);
      toastCycTimerRef.current = null;
    }
    window._dangerToastShown = false;
    window._disguiseToastShown = false;
    window._areaToastShown = false;
    // 冰冻牌：根据触发规则判断是否生成（名称匹配+配置开关优先）
    const selectedConfig = getLevelConfig(level);
    if (shouldTriggerFreeze(selectedConfig)) {
      const frozenCard = {
        uid: 'frozen_' + uidRef.current++,
        type: '__interference_freeze__',
        tileId: null,
        frozen: true
      };
      setFrozenSlot(frozenCard);
    } else {
      setFrozenSlot(null);
    }
  };

  // Load home cats and skill slots from localStorage (P3: updated to home from nurturing)
  // P4: 固定阵容机制 - 只在第一次进入游戏时设置，后续关卡保持不变
  useEffect(() => {
    // 如果已经有固定阵容，直接使用
    if (fixedBattleCats.current !== null) {
      nourishingCats.current = fixedBattleCats.current;
      const slots = [];
      for (let i = 0; i < 6; i++) {
        slots.push(nourishingCats.current[i] ? nourishingCats.current[i].breedId : null);
      }
      setSkillSlots(slots);
      return;
    }
    try {
      const saved = localStorage.getItem('miaolegemi_p0_v1');
      if (saved) {
        const data = JSON.parse(saved);
        // 出战席1-3号位：主动技能
        const battleCats = (data.cats || []).filter(c => c.battleSlot != null && c.battleSlot >= 1 && c.battleSlot <= 3).sort((a, b) => a.battleSlot - b.battleSlot);
        // 观战区1-3号位：被动技能
        const spectatorCats = (data.cats || []).filter(c => c.battleSpectator != null && c.battleSpectator >= 1 && c.battleSpectator <= 3).sort((a, b) => a.battleSpectator - b.battleSpectator);
        // 只显示备战区实际配置的猫咪，不填补
        const cats = [...battleCats, ...spectatorCats].filter(Boolean);
        // 保存固定阵容
        fixedBattleCats.current = cats;
        nourishingCats.current = cats;
        // 构建技能槽位
        const slots = [];
        for (let i = 0; i < 6; i++) {
          slots.push(nourishingCats.current[i] ? nourishingCats.current[i].breedId : null);
        }
        setSkillSlots(slots);
      }
    } catch (e) {}
  }, []);

  // BattlePrep 显示时预加载出战阵容中3只猫的技能视频
  useEffect(() => {
    if (phase === 'prep' || phase === 'playing' && !shownBattlePrep.current) {
      preloadSkillVideos(skillSlots.slice(0, 3).filter(Boolean));
    }
  }, [phase, skillSlots]);
  useEffect(() => {
    slotRef.current = slot;
  }, [slot]);
  useEffect(() => {
    tempStorageRef.current = tempStorage;
  }, [tempStorage]);
  useEffect(() => {
    tilesRef.current = tiles;
  }, [tiles]);
  useEffect(() => {
    pilesRef.current = piles;
  }, [piles]); // P2: 牌堆ref同步
  useEffect(() => {
    timeLeftRef.current = timeLeft;
  }, [timeLeft]);

  // P2: Timer countdown (only in timed mode, respects timerDelay passive)
  useEffect(() => {
    if (!isTimed || phase !== 'playing' || gameState !== GAME_PLAYING) return;
    const interval = setInterval(() => {
      if (timerPauseRef.current) return; // frozen by skill
      // Delay phase: timerDelayRef counts down before real timer starts
      if (timerDelayRef.current > 0) {
        timerDelayRef.current -= 1;
        setTimerDelay(timerDelayRef.current);
        return;
      }
      if (timeLeftRef.current <= 0) {
        clearInterval(interval);
        const remaining = countRemainingBoardTiles(tilesRef.current);
        if (remaining > 0) {
          setGameState(GAME_LOSE);
        } else {
          setGameState(LEVELS[currentLevel + 1] ? GAME_LEVEL_COMPLETE : GAME_WIN);
        }
        return;
      }
      setTimeLeft(t => Math.max(0, t - 1));
    }, 1000);
    return () => clearInterval(interval);
  }, [phase, gameState, isTimed, currentLevel]);

  // 正向计时：所有关卡通用，记录实际用时（尊重冻结暂停）
  useEffect(() => {
    if (phase !== 'playing' || gameState !== GAME_PLAYING) return;
    const interval = setInterval(() => {
      if (timerPauseRef.current) return;
      setElapsedTime(t => t + 1);
    }, 1000);
    return () => clearInterval(interval);
  }, [phase, gameState]);

  // 技能冷却倒计时
  useEffect(() => {
    if (gameState !== GAME_PLAYING) return;
    const interval = setInterval(() => {
      setSkillCooldowns(prev => {
        const next = {
          ...prev
        };
        let changed = false;
        for (const key of ['active0', 'active1', 'active2']) {
          if (next[key] > 0) {
            next[key] = Math.max(0, next[key] - 1);
            changed = true;
          }
        }
        return changed ? next : prev;
      });
    }, 1000);
    return () => clearInterval(interval);
  }, [gameState]);

  // 初始化技能最大使用次数（基于性格效果）
  useEffect(() => {
    if (phase !== 'playing') return;
    const maxUses = {
      active0: 1,
      active1: 1,
      active2: 1
    };
    for (let i = 0; i < 3; i++) {
      const breed = skillSlots[i];
      if (breed) {
        maxUses[`active${i}`] = personalityEffects.skillUsesMap[breed] || 1;
      }
    }
    setSkillUseMax(maxUses);
  }, [phase, personalityEffects, skillSlots]);

  // P3: Apply passive skills on game start (v3.1 updated)
  // P7: 更新为新的鱼干计算系统
  useEffect(() => {
    if (phase !== 'playing') return;
    let delay = 0;
    let fMult = 1;
    let restarts = 0;
    let tempSlotB = 0;
    let luck = 0;
    const slots = skillSlots;

    // Passive slots 3-5 (position 4 + home 5-6) apply global effects
    for (let i = 3; i < 6; i++) {
      const breed = slots[i];
      if (!breed) continue;
      const eff = PASSIVE_EFFECTS[breed];
      if (!eff) continue;
      switch (eff.type) {
        case 'timerDelay':
          delay = Math.max(delay, eff.value);
          break;
        case 'fishBonus':
          fMult += eff.value;
          break;
        // 猫咪自带鱼干被动
        case 'extraRestart':
          restarts += eff.value;
          break;
        case 'tempSlot':
          tempSlotB = Math.max(tempSlotB, eff.value);
          break;
        case 'autoRemove':
          {
            setTimeout(() => {
              setTiles(prev => {
                const interferenceOnBoard = prev.filter(t => !t.removed && !t.inSlot && t.isInterference);
                if (interferenceOnBoard.length > 0) {
                  const topInterference = interferenceOnBoard.reduce((a, b) => b.layer > a.layer ? b : a);
                  return prev.map(t => t.id === topInterference.id ? {
                    ...t,
                    removed: true
                  } : t);
                }
                const candidates = prev.filter(t => !t.removed && !t.inSlot);
                if (candidates.length === 0) return prev;
                const maxLayer = Math.max(...candidates.map(t => t.layer));
                const topTile = candidates.find(t => t.layer === maxLayer);
                if (!topTile) return prev;
                return prev.map(t => t.id === topTile.id ? {
                  ...t,
                  removed: true
                } : t);
              });
            }, 300);
            break;
          }
        case 'autoHint':
          break;
        case 'edgeVision':
          break;
        case 'luck':
          luck += eff.value;
          break;
      }
    }

    // P7: 性格加成 — 来自 computePersonalityEffects（已包含叠加规则）
    const soloFishBonus = personalityEffects.isSoloBattle ? personalityEffects.soloBonus : 0;
    const totalBonusRatio = fMult - 1 + personalityEffects.fishBonus + soloFishBonus;
    setFishMultiplier(1 + totalBonusRatio); // 保持向后兼容
    const cleverLevel = personalityEffects.extraFishLimit >= 2 ? 5 : personalityEffects.extraFishLimit >= 1 ? 3 : 1;
    const fishCalc = calculateFishReward(0, totalBonusRatio, personalityEffects.extraFishLimit > 0, cleverLevel);
    setExtraRestarts(restarts);
    setSlotBonus(tempSlotB);

    // P3: 白猫醒目 - 开局自动消除1组（仅普通牌，不破坏干扰牌与牌型平衡）
    if (slots.slice(3, 6).some(b => b && PASSIVE_EFFECTS[b]?.type === 'autoHint')) {
      setTimeout(() => {
        setTiles(prev => {
          const avail = prev.filter(t => !t.removed && !t.inSlot && !t.isInterference && !isTileBlocked(t, prev));
          const typeCounts = {};
          avail.forEach(t => {
            const mt = getTileMatchType(t);
            typeCounts[mt] = (typeCounts[mt] || 0) + 1;
          });
          const pairType = Object.keys(typeCounts).find(k => typeCounts[k] >= 3);
          if (pairType) {
            const toRemove = avail.filter(t => getTileMatchType(t) === pairType).slice(0, 3);
            toRemove.forEach(t => {
              const cat = CAT_TYPES.find(c => c.id === t.type);
              if (cat) emitExplosion(tileX(t) + TILE_W / 2, tileY(t) + TILE_H / 2, cat.color);
            });
            return prev.map(t => toRemove.some(r => r.id === t.id) ? {
              ...t,
              removed: true
            } : t);
          }
          return prev;
        });
      }, 500);
    }
  }, [phase]);

  // P0: 棋盘尺寸由行列号和SAFE_ZONE唯一确定，不需层偏移余量
  const {
    boardW,
    boardH
  } = getBoardBounds(levelConfig.layers, levelConfig.boardType);
  const boardWidth = boardW;
  const boardHeight = boardH;
  const totalTiles = tiles.length;

  // Dynamic board scaling - 限制scale不超过1，确保棋盘始终完整显示在容器内
  useEffect(() => {
    const el = boardContainerRef.current;
    if (!el) return;
    const ro = new ResizeObserver(() => {
      const s = Math.min(1,
      // 限制最大scale=1，不放大棋盘
      el.clientWidth / boardWidth, el.clientHeight / boardHeight);
      setBoardScale(s);
    });
    ro.observe(el);
    return () => ro.disconnect();
  }, [boardWidth, boardHeight]);

  // Board canvas rAF loop（性能优化：静止时自动降帧到 10fps）
  useEffect(() => {
    const canvas = boardCanvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    canvas.width = boardWidth * dpr;
    canvas.height = boardHeight * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    let rafId;
    let last = performance.now();
    let lastTileCount = 0;
    let idleFrames = 0;
    function loop(now) {
      const dt = Math.min((now - last) / 1000, 0.05);
      last = now;
      const currentTiles = tilesRef.current || [];
      const hasParticles = runParticleFrame(ctx, dt) > 0;
      const tileCount = currentTiles.filter(t => !t.removed && !t.inSlot).length;
      const tileChanged = tileCount !== lastTileCount;
      lastTileCount = tileCount;
      // 无粒子且画面静止时跳过绘制
      if (hasParticles || tileChanged || idleFrames < 2) {
        drawTiles(ctx, currentTiles, highlightedTilesRef.current || [], hoveredTileId, boardWidth, boardHeight);
        idleFrames = hasParticles || tileChanged ? 0 : idleFrames + 1;
        rafId = requestAnimationFrame(loop);
      } else {
        // 静止时降帧到 10fps，大幅降低功耗
        setTimeout(() => { rafId = requestAnimationFrame(loop); }, 100);
      }
    }
    rafId = requestAnimationFrame(loop);
    return () => cancelAnimationFrame(rafId);
  }, [boardWidth, boardHeight]);

  // Canvas 点击 → 命中检测 → handleTileClick（通过 ref 调用，避免闭包过期）
  const onBoardClick = useCallback(e => {
    const canvas = boardCanvasRef.current;
    if (!canvas) return;
    // 防抖：250ms 内重复点击忽略，防止双击/触屏+鼠标事件导致串牌
    const now = Date.now();
    if (now - lastClickTimeRef.current < 250) return;
    lastClickTimeRef.current = now;
    const rect = canvas.getBoundingClientRect();
    const px = (e.clientX - rect.left) * (boardWidth / rect.width);
    const py = (e.clientY - rect.top) * (boardHeight / rect.height);
    const tile = hitTestTile(tilesRef.current, px, py);
    if (tile && handleTileClickRef.current) handleTileClickRef.current(tile);
  }, [boardWidth, boardHeight]);
  const onBoardHover = useCallback(e => {
    const canvas = boardCanvasRef.current;
    if (!canvas) return;
    const rect = canvas.getBoundingClientRect();
    const px = (e.clientX - rect.left) * (boardWidth / rect.width);
    const py = (e.clientY - rect.top) * (boardHeight / rect.height);
    const tile = hitTestTile(tilesRef.current, px, py);
    setHoveredTileId(tile ? tile.id : null);
  }, [boardWidth, boardHeight]);
  const handleTileClick = useCallback(tile => {
    if (gameState !== GAME_PLAYING) return;
    if (tile.removed || tile.inSlot) return;
    if (isTileBlocked(tile, tilesRef.current)) return;

    // 三花牌变身锁定：变身动画期间不可点击
    if (transformLocked.includes(tile.id)) {
      setTransformToast('🔮 卡牌正在变换，暂时无法操作！');
      setTimeout(() => setTransformToast(''), 1000);
      return;
    }

    // 舔毛牌：判断是否为舔毛牌
    const isGroomCard = tile.isInterference && tile.interferenceType === 'groom';
    // 粘连牌：判断是否为粘连牌
    const isStickyCard = tile.isInterference && tile.interferenceType === 'sticky';
    // 小狗牌：判断是否为小狗牌
    const isDangerCard = tile.isInterference && tile.interferenceType === 'danger';
    // 真身牌：判断是否为真身牌
    const isDisguiseCard = tile.isInterference && tile.interferenceType === 'disguise';
    // 胆小性格：干扰牌阻挡 + 胆大性格：危险牌减免
    const persEff = personalityEffectsRef.current || {};
    const cowardlyActive = cowardlyInterferenceBlockedRef.current;
    const groomBlockOverride = isGroomCard && cowardlyActive;
    const stickyBlockOverride = isStickyCard && cowardlyActive; // 胆小减免：粘连牌仅自身入槽
    const braveAutoRemove = isDangerCard && persEff.fishLossRatio <= 0.30; // 胆大挚爱：自动移除狗牌
    const dangerBlockOverride = isDangerCard && cowardlyActive || braveAutoRemove; // 胆小或胆大减免
    // freezeBlockOverride 使用组件级计算（影响CollectionSlot渲染和容量计算）

    // ═══ 小狗牌核心规则：入槽立即判定失败（优先级最高） ═══
    // 胆大挚爱(fishLossRatio<=0.30): 自动移除狗牌
    if (braveAutoRemove) {
      setTiles(prev => prev.map(t => t.id === tile.id ? {
        ...t,
        removed: true
      } : t));
      setDangerToast('🛡️ 胆大猫咪帮你抵挡了小狗牌！');
      setTimeout(() => setDangerToast(''), 1000);
      return;
    }
    // 胆小或胆大减免(>=80%): 小狗牌仅占槽位不失败
    if (isDangerCard && !dangerBlockOverride) {
      // 标记卡牌入槽
      setTiles(prev => prev.map(t => t.id === tile.id ? {
        ...t,
        inSlot: true
      } : t));
      // 立即触发闯关失败
      setDangerToast('❌ 你选中了小狗牌，本局闯关失败！');
      setTimeout(() => {
        setDangerToast('');
        setTiles(prev => prev.map(t => t.inSlot ? {
          ...t,
          inSlot: false
        } : t));
        setSlot([]);
        setGroomSlots([]);
        setTempStorage([]);
        setGameState(GAME_LOSE);
      }, 1500);
      return; // 终止，不执行后续任何逻辑
    }

    // ═══ 真身牌核心规则：点击未暴露的真身牌时，立即揭穿并直接入收集槽 ═══
    // 揭穿后去掉伪装壳，以原始type正常入槽、正常三消
    if (isDisguiseCard && !tile.revealed) {
      if (slotRef.current.length >= effectiveCapacity) return;
      // 揭穿：去掉伪装壳，露出原始牌面
      setTiles(prev => prev.map(t => t.id === tile.id ? {
        ...t,
        revealed: true,
        inSlot: true,
        isDisguiseShell: false
      } : t));
      setDisguiseToast('🫧 你发现了真身牌！伪装已揭穿，自动进入收集槽');
      window._disguiseToastShown = true;
      setTimeout(() => setDisguiseToast(''), 1000);

      // 直接入收集槽，用原始type参与三消匹配
      if (matchTimeoutRef.current) {
        clearTimeout(matchTimeoutRef.current);
        matchTimeoutRef.current = null;
      }
      const uid = ++uidRef.current;
      // 真身牌入槽用原始type，可以和同类型普通牌凑成三消
      const slotItemType = tile.type; // 原始猫咪type
      const slotItem = {
        uid,
        type: slotItemType,
        tileId: tile.id,
        isGroom: false,
        interferenceType: 'disguise',
        areaTag: tile.areaTag,
        visualType: tile.visualType || tile.type
      };
      setMoveCount(m => m + 1);
      setMoveHistory(h => [...h, {
        uid,
        type: slotItemType,
        tileId: tile.id,
        tile
      }]);

      // 检查三消
      const nextSlot = [...slotRef.current, slotItem];
      const curTemp = tempStorageRef.current;
      const combined = [...curTemp, ...nextSlot];
      const sameType = combined.filter(s => s.type === slotItemType && !s.isGroom);
      if (sameType.length >= MATCH_COUNT) {
        const tempMatches = sameType.filter(s => curTemp.some(ts => ts.uid === s.uid));
        const tempRemoveCount = Math.min(tempMatches.length, MATCH_COUNT);
        const slotRemoveCount = MATCH_COUNT - tempRemoveCount;
        const allMatchUids = sameType.slice(0, MATCH_COUNT).map(s => s.uid);
        setSlot(nextSlot);
        setMatching(allMatchUids);

        // 粒子特效
        const catDef = CAT_TYPES.find(c => c.id === slotItemType);
        const pColor = catDef ? catDef.color : '#FFD700';
        sameType.slice(0, MATCH_COUNT).forEach(s => {
          const mt = tilesRef.current.find(t => t.id === s.tileId);
          if (mt) emitExplosion(tileX(mt) + TILE_W / 2, tileY(mt) + TILE_H / 2, pColor);
        });

        // 连消/得分
        setComboCount(c => c + 1);
        const now = Date.now();
        const isCombo = now - lastMatchTimeRef.current < 2000;
        lastMatchTimeRef.current = now;
        setScore(prev => {
          let pts = 10;
          if (isCombo) pts += 5;
          // 高冷性格得分加成
          const pers = personalityEffectsRef.current || {};
          if (pers.scoreBonus > 0) pts = Math.round(pts * (1 + pers.scoreBonus));
          return prev + pts;
        });
        setMaxCombo(c => Math.max(c, sameType.filter(s => s.type === slotItemType).length));
        const matchedTileIds = sameType.slice(0, MATCH_COUNT).map(s => s.tileId);
        matchTimeoutRef.current = setTimeout(() => {
          setTiles(prev => prev.map(t => matchedTileIds.includes(t.id) ? {
            ...t,
            removed: true,
            matched: false
          } : t));
          setTempStorage(prev => {
            let removed = 0;
            return prev.filter(s => {
              if (s.type === slotItemType && !s.isGroom && removed < tempRemoveCount) {
                removed++;
                return false;
              }
              return true;
            });
          });
          setSlot(prev => {
            const remaining = [...prev];
            let removed2 = 0;
            for (let i = remaining.length - 1; i >= 0 && removed2 < slotRemoveCount; i--) {
              if (remaining[i].type === slotItemType && !remaining[i].isGroom) {
                remaining.splice(i, 1);
                removed2++;
              }
            }
            return remaining;
          });
          setMatching([]);
        }, 350);
      } else {
        setSlot(nextSlot);
      }
      return; // 真身牌揭穿+入槽完成
    }

    // 粘连牌：寻找上下左右相邻的可点击卡牌（优先级：上→下→左→右）
    let stickyAdjacentTile = null;
    if (isStickyCard && !stickyBlockOverride) {
      const directions = [{
        dr: -1,
        dc: 0
      },
      // 上
      {
        dr: 1,
        dc: 0
      },
      // 下
      {
        dr: 0,
        dc: -1
      },
      // 左
      {
        dr: 0,
        dc: 1
      } // 右
      ];
      const allTiles = tilesRef.current;
      for (const {
        dr,
        dc
      } of directions) {
        const adjacent = allTiles.find(t => !t.removed && !t.inSlot && t.row === tile.row + dr && t.col === tile.col + dc && t.layer === tile.layer && !isTileBlocked(t, allTiles));
        if (adjacent) {
          stickyAdjacentTile = adjacent;
          break;
        }
      }
    }

    // 冰冻牌占据前N格（胆小减免生效时不扣减） + 舔毛牌占据槽位
    const frozenOffset = frozenSlot && !freezeBlockOverride ? levelConfig.freeze_grid_count || 1 : 0;
    let effectiveCapacity = SLOT_CAPACITY + slotBonus - frozenOffset;

    // 粘连牌容量校验：需同时放入粘连牌+被连带的卡牌，剩余容量不足则直接失败
    const stickyBatchSize = stickyAdjacentTile ? 2 : 1; // 连带1张=2，无连带=1
    if (isStickyCard && !stickyBlockOverride) {
      if (slotRef.current.length + stickyBatchSize > effectiveCapacity) {
        // 容量不足，触发失败
        setStickyToast('🩹 收集槽容量不足，无法放入卡牌！');
        setTimeout(() => {
          setTiles(prev => prev.map(t => t.inSlot ? {
            ...t,
            inSlot: false
          } : t));
          setSlot([]);
          setGroomSlots([]);
          setTempStorage([]);
          setGameState(GAME_LOSE);
        }, 800);
        return;
      }
    } else {
      if (slotRef.current.length >= effectiveCapacity) return;
    }

    // Cancel any pending match cleanup from a previous match
    if (matchTimeoutRef.current) {
      clearTimeout(matchTimeoutRef.current);
      matchTimeoutRef.current = null;
    }
    const uid = ++uidRef.current;
    // 胆小减免下小狗牌用originalType参与三消匹配；真身牌揭穿后直接入槽（不走此分支）；其他情况直接用tile.type
    const slotItemType = isDangerCard && dangerBlockOverride && tile.originalType ? tile.originalType : getTileMatchType(tile);
    const slotItem = {
      uid,
      type: slotItemType,
      tileId: tile.id,
      isGroom: isGroomCard && !groomBlockOverride,
      interferenceType: tile.isInterference ? tile.interferenceType : null,
      areaTag: tile.areaTag,
      visualType: getTileDisplayType(tile)
    };

    // 粘连牌首次点击提示
    if (isStickyCard && !stickyBlockOverride && !stickyAdjacentTile && groomSlots.length === 0 && !window._stickyToastShown) {
      // 粘连牌无相邻牌，仅自身入槽，不显示连带提示
    }
    if (isStickyCard && !stickyBlockOverride && stickyAdjacentTile) {
      setStickyToast('🩹 粘连牌已连带1张卡牌进入收集槽，额外消耗1个槽位！');
      window._stickyToastShown = true;
      setTimeout(() => {
        setStickyToast('');
        window._stickyToastShown = false;
      }, 1000);
    }

    // 舔毛牌首次进入收集槽提示
    if (isGroomCard && !groomBlockOverride && groomSlots.length === 0) {
      setGroomToast(true);
      setTimeout(() => setGroomToast(false), 1000);
    }

    // 舔毛牌进入收集槽后，标记为永久占位
    if (isGroomCard && !groomBlockOverride) {
      setGroomSlots(prev => [...prev, {
        uid,
        type: tile.type,
        tileId: tile.id
      }]);
    }

    // Mark tile as in-slot (not yet matched — stays on board dimmed)
    // 粘连牌：同时标记被连带的相邻卡牌

              const idx = remaining.findIndex(r => r.id === t.id);

              matchTimeoutRef.current = null;

            setMatching([]);
            // 从末尾找到非舔毛牌

            for (let i = slotRef.current.length - 1; i >= 0; i--) {
              if (!slotRef.current[i].isGroom) {
                lastNonGroom2 = slotRef.current[i];
                break;
              }
            }
            if (!lastNonGroom2) break;
            const tileExists = tilesRef.current.some(t => t.id === lastNonGroom2.tileId && t.removed);
            if (tileExists) setTiles(prev => prev.map(t => t.id === lastNonGroom2.tileId ? {
              ...t,
              removed: false,
              inSlot: false
