name: Deploy Verification

on:
  deployment_status:
    branches: [main]

jobs:
  smoke-api:
    name: API 冒烟测试
    if: github.event.deployment_status.state == 'success' && contains(github.event.deployment_status.target_url, 'mwlxx.qzz.io')
    runs-on: ubuntu-latest
    steps:
      - name: 等待部署稳定
        run: sleep 10

      - name: 健康检查（带重试）
        run: |
          echo "🏥 健康检查 https://mwlxx.qzz.io/health"
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 10 https://mwlxx.qzz.io/health 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ 健康检查通过（第${i}次尝试）"
              exit 0
            fi
            echo "   第${i}次: HTTP $STATUS，10秒后重试..."
            sleep 10
          done
          echo "❌ 健康检查失败，已重试5次"
          exit 1

      - name: API 可达性检查
        run: |
          echo "🔌 检查 API..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 10 https://mwlxx.qzz.io/api/auth/me 2>/dev/null || echo "000")
          echo "Auth endpoint 返回 HTTP $STATUS"
          echo "✅ 服务正常运行"

      - name: 前端资源检查
        run: |
          echo "📦 检查前端资源..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 10 https://mwlxx.qzz.io/index.html 2>/dev/null || echo "000")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ index.html 正常返回"
          else
            echo "⚠️ index.html 返回 HTTP $HTTP_CODE（可能刚部署还在预热）"
          fi

  smoke-browser:
    name: 浏览器冒烟测试
    if: github.event.deployment_status.state == 'success' && contains(github.event.deployment_status.target_url, 'mwlxx.qzz.io')
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 等待部署稳定
        run: sleep 20

      - name: 安装 Playwright
        run: npm install playwright && npx playwright install chromium --with-deps

      - name: Headless 浏览器测试
        run: node test/smoke.mjs
