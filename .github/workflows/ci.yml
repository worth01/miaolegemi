name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [dev]

jobs:
  # ═══ 后端类型检查 ═══
  typecheck:
    name: TypeScript 类型检查
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: 安装依赖
        run: npm ci

      - name: 生成 Prisma Client
        run: npx prisma generate

      - name: 类型检查
        run: npx tsc --noEmit

  # ═══ 前端构建验证 ═══
  frontend-check:
    name: 前端构建验证
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: Babel 构建验证
        run: npm run build -- --check

  # ═══ 安全检查 ═══
  security-check:
    name: 安全检查
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 检查敏感文件泄露
        run: |
          echo "🔍 检查 .env 文件是否被提交..."
          FILES=$(git diff --name-only origin/main HEAD)
          if echo "$FILES" | grep -qE '(\.env$|\.env\.local$)'; then
            echo "❌ 发现 .env 文件！这些文件包含敏感信息，禁止提交。"
            echo "请添加到 .gitignore 并删除已跟踪的文件。"
            exit 1
          fi
          echo "✅ 未发现敏感文件泄露"

      - name: 检查密钥硬编码
        run: |
          echo "🔍 检查密钥硬编码..."
          if grep -r "JWT_SECRET.*=.*[a-zA-Z0-9]\{20,\}" server/src/ --include="*.ts" 2>/dev/null; then
            echo "⚠️  警告：发现疑似硬编码密钥，请使用环境变量"
          else
            echo "✅ 未发现密钥硬编码"
          fi
