<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>消消乐粒子特效 Demo</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0F0A1E; display: flex; flex-direction: column; align-items: center; min-height: 100vh; font-family: -apple-system, sans-serif; color: #F0EDFF; overflow: hidden; }
h1 { margin: 16px 0 8px; font-size: 18px; opacity: 0.8; }
.controls { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; justify-content: center; }
.controls button { padding: 6px 14px; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; background: rgba(255,255,255,0.08); color: #F0EDFF; cursor: pointer; font-size: 13px; transition: all 0.2s; }
.controls button:hover { background: rgba(255,255,255,0.15); }
.controls button.active { background: #6C5CE7; border-color: #6C5CE7; }
canvas { border-radius: 12px; cursor: pointer; }
.hint { margin-top: 10px; font-size: 12px; opacity: 0.5; }
</style>
</head>
<body>
<h1>✨ 消消乐粒子特效系统</h1>
<div class="controls">
  <button class="active" onclick="setEffect('explosion')">爆炸</button>
  <button onclick="setEffect('sparkle')">星光</button>
  <button onclick="setEffect('shatter')">碎片</button>
  <button onclick="setEffect('combo')">连击</button>
  <button onclick="setEffect('all')">全部演示</button>
</div>
<canvas id="c"></canvas>
<div class="hint">点击棋盘任意位置触发特效 | 拖拽可画轨迹</div>

<script>
// ============================================================
//  粒子系统核心引擎 — Canvas 2D
// ============================================================
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
const DPR = window.devicePixelRatio || 1;

function resize() {
  W = Math.min(window.innerWidth - 32, 400);
  H = Math.min(window.innerHeight - 140, 600);
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
resize();
window.addEventListener('resize', resize);

// ---- 粒子池 ----
const particles = [];
const MAX_PARTICLES = 2000;

class Particle {
  constructor() { this.active = false; }
  init(opts) {
    this.active = true;
    this.x = opts.x;
    this.y = opts.y;
    this.vx = opts.vx || 0;
    this.vy = opts.vy || 0;
    this.ax = opts.ax || 0;
    this.ay = opts.ay || 0;
    this.life = opts.life || 1;
    this.maxLife = this.life;
    this.size = opts.size || 3;
    this.sizeEnd = opts.sizeEnd ?? 0;
    this.color = opts.color || '#FFD700';
    this.alpha = opts.alpha ?? 1;
    this.alphaEnd = opts.alphaEnd ?? 0;
    this.rotation = opts.rotation || 0;
    this.rotationSpeed = opts.rotationSpeed || 0;
    this.shape = opts.shape || 'circle'; // circle | rect | star | ring
    this.gravity = opts.gravity ?? 0.3;
    this.friction = opts.friction ?? 0.98;
    this.glow = opts.glow ?? false;
    this.trail = opts.trail ?? false;
    this.trailHistory = [];
  }
  update(dt) {
    if (!this.active) return;
    this.life -= dt;
    if (this.life <= 0) { this.active = false; return; }
    this.vx += this.ax * dt;
    this.vy += (this.ay + this.gravity) * dt;
    this.vx *= this.friction;
    this.vy *= this.friction;
    this.x += this.vx * dt * 60;
    this.y += this.vy * dt * 60;
    this.rotation += this.rotationSpeed * dt;
    if (this.trail) {
      this.trailHistory.push({ x: this.x, y: this.y });
      if (this.trailHistory.length > 8) this.trailHistory.shift();
    }
  }
  draw(ctx) {
    if (!this.active) return;
    const t = 1 - this.life / this.maxLife;
    const alpha = this.alpha + (this.alphaEnd - this.alpha) * t;
    const size = this.size + (this.sizeEnd - this.size) * t;
    if (alpha <= 0 || size <= 0) return;

    ctx.save();
    ctx.globalAlpha = Math.max(0, alpha);

    // Trail
    if (this.trail && this.trailHistory.length > 1) {
      ctx.beginPath();
      ctx.moveTo(this.trailHistory[0].x, this.trailHistory[0].y);
      for (let i = 1; i < this.trailHistory.length; i++) {
        ctx.lineTo(this.trailHistory[i].x, this.trailHistory[i].y);
      }
      ctx.strokeStyle = this.color;
      ctx.lineWidth = size * 0.5;
      ctx.globalAlpha = alpha * 0.3;
      ctx.stroke();
      ctx.globalAlpha = Math.max(0, alpha);
    }

    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);

    if (this.glow) {
      ctx.shadowColor = this.color;
      ctx.shadowBlur = size * 3;
    }

    ctx.fillStyle = this.color;

    if (this.shape === 'circle') {
      ctx.beginPath();
      ctx.arc(0, 0, size, 0, Math.PI * 2);
      ctx.fill();
    } else if (this.shape === 'rect') {
      ctx.fillRect(-size, -size * 0.6, size * 2, size * 1.2);
    } else if (this.shape === 'star') {
      drawStar(ctx, 0, 0, 5, size, size * 0.4);
    } else if (this.shape === 'ring') {
      ctx.beginPath();
      ctx.arc(0, 0, size, 0, Math.PI * 2);
      ctx.strokeStyle = this.color;
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }

    ctx.restore();
  }
}

function drawStar(ctx, cx, cy, spikes, outerR, innerR) {
  ctx.beginPath();
  for (let i = 0; i < spikes * 2; i++) {
    const r = i % 2 === 0 ? outerR : innerR;
    const angle = (Math.PI * i) / spikes - Math.PI / 2;
    const x = cx + Math.cos(angle) * r;
    const y = cy + Math.sin(angle) * r;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fill();
}

// 获取或创建粒子
function getParticle() {
  for (let i = 0; i < particles.length; i++) {
    if (!particles[i].active) return particles[i];
  }
  if (particles.length < MAX_PARTICLES) {
    const p = new Particle();
    particles.push(p);
    return p;
  }
  return null;
}

// ============================================================
//  特效生成器
// ============================================================

// 颜色方案（对应猫咪稀有度）
const PALETTES = {
  N:  ['#A8D8EA', '#B8E6CF', '#C4E1F5'],
  R:  ['#7EC8E3', '#58D68D', '#82E0AA'],
  SR: ['#BB8FCE', '#8E44AD', '#D2B4DE'],
  SSR:['#F7DC6F', '#FFD700', '#F0B27A', '#FF6B6B'],
  combo: ['#FF6B6B', '#FF8E53', '#FFD93D', '#6BCB77', '#4D96FF', '#9B59B6'],
};

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function rand(a, b) { return a + Math.random() * (b - a); }

// ---- 1. 爆炸效果 ----
function emitExplosion(x, y, palette = 'SR', count = 35) {
  const colors = PALETTES[palette] || PALETTES.SR;
  // 内核闪光
  const core = getParticle();
  if (core) core.init({
    x, y, life: 0.3, size: 20, sizeEnd: 0,
    color: '#FFFFFF', alpha: 1, alphaEnd: 0,
    shape: 'circle', gravity: 0, glow: true,
  });
  // 冲击波环
  const ring = getParticle();
  if (ring) ring.init({
    x, y, life: 0.5, size: 5, sizeEnd: 50,
    color: pick(colors), alpha: 0.8, alphaEnd: 0,
    shape: 'ring', gravity: 0, glow: true,
  });
  // 碎片粒子
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i) / count + rand(-0.2, 0.2);
    const speed = rand(2, 6);
    const p = getParticle();
    if (!p) break;
    p.init({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: rand(0.5, 1.0),
      size: rand(2, 5), sizeEnd: 0,
      color: pick(colors),
      shape: Math.random() > 0.5 ? 'rect' : 'circle',
      gravity: rand(0.2, 0.5),
      friction: 0.97,
      rotation: rand(0, Math.PI * 2),
      rotationSpeed: rand(-5, 5),
      glow: Math.random() > 0.6,
    });
  }
  // 星星
  for (let i = 0; i < 6; i++) {
    const angle = rand(0, Math.PI * 2);
    const speed = rand(1, 4);
    const p = getParticle();
    if (!p) break;
    p.init({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: rand(0.6, 1.2),
      size: rand(3, 6), sizeEnd: 0,
      color: '#FFD700',
      shape: 'star',
      gravity: 0.15,
      rotationSpeed: rand(-3, 3),
      glow: true,
    });
  }
}

// ---- 2. 星光闪耀 ----
function emitSparkle(x, y, palette = 'SSR', count = 20) {
  const colors = PALETTES[palette] || PALETTES.SSR;
  for (let i = 0; i < count; i++) {
    const angle = rand(0, Math.PI * 2);
    const speed = rand(0.5, 2.5);
    const p = getParticle();
    if (!p) break;
    p.init({
      x: x + rand(-15, 15),
      y: y + rand(-15, 15),
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - rand(0.5, 1.5),
      life: rand(0.6, 1.5),
      size: rand(1.5, 4), sizeEnd: 0,
      color: pick(colors),
      shape: Math.random() > 0.3 ? 'star' : 'circle',
      gravity: -0.05,
      friction: 0.99,
      rotationSpeed: rand(-2, 2),
      glow: true,
      trail: Math.random() > 0.7,
    });
  }
  // 中心光晕
  const glow = getParticle();
  if (glow) glow.init({
    x, y, life: 0.6, size: 15, sizeEnd: 0,
    color: pick(colors), alpha: 0.5, alphaEnd: 0,
    shape: 'circle', gravity: 0, glow: true,
  });
}

// ---- 3. 碎片飞散 ----
function emitShatter(x, y, palette = 'R', count = 18) {
  const colors = PALETTES[palette] || PALETTES.R;
  for (let i = 0; i < count; i++) {
    const angle = rand(0, Math.PI * 2);
    const speed = rand(3, 7);
    const p = getParticle();
    if (!p) break;
    p.init({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - rand(1, 3),
      life: rand(0.4, 0.9),
      size: rand(3, 7), sizeEnd: rand(1, 3),
      color: pick(colors),
      alpha: 1, alphaEnd: 0.3,
      shape: 'rect',
      gravity: rand(0.4, 0.8),
      friction: 0.96,
      rotation: rand(0, Math.PI * 2),
      rotationSpeed: rand(-8, 8),
    });
  }
}

// ---- 4. 连击文字 + 环形波 ----
function emitCombo(x, y, combo) {
  // 连击数越大颜色越炫
  const paletteIdx = Math.min(combo - 1, PALETTES.combo.length - 1);
  const color = PALETTES.combo[paletteIdx];
  // 环形冲击波
  for (let i = 0; i < 3; i++) {
    const ring = getParticle();
    if (!ring) break;
    ring.init({
      x, y, life: 0.6 + i * 0.15,
      size: 3, sizeEnd: 30 + i * 20,
      color, alpha: 0.7 - i * 0.2, alphaEnd: 0,
      shape: 'ring', gravity: 0, glow: true,
    });
  }
  // 粒子环
  const count = 12 + combo * 4;
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i) / count;
    const speed = rand(2, 4) + combo * 0.5;
    const p = getParticle();
    if (!p) break;
    p.init({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: rand(0.5, 1.0),
      size: rand(2, 4), sizeEnd: 0,
      color: pick(PALETTES.combo),
      shape: 'star',
      gravity: 0,
      friction: 0.96,
      glow: true,
      rotationSpeed: rand(-4, 4),
    });
  }
  // 文字（用额外粒子模拟大字）
  return { x, y, combo, color, life: 1.2, maxLife: 1.2 };
}

// ============================================================
//  棋盘绘制 + 交互
// ============================================================
const COLS = 7, ROWS = 7, CELL = Math.floor(W / COLS);
const GRID_PAD_X = (W - COLS * CELL) / 2;
const GRID_PAD_Y = 10;

const CAT_EMOJIS = ['🐱','😺','😸','😻','😼','🙀','😽','😹','🐾','🐟','🧶','🐈'];
let grid = [];
function initGrid() {
  grid = [];
  for (let r = 0; r < ROWS; r++) {
    grid[r] = [];
    for (let c = 0; c < COLS; c++) {
      grid[r][c] = Math.floor(Math.random() * CAT_EMOJIS.length);
    }
  }
}
initGrid();

let comboTexts = [];

function drawGrid() {
  // Background grid
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const x = GRID_PAD_X + c * CELL;
      const y = GRID_PAD_Y + r * CELL;
      ctx.fillStyle = (r + c) % 2 === 0 ? 'rgba(255,255,255,0.04)' : 'rgba(255,255,255,0.02)';
      ctx.fillRect(x, y, CELL, CELL);
      // Emoji
      if (grid[r] && grid[r][c] !== null) {
        ctx.font = `${CELL * 0.55}px serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(CAT_EMOJIS[grid[r][c]], x + CELL / 2, y + CELL / 2 + 1);
      }
    }
  }
  // Border
  ctx.strokeStyle = 'rgba(255,255,255,0.1)';
  ctx.lineWidth = 1;
  ctx.strokeRect(GRID_PAD_X, GRID_PAD_Y, COLS * CELL, ROWS * CELL);
}

function cellAt(px, py) {
  const c = Math.floor((px - GRID_PAD_X) / CELL);
  const r = Math.floor((py - GRID_PAD_Y) / CELL);
  if (r >= 0 && r < ROWS && c >= 0 && c < COLS) return { r, c };
  return null;
}

let currentEffect = 'explosion';
function setEffect(name) {
  currentEffect = name;
  document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  if (name === 'all') runAllDemo();
}

function runAllDemo() {
  const cx = W / 2, cy = H / 2;
  let delay = 0;
  const demos = [
    () => emitExplosion(cx - 80, cy - 80, 'N'),
    () => emitExplosion(cx + 80, cy - 80, 'R'),
    () => emitExplosion(cx - 80, cy + 80, 'SR'),
    () => emitExplosion(cx + 80, cy + 80, 'SSR'),
    () => emitSparkle(cx, cy, 'SSR', 30),
    () => emitShatter(cx, cy - 40, 'SR'),
    () => { comboTexts.push(emitCombo(cx, cy + 40, 7)); },
  ];
  demos.forEach((fn, i) => setTimeout(fn, i * 400));
}

// Click handler
canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const px = e.clientX - rect.left;
  const py = e.clientY - rect.top;

  if (currentEffect === 'all') return;

  const cell = cellAt(px, py);
  const cx = cell ? GRID_PAD_X + cell.c * CELL + CELL / 2 : px;
  const cy = cell ? GRID_PAD_Y + cell.r * CELL + CELL / 2 : py;

  if (currentEffect === 'explosion') {
    const palettes = ['N', 'R', 'SR', 'SSR'];
    emitExplosion(cx, cy, pick(palettes));
    if (cell && grid[cell.r][cell.c] !== null) grid[cell.r][cell.c] = null;
  } else if (currentEffect === 'sparkle') {
    emitSparkle(cx, cy, 'SSR');
  } else if (currentEffect === 'shatter') {
    emitShatter(cx, cy, 'SR');
    if (cell && grid[cell.r][cell.c] !== null) grid[cell.r][cell.c] = null;
  } else if (currentEffect === 'combo') {
    comboTexts.push(emitCombo(cx, cy, Math.floor(rand(2, 9))));
  }
});

// Drag trail
let dragging = false;
canvas.addEventListener('mousedown', () => dragging = true);
canvas.addEventListener('mouseup', () => dragging = false);
canvas.addEventListener('mouseleave', () => dragging = false);
canvas.addEventListener('mousemove', (e) => {
  if (!dragging) return;
  const rect = canvas.getBoundingClientRect();
  const px = e.clientX - rect.left;
  const py = e.clientY - rect.top;
  for (let i = 0; i < 3; i++) {
    const p = getParticle();
    if (!p) break;
    p.init({
      x: px + rand(-5, 5), y: py + rand(-5, 5),
      vx: rand(-0.5, 0.5), vy: rand(-1.5, -0.5),
      life: rand(0.4, 0.8),
      size: rand(2, 4), sizeEnd: 0,
      color: pick(PALETTES.combo),
      shape: 'star', gravity: 0.05, glow: true,
      rotationSpeed: rand(-3, 3),
    });
  }
});

// ============================================================
//  主循环
// ============================================================
let lastTime = performance.now();

function frame(now) {
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;

  // Clear
  ctx.clearRect(0, 0, W, H);
  // Background
  ctx.fillStyle = '#0F0A1E';
  ctx.fillRect(0, 0, W, H);

  // Draw grid
  drawGrid();

  // Update & draw particles
  for (let i = 0; i < particles.length; i++) {
    if (particles[i].active) {
      particles[i].update(dt);
      particles[i].draw(ctx);
    }
  }

  // Draw combo texts
  comboTexts = comboTexts.filter(ct => {
    ct.life -= dt;
    if (ct.life <= 0) return false;
    const t = 1 - ct.life / ct.maxLife;
    const scale = 1 + t * 0.5;
    const alpha = t < 0.1 ? t / 0.1 : (1 - t);
    ctx.save();
    ctx.globalAlpha = Math.max(0, alpha);
    ctx.translate(ct.x, ct.y);
    ctx.scale(scale, scale);
    ctx.font = 'bold 28px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = ct.color;
    ctx.shadowColor = ct.color;
    ctx.shadowBlur = 15;
    ctx.fillText(`${ct.combo}x 连击!`, 0, 0);
    // Outline
    ctx.strokeStyle = '#FFF';
    ctx.lineWidth = 1;
    ctx.strokeText(`${ct.combo}x 连击!`, 0, 0);
    ctx.restore();
    return true;
  });

  // Particle count debug
  const activeCount = particles.filter(p => p.active).length;
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.font = '11px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(`particles: ${activeCount}`, 8, H - 8);

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

// Auto demo on load
setTimeout(() => {
  emitExplosion(W * 0.3, H * 0.4, 'SR');
  emitExplosion(W * 0.7, H * 0.4, 'SSR');
  setTimeout(() => emitSparkle(W * 0.5, H * 0.3, 'SSR'), 300);
  setTimeout(() => comboTexts.push(emitCombo(W * 0.5, H * 0.6, 5)), 600);
}, 500);
</script>
</body>
</html>
